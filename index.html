      g.appendChild(el('text', { x:0, y:cardY+11, 'text-anchor':'middle',
        fill:textCol, 'font-size':fs2, 'font-weight':nameWeight,
        'font-family':"'Syne',sans-serif" }, line1));
      if (line2) g.appendChild(el('text', { x:0, y:cardY+11+fs2+1, 'text-anchor':'middle',
        fill:textCol, 'font-size':fs2, 'font-weight':nameWeight,
        'font-family':"'Syne',sans-serif" }, line2));
    }

    /* dates */
    if (showDates) {
      const alive = p.death === null || p.death === undefined;
      const bs = formatYearShort(p.birth, false);
      const ds = formatYearShort(p.death, alive);
      g.appendChild(el('text', { x:0, y:cardY+28, 'text-anchor':'middle',
        fill:mutedCol, 'font-size':7.5, 'font-family':"'JetBrains Mono',monospace" }, bs+'–'+ds));
    }

    /* Portrait IN MIDDLE of card (between dates and epoch) */
    if (showPortrait) {
      const portraitY = cardY + 32; /* below dates */
      /* single circular background + Epochen-Ring (kein Tier-Doppelring) */
      g.appendChild(el('circle', { cx:0, cy:portraitY+19, r:19, fill:bgCard,
        stroke:p.color, 'stroke-width':2 }));
      /* fallback initial behind the image */
      g.appendChild(el('text', { x:0, y:portraitY+24, 'text-anchor':'middle',
        fill:p.color, 'font-size':15, 'font-weight':'800',
        'font-family':"'Syne',sans-serif", opacity:'0.5' }, dispName(p).replace(/^(Ps\.-|al-)/i,'').charAt(0)));
      /* image (covers initial when it loads; falls back avif→webp→jpg→hide) */
      const pBase = portraitBase(p);
      const img = el('image', {
        x:-17, y:portraitY+2, width:34, height:34,
        href: pPortrait,
        preserveAspectRatio:'xMidYMid slice',
        'clip-path':'circle(17px at 17px 17px)'
      });
      /* Fallback chain via data attribute */
      img.setAttribute('data-fallback', _imgExt === 'avif' ? 'webp' : _imgExt === 'webp' ? 'jpg' : '');
      img.addEventListener('error', function(){
        const fb = img.getAttribute('data-fallback');
        if (fb === 'webp') { img.setAttribute('data-fallback','jpg'); img.setAttributeNS('http://www.w3.org/1999/xlink','href', pBase+'.webp'); img.setAttribute('href', pBase+'.webp'); }
        else if (fb === 'jpg') { img.setAttribute('data-fallback',''); img.setAttributeNS('http://www.w3.org/1999/xlink','href', pBase+'.jpg'); img.setAttribute('href', pBase+'.jpg'); }
        else { img.style.display='none'; }
      });
      g.appendChild(img);
    }

    /* epoch */
    if (showEpoch) {
      const eShort = p.epoch.length>15 ? p.epoch.substring(0,14)+'…' : p.epoch;
      g.appendChild(el('text', { x:0, y:cardY+cH-7, 'text-anchor':'middle',
        fill:p.color, 'font-size':7, 'font-family':"'JetBrains Mono',monospace", opacity:'0.85' }, eShort));
    }

    /* invisible hit rect — for hover + click */
    const hit = el('rect', { x:-CARD_W/2, y:cardY, width:CARD_W, height:cH, fill:'transparent', style:'cursor:pointer' });
    hit.addEventListener('click', () => tlOpenModal(p));
    hit.addEventListener('mouseenter', () => {
      if (_unfocusTimer) { clearTimeout(_unfocusTimer); _unfocusTimer = null; }
      showHoverCard(p, cx, above, cardY, cH);
      setFocus(p.name);
    });
    hit.addEventListener('mouseleave', () => {
      /* Verzögert entfokussieren — wechselt die Maus auf einen verbundenen
         Knoten, wird der neue Fokus gesetzt und dieser Timer abgebrochen.
         Das verhindert das Flacker-Pingpong in Überlappungszonen. */
      if (_unfocusTimer) clearTimeout(_unfocusTimer);
      _unfocusTimer = setTimeout(() => {
        hideHoverCard();
        setFocus(null);
        _unfocusTimer = null;
      }, 90);
    });
    /* ── Touch (C11): erster Tap wirkt wie Hover, zweiter Tap öffnet Details ── */
    hit.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      _tchX = t.clientX; _tchY = t.clientY; _tchT = Date.now();
    }, { passive: true });
    hit.addEventListener('touchend', (e) => {
      const t = e.changedTouches[0];
      const movedPx = Math.hypot(t.clientX - _tchX, t.clientY - _tchY);
      if (movedPx > 12 || Date.now() - _tchT > 600) return;  /* Wischen/Halten = kein Tap */
      e.preventDefault();   /* unterdrückt synthetische mouseenter/click-Events */
      if (_lastTapName === p.name) {
        /* zweiter Tap auf dieselbe Karte → Detail-Modal */
        hideHoverCard();
        tlOpenModal(p);
        _lastTapName = null;
      } else {
        /* erster Tap → wie Hover: Info-Karte + Fokus/Kette (erweitert sich
           beim Tappen auf verbundene Karten, genau wie am Desktop) */
        if (_unfocusTimer) { clearTimeout(_unfocusTimer); _unfocusTimer = null; }
        showHoverCard(p, cx, above, cardY, cH);
        setFocus(p.name);
        _lastTapName = p.name;
      }
    }, { passive: false });
    g.appendChild(hit);
    nodeG.appendChild(g);
  });

  svg.appendChild(nodeG);

  /* Achse mittig: alle Inhalte (außer <defs>) vertikal so verschieben,
     dass die Zeitachse exakt in der Mitte der SVG-Fläche liegt. */
  if (window._contentShiftY) {
    const shiftG = el('g', { transform: 'translate(0,' + window._contentShiftY + ')' });
    const toMove = [];
    Array.from(svg.childNodes).forEach(ch => {
      if (ch.tagName && ch.tagName.toLowerCase() === 'defs') return;
      toMove.push(ch);
    });
    toMove.forEach(ch => shiftG.appendChild(ch));
    svg.appendChild(shiftG);
  }
  /* Container vertikal zur Achse zentrieren, falls das SVG höher als der Viewport ist.
     So bleibt die Achse IMMER auf derselben sichtbaren Höhe — kein Sprung beim Zoomen. */
  const wrapEl = document.getElementById('tl-wrap');
  if (wrapEl) {
    const svgH = parseFloat(svg.getAttribute('height')) || SVG_H;
    const axisAbsY = svgH / 2;   /* Achse sitzt mittig im SVG */
    const target = Math.max(0, axisAbsY - wrapEl.clientHeight / 2);
    wrapEl.scrollTop = target;
  }

  /* update count */
  const vc = document.getElementById('vis-count');
  if (vc) {
    const filterActive = epoch || window._currentEra || search || discFilter || movFilter || posFilter || themaFilter;
    if (filterActive) {
      vc.innerHTML = '<span class="vc-hl">' + hlCnt + ' hervorgehoben</span>'
        + '<span class="vc-sep"> · </span>'
        + '<span class="vc-dim">' + cnt + ' sichtbar</span>';
    } else {
      vc.textContent = cnt + ' Philosoph:innen sichtbar';
    }
  }

  if (viewMode === 'table') renderTable();
}

/* ════════ Hover Card ════════ */
function showHoverCard(p, cx, above, cardY, cH) {
  const card = document.getElementById('tl-hover');
  const wrap = document.getElementById('tl-wrap');
  if (!card || !wrap) return;
  const fav = isFav(p);
  const pPortrait = portraitUrl(p);
  const hb = portraitBase(p);
  card.innerHTML = (pPortrait ?
    `<picture><source srcset="${hb}.avif" type="image/avif"><source srcset="${hb}.webp" type="image/webp">`
    + `<img class="tl-hc-portrait" src="${hb}.jpg" alt="${dispName(p)}" onerror="this.closest('picture').style.display='none'"></picture>` : '')
    + `<span class="tl-hc-epoch" style="background:${p.color}">${p.epoch}</span>`
    + `<div class="tl-hc-name">${dispName(p)}${fav ? ' <span style="color:'+p.color+';font-size:.9rem">★</span>' : ''}</div>`
    + `<div class="tl-hc-dates">${lifeStr(p)}</div>`
    + `<div class="tl-hc-desc">${(p.desc||'').substring(0,180)}${(p.desc||'').length>180?'…':''}</div>`;
  card.style.borderColor = p.color;
  /* Position: relative to wrap viewport */
  const scrollLeft = wrap.scrollLeft;
  const wrapRect = wrap.getBoundingClientRect();
  const outerRect = document.getElementById('tl-outer').getBoundingClientRect();
  const screenX = cx - scrollLeft;
  /* prefer above the card if card is below axis, else below */
  let left = screenX - 130;
  if (left < 10) left = 10;
  if (left + 260 > wrapRect.width) left = wrapRect.width - 270;
  let top;
  if (above) {
    /* card is above axis → show hover further above */
    top = cardY - 130;
  } else {
    /* card is below axis → show hover above the card */
    top = cardY - 145;
  }
  if (top < 10) top = AXIS_Y + 120;
  card.style.left = left + 'px';
  card.style.top  = top + 'px';
  card.classList.add('show');
}
function hideHoverCard() {
  document.getElementById('tl-hover')?.classList.remove('show');
}

/* ════════ Zoom / Search ════════ */
/* Während des Zoomens Karten-Transitions abschalten → kein Aufblitzen/Nachziehen */
let _zoomAnimTimer = null;
function markZooming() {
  const w = document.getElementById('tl-wrap');
  if (!w) return;
  w.classList.add('zooming');
  if (_zoomAnimTimer) clearTimeout(_zoomAnimTimer);
  _zoomAnimTimer = setTimeout(() => w.classList.remove('zooming'), 180);
}

window.tlZoom = function(f) {
  const wrap = document.getElementById('tl-wrap');
  const ratio = wrap ? wrap.scrollLeft / Math.max(1, wrap.scrollWidth) : 0;
  markZooming();
  zoom = Math.max(0.28, Math.min(8.0, zoom * f));
  document.getElementById('zoom-lbl').textContent = '×' + zoom.toFixed(1);
  render();
  /* scrollLeft SOFORT (synchron) setzen — nicht im nächsten Frame.
     Mit scroll-behavior:auto springt er instantan → kein sichtbares Nachrücken. */
  if (wrap) wrap.scrollLeft = ratio * wrap.scrollWidth;
  hideHoverCard();
};

window.tlReset = function() {
  zoom = 1.0;
  document.getElementById('zoom-lbl').textContent = '×1.0';
  epoch = ''; search = ''; window._currentEra = '';
  filterMode = 'epoch'; discFilter = ''; movFilter = ''; posFilter = ''; themaFilter = '';
  const si = document.getElementById('phil-search');
  if (si) si.value = '';
  /* Modus-Buttons auf "Epoche" zurücksetzen */
  document.querySelectorAll('.fm-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.fm-btn[data-mode="epoch"]')?.classList.add('active');
  /* Dropdown zurücksetzen */
  const dd = document.getElementById('epoch-dd');
  if (dd) dd.value = '';
  if (window._fillEpochDropdown) window._fillEpochDropdown();
  render();
  const wrap = document.getElementById('tl-wrap');
  if (wrap) setTimeout(() => { wrap.scrollLeft = BASE_W * 0.22; }, 60);
};

/* ════════ Focus (hover highlight) ════════ */
let _focusRaf = null;
function setFocus(name) {
  if (focusName === name) return;
  focusName = name;
  if (name) {
    const nb = computeConnected(name);
    if (_chainSet.has(name)) {
      /* Knoten gehört zur bestehenden Kette → erweitern (Linien nachverfolgen) */
      nb.forEach(x => _chainSet.add(x));
      _chainSet.add(name);
    } else {
      /* unverbundener Knoten → neue Kette beginnen */
      _chainSet = new Set(nb);
      _chainSet.add(name);
    }
    _connectedToFocus = new Set(_chainSet);
    _connectedToFocus.delete(name);
  }
  /* name === null (Karte verlassen): Kette bewusst NICHT löschen —
     sie bleibt hervorgehoben, bis die Maus die Timeline verlässt. */

  /* Volles Re-Render nur, wenn dadurch WIRKLICH neue Knoten ins DOM müssen,
     die aktuell weder im DOM sind noch es nach dem Wechsel wären.
     Wenn die Maus zwischen zwei bereits sichtbaren (verbundenen) Karten wechselt,
     reicht das leichte Update → kein DOM-Neuaufbau → kein Flackern. */
  function domHas(nm){ return !!document.querySelector('.phil-node-group[data-name="'+(window.CSS&&CSS.escape?CSS.escape(nm):nm)+'"]'); }
  let needsFullRender = false;
  if (name) {
    for (const cn of _connectedToFocus) {
      const cp = byName(cn);
      if (!cp) continue;
      const baseShow = (zoom >= MEGA_ZOOM) ? (zoom >= (TIER_VIS[cp.tier] || 1)) : MEGA.has(cp.name);
      /* Knoten fehlt im DOM UND wäre ohne Fokus nicht sichtbar → muss neu gezeichnet werden */
      if (!baseShow && !domHas(cn)) { needsFullRender = true; break; }
    }
    /* der fokussierte Knoten selbst muss da sein */
    const fp = byName(name);
    if (fp) {
      const baseShowSelf = (zoom >= MEGA_ZOOM) ? (zoom >= (TIER_VIS[fp.tier] || 1)) : MEGA.has(fp.name);
      if (!baseShowSelf && !domHas(name)) needsFullRender = true;
    }
  }
  if (_focusRaf) cancelAnimationFrame(_focusRaf);
  if (needsFullRender) {
    _focusRaf = requestAnimationFrame(() => { render(); });
  } else {
    _focusRaf = requestAnimationFrame(() => { updateFocusVisuals(); });
  }
}

/* Lightweight update: only redraw influence lines + adjust node opacity,
   without rebuilding the entire SVG (prevents hover flicker). */
function updateFocusVisuals() {
  const svg = document.getElementById('tl-svg');
  if (!svg) return;

  /* 1. Update node opacity — Kette bleibt hervorgehoben, Rest gedimmt */
  svg.querySelectorAll('.phil-node-group').forEach(g => {
    const nm = g.getAttribute('data-name');
    const p  = byName(nm);
    let dim = p ? dimmed(p) : false;
    if (_chainSet.size && nm !== focusName && !_chainSet.has(nm)) dim = true;
    g.setAttribute('opacity', dim ? '0.08' : '1');
  });

  /* 2. Rebuild influence layer */
  const old = document.getElementById('infl-g');
  if (!old) return;
  const W = svgW();
  const posMap = {};
  phils().forEach(p => { if (visible(p)) posMap[p.name] = xOf((p.birth + deathYearForPos(p)) / 2); });

  const inflG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  inflG.setAttribute('id', 'infl-g');
  const focusActive = inflMode === 'focus' && _chainSet.size > 0;

  phils().forEach(p => {
    if (!visible(p) || !p.influences) return;
    p.influences.forEach(inf => {
      if (!inflOn[inf.type]) return;
      const tx = posMap[inf.to]; if (tx === undefined) return;
      const fx = posMap[p.name];
      const touchesFocus = focusName && (p.name === focusName || inf.to === focusName);
      const inChain = _chainSet.size > 0 && _chainSet.has(p.name) && _chainSet.has(inf.to);
      if (inflMode === 'focus') { if (!_chainSet.size) return; if (!inChain) return; }
      const c = INFL_COL[inf.type];
      const isSearchHl = search && (p.name.toLowerCase().includes(search) || inf.to.toLowerCase().includes(search));
      const isDim = !focusActive && ((epoch && p.epoch !== epoch && (byName(inf.to)?.epoch) !== epoch) || (search && !isSearchHl));
      const strong = touchesFocus || isSearchHl;
      const curve = inf.type === 'student' ? -55 : inf.type === 'critic' ? 50 : -40;
      const mx = (fx + tx) / 2;
      const d = `M${fx},${AXIS_Y} C${mx},${AXIS_Y+curve} ${mx},${AXIS_Y+curve} ${tx},${AXIS_Y}`;
      const dash = inf.type==='critic' ? '6,3' : inf.type==='develops' ? '3,3' : 'none';
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', c);
      path.setAttribute('stroke-width', strong ? 2.6 : 1.4);
      path.setAttribute('stroke-dasharray', dash);
      path.setAttribute('opacity', isDim ? '0.04' : strong ? '0.85' : '0.32');
      path.setAttribute('marker-end', `url(#arr-${inf.type})`);
      inflG.appendChild(path);
    });
  });
  old.replaceWith(inflG);
}

window.tlSearch = function(val) {
  search = val.toLowerCase().trim();
  if (search.length > 1) {
    const found = phils().find(p => p.name.toLowerCase().includes(search) || dispName(p).toLowerCase().includes(search));
    if (found) {
      /* Ensure the found philosopher is visible: bump zoom to their tier threshold */
      const neededZoom = TIER_VIS[found.tier] || 1;
      if (zoom < neededZoom) {
        zoom = neededZoom;
        const zl = document.getElementById('zoom-lbl');
        if (zl) zl.textContent = '×' + zoom.toFixed(1);
      }
      render();
      /* Center on the found philosopher */
      const wrap = document.getElementById('tl-wrap');
      const cx = ((found.birth + deathYearForPos(found))/2 - YEAR_MIN) / YEAR_RANGE * svgW();
      if (wrap) {
        requestAnimationFrame(() => {
          wrap.scrollLeft = cx - wrap.clientWidth / 2;
        });
      }
      return;
    }
  }
  render();
};

function buildEpochFilter() {
  const dd = document.getElementById('epoch-dd');
  if (!dd) return;

  /* Zeiträume + Großepochen-Zuordnung. Konsistent mit der App, nicht streng historisch.
     era: 'Antike' | 'Mittelalter' | 'Neuzeit'  */
  const EPOCH_META = {
    'Vorsokratik':        { era:'Antike',      from:-600, to:-430 },
    'Sophistik':          { era:'Antike',      from:-485, to:-380 },
    'Klassisch':          { era:'Antike',      from:-450, to:-320 },
    'Kynismus':           { era:'Antike',      from:-410, to:-320 },
    'Hellenismus':        { era:'Antike',      from:-335, to:220  },
    'Spätantike':         { era:'Antike',      from:120,  to:600  },
    'Frühes MA':          { era:'Mittelalter', from:480,  to:1080 },
    'Islamisch':          { era:'Mittelalter', from:800,  to:1330 },
    'Scholastik':         { era:'Mittelalter', from:1000, to:1430 },
    'Mystik':             { era:'Mittelalter', from:1090, to:1370 },
    'Renaissance':        { era:'Neuzeit',     from:1300, to:1650 },
    'Rationalismus':      { era:'Neuzeit',     from:1590, to:1720 },
    'Empirismus':         { era:'Neuzeit',     from:1560, to:1780 },
    'Aufklärung':         { era:'Neuzeit',     from:1690, to:1800 },
    'Dt. Idealismus':     { era:'Neuzeit',     from:1780, to:1840 },
    '19. Jh.':            { era:'Neuzeit',     from:1800, to:1910 },
    'Lebensphilosophie':  { era:'Neuzeit',     from:1870, to:1960 },
    'Phänomenologie':     { era:'Neuzeit',     from:1890, to:1990 },
    'Existenz.':          { era:'Neuzeit',     from:1840, to:1990 },
    'Strukturalismus':    { era:'Neuzeit',     from:1910, to:1980 },
    'Analytisch':         { era:'Neuzeit',     from:1900, to:2025 },
    'Krit. Theorie':      { era:'Neuzeit',     from:1920, to:2000 },
    'Wissenschaftsphilo.':{ era:'Neuzeit',     from:1920, to:2000 },
    'Hermeneutik':        { era:'Neuzeit',     from:1900, to:2010 },
    'Politische Philo.':  { era:'Neuzeit',     from:1900, to:2010 },
    'Poststrukturalismus':{ era:'Neuzeit',     from:1920, to:2010 },
    'Pragmatismus':       { era:'Neuzeit',     from:1870, to:1960 },
    'Neopragmatismus':    { era:'Neuzeit',     from:1930, to:2010 },
    'Gegenwart':          { era:'Neuzeit',     from:1940, to:2025 },
  };
  window._EPOCH_META = EPOCH_META;

  /* Nur Epochen anzeigen, die tatsächlich Philosoph:innen haben */
  const present = new Set(phils().map(p => p.epoch));
  const meta = (typeof EPOCHS_META_V2 !== 'undefined' ? EPOCHS_META_V2 : []);
  const colorOf = {}; meta.forEach(e => colorOf[e.name] = e.color);

  function fmtYr(y){ return y < 0 ? Math.abs(y)+' v.Chr.' : ''+y; }

  /* Großepochen-Zeiträume (für die Dropdown-Beschriftung) */
  const ERA_RANGES = {
    'Antike':      '600 v.Chr.–600',
    'Mittelalter': '480–1370',
    'Neuzeit':     '1300–Jetzt (2026)',
  };

  /* Dropdown füllen: Alle → Großepochen → Einzelepochen (gruppiert) */
  function fillDropdown() {
    dd.innerHTML = '';

    /* 1) Alle Epochen */
    const optAll = document.createElement('option');
    optAll.value = ''; optAll.textContent = 'Alle Epochen';
    dd.appendChild(optAll);

    /* 2) Großepochen als eigene Gruppe */
    const gEra = document.createElement('optgroup');
    gEra.label = 'Großepochen';
    ['Antike','Mittelalter','Neuzeit'].forEach(era => {
      const o = document.createElement('option');
      o.value = 'era:' + era;
      o.textContent = `${era} (${ERA_RANGES[era]})`;
      gEra.appendChild(o);
    });
    dd.appendChild(gEra);

    /* 3) Einzelepochen, gruppiert nach Großepoche, nach Zeit sortiert */
    const items = Object.keys(EPOCH_META)
      .filter(name => present.has(name))
      .sort((a,b) => EPOCH_META[a].from - EPOCH_META[b].from);
    let currentEra = null, optgroup = null;
    items.forEach(name => {
      const m = EPOCH_META[name];
      if (m.era !== currentEra) {
        currentEra = m.era;
        optgroup = document.createElement('optgroup');
        optgroup.label = m.era + ' — Epochen';
        dd.appendChild(optgroup);
      }
      const o = document.createElement('option');
      o.value = name;
      o.textContent = `${name} (${fmtYr(m.from)}–${fmtYr(m.to)})`;
      optgroup.appendChild(o);
    });

    /* aktuellen Wert wiederherstellen */
    dd.value = window._currentEra ? ('era:' + window._currentEra) : (epoch || '');
  }

  /* Disziplinen + Strömungen aus den Daten sammeln (mit Häufigkeit) */
  function collectField(field) {
    const counts = {};
    phils().forEach(p => {
      (p[field] || []).forEach(v => { counts[v] = (counts[v] || 0) + 1; });
    });
    return Object.keys(counts).sort((a,b) => counts[b] - counts[a] || a.localeCompare(b))
                 .map(name => ({ name, count: counts[name] }));
  }

  /* Dropdown je nach Modus füllen */
  const MODE_META = {
    disc:  { field:'disc',  label:'Alle Disziplinen' },
    mov:   { field:'mov',   label:'Alle Strömungen' },
    pos:   { field:'pos',   label:'Alle Grundpositionen' },
    thema: { field:'thema', label:'Alle Themen' },
  };
  /* Themen intern gegliedert (B7): Reihenfolge = Anzeige-Reihenfolge im Dropdown */
  const THEMA_GROUPS = [
    ['Metaphysik',            ['Sein','Nichts','Zeit','Ewigkeit','Unendlichkeit','Kausalität','Modalität','Natur','Gott','Ideen']],
    ['Mensch & Geist',        ['Mensch','Seele','Körper','Person','Identität','Bewusstsein']],
    ['Erkenntnis & Sprache',  ['Erkenntnis','Wahrheit','Vernunft','Sprache']],
    ['Praxis & Gesellschaft', ['Freiheit','Wille','Gerechtigkeit','Politik','Glück']],
    ['Existenz & Ästhetik',   ['Tod','Liebe','Tragik','Langeweile','Schönheit']],
  ];
  function fillForMode() {
    if (filterMode === 'epoch') { fillDropdown(); return; }
    const meta = MODE_META[filterMode];
    if (!meta) return;
    dd.innerHTML = '';
    const optAll = document.createElement('option');
    optAll.value = ''; optAll.textContent = meta.label;
    dd.appendChild(optAll);
    const items = collectField(meta.field);
    if (filterMode === 'thema') {
      /* gruppiert nach THEMA_GROUPS; Zähler aus collectField */
      const countOf = {}; items.forEach(it => countOf[it.name] = it.count);
      const placed = new Set();
      THEMA_GROUPS.forEach(([grpLabel, themen]) => {
        const present = themen.filter(t => countOf[t]);
        if (!present.length) return;
        const og = document.createElement('optgroup');
        og.label = grpLabel;
        present.forEach(t => {
          const o = document.createElement('option');
          o.value = t; o.textContent = `${t} (${countOf[t]})`;
          og.appendChild(o); placed.add(t);
        });
        dd.appendChild(og);
      });
      /* nicht gruppierte Themen (falls künftig welche dazukommen) ans Ende */
      const rest = items.filter(it => !placed.has(it.name));
      if (rest.length) {
        const og = document.createElement('optgroup');
        og.label = 'Weitere';
        rest.forEach(it => {
          const o = document.createElement('option');
          o.value = it.name; o.textContent = `${it.name} (${it.count})`;
          og.appendChild(o);
        });
        dd.appendChild(og);
      }
    } else {
      items.forEach(item => {
        const o = document.createElement('option');
        o.value = item.name;
        o.textContent = `${item.name} (${item.count})`;
        dd.appendChild(o);
      });
    }
    const cur = { disc:discFilter, mov:movFilter, pos:posFilter, thema:themaFilter }[filterMode];
    dd.value = cur || '';
  }

  window._fillEpochDropdown = fillForMode;
  fillForMode();
}

/* Dropdown-Auswahl je nach aktivem Modus */
/* ── Tabellenansicht ── */
function tableVisiblePhils() {
  const seen = new Set();
  return phils().filter(p => {
    if (!p.slug || seen.has(p.slug)) return false;
    seen.add(p.slug);
    if (femaleOnly && !p.female) return false;
    return !dimmed(p);   /* aktive Filter (Epoche/Disziplin/Strömung/Grundposition/Thema) + Suche */
  });
}
function tlBadges(arr, hlVal) {
  if (!arr || !arr.length) return '<span style="opacity:.35">–</span>';
  return arr.map(v => '<span class="tl-badge' + (hlVal && v === hlVal ? ' hl' : '') + '">' + v + '</span>').join('');
}
window._tblRows = [];
window._tblOpenRow = function(i) {
  const p = window._tblRows[i];
  if (p) tlOpenModal(p);
};
window.tlTblSort = function(key) {
  if (_tblSort.key === key) _tblSort.dir *= -1;
  else { _tblSort.key = key; _tblSort.dir = 1; }
  renderTable();
};
function renderTable() {
  const body = document.getElementById('tl-table-body');
  const meta = document.getElementById('tl-table-meta');
  if (!body) return;
  const rows = tableVisiblePhils();
  /* Sortierung */
  const k = _tblSort.key, d = _tblSort.dir;
  rows.sort((a,b) => {
    let va, vb;
    if (k === 'name') { va = dispName(a).toLowerCase(); vb = dispName(b).toLowerCase(); }
    else if (k === 'epoch') { va = a.epoch || ''; vb = b.epoch || ''; }
    else { va = a.birth; vb = b.birth; }
    return va < vb ? -d : va > vb ? d : 0;
  });
  /* Sortier-Pfeile */
  ['name','birth','epoch'].forEach(kk => {
    const el2 = document.getElementById('arr-' + kk);
    if (el2) el2.textContent = (_tblSort.key === kk) ? (_tblSort.dir === 1 ? '▲' : '▼') : '';
  });
  window._tblRows = rows;
  /* aktiver Filterwert je Achse → Badge hervorheben */
  const hlDisc = filterMode==='disc' ? discFilter : '';
  const hlMov  = filterMode==='mov'  ? movFilter  : '';
  const hlPos  = filterMode==='pos'  ? posFilter  : '';
  const hlThe  = filterMode==='thema'? themaFilter: '';
  /* Meta-Zeile */
  const fLabel = hlDisc || hlMov || hlPos || hlThe || (epoch || window._currentEra || '');
  meta.textContent = rows.length + ' Philosoph' + (rows.length === 1 ? ':in' : ':innen')
    + (fLabel ? ' · Filter: ' + fLabel : '') + (femaleOnly ? ' · nur Frauen' : '')
    + (search ? ' · Suche: „' + search + '"' : '');
  body.innerHTML = rows.map((p, i) =>
    '<tr onclick="window._tblOpenRow(' + i + ')">'
    + '<td class="tl-tbl-name"><span class="tl-tbl-dot" style="background:' + (p.color||'#888') + '"></span>' + dispName(p) + '</td>'
    + '<td class="tl-tbl-life">' + lifeStr(p) + '</td>'
    + '<td class="tl-tbl-epoch">' + (p.epoch ? '<span class="tl-epoch-pill" style="color:' + (p.color||'#999') + ';background:' + (p.color||'#999') + '1a;border-color:' + (p.color||'#999') + '55">' + p.epoch + '</span>' : '') + '</td>'
    + '<td>' + tlBadges(p.disc, hlDisc) + '</td>'
    + '<td>' + tlBadges(p.mov, hlMov) + '</td>'
    + '<td class="opt-col">' + tlBadges(p.pos, hlPos) + '</td>'
    + '<td class="opt-col">' + tlBadges(p.thema, hlThe) + '</td>'
    + '</tr>'
  ).join('');
}
/* CSV-Export der aktuellen Tabellenansicht (respektiert Filter/Sortierung) */
window.tlTblExport = function() {
  const rows = window._tblRows || [];
  if (!rows.length) return;
  const esc = v => '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
  const head = ['Philosoph','Geboren','Gestorben','Epoche','Disziplinen','Strömungen','Grundpositionen','Themen'];
  const lines = [head.map(esc).join(';')];
  rows.forEach(p => lines.push([
    dispName(p),
    p.birth,
    (p.death == null ? '' : p.death),
    p.epoch || '',
    (p.disc || []).join(', '),
    (p.mov || []).join(', '),
    (p.pos || []).join(', '),
    (p.thema || []).join(', ')
  ].map(esc).join(';')));
  /* BOM + Semikolon → öffnet sauber in deutschem Excel/LibreOffice */
  const blob = new Blob(['\ufeff' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  const fLabel = (filterMode==='disc'&&discFilter) || (filterMode==='mov'&&movFilter)
    || (filterMode==='pos'&&posFilter) || (filterMode==='thema'&&themaFilter) || epoch || window._currentEra || '';
  const suffix = fLabel ? '-' + fLabel.toLowerCase().replace(/[^a-z0-9äöüß]+/gi,'-') : '';
  a.href = URL.createObjectURL(blob);
  a.download = 'philosophen' + suffix + '.csv';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
};

/* ════════ Drag scroll ════════ */
function setupDrag() {
  const w = document.getElementById('tl-wrap');
  if (!w) return;
  let dn=false, sx, sl, moved=false;
  /* Maus verlässt die Timeline komplett → Hover-Kette auflösen, Filter-Ansicht zurück */
  w.addEventListener('mouseleave', () => {
    if (_unfocusTimer) { clearTimeout(_unfocusTimer); _unfocusTimer = null; }
    _lastTapName = null;
    if (_chainSet.size || focusName) {
      _chainSet = new Set();
      _connectedToFocus = new Set();
      focusName = null;
      hideHoverCard();
      requestAnimationFrame(() => render());
    }
  });
  /* Touch (C11): Tap auf den Timeline-HINTERGRUND löst die Kette auf
     (Äquivalent zum Verlassen der Timeline mit der Maus) */
  w.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    _tchX = t.clientX; _tchY = t.clientY; _tchT = Date.now();
  }, { passive: true });
  w.addEventListener('touchend', (e) => {
    const t = e.changedTouches[0];
    const movedPx = Math.hypot(t.clientX - _tchX, t.clientY - _tchY);
    if (movedPx > 12 || Date.now() - _tchT > 600) return;   /* Wischen = Scrollen, kein Tap */
    const onCard = e.target && e.target.closest && e.target.closest('.phil-node-group');
    if (onCard) return;   /* Karten-Taps behandelt der Karten-Handler */
    _lastTapName = null;
    if (_chainSet.size || focusName) {
      _chainSet = new Set();
      _connectedToFocus = new Set();
      focusName = null;
      hideHoverCard();
      requestAnimationFrame(() => render());
    }
  }, { passive: true });
  w.addEventListener('mousedown', e=>{dn=true; moved=false; sx=e.pageX-w.offsetLeft; sl=w.scrollLeft;});
  w.addEventListener('mouseleave',()=>{dn=false; hideHoverCard(); setFocus(null);});
  w.addEventListener('mouseup',  ()=>{dn=false;});
  w.addEventListener('mousemove', e=>{if(!dn)return; e.preventDefault(); moved=true; w.scrollLeft=sl-(e.pageX-w.offsetLeft-sx); hideHoverCard();});
  let ts, tsl;
  w.addEventListener('touchstart', e=>{ts=e.touches[0].pageX-w.offsetLeft; tsl=w.scrollLeft;},{passive:true});
  w.addEventListener('touchmove',  e=>{w.scrollLeft=tsl-(e.touches[0].pageX-w.offsetLeft-ts);},{passive:true});

  /* ── Mausrad-Zoom: zoomt zum Cursor hin ── */
  let wheelRaf = null;
  let pendingFactor = 1;
  let pendingClientX = 0;
  w.addEventListener('wheel', e => {
    /* Only zoom on vertical wheel; let shift+wheel scroll horizontally */
    if (e.shiftKey) return;  /* shift+wheel = native horizontal scroll */
    e.preventDefault();
    hideHoverCard();
    /* Accumulate factor; apply on next animation frame for smoothness */
    const step = e.deltaY < 0 ? 1.12 : 1/1.12;
    pendingFactor *= step;
    pendingClientX = e.clientX;
    if (wheelRaf) return;
    wheelRaf = requestAnimationFrame(() => {
      applyWheelZoom(pendingFactor, pendingClientX);
      pendingFactor = 1;
      wheelRaf = null;
    });
  }, { passive:false });
}

/* Zoom by factor f, keeping the point under the cursor stationary */
function applyWheelZoom(f, clientX) {
  const w = document.getElementById('tl-wrap');
  if (!w) return;
  const prevZoom = zoom;
  const newZoom = Math.max(0.28, Math.min(8.0, zoom * f));
  if (newZoom === prevZoom) return;

  /* The x-coordinate (in SVG space) currently under the cursor */
  const rect = w.getBoundingClientRect();
  const cursorInWrap = clientX - rect.left;          /* px from left of viewport */
  const svgXUnderCursor = w.scrollLeft + cursorInWrap; /* px in old SVG space */
  const ratio = svgXUnderCursor / Math.max(1, svgW()); /* fractional position */

  markZooming();
  zoom = newZoom;
  document.getElementById('zoom-lbl').textContent = '×' + zoom.toFixed(1);
  render();

  /* Cursor-Punkt SOFORT (synchron) wiederherstellen — kein Frame mit falscher Position */
  const newSvgX = ratio * svgW();
  w.scrollLeft = newSvgX - cursorInWrap;
}

/* ════════ Modal ════════ */
window.tlOpenModal = function(p) {
  const modal = document.getElementById('pmodal');

    + `● Tier ${p.tier} · ${tierName(p)}</span>`

  document.getElementById('pm-name').textContent = dispName(p);

  } else {

  /* influence section */
  const out = (p.influences||[]);

                     .map(q=>({from:q.name, type:q.influences.find(i=>i.to===p.name).type}));
  let html = '';
  if (out.length) {
    html += `<span class="pmodal-infl-lbl">Hat beeinflusst</span><div class="pmodal-chips">`;
    out.forEach(i=>{
      const c=INFL_COL[i.type];
      const safeN = i.to.replace(/'/g,"\\'");
      html+=`<span class="pmodal-chip" style="background:${c}20;border-color:${c}55;color:${c}"
        onclick="tlCloseModal();setTimeout(()=>{const q=tlByName('${safeN}');if(q)tlOpenModal(q)},200)">
        <div class="chip-dot" style="background:${c}"></div>${i.to}
        <span style="opacity:.55;font-size:.63rem">${i.type}</span></span>`;
    });
    html += '</div>';
  }
  if (inc.length) {
    html += `<span class="pmodal-infl-lbl">Wurde beeinflusst durch</span><div class="pmodal-chips">`;
    inc.forEach(i=>{
      const c=INFL_COL[i.type];
      const safeN = i.from.replace(/'/g,"\\'");
      html+=`<span class="pmodal-chip" style="background:${c}20;border-color:${c}55;color:${c}"
        onclick="tlCloseModal();setTimeout(()=>{const q=tlByName('${safeN}');if(q)tlOpenModal(q)},200)">
        <div class="chip-dot" style="background:${c}"></div>${i.from}
        <span style="opacity:.55;font-size:.63rem">${i.type}</span></span>`;
    });
    html += '</div>';
  }
  document.getElementById('pm-infl').innerHTML = html;
  modal.classList.add('open');
  hideHoverCard();
};
window.tlCloseModal = function() { document.getElementById('pmodal')?.classList.remove('open'); };
window.tlByName = byName;

/* ════════ Responsive height ════════ */
function setH() {
  /* Feste Viewport-Höhe zwischen Filtern und Footer (zoom-unabhängig). */
  const h = Math.max(460, window.innerHeight - 290);
  const w = document.getElementById('tl-wrap');
  const o = document.getElementById('tl-outer');
  if (w) w.style.height = h+'px';
  if (o) o.style.height = h+'px';
  /* SVG-Höhe = Container-Höhe; Achse exakt mittig. */
  SVG_H  = h;
  AXIS_Y = Math.round(h / 2);
}

/* ════════ Init ════════ */
function init() {
  detectImageFormat();
  requestAnimationFrame(() => {
    setH();
    window.addEventListener('resize', ()=>{ setH(); render(); });
    new MutationObserver(()=>render()).observe(document.documentElement,
      { attributes:true, attributeFilter:['data-theme'] });

    buildInflToggles();
    buildEpochFilter();
    buildEpochLegend();
    setupDrag();

    const tryRender = (attempts) => {
      if (typeof PHILS_V2 !== 'undefined' && typeof EPOCHS_META_V2 !== 'undefined') {
        render();
        setTimeout(()=>{
          const w = document.getElementById('tl-wrap');
          if (w) w.scrollLeft = BASE_W * 0.20;
        }, 100);
      } else if ((attempts||0) < 50) {
        setTimeout(() => tryRender((attempts||0)+1), 100);
      }
    };
    tryRender(0);
  });
}

init();

})();

        <span class="diss-abstract-label">// KURZFASSUNG</span>
        Schellings unvollendetes Lebensprojekt, eine dreibändige Reihe über »Die Weltalter« zu schreiben, stellt
        die Forschung bis heute vor die Herausforderung, seine oft verschleiernd ausgedrückten Gedanken zu
        durchleuchten und sie systematisch und im Einklang mit seinen sonstigen Äußerungen zu rekonstruieren.
        In diesem Band zeigt Alexander Schmidt, dass Schelling seiner Philosophie ein an der Bibel orientiertes
        7-Phasen-Modell zugrunde legt, in dem sein lebenslanges Streben nach einem System der Freiheit seine
        Verwirklichung findet. Schmidt rekonstruiert Schellings metaphysisches System der Zeiten erstmals
        vollumfänglich, entschlüsselt das Weltalterprojekt in einem einzigen Ergebnissatz und belegt, dass
        Zeit für Schelling Geschichte ist, die als christliche Heilsgeschichte identifiziert werden muss.

      <p>Im Zentrum meines Denkens steht die Überzeugung, dass menschliches Leben grundlegend tragisch verfasst ist. Tragik bedeutet hier nicht bloß Leid oder Unglück, sondern eine strukturelle Eigenschaft menschlicher Existenz: Der Mensch handelt in einer Welt, deren Konsequenzen er niemals vollständig überblicken oder kontrollieren kann.</p>

      <p>Der Mensch ist für mich wesentlich ein erzählendes Wesen. Er lebt nicht nur, sondern deutet sein Leben, ordnet Erfahrungen und bildet Zusammenhänge durch Geschichten. Identität entsteht nicht als feste Substanz, sondern als narrative Struktur — durch das Zusammenspiel von Selbstdeutungen, Erinnerungen und den Geschichten, die andere über uns erzählen.</p>

      <p>Ein weiterer zentraler Gedanke meiner Philosophie ist die radikale Endlichkeit aller Existenz. Alles, was gedacht, erlebt oder erkannt wird, geschieht innerhalb zeitlicher, begrenzter Strukturen. Auch das Denken des Unendlichen bleibt selbst ein endlicher Akt.</p>

  <!-- Ch 4 -->
  <section class="phe-chapter" data-ch="4">
    <aside class="phe-margin-left">
      <div>
        <div class="phe-margin-stat">04</div>
        <div class="phe-margin-stat-label">Vierter Grundgedanke</div>
      </div>
      <div class="phe-margin-key">
        <div class="phe-margin-key-label">Definition</div>
        <div class="phe-margin-key-text">Metaphysik = <strong>Weltverhältnis</strong>. Nicht System, sondern Grundbewegung des Daseins.</div>
      </div>
    </aside>
    <main class="phe-main">
      <div class="phe-ch-num">Kapitel 04</div>
      <h2 class="phe-ch-title">Metaphysik als unvermeidliches Weltverhältnis</h2>
      <div class="phe-ch-subtitle">Animal metaphysicum — auch wer Metaphysik ablehnt, betreibt sie.</div>

      <p>Trotz aller Kritik an metaphysischen Systemen halte ich Metaphysik für unvermeidlich. Der Mensch ist ein <em>animal metaphysicum</em>: ein Wesen, das sich notwendig zur Welt als Ganzer verhält.</p>

      <p>Metaphysik verstehe ich dabei nicht primär als spekulatives System, sondern als grundlegendes Weltverhältnis — als die Weise, in der Menschen implizit oder explizit die Welt deuten. Jeder Mensch lebt mit Annahmen über Sinn, Ursprung, Tod, Zeit und Wirklichkeit, selbst wenn diese nie ausdrücklich formuliert werden. Metaphysik beginnt bereits dort, wo Fragen entstehen: <em>Warum ist überhaupt etwas? Warum muss ich sterben? Was ist der Sinn meines Lebens?</em></p>

      <div class="phe-pullquote">Der Mensch fragt nach dem Ganzen, obwohl er nie außerhalb des Endlichen steht.</div>

      <p>Diese Fragen lassen sich nicht abschließend beantworten, aber sie lassen sich auch nicht vollständig vermeiden. Auch der Versuch, Metaphysik zurückzuweisen, bleibt häufig selbst noch metaphysisch, weil er bereits bestimmte Annahmen über Wirklichkeit, Wahrheit und Sinn voraussetzt.</p>

      <p>Gleichzeitig muss jede Form von Metaphysik die Kritik von Kant, Nietzsche, Heidegger, Derrida und anderen ernst nehmen. Eine unreflektierte Metaphysik droht dogmatisch zu werden, wenn sie ihre eigenen Voraussetzungen vergisst.</p>
    </main>
    <aside class="phe-margin-right">
      <div class="phe-glosse">
        <span class="phe-glosse-tag">Randbemerkung</span>
        Auch der Reddit-Atheist mit dem Pfeil-im-Profilbild macht Metaphysik. Er hat es nur noch nicht bemerkt.
      </div>

  <!-- Ch 5 -->
  <section class="phe-chapter" data-ch="5">
    <aside class="phe-margin-left">
      <div>
        <div class="phe-margin-stat">05</div>
        <div class="phe-margin-stat-label">Fünfter Grundgedanke</div>
      </div>
      <div class="phe-margin-key">
        <div class="phe-margin-key-label">Spannung</div>
        <div class="phe-margin-key-text">Wissenschaft liefert die <strong>besten Erklärungen</strong> — aber sie bleibt das Werk endlicher Subjekte.</div>
      </div>
    </aside>
    <main class="phe-main">
      <div class="phe-ch-num">Kapitel 05</div>
      <h2 class="phe-ch-title">Wissenschaft, Kontingenz und die Stellung des Menschen</h2>
      <div class="phe-ch-subtitle">Der Mensch als kontingentes Resultat — und die Wissenschaft als menschliches Unternehmen.</div>

      <p>Ich halte viele wissenschaftliche Theorien für die bestmöglichen Erklärungen der Welt, die uns zur Verfügung stehen. Insbesondere die Evolutionstheorie und die moderne Kosmologie legen nahe, dass der Mensch kein notwendiger Endpunkt der Weltentwicklung ist, sondern ein kontingentes Ergebnis langer, zufälliger Prozesse.</p>

      <p>In diesem Sinn ist der Mensch nicht das Zentrum des Universums, sondern ein randständiges, zeitlich begrenztes Phänomen in einer unvorstellbar großen Wirklichkeit. Diese Einsicht steht im Spannungsverhältnis zum menschlichen Bedürfnis nach Bedeutung. Menschen neigen dazu, sich selbst zu überschätzen und Sinn dort zu erzeugen, wo keine objektive Zweckstruktur erkennbar ist.</p>

      <div class="phe-pullquote">Bedeutung nicht vorauszusetzen, sondern innerhalb einer Wirklichkeit zu denken, die sich nicht um unsere Bedeutung kümmert.</div>

      <p>Mythen, Narrative und metaphysische Systeme können als Versuche verstanden werden, diese mögliche Bedeutungslosigkeit zu überformen. Gleichzeitig ist die wissenschaftliche Perspektive nicht selbst sinnstiftend. Sie beschreibt, aber sie beantwortet nicht die existenzielle Frage nach Bedeutung.</p>

      <p>Auch die Wissenschaft selbst stößt an eine Grenze, die sie schwer reflektiert: Hinter jeder Theorie steht ein endliches Leben. Wissenschaftler sind nicht bloße Träger abstrakter Rationalität, sondern Personen mit Biografien, Interessen, Vorprägungen, Erfolgen und Kränkungen. Wissenschaft wird damit nicht relativiert, aber sie wird in ihrem menschlichen Charakter sichtbar.</p>
    </main>
    <aside class="phe-margin-right">
      <div class="phe-glosse">
        <span class="phe-glosse-tag">Randbemerkung</span>
        Die nüchterne Erkenntnis, ein Ergebnis kontingenter Evolution zu sein, ist seltsam tröstlich. Niemand hat Erwartungen an dich, die du nicht selbst gestellt hast.
      </div>

        <div class="phe-refs-label">Im Hintergrund</div>

  <!-- Ch 6 -->
  <section class="phe-chapter" data-ch="6">
    <aside class="phe-margin-left">
      <div>
        <div class="phe-margin-stat">06</div>
        <div class="phe-margin-stat-label">Sechster Grundgedanke</div>
      </div>
      <div class="phe-margin-key">
        <div class="phe-margin-key-label">These</div>
        <div class="phe-margin-key-text">Freiheit ist <strong>gelebte Erfahrung</strong>, nicht theoretische Schlussfolgerung.</div>
      </div>
    </aside>
    <main class="phe-main">
      <div class="phe-ch-num">Kapitel 06</div>
      <h2 class="phe-ch-title">Freiheit, Verantwortung und die Entstehung von Moral</h2>
      <div class="phe-ch-subtitle">Moral entsteht im Leben — Theorien stabilisieren sie, erzeugen sie nicht.</div>

      <p>Ich gehe davon aus, dass der Mensch frei ist — in einem grundlegenden, vor-theoretischen Sinn. Diese Freiheit ist nicht zuerst ein Problem der Kausalitätstheorie, sondern eine gelebte Erfahrung von Handlungsfähigkeit: Menschen erleben sich als Wesen, die handeln oder unterlassen können. Auf dieser Erfahrung basiert auch Verantwortung.</p>

      <p>Daraus folgt die Möglichkeit moralischer Zurechnung, Strafe und Anerkennung. Auch gesellschaftliche Praktiken wie Urteil und Kritik beruhen letztlich auf dieser geteilten Grundannahme menschlicher Verantwortlichkeit.</p>

      <div class="phe-pullquote">Moral entsteht nicht im Denken, sondern im Leben selbst.</div>

      <p>Gleichzeitig bin ich überzeugt, dass moralische Überzeugungen nicht in erster Linie aus späteren theoretischen Reflexionen entstehen. Die Grundlage des Moralischen liegt tiefer: in frühkindlicher Entwicklung, in Beziehungserfahrungen, in psychologischen Grundstrukturen wie Vertrauen, Bindung und der Erfahrung von Verlässlichkeit oder deren Fehlen. Besonders prägend ist dabei das, was man als <strong>Urvertrauen</strong> bezeichnen kann.</p>

      <p>Moralische Orientierung entsteht primär im gelebten sozialen Umfeld: in Familie, Kindheit, Erziehung, Schule, Freundschaften und frühen Beziehungserfahrungen. Philosophische Theorien können vorhandene moralische Intuitionen klären, reflektieren oder stabilisieren — aber sie erzeugen sie nur selten grundlegend neu.</p>
    </main>
    <aside class="phe-margin-right">
      <div class="phe-glosse">
        <span class="phe-glosse-tag">Randbemerkung</span>
        Wer denkt, dass Kant einen schlechten Menschen zu einem guten gemacht hätte, hat noch nie versucht, mit einem schlechten Menschen über Kant zu reden.
      </div>

        <div class="phe-refs-label">Im Hintergrund</div>

  </section>

  <!-- Ch 7 -->
  <section class="phe-chapter" data-ch="7">
    <aside class="phe-margin-left">
      <div>
        <div class="phe-margin-stat">07</div>
        <div class="phe-margin-stat-label">Siebter Grundgedanke</div>
      </div>
      <div class="phe-margin-key">
        <div class="phe-margin-key-label">Paradox</div>
        <div class="phe-margin-key-text">Der Mensch ist <strong>ersetzbar und unersetzlich zugleich</strong>.</div>
      </div>
    </aside>
    <main class="phe-main">
      <div class="phe-ch-num">Kapitel 07</div>
      <h2 class="phe-ch-title">Individuum, Sprache und das Unverfügbare</h2>
      <div class="phe-ch-subtitle">Das Individuelle entzieht sich dem Begriff — und das ist kein Mangel.</div>

      <p>Der Mensch ist zugleich ersetzbar und unersetzlich. In funktionalen Kontexten sind Menschen austauschbar — Rollen können neu besetzt, Aufgaben übernommen werden. Doch diese Ersetzbarkeit trifft nicht ohne Rest auf das zu, was wir Individualität nennen.</p>

      <p>Die Vernunft arbeitet notwendig mit Allgemeinheiten, mit Begriffen, Regeln und Strukturen. Das Individuelle als Individuelles entzieht sich ihr immer ein Stück weit. Es bleibt ein Überschuss, der nicht vollständig begrifflich fixierbar ist.</p>

      <div class="phe-pullquote">Jeder Mensch ist eine einmalige Verdichtung von Erfahrung, Beziehung, Erinnerung und gelebter Zeit.</div>

      <p>Diese Spannung zeigt sich in zwischenmenschlichen Beziehungen, in denen Bedeutung entsteht, die sich nicht vollständig auf Funktion oder Begriff reduzieren lässt. Vielleicht ist das, was hier <em>Liebe</em> genannt werden kann, genau diese Erfahrung: dass endliche Wesen einander in einer Weise bedeuten, die nicht vollständig in Begriffe, Funktionen oder Rollen auflösbar ist, obwohl sie niemals außerhalb der Endlichkeit steht.</p>

      <p>So bleibt der Mensch zugleich ersetzbar und unersetzlich, allgemeines Wesen und unaufhebbares Individuum — ein Spannungsverhältnis, das sich nicht auflösen lässt, sondern gelebt werden muss.</p>
    </main>
    <aside class="phe-margin-right">
      <div class="phe-glosse">
        <span class="phe-glosse-tag">Randbemerkung</span>
        LinkedIn ersetzt dich in zwei Wochen. Deine Großmutter nicht.
      </div>

  <!-- Ch 8 -->
  <section class="phe-chapter" data-ch="8">
    <aside class="phe-margin-left">
      <div>
        <div class="phe-margin-stat">08</div>
        <div class="phe-margin-stat-label">Achter Grundgedanke</div>
      </div>
      <div class="phe-margin-key">
        <div class="phe-margin-key-label">Doppelhorizont</div>
        <div class="phe-margin-key-text">Denken zielt auf <strong>Allgemeinheit</strong>, entsteht aber aus <strong>individuellem Leben</strong>.</div>
      </div>
    </aside>
    <main class="phe-main">
      <div class="phe-ch-num">Kapitel 08</div>
      <h2 class="phe-ch-title">Denken, Biografie und Wahrheit</h2>
      <div class="phe-ch-subtitle">Kein Gedanke ist biografielos — und das macht das Denken nicht beliebig.</div>

      <p>Philosophisches Denken ist nie rein abstrakt. Es entsteht aus einem konkreten Leben, aus Erfahrungen, Prägungen und individuellen Situationen. Auch wenn Philosophie auf Allgemeingültigkeit zielt, bleibt sie biografisch situiert.</p>

      <p>In vielen philosophischen Texten entsteht der Eindruck, als würde Denken aus einem rein abstrakten Raum hervorgehen: aus logischen Strukturen, allgemeinen Prinzipien oder zeitlosen Wahrheiten. Der Philosoph spricht dann scheinbar aus einer Perspektive, die von seinem eigenen Leben vollständig abgelöst ist. Ich halte diese Vorstellung für problematisch.</p>

      <div class="phe-pullquote">Jeder Gedanke bewegt sich zwischen dem konkreten Leben, aus dem er hervorgeht, und den allgemeinen Formen, in denen er sich ausdrückt.</div>

      <p>Das bedeutet nicht, dass Wahrheit relativ ist, sondern dass sie immer durch endliche Subjekte hindurch gedacht wird. Zwischen Lebensgeschichte und begrifflicher Geltung besteht eine unauflösbare Spannung, die das Denken zugleich begrenzt und lebendig hält.</p>

      <p>Der biografische Anteil des Denkens ist nicht bloß ein äußerlicher Faktor — er ist Teil seiner Lebendigkeit. Ohne ihn würde Philosophie leicht in Abstraktion erstarren und den Bezug zum menschlichen Leben verlieren, aus dem sie hervorgeht.</p>
    </main>
    <aside class="phe-margin-right">
      <div class="phe-glosse">
        <span class="phe-glosse-tag">Randbemerkung</span>
        Jede transzendentale Deduktion hat eine Kindheit. Manchmal eine schwierige.
      </div>

  <!-- Ch 9 -->
  <section class="phe-chapter" data-ch="9">
    <aside class="phe-margin-left">
      <div>
        <div class="phe-margin-stat">09</div>
        <div class="phe-margin-stat-label">Neunter Grundgedanke</div>
      </div>
      <div class="phe-margin-key">
        <div class="phe-margin-key-label">Doppelhorizont</div>
        <div class="phe-margin-key-text">Metaphysisch <strong>graduell</strong>, pragmatisch <strong>stabil</strong>. Beides gilt zugleich.</div>
      </div>
    </aside>
    <main class="phe-main">
      <div class="phe-ch-num">Kapitel 09</div>
      <h2 class="phe-ch-title">Wissen, Meinung und pragmatische Unterscheidungen</h2>
      <div class="phe-ch-subtitle">Keine harten metaphysischen Grenzen — und doch unverzichtbare Unterscheidungen.</div>

      <p>Ich gehe davon aus, dass es auf einer strengsten metaphysischen Ebene keine absolut scharfen Grenzen zwischen Wissen und Meinung, Wahrheit und Interpretation gibt. Übergänge sind graduell, nie hart.</p>

      <p>Dennoch sind solche Unterscheidungen im alltäglichen und wissenschaftlichen Kontext unverzichtbar und praktisch stabil. Sie besitzen keine absolute metaphysische Trennschärfe, aber eine <strong>funktionale Notwendigkeit</strong>. Wer Wissenschaft und Verschwörungsmythos für ununterscheidbar erklärt, weil sich keine absolute Grenze ziehen lässt, hat den Punkt der Argumentation verfehlt.</p>

      <div class="phe-pullquote">Nicht absolut, aber auch nicht beliebig.</div>

      <p>Erkenntnis bewegt sich zwischen graduellen Übergängen und pragmatischen Grenzziehungen. Das ist kein Widerspruch, sondern ein Doppelhorizont: Erkenntnis als graduell offen — Handlung als operativ stabil.</p>
    </main>
    <aside class="phe-margin-right">
      <div class="phe-glosse">
        <span class="phe-glosse-tag">Randbemerkung</span>
        Dass sich Wissen und Meinung graduell verhalten, heißt nicht, dass Großonkel Klausʼ Telegram-Channel gleichberechtigt neben dem CERN steht. Sehr graduell verhält es sich da nicht.
      </div>

      <h2 class="phe-ch-title">Endliches, erzählendes, fragendes Wesen</h2>
      <div class="phe-ch-subtitle">Eine Philosophie, die beim Leben anfängt — nicht beim System.</div>

      <p>Meine Philosophie bewegt sich insgesamt in einem Spannungsfeld aus Endlichkeit und Sinn, Tragik und Freiheit, Wissenschaft und Metaphysik, Individualität und Allgemeinheit.</p>

      <div class="phe-pullquote">Sie beginnt nicht bei einem abstrakten System, sondern beim menschlichen Leben selbst.</div>

      <p>Bei einem endlichen, erzählenden, fragenden und handelnden Wesen, das in einer Welt existiert, die es nicht vollständig verstehen oder beherrschen kann — und die es dennoch notwendig deutet.</p>

      <p>Diese neun Kapitel bilden keinen abgeschlossenen Bau. Sie sind eher die Skizze eines Denkens, das aus einem bestimmten Leben hervorgegangen ist und in einem bestimmten Leben weitergeht. Was darin haltbar bleibt, was sich verändert, was sich noch zeigen wird — das gehört zur Bewegung selbst.</p>
    </main>

  '<div class="pstat"><span class="pstat-num">'+PODS.length+'</span><span class="pstat-lbl">PODCASTS</span></div>'+

const cats=['Alle',...new Set(PODS.map(p=>p.cat))];
cats.forEach(c=>{
  const b=document.createElement('button');
  b.className='pod-cat-btn'+(c==='Alle'?' active':'');
  b.textContent=c;
  b.onclick=()=>{activeCat=c;document.querySelectorAll('.pod-cat-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderPods();};
  cn.appendChild(b);
});
function renderPods(){
  const g=document.getElementById('pod-grid2');g.innerHTML='';
  (activeCat==='Alle'?PODS:PODS.filter(p=>p.cat===activeCat)).forEach(p=>{
    const d=document.createElement('div');d.className='pod-card2';
    const safeName = p.name.replace(/"/g,'&quot;');
    const cover = p.img
      ? '<img class="pod-cover2" src="'+p.img+'" alt="'+safeName+' Cover" loading="lazy">'
      : '<div class="pod-icon2" style="background:'+p.bg+'">'+p.icon+'</div>';
    const linkIcon = p.url
      ? '<a class="pod-link2" href="'+p.url+'" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Auf Apple Podcasts öffnen">↗</a>'
      : '';
    const officialDesc = (p.offdesc && p.offdesc.length>10)
      ? '<div class="pod-offdesc"><span class="pod-offlabel">Offiziell:</span> '+p.offdesc+'</div>' : '';
    d.innerHTML = cover + '<div class="pod-body2"><div class="pod-name2">'+p.name+linkIcon+'</div>'
                + '<span class="pod-badge">'+p.cat+'</span>'
                + '<div class="pod-desc2">'+p.desc+'</div>' + officialDesc + '</div>';
    if (p.url) { d.style.cursor='pointer'; d.onclick=function(e){ if(e.target.tagName!=='A') window.open(p.url,'_blank','noopener'); }; }
    g.appendChild(d);
  });
}

// Hörbücher
let hbS='title',hbD=1;
window.sortHB=function(c){if(hbS===c)hbD*=-1;else{hbS=c;hbD=1;}filterHB();};
window.filterHB=function(){
  const tb=document.getElementById('hb-tbody'); if(!tb) return;
  const s=document.getElementById('hb-search'); const c=document.getElementById('hb-cat');
  const q=(s&&s.value||'').toLowerCase(); const fc=c&&c.value||'';
  let arr=HOERB.filter(h=>(!fc||h.cat===fc)&&(!q||(h.title+h.author).toLowerCase().includes(q)));
  arr.sort((a,b)=>{const x=a[hbS]||'',y=b[hbS]||'';return x<y?-hbD:x>y?hbD:0;});
  tb.innerHTML='';
  arr.forEach(h=>{
    const tr=document.createElement('tr');
    let cover;
    if (h.img) {
      cover = '<img class="hb-cover" src="'+h.img+'" alt="" loading="lazy">';
    } else {
      /* Kein lokales Cover → Platzhalter, der per Open Library nachgeladen wird */
      const q = encodeURIComponent(h.title + ' ' + h.author);
      cover = '<div class="hb-cover hb-cover-none" data-ol-title="'+
              (h.title+' '+h.author).replace(/"/g,'&quot;')+'">📖</div>';
    }
    const cls = {'Philosophie':'hb-philo','Psychologie':'hb-psych','Gaming':'hb-gaming','Literatur':'hb-lit','Selbstentwicklung':'hb-selbst','Geschichte':'hb-gesch','Wissenschaft':'hb-wiss','Musik / Biografie':'hb-musik'}[h.cat]||'';
    tr.innerHTML='<td class="hb-title-cell"><div class="hb-row-inner">'+cover+'<span>'+h.title+'</span></div></td>'
                +'<td>'+h.author+'</td>'
                +'<td><span class="hb-badge '+cls+'">'+h.cat+'</span></td>'
                +'<td>'+h.dauer+'</td>';
    tb.appendChild(tr);
  });
  const cnt=document.getElementById('hb-count'); if(cnt) cnt.textContent=arr.length+' Titel';
  loadOpenLibraryCovers();
};

/* ── Open Library Cover-Fallback ──
   Für Hörbücher ohne lokales Cover holen wir das Cover live von Open Library.
   Wir SPEICHERN nichts — das Bild wird direkt von covers.openlibrary.org im
   Browser des Besuchers geladen (covers.openlibrary.org ist ausdrücklich für
   die Anzeige auf öffentlichen Websites gedacht). Quelle wird angezeigt. */
const _olCache = {};
function loadOpenLibraryCovers(){
  document.querySelectorAll('.hb-cover-none[data-ol-title]').forEach(el => {
    const title = el.getAttribute('data-ol-title');
    if (!title || el.dataset.olDone) return;
    el.dataset.olDone = '1';
    if (_olCache[title] === 'none') return;
    if (_olCache[title]) { applyOlCover(el, _olCache[title], title); return; }
    const url = 'https://openlibrary.org/search.json?q=' +
                encodeURIComponent(title) + '&limit=1&fields=cover_i';
    fetch(url)
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => {
        const doc = d.docs && d.docs[0];
        if (doc && doc.cover_i) {
          /* Zugriff über Cover-ID → kein Rate-Limit */
          const cov = 'https://covers.openlibrary.org/b/id/' + doc.cover_i + '-M.jpg';
          _olCache[title] = cov;
          applyOlCover(el, cov, title);
        } else {
          _olCache[title] = 'none';
        }
      })
      .catch(() => { _olCache[title] = 'none'; });
  });
}
function applyOlCover(el, coverUrl, title){
  const img = new Image();
  img.className = 'hb-cover';
  img.alt = '';
  img.loading = 'lazy';
  img.title = 'Cover: Open Library';
  img.src = coverUrl;
  img.onload = () => { el.replaceWith(img); };
  /* bei Fehler bleibt das 📖-Emoji stehen */
}

filterHB();

window.renderPodcasts = function(){};

<script>
(function(){
'use strict';

/* ─── Local image paths ───────────────────────────────────────────

   hk_1.avif/.webp     hk_2.avif/.webp     hk_3.avif/.webp   _4.avif/.webp
   ff_1.avif/.webp     ff_2.avif/.webp     ff_3.avif/.webp   _4.avif/.webp
   lufia_1.avif/.webp  lufia_2.avif/.webp  lufia_3.avif/.webp   _4.avif/.webp

   future_cop_1.avif/.webp  future_cop_2.avif/.webp  future_cop_3.avif/.webp   _4.avif/.webp
   sg_1.avif/.webp     sg_2.avif/.webp     sg_3.avif/.webp   _4.avif/.webp
   pw_1.avif/.webp     pw_2.avif/.webp     pw_3.avif/.webp   _4.avif/.webp
   mmbn_1.avif/.webp   mmbn_2.avif/.webp   mmbn_3.avif/.webp   _4.avif/.webp
   hs_1.avif/.webp     hs_2.avif/.webp     hs_3.avif/.webp     hs_4.avif/.webp
──────────────────────────────────────────────────────────────── */
var IMG = {
  wc3:    ['assets/images/games/wc3_1',   'assets/images/games/wc3_2',   'assets/images/games/wc3_3', 'assets/images/games/wc3_4'],
  sc:     ['assets/images/games/sc_1',    'assets/images/games/sc_2',    'assets/images/games/sc_3', 'assets/images/games/sc_4'],

  hk:     ['assets/images/games/hk_1',    'assets/images/games/hk_2',    'assets/images/games/hk_3', 'assets/images/games/hk_4'],
  hkss:   ['assets/images/games/hkss_1',  'assets/images/games/hkss_2',  'assets/images/games/hkss_3', 'assets/images/games/hkss_4'],
  ff7remake:  ['assets/images/games/ff7remake_1','assets/images/games/ff7remake_2','assets/images/games/ff7remake_3','assets/images/games/ff7remake_4'],
  ff7rebirth: ['assets/images/games/ff7rebirth_1','assets/images/games/ff7rebirth_2','assets/images/games/ff7rebirth_3','assets/images/games/ff7rebirth_4'],

  ff8:    ['assets/images/games/ff8_1',   'assets/images/games/ff8_2',   'assets/images/games/ff8_3',   'assets/images/games/ff8_4'],
  ff9:    ['assets/images/games/ff9_1',   'assets/images/games/ff9_2',   'assets/images/games/ff9_3',   'assets/images/games/ff9_4'],
  ff10:   ['assets/images/games/ff10_1',  'assets/images/games/ff10_2',  'assets/images/games/ff10_3',  'assets/images/games/ff10_4'],

  ff:     ['assets/images/games/ff_1',    'assets/images/games/ff_2',    'assets/images/games/ff_3', 'assets/images/games/ff_4'],
  lufia:  ['assets/images/games/lufia_1', 'assets/images/games/lufia_2', 'assets/images/games/lufia_3', 'assets/images/games/lufia_4'],
  kknd:   ['assets/images/games/kknd2_1', 'assets/images/games/kknd2_2', 'assets/images/games/kknd2_3', 'assets/images/games/kknd2_4'],
  fc:     ['assets/images/games/future_cop_1','assets/images/games/future_cop_2','assets/images/games/future_cop_3', 'assets/images/games/future_cop_4'],
  sg:     ['assets/images/games/sg_1',    'assets/images/games/sg_2',    'assets/images/games/sg_3', 'assets/images/games/sg_4'],
  pw:     ['assets/images/games/pw_1',    'assets/images/games/pw_2',    'assets/images/games/pw_3', 'assets/images/games/pw_4'],
  mmbn:   ['assets/images/games/mmbn_1',  'assets/images/games/mmbn_2',  'assets/images/games/mmbn_3', 'assets/images/games/mmbn_4'],
  pokemon:['assets/images/games/pkmn_1',  'assets/images/games/pkmn_2',  'assets/images/games/pkmn_3', 'assets/images/games/pkmn_4'],
  hs:     ['assets/images/games/hs_1',    'assets/images/games/hs_2',    'assets/images/games/hs_3',    'assets/images/games/hs_4'],
};

// Per-image object-position overrides (index matches IMG array)
// Format: 'left|center|right top|center|bottom' or 'X% Y%'
var IMG_POS = {
  kknd: ['left bottom', 'left bottom', 'center center'],
  wc3:  ['center top', null, null, null],            // wc3_1 oberer Ausschnitt
  pw:   ['center 20%', 'center top', null, 'center top'], // pw_1 leicht runter; pw_2, pw_4 oben; pw_3 zentriert
  // Add overrides for other games as needed, e.g.:
  // fc: ['center bottom', null, null],
};

var EMOJI = {wc3:'⚔️',sc:'🚀',diablo:'💀',hs:'🃏',sotc:'🗿',hk:'🦋',ff:'✨',lufia:'🗡️',kknd:'💥',fc:'🤖',sg:'⏰',pw:'⚖️',mmbn:'💾',pokemon:'🔴',hkss:'🪡',ff7remake:'✨',ff7rebirth:'✨',ff7revelation:'✨',ff7original:'✨',ff8:'✨',ff9:'✨',ff10:'✨'};

/* ─── Tab switching ─────────────────────────────────────────────── */
window.showFFSub = function(which) {
  ['7','8','9','10'].forEach(function(k){
    var pane = document.getElementById('ffpane-' + k);
    var btn = document.getElementById('ffsub-' + k);
    if (pane) pane.style.display = (k === which) ? '' : 'none';
    if (btn) btn.classList.toggle('active', k === which);
  });
};
window.showFF7 = function(which) {
  ['remake','rebirth','revelation','original'].forEach(function(k){
    var pane = document.getElementById('ff7pane-' + k);
    var btn = document.getElementById('ff7-' + k);
    if (pane) pane.style.display = (k === which) ? '' : 'none';
    if (btn) btn.classList.toggle('active', k === which);
  });
};
window.showHKSub = function(which) {
  ['hk','hkss'].forEach(function(k){
    var pane = document.getElementById('hksub-pane-' + k);
    var btn = document.getElementById('hksub-' + k);
    if (pane) pane.style.display = (k === which) ? '' : 'none';
    if (btn) btn.classList.toggle('active', k === which);
  });
};

window.showGTab = function(name, idx) {
  document.querySelectorAll('.g-section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.gtab').forEach(function(b){ b.classList.remove('active'); });
  var sec = document.getElementById('gs-' + name);
  if (sec) sec.classList.add('active');
  var tabs = document.querySelectorAll('.gtab');
  if (tabs[idx]) tabs[idx].classList.add('active');

  // Future Cop audio easter egg
  if (name === 'fc') {
    setTimeout(function() {
      var toast = document.getElementById('_as_toast');
      try {
        var a = new Audio('assets/audio/skycaptain.mp3');
        a.volume = 0.72;
        a.play().catch(function(){});
      } catch(e) {}
      if (toast) {
        toast.textContent = '🔊 Niemand kann den Sky Captain aufhalten!';
        toast.style.transform = 'translateY(0)';
        toast.style.opacity = '1';
        clearTimeout(toast._t);
        toast._t = setTimeout(function(){
          toast.style.transform = 'translateY(80px)';
          toast.style.opacity = '0';
        }, 3500);
      }
    }, 400);
  }

  if (name === 'pokemon') { if (!pokeLoaded) loadPoke(); }
};

/* ── Blizzard sub-tab switching ─────────────────────── */
window.showBlizTab = function(name) {
  document.querySelectorAll('.bliz-sub').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.btab').forEach(function(b){ b.classList.remove('active'); });
  var sub = document.getElementById('bsub-' + name);
  if (sub) sub.classList.add('active');
  // Mark the right btab active
  document.querySelectorAll('.btab').forEach(function(b){
    if (b.getAttribute('onclick') && b.getAttribute('onclick').indexOf("'" + name + "'") >= 0) {
      b.classList.add('active');
    }
  });
  // Render cards for this sub-section if not yet done
  renderGameCards();
};

/* ─── Game cards ────────────────────────────────────────────────── */
function makePicture(base, alt, emoji, objPos) {
  var wrap = document.createElement('div');
  wrap.className = 'game-card-cover-wrap';
  var pic = document.createElement('picture');
  var src1 = document.createElement('source');
  src1.setAttribute('srcset', base + '.avif');
  src1.setAttribute('type', 'image/avif');
  var src2 = document.createElement('source');
  src2.setAttribute('srcset', base + '.webp');
  src2.setAttribute('type', 'image/webp');
  var img = document.createElement('img');
  img.className = 'game-card-cover';
  img.src = base + '.webp';
  img.alt = alt;
  img.loading = 'lazy';
  if (objPos) img.style.objectPosition = objPos;
  img.onerror = function() {
    var ph = document.createElement('div');
    ph.className = 'game-card-cover-placeholder';
    ph.textContent = emoji;
    wrap.replaceWith(ph);
  };
  pic.appendChild(src1);
  pic.appendChild(src2);
  pic.appendChild(img);
  wrap.appendChild(pic);
  // Click → open lightbox with full image
  wrap.addEventListener('click', function() {
    gameLbOpen(base + '.webp', alt);
  });
  return wrap;
}

/* ── Game image lightbox ─────────────────────────────── */
window.gameLbOpen = function(src, caption) {
  var lb  = document.getElementById('game-lb');
  var img = document.getElementById('game-lb-img');
  var cap = document.getElementById('game-lb-cap');
  if (!lb || !img) return;
  img.src = src;
  img.alt = caption || '';
  if (cap) cap.textContent = caption || '';
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
};
window.gameLbClose = function() {
  var lb = document.getElementById('game-lb');
  if (lb) { lb.classList.remove('open'); document.body.style.overflow = ''; }
};
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') gameLbClose();
});

function renderGameCards() {
  if (typeof DB === 'undefined') return;
  Object.keys(DB).forEach(function(s) {
    if (s === 'podcasts' || s === 'nature') return;
    var grid = document.getElementById(s + '-grid');
    if (!grid) return;
    grid.innerHTML = '';
    var imgs  = IMG[s] || null;
    var emoji = EMOJI[s] || '🎮';
    var cards = DB[s] || [];

    cards.forEach(function(item, idx) {
      var card = document.createElement('div');
      card.className = 'game-card';

      if (imgs && idx < imgs.length) {
        var base = imgs[idx];
        var posArr = IMG_POS[s] || [];
        var pos = posArr[idx] || null;
        card.appendChild(makePicture(base, item.title, emoji, pos));
      } else {
        var ph = document.createElement('div');
        ph.className = 'game-card-cover-placeholder';
        ph.textContent = emoji;
        card.appendChild(ph);
      }

      var body = document.createElement('div');
      body.className = 'game-card-body';
      body.innerHTML =
        '<span class="game-badge ' + item.badge + '">' + item.badgeText + '</span>' +
        '<div class="game-card-title">' + item.title + '</div>' +
        '<div class="game-card-text">' + item.text + '</div>' +
        '<div class="tags">' + item.tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('') + '</div>';
      card.appendChild(body);
      grid.appendChild(card);
    });
  });
}

/* ─── Pokémon ───────────────────────────────────────────────────── */
var pokeLoaded = false, allPoke = [], filtPoke = [], pokeOff = 0, typeCache = {};
var BATCH = 24;

function loadPoke() {
  if (pokeLoaded) return;
  pokeLoaded = true;
  fetch('https://pokeapi.co/api/v2/pokemon?limit=493')
    .then(function(r){ return r.json(); })
    .then(function(d){
      allPoke = d.results.map(function(p,i){ return {name:p.name, id:i+1}; });
      filtPoke = allPoke.slice();
      renderPokeGrid();
    })
    .catch(function(){
      var g = document.getElementById('poke-grid');
      if (g) g.innerHTML = '<div class="poke-loading-msg">PokeAPI nicht erreichbar.</div>';
    });
}

function renderPokeGrid() {
  var grid = document.getElementById('poke-grid');
  if (!grid) return;
  if (pokeOff === 0) grid.innerHTML = '';
  filtPoke.slice(pokeOff, pokeOff + BATCH).forEach(function(p){
    grid.appendChild(makePokeCard(p));
  });
  pokeOff += BATCH;
  var more = document.getElementById('poke-more');
  if (more) more.style.display = pokeOff < filtPoke.length ? 'block' : 'none';
}

function makePokeCard(p) {
  var c = document.createElement('div');
  c.className = 'poke-card';
  c.innerHTML =
    '<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/' + p.id + '.png" alt="' + p.name + '" loading="lazy">' +
    '<div class="poke-name">' + p.name + '</div>' +
    '<div class="poke-num">#' + String(p.id).padStart(3,'0') + '</div>' +
    '<div class="poke-types" id="pt-' + p.id + '"><span class="type-badge type-normal">?</span></div>';
  c.onclick = function(){ showPokeDet(p.id); };
  loadPokeTypes(p.id);
  return c;
}

function loadPokeTypes(id) {
  if (typeCache[id]) return;
  fetch('https://pokeapi.co/api/v2/pokemon/' + id)
    .then(function(r){ return r.json(); })
    .then(function(d){
      typeCache[id] = d;
      var el = document.getElementById('pt-' + id);
      if (el) el.innerHTML = d.types.map(function(t){
        return '<span class="type-badge type-' + t.type.name + '">' + t.type.name + '</span>';
      }).join('');
    })
    .catch(function(){});
}

function showPokeDet(id) {
  var det = document.getElementById('poke-detail');
  if (!det) return;
  det.innerHTML = '<div style="color:var(--text3);font-family:var(--fm);padding:1rem">Lade\u2026</div>';
  det.classList.add('show');
  var d = typeCache[id];
  if (d) { renderPokeDet(det, d); return; }
  fetch('https://pokeapi.co/api/v2/pokemon/' + id)
    .then(function(r){ return r.json(); })
    .then(function(d){ typeCache[id] = d; renderPokeDet(det, d); })
    .catch(function(){ det.innerHTML = '<div style="color:var(--accent2);padding:1rem">Fehler beim Laden.</div>'; });
}

function renderPokeDet(det, d) {
  var sc = {hp:'#ff6b35',attack:'#f7c948',defense:'#5aa0e8','special-attack':'#e85878','special-defense':'#3ba844',speed:'#a890f0'};
  det.innerHTML =
    '<img class="poke-big-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/' + d.id + '.png" alt="' + d.name + '">' +
    '<div style="flex:1;min-width:200px">' +
    '<div class="poke-big-name">' + d.name + '</div>' +
    '<div style="display:flex;gap:.4rem;margin-bottom:.85rem">' + d.types.map(function(t){ return '<span class="type-badge type-' + t.type.name + '">' + t.type.name + '</span>'; }).join('') + '</div>' +
    '<div style="display:flex;gap:1.25rem;margin-bottom:.85rem;flex-wrap:wrap">' +
    '<div><div style="font-family:var(--fm);font-size:.65rem;color:var(--text3)">H\u00d6HE</div><div style="font-weight:500">' + (d.height/10) + 'm</div></div>' +
    '<div><div style="font-family:var(--fm);font-size:.65rem;color:var(--text3)">GEWICHT</div><div style="font-weight:500">' + (d.weight/10) + 'kg</div></div>' +
    '</div>' +
    d.stats.map(function(s){
      return '<div class="stat-bar"><span class="stat-label-sm">' + s.stat.name.replace('special-','sp.') + '</span>' +
             '<span class="stat-val">' + s.base_stat + '</span>' +
             '<div class="stat-track"><div class="stat-fill" style="width:' + Math.min(100, s.base_stat/255*100) + '%;background:' + (sc[s.stat.name]||'var(--accent)') + '"></div></div></div>';
    }).join('') +
    '</div>';
  det.scrollIntoView({behavior:'smooth', block:'nearest'});
}

window.filterPoke = function() {
  var q    = (document.getElementById('poke-search') || {value:''}).value.toLowerCase();
  var type = (document.getElementById('type-filter') || {value:''}).value;
  var gen  = parseInt((document.getElementById('gen-filter') || {value:''}).value) || 0;
  var gens = [[1,151],[152,251],[252,386],[387,493]];
  filtPoke = allPoke.filter(function(p) {
    if (q && p.name.indexOf(q) < 0) return false;
    if (gen) { var mm = gens[gen-1]; if (p.id < mm[0] || p.id > mm[1]) return false; }
    if (type && typeCache[p.id]) {
      var has = typeCache[p.id].types.some(function(t){ return t.type.name === type; });
      if (!has) return false;
    }
    return true;
  });
  pokeOff = 0;
  renderPokeGrid();
};
window.loadMorePoke = function() { renderPokeGrid(); };

/* ─── Init ──────────────────────────────────────────────────────── */
renderGameCards();

})();
</script>

.sky-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:.55rem;
}
.sky-btn{
  position:relative;
  background:linear-gradient(180deg,#2a0808,#1a0404);
  border:1px solid rgba(220,38,38,.35);
  border-radius:7px;
  padding:.65rem .85rem;
  color:#fecaca;text-align:left;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.78rem;line-height:1.35;
  transition:all .15s;
  overflow:hidden;
  box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 2px 4px rgba(0,0,0,.5);
}
.sky-btn::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:#dc2626;transform:scaleY(0);transform-origin:bottom;
  transition:transform .25s;
}
.sky-btn:hover{
  background:linear-gradient(180deg,#3e0c0c,#240606);
  border-color:#dc2626;color:#fff;
  transform:translateY(-1px);
  box-shadow:0 0 0 1px rgba(220,38,38,.5),0 4px 14px rgba(220,38,38,.35);
}
.sky-btn:hover::before{transform:scaleY(1);}
.sky-btn:active{transform:translateY(0);}
.sky-btn.playing{
  background:linear-gradient(180deg,#dc2626,#7c0a0a);color:#fff;
  border-color:#fca5a5;
  animation:skyPulse .8s ease-in-out infinite;
}
.sky-btn.playing::before{transform:scaleY(1);background:#fff;}
@keyframes skyPulse{
  0%,100%{box-shadow:0 0 0 1px rgba(252,165,165,.4),0 4px 14px rgba(220,38,38,.5);}
  50%    {box-shadow:0 0 0 1px rgba(252,165,165,.8),0 8px 28px rgba(220,38,38,.8);}
}
.sky-num{
  display:inline-block;font-family:'JetBrains Mono',monospace;
  font-size:.62rem;color:rgba(252,165,165,.55);margin-right:.45rem;
}
.sky-btn.playing .sky-num{color:rgba(255,255,255,.7);}

.sky-hint{
  margin-top:1.25rem;padding-top:1rem;border-top:1px solid rgba(220,38,38,.2);
  font-family:'JetBrains Mono',monospace;font-size:.65rem;
  color:rgba(252,165,165,.5);letter-spacing:.06em;
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:.5rem;
}
.sky-hint kbd{
  background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);
  border-radius:3px;padding:.05rem .35rem;font-family:inherit;color:#fca5a5;
}

/* ── Game Sub-Tabs (Hollow Knight / Silksong, Final Fantasy) ── */
.g-subtabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.g-subtab{background:var(--surface);border:1px solid var(--border);color:var(--text2);
  padding:.45rem .95rem;border-radius:8px;cursor:pointer;font-family:var(--fm);font-size:.78rem;transition:all .15s;}

.g-subtab2:hover{border-color:var(--accent);color:var(--text2);}

/* ── Soundboard Flanken-Bilder (Sky Captain) ── */
.sky-flank{
  position:fixed;top:50%;transform:translateY(-50%);
  width:clamp(140px,14vw,240px);z-index:10001;
  filter:drop-shadow(0 0 30px rgba(220,38,38,.5));

}
.sky-flank picture,.sky-flank img{width:100%;height:auto;display:block;border-radius:10px;}
.sky-flank img{cursor:zoom-in;transition:transform .2s,box-shadow .2s;}
.sky-flank img:hover{transform:scale(1.04);box-shadow:0 0 40px rgba(220,38,38,.7);}
.sky-flank.left{left:max(1rem,calc(50% - 550px - 16vw));}
.sky-flank.right{right:max(1rem,calc(50% - 550px - 16vw));}
@keyframes skyFlankIn{from{opacity:0;transform:translateY(-50%) scale(.85);}to{opacity:1;transform:translateY(-50%) scale(1);}}
