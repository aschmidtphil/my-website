/* Kontakt */
html[data-style="elegant"] .contact-card { border: 1px solid var(--border); border-radius: var(--r); }
html[data-style="elegant"] .contact-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }

/* Wordcloud */
html[data-style="elegant"] .wc-thumb-wrap { border-radius: var(--r); }
html[data-style="elegant"] .diss-wc-label { color: var(--accent); }
html[data-style="elegant"] .wc-card { border: 1px solid var(--border); border-radius: var(--r); }
html[data-style="elegant"] .wc-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="elegant"] .wc-info-label { color: var(--accent); }

/* ═══════════════════════════════════════════════════════
   RETRO TERMINAL
   Scoped to html[data-style="terminal"]

   Concept: 1980s CRT terminal. Green phosphor glow on
   deep black. Monospace everything. Scanline texture.
   Boot sequence aesthetic.

   "Light" = classic green terminal (still dark bg)
   Dark    = amber phosphor variant (warm orange-gold)
═══════════════════════════════════════════════════════ */

/* ── Fonts: override to monospace for full effect ── */
html[data-style="terminal"] {
  --bg:       #000d00;
  --bg2:      #001200;
  --bg3:      #001800;
  --surface:  #001500;
  --surface2: #002200;

  --accent:   #00e040;
  --accent2:  #00ff55;
  --accent3:  #00c030;
  --accent4:  #80ff98;

  --glow-accent:  rgba(0,224,64,.5);
  --glow-accent2: rgba(0,255,85,.4);
  --glow-accent3: rgba(0,192,48,.4);
  --glow-accent4: rgba(128,255,152,.3);

  --text:  #00e040;
  --text2: #009928;
  --text3: #005518;

  --border:  #003310;
  --border2: #005520;

  --card:         #000d00;
  --card-glass:   rgba(0,13,0,.95);
  --card-border:  #00e040;
  --shadow:        0 0 8px rgba(0,224,64,.3), 0 0 2px rgba(0,224,64,.5);
  --shadow-hover:  0 0 20px rgba(0,224,64,.6), 0 0 4px rgba(0,224,64,.8);

  --fh: 'JetBrains Mono', monospace;
  --fb: 'JetBrains Mono', monospace;
  --fm: 'JetBrains Mono', monospace;
  --r:    2px;
  --r-sm: 2px;

  --grad-accent:  linear-gradient(135deg, #00ff55, #00c030);
  --grad-accent2: linear-gradient(135deg, #00e040, #005518);
  --grad-text:    linear-gradient(135deg, #00ff55, #009928);
}

/* Amber variant for dark mode */
html[data-style="terminal"][data-theme="dark"] {
  --bg:       #0d0800;
  --bg2:      #120c00;
  --bg3:      #1a1100;
  --surface:  #1a1100;
  --surface2: #221800;

  --accent:   #ff9500;
  --accent2:  #ffb830;
  --accent3:  #cc7800;
  --accent4:  #ffd080;

  --glow-accent:  rgba(255,149,0,.5);
  --glow-accent2: rgba(255,184,48,.4);
  --glow-accent3: rgba(204,120,0,.4);
  --glow-accent4: rgba(255,208,128,.3);

  --text:  #ff9500;
  --text2: #b36800;
  --text3: #664000;

  --border:  #331f00;
  --border2: #553300;

  --card:         #0d0800;
  --card-glass:   rgba(13,8,0,.95);
  --card-border:  #ff9500;
  --shadow:        0 0 8px rgba(255,149,0,.3), 0 0 2px rgba(255,149,0,.5);
  --shadow-hover:  0 0 20px rgba(255,149,0,.6), 0 0 4px rgba(255,149,0,.8);

  --grad-accent:  linear-gradient(135deg, #ffb830, #cc7800);
  --grad-accent2: linear-gradient(135deg, #ff9500, #664000);
  --grad-text:    linear-gradient(135deg, #ffb830, #b36800);
}

/* ── Global ── */
html[data-style="terminal"] body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--fm);
}

/* CRT scanline overlay */
html[data-style="terminal"] body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9998; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.18) 2px,
    rgba(0,0,0,.18) 4px
  );
}

/* ── NAV ── */
html[data-style="terminal"] nav {
  background: var(--bg2);
  border-bottom: 1px solid var(--accent);
  backdrop-filter: none;
  box-shadow: 0 1px 0 var(--accent), 0 2px 12px var(--glow-accent);
}
html[data-style="terminal"] .nav-logo {
  font-family: var(--fm); font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; font-size: 1rem;
  color: var(--accent);
  text-shadow: 0 0 8px var(--glow-accent);
}
html[data-style="terminal"] .nav-logo span {
  color: var(--accent2); background: none; -webkit-text-fill-color: var(--accent2);
  text-shadow: 0 0 10px var(--glow-accent2);
}
html[data-style="terminal"] .nav-group-btn,
html[data-style="terminal"] .nav-direct {
  font-family: var(--fm); letter-spacing: .08em; font-size: .72rem;
  color: var(--text2); text-transform: uppercase;
}
html[data-style="terminal"] .nav-group-btn:hover,
html[data-style="terminal"] .nav-group-btn.group-active,
html[data-style="terminal"] .nav-direct:hover,
html[data-style="terminal"] .nav-direct.active {
  color: var(--accent);
  text-shadow: 0 0 8px var(--glow-accent);
  background: transparent;
}
html[data-style="terminal"] .nav-dropdown {
  background: var(--bg2); border: 1px solid var(--accent); border-radius: 2px;
  box-shadow: 0 0 16px var(--glow-accent); backdrop-filter: none;
}
html[data-style="terminal"] .nav-dropdown-item { font-family: var(--fm); text-transform: uppercase; font-size: .68rem; letter-spacing: .06em; color: var(--text2); }
html[data-style="terminal"] .nav-dropdown-item:hover { background: var(--accent); color: var(--bg); text-shadow: none; border-radius: 0; }
html[data-style="terminal"] .theme-btn,
html[data-style="terminal"] .lang-btn {
  border-radius: 2px; border: 1px solid var(--accent);
  background: transparent; color: var(--accent);
  font-family: var(--fm); font-size: .65rem;
  text-shadow: 0 0 6px var(--glow-accent);
}
html[data-style="terminal"] .theme-btn:hover,
html[data-style="terminal"] .lang-btn:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 12px var(--glow-accent); }

/* ── Cards ── */
html[data-style="terminal"] .card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 2px; box-shadow: var(--shadow); backdrop-filter: none;
}
html[data-style="terminal"] .card:hover { box-shadow: var(--shadow-hover); border-color: var(--accent2); transform: translateY(-2px); }

/* ── Buttons ── */
html[data-style="terminal"] .btn { border-radius: 2px; font-family: var(--fm); letter-spacing: .08em; text-transform: uppercase; }
html[data-style="terminal"] .btn-primary {
  background: transparent; color: var(--accent); border: 1px solid var(--accent);
  box-shadow: 0 0 10px var(--glow-accent); font-weight: 700;
}
html[data-style="terminal"] .btn-primary:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 20px var(--glow-accent); transform: translateY(-1px); }
html[data-style="terminal"] .btn-ghost { border: 1px solid var(--text2); color: var(--text2); background: transparent; }
html[data-style="terminal"] .btn-ghost:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 8px var(--glow-accent); }

/* ── Home hero ── */
html[data-style="terminal"] .hero-grid-bg {
  background-image:
    linear-gradient(var(--accent)22 1px, transparent 1px),
    linear-gradient(90deg, var(--accent)22 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: .6;
}
html[data-style="terminal"] .hero-glow { background: radial-gradient(circle, rgba(0,224,64,.15), transparent 70%); }
html[data-style="terminal"] .hero-name .n1 { color: var(--text); text-shadow: 0 0 12px var(--glow-accent3); }
html[data-style="terminal"] .hero-name .n2 {
  color: var(--accent); background: none; -webkit-text-fill-color: var(--accent);
  text-shadow: 0 0 20px var(--glow-accent);
  filter: none;
}
html[data-style="terminal"] .cursor { color: var(--accent); text-shadow: 0 0 12px var(--glow-accent); }
html[data-style="terminal"] .hero-tag { color: var(--accent3); text-shadow: 0 0 8px var(--glow-accent3); letter-spacing: .2em; }
html[data-style="terminal"] .hero-tag::before { background: var(--accent3); box-shadow: 0 0 6px var(--glow-accent3); }
html[data-style="terminal"] .hero-subtitle span { color: var(--accent); text-shadow: 0 0 8px var(--glow-accent); }
html[data-style="terminal"] .hero-portrait-wrap::before { background: radial-gradient(ellipse, rgba(0,224,64,.2), transparent 70%); }
html[data-style="terminal"] .hero-portrait-wrap::after { animation: none; background: radial-gradient(ellipse, rgba(0,224,64,.15), transparent 70%); }
html[data-style="terminal"] .hero-portrait { border: 2px solid var(--accent); border-radius: 4px; box-shadow: 0 0 24px var(--glow-accent), inset 0 0 0 1px var(--accent3); filter: saturate(.6) contrast(1.1); }
html[data-style="terminal"] .hero-portrait:hover { box-shadow: 0 0 40px var(--glow-accent); filter: saturate(.8) contrast(1.2); }
html[data-style="terminal"] .stat-num { color: var(--accent); background: none; -webkit-text-fill-color: var(--accent); text-shadow: 0 0 10px var(--glow-accent); }
html[data-style="terminal"] .stats-row { background: var(--bg2); border-color: var(--accent); border-width: 1px; }
html[data-style="terminal"] .stat-item:hover { background: var(--surface2); }
html[data-style="terminal"] .skill-title { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent3); }
html[data-style="terminal"] .social-link { border: 1px solid var(--border2); border-radius: 2px; color: var(--text2); }
html[data-style="terminal"] .social-link:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 8px var(--glow-accent); background: transparent; }
html[data-style="terminal"] .tl-item::before { background: var(--accent); box-shadow: 0 0 6px var(--glow-accent); border-radius: 0; }
html[data-style="terminal"] .tl-year { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent3); }
html[data-style="terminal"] .tl::before { background: var(--accent); width: 1px; box-shadow: 0 0 4px var(--glow-accent); }
html[data-style="terminal"] .about-portrait { border: 2px solid var(--accent); border-radius: 2px; box-shadow: 0 0 16px var(--glow-accent); filter: saturate(.5); }
html[data-style="terminal"] .proj-lang { background: rgba(0,224,64,.1); color: var(--accent); border: 1px solid var(--accent3); }

/* ── Sections ── */
html[data-style="terminal"] .sec-title { color: var(--accent); text-shadow: 0 0 8px var(--glow-accent3); }
html[data-style="terminal"] .sec-sub { color: var(--text3); letter-spacing: .15em; }
html[data-style="terminal"] .section-divider { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent3); }
html[data-style="terminal"] .section-divider::after { background: linear-gradient(90deg, var(--accent), transparent); }
html[data-style="terminal"] .page-title span { color: var(--accent); text-shadow: 0 0 12px var(--glow-accent); }
html[data-style="terminal"] .pstat-num { color: var(--accent); background: none; -webkit-text-fill-color: var(--accent); text-shadow: 0 0 8px var(--glow-accent); }
html[data-style="terminal"] .hero-tag { color: var(--accent3); text-shadow: 0 0 8px var(--glow-accent3); }
html[data-style="terminal"] .page-hero { border-bottom: 1px solid var(--accent); }
html[data-style="terminal"] .page-hero-glow { background: radial-gradient(circle, rgba(0,224,64,.12), transparent 70%); }

/* Tags */
html[data-style="terminal"] .tag { border: 1px solid var(--border2); border-radius: 2px; color: var(--text3); background: transparent; font-size: .62rem; letter-spacing: .06em; }

/* Inputs */
html[data-style="terminal"] .ctrl-input,
html[data-style="terminal"] .ctrl-select { border-radius: 2px; border-color: var(--border2); background: var(--bg2); color: var(--text); font-family: var(--fm); }
html[data-style="terminal"] .ctrl-input:focus { border-color: var(--accent); box-shadow: 0 0 8px var(--glow-accent); }

/* Zitate */
html[data-style="terminal"] .zitat-author { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent3); }
html[data-style="terminal"] .zitat-card { border: 1px solid var(--border2); border-radius: 2px; backdrop-filter: none; background: var(--card); }
html[data-style="terminal"] .zitat-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="terminal"] .zitat-card::before { color: var(--accent); opacity: .15; }
html[data-style="terminal"] .zitat-motto { border-left-color: var(--accent); background: var(--bg2); }
html[data-style="terminal"] .zf-btn { border-radius: 2px; font-family: var(--fm); text-transform: uppercase; font-size: .68rem; }
html[data-style="terminal"] .zf-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

/* Games */
html[data-style="terminal"] .game-card { border: 1px solid var(--border2); border-radius: 2px; backdrop-filter: none; }
html[data-style="terminal"] .game-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="terminal"] .game-card-cover { filter: saturate(.5) contrast(1.1); transition: filter .3s; }
html[data-style="terminal"] .game-card:hover .game-card-cover { filter: saturate(.8) contrast(1.15); }
html[data-style="terminal"] .gtab { border-radius: 2px; font-family: var(--fm); text-transform: uppercase; font-size: .67rem; letter-spacing: .08em; }
html[data-style="terminal"] .gtab.active { background: var(--accent); color: var(--bg); }
html[data-style="terminal"] .g-tabs { border-radius: 2px; border: 1px solid var(--accent); }
html[data-style="terminal"] .game-badge { font-family: var(--fm); }

/* Podcasts */
html[data-style="terminal"] .pod-card2 { border: 1px solid var(--border2); border-radius: 2px; }
html[data-style="terminal"] .pod-card2:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="terminal"] .pod-cat-btn { border-radius: 2px; font-family: var(--fm); text-transform: uppercase; font-size: .68rem; }
html[data-style="terminal"] .pod-cat-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

/* Natur */
html[data-style="terminal"] .nature-card { border: 1px solid var(--border2); border-radius: 2px; }
html[data-style="terminal"] .nature-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="terminal"] .nature-card-img { filter: saturate(.5) contrast(1.1); }
html[data-style="terminal"] .nature-cat-btn { border-radius: 2px; font-family: var(--fm); text-transform: uppercase; font-size: .68rem; }
html[data-style="terminal"] .nature-cat-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); box-shadow: 0 0 10px var(--glow-accent); }

/* Studium */
html[data-style="terminal"] .sort-btn { border-radius: 2px; font-family: var(--fm); }
html[data-style="terminal"] .sort-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
html[data-style="terminal"] .books-table th { background: var(--surface2); color: var(--accent); }
html[data-style="terminal"] .books-table th:hover { color: var(--accent2); }
html[data-style="terminal"] .books-table tr:hover td { background: var(--surface); }
html[data-style="terminal"] .kurs-table th { background: var(--surface2); color: var(--accent); }
html[data-style="terminal"] .b-title { color: var(--accent3); }

/* Diss */
html[data-style="terminal"] .diss-meta-badge { border-radius: 2px; border-color: var(--accent3); color: var(--text); }
html[data-style="terminal"] .diss-meta-badge.accent { background: var(--accent); color: var(--bg); border-color: var(--accent); }
html[data-style="terminal"] .diss-stat { border-radius: 2px; border-color: var(--border2); }
html[data-style="terminal"] .diss-stat-num { color: var(--accent); background: none; -webkit-text-fill-color: var(--accent); text-shadow: 0 0 8px var(--glow-accent); }
html[data-style="terminal"] .diss-abstract { border-left-color: var(--accent); background: var(--bg2); }
html[data-style="terminal"] .diss-abstract-label { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent3); }
html[data-style="terminal"] .toc-num { color: var(--accent); }
html[data-style="terminal"] .toc-row:hover { background: var(--surface2); }

/* Phil modal */
html[data-style="terminal"] .pmodal-box { border: 1px solid var(--accent); border-radius: 2px; backdrop-filter: none; box-shadow: 0 0 40px var(--glow-accent); background: var(--bg2); }
html[data-style="terminal"] .pmodal-name { color: var(--accent); text-shadow: 0 0 10px var(--glow-accent); }
html[data-style="terminal"] .pmodal-close { border-radius: 2px; }

/* Math */
html[data-style="terminal"] .math-canvas { border-radius: 2px; border-color: var(--accent); box-shadow: 0 0 12px var(--glow-accent3); }
html[data-style="terminal"] .mtab { border-radius: 2px; font-family: var(--fm); text-transform: uppercase; }
html[data-style="terminal"] .mtab.active { background: var(--accent); color: var(--bg); }
html[data-style="terminal"] .math-formula { color: var(--accent); background: var(--surface2); border-radius: 2px; }
html[data-style="terminal"] .math-tabs { border-radius: 2px; border: 1px solid var(--accent); }

/* Footer */
html[data-style="terminal"] footer { background: var(--bg2); border-top: 1px solid var(--accent); box-shadow: 0 -1px 0 var(--accent), 0 -2px 12px var(--glow-accent); }
html[data-style="terminal"] .footer-txt { color: var(--text3); }
html[data-style="terminal"] .footer-links a:hover { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent); }

/* Pokémon — desaturated for terminal feel */
html[data-style="terminal"] .poke-card { border: 1px solid var(--border2); border-radius: 2px; }
html[data-style="terminal"] .poke-card img { filter: saturate(.4) sepia(.3); }
html[data-style="terminal"] .poke-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="terminal"] .poke-card:hover img { filter: saturate(.7); }

/* Kontakt */
html[data-style="terminal"] .contact-card { border: 1px solid var(--border2); border-radius: 2px; }
html[data-style="terminal"] .contact-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }

/* Favphil / Pe */
html[data-style="terminal"] .favphil-card { border: 1px solid var(--border2); border-radius: 2px; }
html[data-style="terminal"] .favphil-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="terminal"] .pe-card { border: 1px solid var(--border2); border-radius: 2px; backdrop-filter: none; }
html[data-style="terminal"] .pe-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="terminal"] .pe-ta { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent3); }

/* Wordcloud */
html[data-style="terminal"] .wc-thumb-wrap { border-radius: 2px; }
html[data-style="terminal"] .wc-thumb-wrap img { filter: saturate(.4) hue-rotate(90deg); }
html[data-style="terminal"] .diss-wc-label { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent3); }

/* Game lightbox */
html[data-style="terminal"] .game-lb img { border-radius: 2px; filter: saturate(.8) contrast(1.1); box-shadow: 0 0 60px var(--glow-accent); }

/* ═══════════════════════════════════════════════════════
   GLASSMORPHISM
   Scoped to html[data-style="glass"]

   Concept: Everything is frosted glass floating over
   deep violet-indigo gradients. Iridescent edges,
   soft blur everywhere, aurora-like colour shifts.

   Light: violet-tinted soft white, glass with depth
   Dark:  deep indigo-black, strong glass contrast
═══════════════════════════════════════════════════════ */

html[data-style="glass"] {
  --bg:       #e8e4f8;
  --bg2:      #ddd8f4;
  --bg3:      #d0caf0;
  --surface:  rgba(255,255,255,.55);
  --surface2: rgba(255,255,255,.65);

  --accent:   #6c3ef5;
  --accent2:  #c040e8;
  --accent3:  #3b9ef0;
  --accent4:  #f03090;

  --glow-accent:  rgba(108,62,245,.4);
  --glow-accent2: rgba(192,64,232,.35);
  --glow-accent3: rgba(59,158,240,.35);
  --glow-accent4: rgba(240,48,144,.35);

  --text:  #1a1030;
  --text2: #5040a0;
  --text3: #8878c0;

  --border:  rgba(108,62,245,.2);
  --border2: rgba(108,62,245,.35);

  --card:         rgba(255,255,255,.65);
  --card-glass:   rgba(255,255,255,.55);
  --card-border:  rgba(255,255,255,.8);
  --shadow:        0 8px 32px rgba(108,62,245,.15), 0 2px 8px rgba(0,0,0,.08);
  --shadow-hover:  0 16px 48px rgba(108,62,245,.3), 0 4px 16px rgba(0,0,0,.1);

  --fh: 'Syne', sans-serif;
  --fb: 'DM Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --r:    16px;
  --r-sm: 10px;

  --grad-accent:  linear-gradient(135deg, #6c3ef5, #c040e8);
  --grad-accent2: linear-gradient(135deg, #3b9ef0, #6c3ef5);
  --grad-text:    linear-gradient(135deg, #6c3ef5 0%, #c040e8 50%, #f03090 100%);
}

html[data-style="glass"][data-theme="dark"] {
  --bg:       #080618;
  --bg2:      #0e0a24;
  --bg3:      #150f30;
  --surface:  rgba(255,255,255,.06);
  --surface2: rgba(255,255,255,.10);

  --accent:   #8060ff;
  --accent2:  #d060f8;
  --accent3:  #40b0ff;
  --accent4:  #ff4090;

  --glow-accent:  rgba(128,96,255,.55);
  --glow-accent2: rgba(208,96,248,.5);
  --glow-accent3: rgba(64,176,255,.45);
  --glow-accent4: rgba(255,64,144,.45);

  --text:  #f0ecff;
  --text2: #a898d8;
  --text3: #6858a0;

  --border:  rgba(128,96,255,.2);
  --border2: rgba(128,96,255,.38);

  --card:         rgba(255,255,255,.06);
  --card-glass:   rgba(255,255,255,.05);
  --card-border:  rgba(255,255,255,.14);
  --shadow:        0 8px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(128,96,255,.12);
  --shadow-hover:  0 16px 56px rgba(128,96,255,.4), 0 0 0 1px rgba(128,96,255,.3);
}

/* ── Global + aurora background ── */
html[data-style="glass"] body {
  background: var(--bg);
  color: var(--text);
  position: relative;
}

/* Aurora gradient background */
html[data-style="glass"] body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(108,62,245,.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(192,64,232,.2) 0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 50% 90%, rgba(59,158,240,.15) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 60%, rgba(240,48,144,.12) 0%, transparent 55%);
  opacity: 1;
}
html[data-style="glass"][data-theme="dark"] body::before {
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%,   rgba(128,96,255,.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 10%,  rgba(208,96,248,.3)  0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 50% 100%, rgba(64,176,255,.2)  0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 60%,  rgba(255,64,144,.18) 0%, transparent 55%);
}
/* Aurora background sits at z-index 0; lift content above it.
   IMPORTANT: keep nav as position:fixed (its default) — only raise z-index. */
html[data-style="glass"] #page-root,
html[data-style="glass"] footer { position: relative; z-index: 1; }
html[data-style="glass"] nav { z-index: 500; }  /* fixed by default, just bump above aurora */

/* ── NAV ── */
html[data-style="glass"] nav {
  background: rgba(255,255,255,.55);
  backdrop-filter: blur(24px) saturate(1.8);
  border-bottom: 1px solid rgba(108,62,245,.2);
  box-shadow: 0 1px 0 rgba(255,255,255,.4), 0 4px 16px rgba(108,62,245,.1);
}
html[data-style="glass"][data-theme="dark"] nav {
  background: rgba(8,6,24,.7);
  border-bottom: 1px solid rgba(128,96,255,.2);
}
html[data-style="glass"] .nav-logo { font-weight: 800; letter-spacing: .01em; }
html[data-style="glass"] .nav-logo span {
  background: var(--grad-accent);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 8px var(--glow-accent));
}
html[data-style="glass"] .nav-group-btn:hover,
html[data-style="glass"] .nav-group-btn.group-active,
html[data-style="glass"] .nav-direct:hover,
html[data-style="glass"] .nav-direct.active { color: var(--accent); text-shadow: 0 0 10px var(--glow-accent); background: rgba(108,62,245,.08); border-radius: 6px; }
html[data-style="glass"] .nav-dropdown {
  background: rgba(255,255,255,.75);
  backdrop-filter: blur(32px) saturate(2);
  border: 1px solid rgba(255,255,255,.8);
  border-radius: 14px;
  box-shadow: 0 16px 48px rgba(108,62,245,.2), inset 0 1px 0 rgba(255,255,255,.9);
}
html[data-style="glass"][data-theme="dark"] .nav-dropdown {
  background: rgba(14,10,36,.85);
  border-color: rgba(128,96,255,.25);
}
html[data-style="glass"] .nav-dropdown-item:hover { background: rgba(108,62,245,.1); color: var(--accent); }
html[data-style="glass"] .theme-btn,
html[data-style="glass"] .lang-btn {
  background: rgba(255,255,255,.5);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(108,62,245,.3);
  border-radius: 8px;
}
html[data-style="glass"] .theme-btn:hover,
html[data-style="glass"] .lang-btn:hover { background: rgba(108,62,245,.15); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 12px var(--glow-accent); }

/* ── Cards ── */
html[data-style="glass"] .card {
  background: var(--card);
  backdrop-filter: blur(20px) saturate(1.6);
  border: 1px solid var(--card-border);
  border-radius: var(--r);
  box-shadow: var(--shadow);
}
html[data-style="glass"] .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: rgba(108,62,245,.4); }

/* ── Buttons ── */
html[data-style="glass"] .btn { border-radius: 10px; }
html[data-style="glass"] .btn-primary {
  background: var(--grad-accent); color: #fff;
  box-shadow: 0 4px 20px var(--glow-accent);
}
html[data-style="glass"] .btn-primary:hover { box-shadow: 0 8px 32px var(--glow-accent); transform: translateY(-2px); }
html[data-style="glass"] .btn-ghost {
  background: rgba(255,255,255,.4);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border2);
  color: var(--text);
}
html[data-style="glass"] .btn-ghost:hover { background: rgba(108,62,245,.15); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 14px var(--glow-accent); }

/* ── Home hero ── */
html[data-style="glass"] .hero-grid-bg { display: none; }
html[data-style="glass"] .hero-glow { width: 600px; height: 600px; background: radial-gradient(circle, var(--glow-accent) 0%, transparent 70%); }
html[data-style="glass"] .hero-name .n1 { color: var(--text); }
html[data-style="glass"] .hero-name .n2 {
  background: var(--grad-text);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 20px var(--glow-accent));
}
html[data-style="glass"] .cursor { color: var(--accent); text-shadow: 0 0 12px var(--glow-accent); }
html[data-style="glass"] .hero-tag { color: var(--accent3); text-shadow: 0 0 10px var(--glow-accent3); }
html[data-style="glass"] .hero-tag::before { background: var(--accent3); box-shadow: 0 0 6px var(--glow-accent3); }
html[data-style="glass"] .hero-portrait-wrap::before {
  background: radial-gradient(ellipse, var(--glow-accent), transparent 70%);
  inset: -20px;
}
html[data-style="glass"] .hero-portrait-wrap::after {
  background: radial-gradient(ellipse, var(--glow-accent), transparent 70%);
  inset: -30px;
  animation: neonPulse 3s ease-in-out infinite;
}
html[data-style="glass"] .hero-portrait {
  border: 2px solid transparent;
  background: linear-gradient(var(--bg2),var(--bg2)) padding-box, var(--grad-accent) border-box;
  box-shadow: 0 16px 48px var(--glow-accent), 0 0 0 1px rgba(108,62,245,.2);
  border-radius: 20px;
}
html[data-style="glass"] .hero-portrait:hover { box-shadow: 0 24px 64px var(--glow-accent2), 0 0 0 2px rgba(192,64,232,.3); }
html[data-style="glass"] .stat-num { background: var(--grad-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
html[data-style="glass"] .stats-row { background: rgba(255,255,255,.3); backdrop-filter: blur(12px); border-color: rgba(108,62,245,.2); }

html[data-style="glass"] .stat-item:hover { background: rgba(108,62,245,.08); }

html[data-style="glass"] .tl-item::before { background: var(--accent); box-shadow: 0 0 8px var(--glow-accent); }

html[data-style="glass"] .about-portrait {

<script>
(function(){
'use strict';
// Wait briefly until ZITATE / PHILS_V2 / DB are available (they live in data.js + pages.js)
function init() {
  if (typeof ZITATE === 'undefined' && typeof PHILS_V2 === 'undefined' && typeof DB === 'undefined') {
    setTimeout(init, 100);
    return;
  }

  // Build the pool of featured items from existing data.
  // This is intentionally generic — when new content is added (more ZITATE, more PHILS_V2),
  // they will automatically appear here without code changes.
  var pool = [];

  // ── Zitate ─────────────────────────
  if (typeof ZITATE !== 'undefined' && ZITATE && ZITATE.length) {
    ZITATE.forEach(function(z) {
      pool.push({
        kind: 'Zitat',
        render: function() {
          return '<div class="featured-kind">Zitat</div>' +
                 '<div class="featured-body">' +
                   '<div class="featured-quote-text">»' + escapeHtml(z.text) + '«</div>' +
                   '<div class="featured-quote-attr"><strong>' + escapeHtml(z.author) + '</strong>' +
                     (z.source ? ' &middot; ' + escapeHtml(z.source) : '') + '</div>' +
                 '</div>' +
                 '<button class="featured-link" onclick="showPage(\'zitate\')">Alle Zitate</button>';
        }
      });
    });
  }

  // ── Lieblingsphilosophen (Tier 1 only — die wirklich wichtigen) ─────────────────────────
  if (typeof PHILS_V2 !== 'undefined' && PHILS_V2 && PHILS_V2.length) {
    PHILS_V2.filter(function(p) { return p.tier === 1; }).forEach(function(p) {
      pool.push({
        kind: 'Philosoph',
        render: function() {
          var ideas = (p.ideas || []).slice(0, 4).map(function(i) {
            return '<span class="tag">' + escapeHtml(i) + '</span>';
          }).join('');
          return '<div class="featured-kind">Lieblings­philosoph</div>' +
                 '<div class="featured-body">' +
                   '<div class="featured-phil-name">' + escapeHtml(p.name) + '</div>' +
                   '<div class="featured-phil-dates">' + escapeHtml((p.birth || '') + ' – ' + (p.death || '')) +
                     (p.epoch ? ' &middot; ' + escapeHtml(p.epoch) : '') + '</div>' +
                   '<div class="featured-phil-desc">' + escapeHtml(p.desc || p.short || '') + '</div>' +
                   (ideas ? '<div class="featured-phil-ideas">' + ideas + '</div>' : '') +
                 '</div>' +
                 '<button class="featured-link" onclick="showPage(\'philosophy\')">Zur Timeline</button>';
        }
      });
    });
  }

  // ── Games / Blizzard ─────────────────────────
  if (typeof DB !== 'undefined' && DB) {
    Object.keys(DB).forEach(function(key) {
      var arr = DB[key];
      if (!Array.isArray(arr)) return;
      arr.forEach(function(g) {
        if (!g.title || !g.text) return;
        pool.push({
          kind: 'Spiel',
          render: function() {
            var tags = (g.tags || []).slice(0, 4).map(function(t) {
              return '<span class="tag">' + escapeHtml(t) + '</span>';
            }).join('');
            return '<div class="featured-kind">' + escapeHtml(g.badgeText || 'Spiel') + '</div>' +
                   '<div class="featured-body">' +
                     '<div class="featured-game-title">' + escapeHtml(g.title) + '</div>' +
                     '<div class="featured-game-text">' + escapeHtml(g.text) + '</div>' +
                     (tags ? '<div class="featured-game-tags">' + tags + '</div>' : '') +
                   '</div>' +
                   '<button class="featured-link" onclick="showPage(\'gaming\')">Zur Gaming-Seite</button>';
          }
        });
      });
    });
  }

  if (pool.length === 0) return;

  // ── Setup carousel ─────────────────────────
  var card = document.getElementById('featured-card');
  var dotsEl = document.getElementById('ftr-dots');
  if (!card) return;

  // Show at most 8 dots — for many items, use ellipsis dots
  // For simplicity here just render up to 8 dots representing groups
  var MAX_DOTS = Math.min(8, pool.length);
  dotsEl.innerHTML = '';
  for (var i = 0; i < MAX_DOTS; i++) {
    var d = document.createElement('div');
    d.className = 'ftr-dot';
    dotsEl.appendChild(d);
  }

  // Shuffle the pool for a different order each visit
  function shuffled(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  var sequence = shuffled(pool);
  var idx = 0;

  function render(animateOut) {
    function doRender() {
      card.innerHTML = sequence[idx].render();
      // update dots — map current idx into MAX_DOTS positions
      var dotIdx = Math.floor((idx / sequence.length) * MAX_DOTS);
      Array.from(dotsEl.children).forEach(function(d, di) {
        d.classList.toggle('active', di === dotIdx);
      });
      requestAnimationFrame(function() {
        card.classList.remove('swap');
      });
    }
    if (animateOut) {
      card.classList.add('swap');
      setTimeout(doRender, 250);
    } else {
      doRender();
    }
  }

  document.getElementById('ftr-prev').onclick = function() {
    idx = (idx - 1 + sequence.length) % sequence.length;
    render(true);
    pauseAutoRotate();
  };
  document.getElementById('ftr-next').onclick = function() {
    idx = (idx + 1) % sequence.length;
    render(true);
    pauseAutoRotate();
  };
  document.getElementById('ftr-shuffle').onclick = function() {
    sequence = shuffled(pool);
    idx = 0;
    render(true);
    pauseAutoRotate();
  };

  // Auto-rotate every 10s, pause if user interacted
  var auto = null, paused = false;
  function startAutoRotate() {
    if (paused) return;
    auto = setInterval(function() {
      idx = (idx + 1) % sequence.length;
      render(true);
    }, 10000);
  }
  function pauseAutoRotate() {
    paused = true;
    if (auto) clearInterval(auto);
  }
  // Stop auto-rotate if user has navigated away
  document.addEventListener('visibilitychange', function() {
    if (document.hidden && auto) clearInterval(auto);
    else if (!paused) startAutoRotate();
  });

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  render();
  startAutoRotate();
}

init();
})();
</script>

<script>
window.buildFavphilBanner = function(){
  const tiles = [
    {slug:'parmenides',name:'Parmenides',era:'Vorsokratik',dates:'ca. 520-460 v. Chr.',color:'#f7971e',quotes:['Denn dasselbe ist Denken und Sein.','Es ist; nicht-sein aber ist unmöglich.','Du wirst das Nichtseiende weder erkennen noch aussprechen können.']},
    {slug:'anaximander',name:'Anaximander',era:'Vorsokratik',dates:'ca. 610-546 v. Chr.',color:'#f7971e',quotes:['Woraus aber das Werden ist den seienden Dingen, in das hinein geschieht auch ihr Vergehen nach der Notwendigkeit.','Der Urgrund aller Dinge ist das Apeiron — das Unbegrenzte.','Sie zahlen einander Strafe und Buße für ihre Ungerechtigkeit, gemäß der Ordnung der Zeit.']},
    {slug:'heraklit',name:'Heraklit',era:'Vorsokratik',dates:'ca. 540-480 v. Chr.',color:'#f7971e',quotes:['Alles fließt — und niemand steigt zweimal in denselben Fluss.','Der Krieg ist der Vater aller Dinge.','Den Wachenden ist eine einzige gemeinsame Welt; die Schlafenden aber wenden sich ein jeder in seine eigene.']},
    {slug:'platon',name:'Platon',era:'Klassische Antike',dates:'428-348 v. Chr.',color:'#f7971e',quotes:['Das ungeprüfte Leben ist nicht wert, gelebt zu werden.','Die Idee des Guten steht jenseits des Seins an Würde und Macht.','Die Zeit ist ein bewegliches Abbild der im Einen verharrenden Ewigkeit.']},
    {slug:'aristoteles',name:'Aristoteles',era:'Klassische Antike',dates:'384-322 v. Chr.',color:'#f7971e',quotes:['In allen natürlichen Dingen ist etwas Erstaunliches.',"Die Zeit ist die Maßzahl der Bewegung hinsichtlich des ‚davor' und ‚danach'.",'Alle Menschen streben von Natur aus nach Wissen.']},
    {slug:'plotin',name:'Plotin',era:'Neuplatonismus',dates:'204-270 n. Chr.',color:'#ff8060',quotes:['Alles, was ist, ist durch das Eine.','Das Schöne ist das Glänzen der ewigen Ideen durch die Materie.','Niemand findet das Eine, der nicht aufhört, es zu suchen.']},
    {slug:'eriugena',name:'Johannes Scottus Eriugena',era:'Karolingische Zeit',dates:'ca. 815-877',color:'#ff8060',quotes:['Gott ist das Wesen aller Dinge, jenseits aller Wesen, das Nichts wegen seiner Überfülle.','Niemand betritt den Himmel, außer durch Philosophie.','Die Autorität ist aus der wahren Vernunft hervorgegangen, nicht die Vernunft aus der Autorität.']},
    {slug:'augustinus',name:'Augustinus',era:'Spätantike',dates:'354-430',color:'#ff6584',quotes:['Was ist also die Zeit? Wenn mich niemand darnach fragt, weiß ich es, wenn ich es aber einem, der mich fragt, erklären sollte, weiß ich es nicht.','Was tat Gott, bevor er Himmel und Erde schuf? [...] Er bereitet denen, die sich vermessen, jene hohen Geheimnisse zu ergründen, Höllen.','Liebe — und tu, was du willst.']},
    {slug:'boehme',name:'Jakob Böhme',era:'Mystik',dates:'1575-1624',color:'#d090f0',quotes:['Das Nichts hungert nach dem Etwas.','Der Ungrund ist ein ewig Nichts und machet aber einen ewigen Anfang, als eine Sucht; Dann das Nichts ist eine Sucht nach Etwas','Das Nichts will nicht ein Nichts seyn und kann nicht ein Nichts seyn.']},
    {slug:'pascal',name:'Blaise Pascal',era:'Frühe Neuzeit',dates:'1623-1662',color:'#e85878',quotes:['Der Mensch ist nur ein Schilfrohr, das schwächste der Natur; aber er ist ein denkendes Schilfrohr.','Das Herz hat seine Gründe, die der Verstand nicht kennt.','Das ewige Schweigen dieser unendlichen Räume macht mir Angst.']},
    {slug:'malebranche',name:'Nicolas Malebranche',era:'Rationalismus',dates:'1638-1715',color:'#f85888',quotes:['Wir sehen alle Dinge in Gott.','Aufmerksamkeit ist das natürliche Gebet der Seele.','Die Ordnung ist das unwandelbare Gesetz der Geister.']},
    {slug:'kant',name:'Immanuel Kant',era:'Aufklärung',dates:'1724-1804',color:'#e8c040',quotes:['Jede Wissenschaft ist so weit Wissenschaft, wie Mathematik in ihr ist.', 'Handle nur nach derjenigen Maxime, durch die du zugleich wollen kannst, dass sie allgemeines Gesetz werde.','Aus so krummem Holze, als woraus der Mensch gemacht ist, kann nichts ganz Gerades gezimmert werden.','Zwei Dinge erfüllen das Gemüt mit immer neuer Bewunderung: der bestirnte Himmel über mir und das moralische Gesetz in mir.']},
    {slug:'schelling',name:'F. W. J. Schelling',era:'Dt. Idealismus',dates:'1775-1854',color:'#c8a020',quotes:['Nur wer Freiheit gekostet hat, kann das Verlangen empfinden, ihr alles analog zu machen.','Der Anfang ist nur als Anfang vom Ende her.','Das Wollen ist Urseyn.']},
    {slug:'hegel',name:'G. W. F. Hegel',era:'Dt. Idealismus',dates:'1770-1831',color:'#d0a830',quotes:['Das Wahre ist das Ganze.','Die Eule der Minerva beginnt erst mit der einbrechenden Dämmerung ihren Flug.','Was vernünftig ist, das ist wirklich; und was wirklich ist, das ist vernünftig.']},
    {slug:'hoelderlin',name:'Friedrich Hölderlin',era:'Lyrik / Idealismus',dates:'1770-1843',color:'#b89040',quotes:['Wo aber Gefahr ist, wächst das Rettende auch.','Voll Verdienst, doch dichterisch, wohnet der Mensch auf dieser Erde.','Was bleibet aber, stiften die Dichter.']},
    {slug:'heidegger',name:'Martin Heidegger',era:'Phänomenologie',dates:'1889-1976',color:'#5b80e8',quotes:['Das Dasein ist ein Seiendes, dem es in seinem Sein um dieses Sein selbst geht.','Die Sprache ist das Haus des Seins.','Nur ein Gott kann uns noch retten.']},
    {slug:'levinas',name:'Emmanuel Levinas',era:'Phänomenologie / Ethik',dates:'1906-1995',color:'#7b60d8',quotes:['Das Antlitz des Anderen ist der Ort, an dem die Unendlichkeit in die Endlichkeit einbricht.','Die Ethik ist die erste Philosophie.','Das Antlitz spricht: Du sollst nicht töten.']},
    {slug:'tengelyi',name:'László Tengelyi',era:'Phänomenologie',dates:'1954-2014',color:'#6890c0',quotes:['Vom platonischen Sokrates stammt der Gedanke, dass das Leben erst dann wert ist, gelebt zu werden, wenn es untersucht wird.','Das Spezifische der Philosophie besteht für mich darin, das Leben innerhalb der Welt zu lokalisieren und im Gesamtzusammenhang der Welt zu betrachten.','Als Gesamtprojekt sollte sich die Phänomenologie m. E. als ein Weltentwurf verstehen.']},
    {slug:'leibniz',name:'Gottfried W. Leibniz',era:'Rationalismus',dates:'1646-1716',color:'#e87060',quotes:['Diese Welt ist die beste aller möglichen Welten.','Nichts ist im Verstand, was nicht zuvor in den Sinnen war — außer der Verstand selbst.','Die Gegenwart ist schwanger mit der Zukunft.']},
    {slug:'jacobi',name:'F. H. Jacobi',era:'Glaubensphilosophie',dates:'1743-1819',color:'#e89060',quotes:['Mit dem Eintreten der Zeit verwandeln sich die Begriffe von Grund und Folge in die Begriffe von Ursache und Wirkung.','Diesen Fehler beging also Spinoza nicht; aber was er eigentlich zu Stande bringen wollte: eine natürliche Erklärung des Daseyns erdHcher und successiver Dinge, konnte durch seine neue Vorstellungsart so wenig, als durch irgend eine andre erreicht werden.','Denn die Folge, welche in den mathematischen gleichnissen vorgestellt wird, ist keine objektive und wirkliche, sondern eine subjektive und bloß idealische, die auch nicht einmal idealisch vorhanden sein könnte, wenn ihr nicht eine wirkliche Sukzession in dem Subjekt, welche sie in Gedanken erzeugt, zu Grunde läge, und dadurch das Stehende in ein Fließendes verwandelt würde.']},
    {slug:'kierkegaard',name:'Søren Kierkegaard',era:'Existenzphilosophie',dates:'1813-1855',color:'#5070b0',quotes:['Ich stecke den Finger ins Dasein - es riecht nach nichts.','Angst ist der Schwindel der Freiheit.','Das Leben kann nur rückwärts verstanden, aber muss vorwärts gelebt werden.']},
    {slug:'spinoza',name:'Baruch de Spinoza',era:'Rationalismus',dates:'1632-1677',color:'#f85888',quotes:['Deus sive Natura - Gott oder die Natur.','Weine nicht, lache nicht, verstehe.','Frieden ist nicht die Abwesenheit von Krieg, sondern eine Tugend, die aus seelischer Stärke entspringt.']},
    {slug:'schopenhauer',name:'Arthur Schopenhauer',era:'Postidealismus',dates:'1788-1860',color:'#a05050',quotes:['Das Leben ist eine missliche Sache. Ich habe mir vorgesetzt, es damit hinzubringen, über dasselbe nachzudenken.','Das Leben pendelt wie ein Pendel hin und her zwischen Schmerz und Langeweile.','Jeder hält die Grenzen seines eigenen Gesichtsfeldes für die Grenzen der Welt.']},
    {slug:'nietzsche',name:'Friedrich Nietzsche',era:'19. Jh.',dates:'1844-1900',color:'#fb923c',quotes:['Gott ist tot. Und wir haben ihn getötet.','Was mich nicht umbringt, macht mich stärker.','Wer mit Ungeheuern kämpft, mag zusehen, dass er nicht dabei zum Ungeheuer wird.']},
    {slug:'freud',name:'Sigmund Freud',era:'Psychoanalyse',dates:'1856-1939',color:'#7060b0',quotes:['Das Ich ist nicht Herr im eigenen Haus.','Wo Es war, soll Ich werden.','Unsere Kultur ist ganz allgemein auf der Unterdrückung von Trieben aufgebaut.']},
    {slug:'cioran',name:'Emil Cioran',era:'20. Jh.',dates:'1911-1995',color:'#606080',quotes:['Ein Buch ist ein aufgeschobener Selbstmord.','Es genügt nicht, geboren zu werden — man muss auch sterben.','Ich würde eine Welt lieben, in der es gar kein Kriterium gäbe, keine Form und keinerlei Prinzip, eine Welt der absoluten Unbestimmtheit. Denn in unserer Welt sind alle Kriterien, Formen und Prinzipien schal.', 'Ich weiß überhaupt nicht, weshalb wir hienieden etwas tun, warum wir Freude und Bestrebungen, Hoffnungen und Träume haben müssen. […] Aber was gibt es in dieser Welt schon zu gewinnen? […] Es gibt keinerlei Argumente für das Leben.', 'Es leuchtet ein, dass Gott eine Lösung war und dass man nie wieder eine ebenso befriedigende finden wird.']},
    {slug:'derrida',name:'Jacques Derrida',era:'Poststrukturalismus',dates:'1930-2004',color:'#7060b0',quotes:['Es gibt kein Außerhalb des Textes.','Die Dekonstruktion findet statt, ich werde nichts machen.','Die Spur ist die Wiederkehr des Anderen im Selben.']},
    {slug:'hume',name:'David Hume',era:'Empirismus',dates:'1711-1776',color:'#50b080',quotes:['Aus dem Sein folgt kein Sollen.','Die Vernunft ist Sklavin der Leidenschaften.','Gewohnheit ist die große Führerin des menschlichen Lebens.']},
    {slug:'n-hartmann',name:'Nicolai Hartmann',era:'Ontologie',dates:'1882-1950',color:'#6890c0',quotes:['Die Welt ist ein Schichtenbau realer Seinsweisen.','Das Reale ist das schwerere Sein gegenüber dem Ideellen.','Aporetik ist die unvollendete Methode der Philosophie.']},
    {slug:'wjames',name:'William James',era:'Pragmatismus',dates:'1842-1910',color:'#80b070',quotes:['Truth happens to an idea.','Glauben heißt, das zu tun, was wir wollen, vorausgesetzt, dass wir die Folgen tragen wollen.','Das größte Werkzeug gegen Stress ist unsere Fähigkeit, einen Gedanken einem anderen vorzuziehen.']},
    {slug:'scholem',name:'Gershom Scholem',era:'Religionsphilosophie',dates:'1897-1982',color:'#a08060',quotes:['Mystik ist die Stimme dessen, was in der Religion verstummt ist.','Jeder bedeutende Gedanke birgt in sich einen Widerspruch.','Es gibt eine Wahrheit, aber sie ist nicht eine Aussage.']},
  ];

  // Shuffle for random initial order
  for(let i=tiles.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [tiles[i],tiles[j]]=[tiles[j],tiles[i]];
  }

  const wrap = document.getElementById('favphil-banner');
  const glow = document.getElementById('fpb-bg-glow');
  if(!wrap) return;
  
  /* Hide wrap during construction to prevent flash */
  wrap.style.visibility = 'hidden';
  wrap.classList.add('no-anim');   /* erstes Slide ohne Einblend-Transition zeigen */

  // Idempotent: remove any existing slides if function was called before
  wrap.querySelectorAll('.fpb-slide').forEach(function(s){ s.remove(); });
  const oldDots = document.getElementById('fpb-dots');
  if(oldDots) oldDots.innerHTML = '';

  // Create slides
  const slides = tiles.map(function(t,i){
    const s = document.createElement('div');
    s.className = 'fpb-slide' + (i===0?' active':'');
    const _tslug = (window.resolveFavSlug ? window.resolveFavSlug(t.slug) : t.slug);
    const _loading = (i===0 ? 'eager' : 'lazy');   /* erstes Bild sofort → kein Flackern beim Seitenwechsel */
    s.innerHTML =
      '<div class="fpb-portrait">'
        +'<picture>'
        +'<source srcset="assets/images/philosophen/'+_tslug+'.avif" type="image/avif">'
        +'<source srcset="assets/images/philosophen/'+_tslug+'.webp" type="image/webp">'
        +'<img src="assets/images/philosophen/'+_tslug+'.jpg" alt="'+t.name+'" loading="'+_loading+'" '
        +'onerror="this.closest(\'picture\').style.display=\'none\';this.closest(\'picture\').nextElementSibling.style.display=\'flex\';">'
        +'</picture>'
        +'<div class="fpb-portrait-mono" style="display:none;color:'+t.color+';">'+t.name.split(' ').pop().charAt(0)+'</div>'
      +'</div>'
      +'<div class="fpb-info">'
        +'<span class="fpb-era-badge" style="background:'+t.color+';">'+t.era+'</span>'
        +'<div class="fpb-name">'+t.name+'</div>'
        +'<div class="fpb-dates">'+t.dates+'</div>'
        +'<div class="fpb-quote" style="--fpb-color:'+t.color+';">\u201E'+(t.quotes?t.quotes[Math.floor(Math.random()*t.quotes.length)]:t.quote)+'\u201C</div>'
      +'</div>';
    wrap.appendChild(s);
    return s;
  });

  // Dots
  const dotsEl = document.getElementById('fpb-dots');
  tiles.forEach(function(_,i){
    const d = document.createElement('div');
    d.className = 'fpb-dot' + (i===0?' active':'');
    d.onclick = function(){ goTo(i); };
    dotsEl.appendChild(d);
  });

  let idx = 0, paused = false, timer = null;
  const INTERVAL = 6000;

  function hexToRgba(hex,a){
    const m=hex.replace('#','');
    const r=parseInt(m.substring(0,2),16),g=parseInt(m.substring(2,4),16),b=parseInt(m.substring(4,6),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }
  function applyGlow(color){
    glow.style.background='radial-gradient(ellipse 60% 80% at 30% 50%,'+hexToRgba(color,.18)+' 0%,transparent 70%)';
  }
  function show(i){
    slides[idx].classList.remove('active');
    dotsEl.children[idx].classList.remove('active');
    idx = (i + slides.length) % slides.length;
    slides[idx].classList.add('active');
    dotsEl.children[idx].classList.add('active');
    applyGlow(tiles[idx].color);
  }
  function next(){ show(idx+1); }
  function start(){
    if(timer) clearInterval(timer);
    if(!paused) timer = setInterval(next, INTERVAL);
  }
  function goTo(i){ show(i); start(); }

  window.fpbNext = function(){ next(); start(); };
  window.fpbPrev = function(){ show(idx-1); start(); };
  window.fpbPause = function(){
    paused = !paused;
    const btn = document.getElementById('fpb-pause');
    btn.textContent = paused ? '▶' : '⏸';
    btn.title = paused ? 'Fortsetzen' : 'Pausieren';
    if(paused){ clearInterval(timer); } else { start(); }
  };

  applyGlow(tiles[0].color);
  start();
  /* Show wrap atomically */
  wrap.style.visibility = 'visible';
  /* nach dem ersten Frame Transitions wieder aktivieren (für sanfte Wechsel danach) */
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ wrap.classList.remove('no-anim'); }); });
};
/* Defensive: if renderFavphil is registered, let it call us — else self-trigger */
if (typeof window.renderFavphil === 'function') {
  window.renderFavphil();
} else {
  /* Fallback: render banner only, render grid when renderFavphil becomes available */
  window.buildFavphilBanner();
  let attempts = 0;
  const waitForRender = setInterval(function(){
    attempts++;
    if (typeof window.renderFavphil === 'function') {
      clearInterval(waitForRender);
      window.renderFavphil();
    } else if (attempts > 30) {
      clearInterval(waitForRender);
    }
  }, 50);
}
</script>

    text: `Habt ihr nicht von jenem tollen Menschen gehört, der am hellen Vormittage eine Laterne anzündete, auf den Markt lief und unaufhörlich schrie: „Ich suche Gott! Ich suche Gott!" — Da dort gerade viele von Denen zusammenstanden, welche nicht an Gott glaubten, so erregte er ein großes Gelächter. Ist er denn verloren gegangen? Sagte der Eine. Hat er sich verlaufen wie ein Kind? Sagte der Andere. Oder hält er sich versteckt? Fürchtet er sich vor uns? Ist er zu Schiff gegangen? Ausgewandert? — so schrien und lachten sie durcheinander. Der tolle Mensch sprang mitten unter sie und durchbohrte sie mit seinen Blicken. „Wohin ist Gott? Rief er, ich will es euch sagen! Wir haben ihn getötet, — ihr und ich! Wir alle sind seine Mörder! Aber wie haben wir dies gemacht? Wie vermochten wir das Meer auszutrinken? Wer gab uns den Schwamm, um den ganzen Horizont wegzuwischen? Was taten wir, als wir diese Erde von ihrer Sonne losketteten? Wohin bewegt sie sich nun? Wohin bewegen wir uns? Fort von allen Sonnen? Stürzen wir nicht fortwährend? Und rückwärts, vorwärts, nach allen Seiten? Gibt es noch ein Oben und ein Unten? Irren wir nicht wie durch ein unendliches Nichts? Haucht uns nicht der leere Raum an? Ist es nicht kälter geworden? Kommt nicht immerfort die Nacht und mehr Nacht? Müssen nicht Laternen am Vormittage angezündet werden? Hören wir noch Nichts von dem Lärm der Totengräber, welche Gott begraben? Riechen wir noch Nichts von der göttlichen Verwesung? — auch Götter verwesen! Gott ist tot! Gott bleibt tot! Und wir haben ihn getötet! Wie trösten wir uns, die Mörder aller Mörder? Das Heiligste und Mächtigste, was die Welt bisher besaß, es ist unter unseren Messern verblutet, — wer wischt dies Blut von uns ab? Mit welchem Wasser könnten wir uns reinigen? Welche Sühnfeiern, welche heiligen Spiele werden wir erfinden müssen? Ist nicht die Größe dieser Tat zu groß für uns? Müssen wir nicht selber zu Göttern werden, um nur ihrer würdig zu erscheinen? Es gab nie eine größere Tat, — und wer nur immer nach uns geboren wird, gehört um dieser Tat willen in eine höhere Geschichte, als alle Geschichte bisher war!" — Hier schwieg der tolle Mensch und sah wieder seine Zuhörer an: auch sie schwiegen und blickten befremdet auf ihn. Endlich warf er seine Laterne auf den Boden, dass sie in Stücke sprang und erlosch. „Ich komme zu früh, sagte er dann, ich bin noch nicht an der Zeit. Dies ungeheure Ereignis ist noch unterwegs und wandert, — es ist noch nicht bis zu den Ohren der Menschen gedrungen. Blitz und Donner brauchen Zeit, das Licht der Gestirne braucht Zeit, Taten brauchen Zeit, auch nachdem sie getan sind, um gesehen und gehört zu werden. Die Tat ist ihnen immer noch ferner, als die fernsten Gestirne, — und doch haben sie dieselbe getan!" — Man erzählt noch, dass der tolle Mensch des selbigen Tages in verschiedene Kirchen eingedrungen sei und darin sein Requiem aeternam deo angestimmt habe. Hinausgeführt und zur Rede gesetzt, habe er immer nur dies entgegnet: „Was sind denn diese Kirchen noch, wenn sie nicht die Grüfte und Grabmäler Gottes sind?"`,
    pullquote: 'Gott ist tot! Gott bleibt tot! Und wir haben ihn getötet!',
    author: 'Friedrich Nietzsche',
    source: 'Die fröhliche Wissenschaft (1882), KSA Band 3, S. 480–482',
    url: 'https://www.projekt-gutenberg.org/nietzsch/froehl/froehl.html',
    kat: 'Metaphysik',
    portrait: 'nietzsche'
  },

  // ── Kierkegaard ─────────────────────────────────────────────
  {
    text: `Man steckt den Finger in die Erde, um zu riechen, in welchem Land man ist, ich stecke den Finger ins Dasein – es riecht nach nichts. Wo bin ich? Was heißt das: die Welt? Was bedeutet dieses Wort? Wer hat mich durch seine Tricks in die ganze Sache hereingezogen und lässt mich nun damit allein? Wer bin ich? Wie bin ich in die Welt hineingekommen; warum wurde ich nicht gefragt, warum nicht mit Sitten und Gebräuchen bekanntgemacht, sondern in Reih und Glied gesteckt, als wäre ich von einem Seelenverkäufer gekauft? Wie wurde ich Teilhaber an dem großen Unternehmen, das man die Wirklichkeit nennt? Warum soll ich Teilhaber sein? Ist einem das nicht freigestellt? Und wenn ich dazu gezwungen werden soll, wo ist dann der Diskussionsleiter, ich habe einen Einwand zu machen? Gibt es keinen Diskussionsleiter? Wohin soll ich mich mit meiner Klage wenden? Das Dasein ist ja eine Debatte, darf ich bitten, dass meine Überlegungen mit in Erwägung gezogen werden? Soll man das Dasein nehmen, wie es ist, wäre es dann nicht das beste, dass man erführe, wie es ist?`,

  // ── Michael Ende — Momo ─────────────────────────────────────
  {

Momo konnte so zuhören, dass dummen Leuten plötzlich sehr gescheite Gedanken kamen. Nicht etwa, weil sie etwas sagte oder fragte, was den anderen auf solche Gedanken brachte, nein, sie saß nur da und hörte einfach zu, mit aller Aufmerksamkeit und Anteilnahme. Dabei schaute sie den anderen mit ihren großen, dunklen Augen an und der Betreffende fühlte, wie in ihm auf einmal Gedanken auftauchten, von denen er nie geahnt hatte, dass sie in ihm steckten.

Sie konnte so zuhören, dass rastlose oder unentschlossene Leute auf einmal ganz genau wussten, was sie wollten. Oder dass Schüchterne sich plötzlich frei und mutig fühlten. Oder dass Unglückliche und Bedrückte zuversichtlich und froh wurden. Und wenn jemand meinte, sein Leben sei ganz verfehlt und bedeutungslos und er selbst nur irgendeiner unter Millionen, einer, auf den es überhaupt nicht ankommt und der ebenso schnell ersetzt werden kann wie ein kaputter Topf – und er ging hin und erzählte alles das der kleinen Momo, dann wurde ihm, noch während er redete, auf geheimnisvolle Weise klar, dass er sich gründlich irrte, dass es ihn, genauso wie er war, unter allen Menschen nur ein einziges Mal gab und dass er deshalb auf seine besondere Weise für die Welt wichtig war. So konnte Momo zuhören!`,

const KAT_ORDER = ['Antike','Metaphysik','Freiheit','(Un-)Endlichkeit','Existenz','Literatur'];
const LONG_THRESHOLD = 280;
let activeKat = 'Alle';

// ────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return esc(s).replace(/"/g,'&quot;'); }

function monogram(name){
  // Take first letter of last word ("F. W. J. Schelling" → "S")
  const parts = name.replace(/[.,]/g,'').split(/\s+/).filter(Boolean);
  return parts[parts.length-1].charAt(0).toUpperCase();
}

function portraitTag(z, mono='') {
  const m = mono || monogram(z.author);
  if(z.portrait){
    const base = 'assets/images/philosophen/'+esc(resolveZSlug(z.portrait));
    /* <picture> with avif → webp → jpg fallback chain (browser picks best available) */
    return '<picture>'
      +'<source srcset="'+base+'.avif" type="image/avif">'
      +'<source srcset="'+base+'.webp" type="image/webp">'
      +'<img src="'+base+'.jpg" alt="'+escAttr(z.author)+'" loading="lazy" '
      +'onerror="this.closest(\'picture\').style.display=\'none\';this.closest(\'picture\').nextElementSibling.style.display=\'flex\';">'
      +'</picture>'
      +'<span class="zc-portrait-mono" style="display:none">'+esc(m)+'</span>';
  }
  return '<span class="zc-portrait-mono">'+esc(m)+'</span>';
}

function shortenText(t){
  if(t.length <= LONG_THRESHOLD) return t;
  let cut = t.indexOf(' ', LONG_THRESHOLD);
  if(cut === -1 || cut > LONG_THRESHOLD + 60) cut = LONG_THRESHOLD;
  const slice = t.substring(0, cut);
  const lastPunct = Math.max(slice.lastIndexOf('. '), slice.lastIndexOf('! '), slice.lastIndexOf('? '));
  if(lastPunct > LONG_THRESHOLD - 80) cut = lastPunct + 1;
  return t.substring(0, cut).trim() + ' …';
}

function paragraphsHTML(t){
  return t.split(/\n\n+/).map(p => '<p>'+esc(p).replace(/\n/g,'<br>')+'</p>').join('');
}

// ────────────────────────────────────────────────────────────
// Karten
// ────────────────────────────────────────────────────────────
function buildCard(z, idx){
  const isLong = z.text.length > LONG_THRESHOLD;
  const card = document.createElement('div');
  card.className = 'zitat-card' + (isLong ? ' is-long is-collapsed' : '');
  card.id = 'zitat-' + idx;
  card.setAttribute('data-idx', idx);

  const head = '<div class="zc-head">'
    +'<div class="zc-portrait">'+portraitTag(z)+'</div>'
    +'<div class="zc-author-block">'
      +'<div class="zc-author">'+esc(z.author)+'</div>'
      +'<div class="zc-source">'+esc(z.source.split('—')[0].trim())+'</div>'
    +'</div>'
    +'<span class="zc-kat-tag">'+esc(z.kat)+'</span>'
    +'</div>';

  let body = '<div class="zc-body">';
  if(z.original){
    body += '<div class="zc-original">'+esc(z.original)+'</div>';
    body += '<div class="zc-text">'+esc(z.text)+'</div>';
  } else if(isLong){
    body += '<div class="zc-text zc-text-short">'+esc(shortenText(z.text))+'</div>';
    body += '<div class="zc-text zc-text-full">'+paragraphsHTML(z.text)+'</div>';
    if(z.pullquote){
      body += '<div class="zc-pullquote zc-text-full">„'+esc(z.pullquote)+'"</div>';
    }
    body += '<button class="zc-toggle">Kontext anzeigen ▾</button>';
  } else {
    body += '<div class="zc-text">'+esc(z.text)+'</div>';
    if(z.pullquote){
      body += '<div class="zc-pullquote">„'+esc(z.pullquote)+'"</div>';
    }
  }
  body += '</div>';

  let foot = '';
  if(z.note){
    foot += '<div class="zc-note">'+esc(z.note)+'</div>';
  }

  const sourceFooter = '<div class="zc-foot">'
    + (z.url
        ? '<a class="zc-source-link" href="'+escAttr(z.url)+'" target="_blank" rel="noopener">'+esc(z.source)+' ↗</a>'
        : '<span class="zc-source-full">'+esc(z.source)+'</span>')
    + '</div>';

  card.innerHTML = head + body + foot + sourceFooter;

  if(isLong){
    const btn = card.querySelector('.zc-toggle');
    btn.onclick = function(){
      const exp = card.classList.toggle('is-expanded');
      card.classList.toggle('is-collapsed', !exp);
      btn.textContent = exp ? 'Kontext ausblenden ▴' : 'Kontext anzeigen ▾';
    };
  }
  return card;
}

// ────────────────────────────────────────────────────────────
function buildFilters(){
  const bar = document.getElementById('zitat-filter');
  const counts = {Alle: ZITATE.length};
  ZITATE.forEach(z => { counts[z.kat] = (counts[z.kat]||0)+1; });
  const seen = new Set(['Alle']);
  const ordered = ['Alle'];
  KAT_ORDER.forEach(k => { if(counts[k]) { ordered.push(k); seen.add(k); } });
  Object.keys(counts).sort().forEach(k => { if(!seen.has(k) && k !== 'Alle') ordered.push(k); });

  bar.innerHTML = '';
  const l = document.createElement('span'); l.className='zitat-filter-label'; l.textContent='Filter:';
  bar.appendChild(l);

  ordered.forEach(k => {
    const b = document.createElement('button');
    b.className = 'zitat-filter-btn' + (k===activeKat ? ' active' : '');
    b.innerHTML = k + '<span class="ct">' + counts[k] + '</span>';
    b.onclick = () => { activeKat = k; buildFilters(); renderGrid(); };
    bar.appendChild(b);
  });

  const cnt = document.createElement('span');
  cnt.className = 'zitat-count';
  const showing = activeKat === 'Alle' ? ZITATE.length : counts[activeKat] || 0;
  cnt.textContent = showing + (showing===1 ? ' Zitat' : ' Zitate');
  bar.appendChild(cnt);
}

function renderGrid(){
  const grid = document.getElementById('zitat-grid');
  grid.innerHTML = '';
  const items = activeKat==='Alle' ? ZITATE : ZITATE.filter(z => z.kat===activeKat);
  items.forEach(z => grid.appendChild(buildCard(z, ZITATE.indexOf(z))));
}

// ────────────────────────────────────────────────────────────
// Zufalls-Showcase
// ────────────────────────────────────────────────────────────
let lastRandomIdx = -1;
function pickRandom(){
  if(ZITATE.length < 2) return 0;
  let i;
  do { i = Math.floor(Math.random() * ZITATE.length); } while(i === lastRandomIdx);
  lastRandomIdx = i;
  return i;
}

function renderRandom(){
  const box = document.getElementById('zr-showcase');
  if(!box) return;
  const idx = pickRandom();
  const z = ZITATE[idx];
  box.setAttribute('data-current-idx', idx);
  const display = z.pullquote || (z.text.length > 240 ? shortenText(z.text).slice(0,240) + '…' : z.text);

  box.classList.add('swap');
  setTimeout(() => {
    const portraitEl = document.getElementById('zr-portrait');
    portraitEl.innerHTML = '';
    if(z.portrait){
      const base = 'assets/images/philosophen/'+resolveZSlug(z.portrait);
      const pic = document.createElement('picture');
      const s1 = document.createElement('source'); s1.srcset = base+'.avif'; s1.type = 'image/avif';
      const s2 = document.createElement('source'); s2.srcset = base+'.webp'; s2.type = 'image/webp';
      const img = document.createElement('img');
      img.src = base+'.jpg'; img.alt = z.author;
      img.onerror = function(){
        portraitEl.innerHTML = '<span class="zr-portrait-mono">'+esc(monogram(z.author))+'</span>';
      };
      pic.appendChild(s1); pic.appendChild(s2); pic.appendChild(img);
      portraitEl.appendChild(pic);
    } else {
      portraitEl.innerHTML = '<span class="zr-portrait-mono">'+esc(monogram(z.author))+'</span>';
    }
    document.getElementById('zr-quote').textContent = '„'+display+'"';
    document.getElementById('zr-meta').innerHTML =
      '<span class="zr-author">'+esc(z.author)+'</span> · '+esc(z.source);
    box.classList.remove('swap');
  }, 220);
}


window.focusZitatFromRandom = function(){
  const box = document.getElementById('zr-showcase');
  if(!box) return;
  const idx = box.getAttribute('data-current-idx');
  if(idx === null) return;
  if(activeKat !== 'Alle'){
    activeKat = 'Alle';
    buildFilters();
    renderGrid();
  }
  setTimeout(function(){
    const card = document.getElementById('zitat-' + idx);
    if(!card) return;
    card.scrollIntoView({behavior:'smooth', block:'center'});
    card.classList.add('zitat-card-highlight');
    if(card.classList.contains('is-long')){
      card.classList.remove('is-collapsed');
      card.classList.add('is-expanded');
      const btn = card.querySelector('.zc-toggle');
      if(btn) btn.textContent = 'Kontext ausblenden ▴';
    }
    setTimeout(function(){ card.classList.remove('zitat-card-highlight'); }, 2500);
  }, 50);
};
window.rerollRandom = renderRandom;
window.renderZitate = function(){ buildFilters(); renderGrid(); renderRandom(); };

buildFilters();
renderGrid();
renderRandom();

})();
</script>
</template>

<script>

(function(){

const YEAR_MIN = -700, YEAR_MAX = 2030, YEAR_RANGE = YEAR_MAX - YEAR_MIN;
const BASE_W   = 4400;
let SVG_H      = 760;   /* = feste Viewport-Höhe, wird in setH() gesetzt */

let PAD        = 85;   // axis-to-card gap (dynamisch: schrumpft bei wenig Höhe)

const MEGA = new Set(['Platon','Aristoteles','Kant','Sokrates','Nietzsche','Descartes','Hegel','Augustinus','Thomas v. Aquin']);
const MEGA_ZOOM = 0.55;  /* unter diesem Zoom: nur die 9 Giganten + grobe Großepochen-Bänder */

const TIER_RING = { 1:'#f5b50a', 2:'#3b9eff', 3:'#23c552', 4:'#9b7cff' };
const TIER_NAME    = { 1:'Gigant',  2:'Wichtiger Denker', 3:'Bedeutend', 4:'Schüler/Randfigur' };
const TIER_NAME_F  = { 1:'Gigantin', 2:'Wichtige Denkerin', 3:'Bedeutend', 4:'Schülerin/Randfigur' };
/* geschlechtssensible Tier-Bezeichnung */
function tierName(p) { return (p.female ? TIER_NAME_F : TIER_NAME)[p.tier] || ''; }

/* Lieblingsphilosophen — Mapping von Namen in PHILS_V2 zu Bild-Slug */
const FAV_SLUGS = {
  'Parmenides':'parmenides','Anaximander':'anaximander','Heraklit':'heraklit',
  'Platon':'platon','Aristoteles':'aristoteles','Plotin':'plotin',
  'Eriugena':'eriugena','Augustinus':'augustinus','Böhme':'boehme',
  'Pascal':'pascal','Malebranche':'malebranche','Kant':'kant',
  'Schelling':'schelling','Hegel':'hegel','Hölderlin':'hoelderlin',
  'Heidegger':'heidegger','Levinas':'levinas','Tengelyi':'tengelyi',
  'Leibniz':'leibniz','Jacobi':'jacobi','Kierkegaard':'kierkegaard',
  'Spinoza':'spinoza','Schopenhauer':'schopenhauer','Nietzsche':'nietzsche',
  'Freud':'freud','Cioran':'cioran','Derrida':'derrida','Hume':'hume',
  'N. Hartmann':'n-hartmann','James':'wjames','Scholem':'scholem'
};

let zoom = 1.0;
let epoch = '';
let femaleOnly = false;  /* Frauen-Filter */
let viewMode = 'timeline';  /* 'timeline' | 'table' */
let _tblSort = { key:'birth', dir:1 };
let search = '';
let filterMode = 'epoch';   /* 'epoch' | 'disc' | 'mov' | 'pos' | 'thema' */
let discFilter = '';        /* aktive Disziplin */
let movFilter = '';         /* aktive Strömung */
let posFilter = '';         /* aktive Grundposition */
let themaFilter = '';       /* aktives Thema */
let inflOn = { student:true, inspires:true, critic:true, develops:true };
let focusName = null;   /* currently hovered/clicked philosopher — drives focus mode */
let _connectedToFocus = new Set();  /* Namen, die mit dem fokussierten Knoten verbunden sind */
let _unfocusTimer = null;  /* Debounce für mouseleave (Anti-Flacker) */
let _chainSet = new Set();  /* Hover-Kette: bleibt beim Linien-Nachverfolgen bestehen,
                               wird erst beim Verlassen der Timeline geleert */
/* ── Touch (C11): 1. Tap = Fokus/Info, 2. Tap auf dieselbe Karte = Modal ── */
let _lastTapName = null;     /* zuletzt getappte Karte (für Doppel-Tap-Erkennung) */
let _tchX = 0, _tchY = 0, _tchT = 0;  /* Tap vs. Scroll unterscheiden */
function computeConnected(name) {
  const s = new Set();
  if (!name) return s;
  const fp = byName(name);
  if (fp && fp.influences) fp.influences.forEach(i => s.add(i.to));
  phils().forEach(q => {
    if (q.influences && q.influences.some(i => i.to === name)) s.add(q.name);
  });
  return s;
}
let inflMode = 'focus'; /* 'focus' = lines only for active node, 'all' = always show all */

function svgW() { return BASE_W * zoom; }
function xOf(yr) { return ((yr - YEAR_MIN) / YEAR_RANGE) * svgW(); }
function dark() { return document.documentElement.dataset.theme === 'dark'; }
function cv(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function phils() { return typeof PHILS_V2 !== 'undefined' ? PHILS_V2 : []; }
function byName(n) { return phils().find(p => p.name === n); }
/* Anzeigename: display-Feld bevorzugt, sonst name (Schlüssel bleibt name) */
function dispName(p) { return p.display || p.name; }
/* Basis-Sichtbarkeit: hängt NUR von Zoom/Filter ab, NICHT vom Hover.

function baseVisible(p) {
  if (femaleOnly && !p.female) return false;
  if (zoom < MEGA_ZOOM) return MEGA.has(p.name);   /* Mega-Verdichtungsstufe */

  if (filterMode === 'epoch') {

const MULTI_PORTRAITS = {
  'schelling': 4,   // schelling.jpg, schelling1, schelling2, schelling3 (private Zeichnung)
  'kant': 2,        // kant.jpg + kant1.jpg

/* ════════ MAIN RENDER ════════ */
function render() {

    m.appendChild(el('path', { d:'M0,0 L0,6 L9,3 z', fill:c }));

    const d = deathYearForPos(p);

    epochRanges[p.epoch].max = Math.max(epochRanges[p.epoch].max, d);
  });
  const bandG = el('g');
  if (zoom < MEGA_ZOOM) {
    /* GROBE EINTEILUNG: nur drei Großepochen-Bänder (Antike/Mittelalter/Neuzeit) */
    const ERA_BANDS = [
      { name:'Antike',      from:-600, to:600,  c:'#d98c3f' },
      { name:'Mittelalter', from:480,  to:1370, c:'#7b9acc' },
      { name:'Neuzeit',     from:1300, to:2026, c:'#5fb87a' },

    });

      bandG.appendChild(el('rect', { x:x1, y:0, width:Math.max(1, x2-x1), height:SVG_H,
        fill: r.c + (isActive ? '24' : dk ? '10' : '0a') }));

  phils().forEach(p => {

      if (!inflOn[inf.type]) return;

      if (tx === undefined) return;

      /* Kante berührt den aktuell gehoverten Knoten? (→ kräftiger Stil) */
      const touchesFocus = focusName && (p.name === focusName || inf.to === focusName);
      /* Kante liegt innerhalb der Hover-Kette? */

      const isSearchHl = search && (p.name.toLowerCase().includes(search) || inf.to.toLowerCase().includes(search));

                    (search && !isSearchHl));

  const SLOT_GAP_X = CARD_W - 6;  /* min horizontal gap before pushing to next row */
  const ROW_HEIGHT_BASE = 28;   /* Wunsch-Zeilenabstand bei genug Platz */

  const _layoutKey = 'z' + zoom.toFixed(3) + (femaleOnly ? 'F' : '');
  if (!window._layoutCache || window._layoutCache.key !== _layoutKey) {
    const sideMap = {}, rowMap = {};
    const rowEnds = { above: [], below: [] };
    /* nur die bei diesem Zoom (ohne Hover) sichtbaren Karten anordnen → kompakt */
    const layoutPhils = phils().filter(baseVisible)
      .sort((a,b) => posMap[a.name] - posMap[b.name]);
    layoutPhils.forEach(p => {
      const cx = posMap[p.name];
      function lowestRowFor(side) {
        const ends = rowEnds[side];
        let r = 0;
        while (ends[r] !== undefined && cx - ends[r] < SLOT_GAP_X) r++;

      const rowBelowCand = lowestRowFor('below');

      const natRow  = natural === 'above' ? rowAboveCand : rowBelowCand;
      const othRow  = other   === 'above' ? rowAboveCand : rowBelowCand;
      let chosenSide, chosenRow;
      if (othRow < natRow) { chosenSide = other;   chosenRow = othRow; }
      else                 { chosenSide = natural; chosenRow = natRow; }

  });

  /* ── A+C: Zeilenabstand an die Dichte anpassen, damit nichts über den
     festen Viewport hinausragt. Wir berechnen, wie viel vertikaler Platz
     EINE Seite (oben bzw. unten) hat: von der Achse bis zum Viewport-Rand,

  PAD = 85;  /* Basiswert pro Render zurücksetzen, dann ggf. stauchen */

  const wrapEl0 = document.getElementById('tl-wrap');
  const viewH = wrapEl0 ? wrapEl0.clientHeight : SVG_H;
  /* halbe verfügbare Höhe (eine Seite der Achse), minus Sicherheitsrand */
  const halfAvail = (viewH / 2) - 6;
  /* PAD (Achse→erste Karte) bei wenig Platz reduzieren: bis runter auf PAD_MIN.
     So gewinnen besonders kleine Fenster den nötigen Raum. */
  const PAD_MIN = 30;
  if (halfAvail < PAD + CARD_H + maxRowEither * ROW_HEIGHT_MIN) {
    /* Selbst mit engsten Zeilen zu eng → auch PAD schrumpfen */
    PAD = Math.max(PAD_MIN, halfAvail - CARD_H - maxRowEither * ROW_HEIGHT_MIN);
  }
  if (maxRowEither > 0) {
    /* verfügbarer Platz für die gestapelten Zeilen (nach Karte+PAD) */
    const avail = halfAvail - PAD - CARD_H;

  phils().forEach(p => {

    let focusDim = false, isFocused = false, isConnected = false;

    const showPortrait = !!pPortrait;  /* Porträts immer sichtbar, jede Zoomstufe */
    const cH    = CARD_H + (showEpoch ? 13 : 0);
    const cardY = (above ? AXIS_Y - PAD - cH : AXIS_Y + PAD) + rowOffset;
    const ly1   = above ? cardY + cH + 2 : AXIS_Y + 6;
    const ly2   = above ? AXIS_Y - 6 : cardY - 2;
    const dotR  = fav ? 8 : p.tier === 1 ? 7 : p.tier === 2 ? 5 : 4;

    const g = el('g', { class:'phil-node-group', opacity: dm ? '0.08' : '1', transform:`translate(${cx},0)` });
    g.setAttribute('data-name', p.name);

    g.appendChild(el('line', { x1:0, y1:ly1, x2:0, y2:ly2, stroke:p.color+'66', 'stroke-width':1.5 }));

    g.appendChild(el('circle', { cx:0, cy:AXIS_Y, r:dotR, fill:p.color,
      stroke: dk?'#0a0a0f':'#ffffff', 'stroke-width': fav ? 3 : 2.5 }));
    if (fav) {
      /* outer ring for favs */

        stroke:p.color, 'stroke-width':1.2, opacity:'0.55' }));
    }

    }

    g.appendChild(el('rect', { x:-CARD_W/2, y:cardY, width:CARD_W, height:cH,
      fill:cardBg, stroke:p.color, 'stroke-width': fav ? 2.2 : p.tier===1 ? 2 : 0.9, rx:8, ry:8 }));

    /* Fav-Star in corner */
    if (fav) {
      g.appendChild(el('text', { x:CARD_W/2-9, y:cardY+11, 'text-anchor':'end',
        fill:p.color, 'font-size':10, 'font-weight':'700' }, '★'));
    }

    /* Tier-Marker oben links — farbig nach Tier (auffällig, eigene Info) */
    const tierCol = TIER_RING[p.tier] || '#9b7cff';
    g.appendChild(el('text', { x:-CARD_W/2+8, y:cardY+12, 'text-anchor':'start',
      fill:tierCol, 'font-size':8.5, 'font-weight':'800',
      'font-family':"'JetBrains Mono',monospace" }, 'T'+p.tier));

    const _dn = dispName(p);
    const nameWeight = p.tier<=2 ? '700' : '600';
    if (_dn.length <= 17) {
      g.appendChild(el('text', { x:0, y:cardY+15, 'text-anchor':'middle',
        fill:textCol, 'font-size':fsize, 'font-weight':nameWeight,
        'font-family':"'Syne',sans-serif" }, _dn));
    } else {
      const parts = _dn.split(' ');
      let line1 = '', line2 = '';
      if (parts.length === 1) {
        line1 = _dn.substring(0, 16) + '…';
      } else {
        const half = _dn.length / 2;

        for (; idx < parts.length - 1; idx++) {
          acc += parts[idx].length + 1;
          if (acc >= half) { idx++; break; }
        }
        line1 = parts.slice(0, idx).join(' ');
        line2 = parts.slice(idx).join(' ');
        if (line1.length > 19) line1 = line1.substring(0,18)+'…';
        if (line2.length > 19) line2 = line2.substring(0,18)+'…';
