<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Alexander Schmidt — Data Scientist, Philosoph, Entwickler.">
<meta name="author" content="Alexander Schmidt">
<title>Alexander Schmidt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS — alexander-schmidt.dev
   Edit here to retheme the entire site.
═══════════════════════════════════════════ */
:root {
  /* Backgrounds */
  --bg:       #ffffff;
  --bg2:      #f8f8fc;
  --bg3:      #f0f0f8;
  --surface:  #f0f0f8;
  --surface2: #e4e4f0;

  /* Accent colours */
  --accent:  #5b52e8;
  --accent2: #e8527a;
  --accent3: #22c55e;
  --accent4: #f59e0b;

  /* Text */
  --text:  #18181f;
  --text2: #52526a;
  --text3: #9090a8;

  /* Borders */
  --border:  #e0e0ec;
  --border2: #d0d0e0;

  /* Cards */
  --card:   #ffffff;
  --shadow: 0 2px 12px rgba(0,0,0,.07);

  /* Typography */
  --fh: 'Syne', sans-serif;
  --fb: 'DM Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;

  /* Border radius */
  --r: 14px;
}

[data-theme="dark"] {
  --bg:       #0a0a0f;
  --bg2:      #111118;
  --bg3:      #181824;
  --surface:  #22223a;
  --surface2: #2a2a40;

  --accent:  #7c73ff;
  --accent2: #ff6584;
  --accent3: #43e97b;
  --accent4: #f7971e;

  --text:  #e8e8f0;
  --text2: #a0a0b8;
  --text3: #606078;

  --border:  #2a2a42;
  --border2: #3a3a55;

  --card:   #181824;
  --shadow: 0 2px 12px rgba(0,0,0,.3);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--fb);
  overflow-x: hidden;
  transition: background .3s, color .3s;
}

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  height: 56px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 1.5rem;
  background: var(--bg); border-bottom: 1px solid var(--border);
  transition: background .3s;
}
.nav-logo {
  font-family: var(--fh); font-size: 1.1rem; font-weight: 800;
  color: var(--text); text-decoration: none; letter-spacing: -.02em;
  cursor: pointer; flex-shrink: 0;
}
.nav-logo span { color: var(--accent); }

/* Grouped nav */
.nav-groups { display: flex; gap: 0; list-style: none; align-items: center; }
.nav-group  { position: relative; }

.nav-group-btn {
  background: none; border: none; color: var(--text2);
  font-family: var(--fm); font-size: .73rem;
  padding: .3rem .7rem; border-radius: 6px;
  cursor: pointer; display: flex; align-items: center; gap: .3rem;
  transition: all .15s; white-space: nowrap;
}
.nav-group-btn:hover,
.nav-group-btn.group-active { background: var(--surface); color: var(--accent); }
.nav-group-btn .arr { font-size: .55rem; opacity: .5; transition: transform .2s; }
.nav-group:hover .arr { transform: rotate(180deg); }

.nav-direct {
  background: none; border: none; color: var(--text2);
  font-family: var(--fm); font-size: .73rem;
  padding: .3rem .7rem; border-radius: 6px;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.nav-direct:hover,
.nav-direct.active { background: var(--surface); color: var(--accent); }

/* Dropdown */
.nav-dropdown {
  position: absolute; top: 100%; left: 0;
  min-width: 220px; background: var(--card);
  border: 1px solid var(--border); border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,.12);
  opacity: 0; pointer-events: none;
  transform: translateY(-4px); transition: opacity .18s, transform .18s; z-index: 600;
  /* padding-top creates an invisible bridge so mouse can move from button to dropdown */
  padding-top: 8px;
  margin-top: 0;
}
/* Extend hover area downward to cover the gap between button and dropdown */
.nav-group::after {
  content: ''; display: block; position: absolute;
  top: 100%; left: 0; width: 100%; height: 12px;
  background: transparent;
}
.nav-group:hover .nav-dropdown,
.nav-group.open .nav-dropdown {
  opacity: 1; pointer-events: all; transform: translateY(0);
}

.nav-dropdown-item {
  display: flex; align-items: center; gap: .6rem;
  padding: .6rem 1rem; cursor: pointer;
  font-family: var(--fm); font-size: .73rem; color: var(--text2);
  transition: all .15s; border-radius: 6px; margin: .2rem;
}
.nav-dropdown-item:hover { background: var(--surface); color: var(--accent); }
.nav-dropdown-item .icon { font-size: .9rem; width: 18px; text-align: center; }
.nav-dropdown-divider { height: 1px; background: var(--border); margin: .3rem .8rem; }

.nav-right { display: flex; gap: .4rem; align-items: center; }
.theme-btn {
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text2); width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer; font-size: .95rem; transition: all .2s;
}
.theme-btn:hover { border-color: var(--accent); color: var(--accent); }
.lang-btn {
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text2); padding: .25rem .6rem; border-radius: 6px;
  cursor: pointer; font-family: var(--fm); font-size: .68rem; transition: all .2s;
}
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ═══════════════════════════════════════════
   PAGE SYSTEM  (content loaded via JS into #page-root)
═══════════════════════════════════════════ */
#page-root { padding-top: 56px; min-height: 100vh; }

/* ═══════════════════════════════════════════
   SHARED COMPONENTS
═══════════════════════════════════════════ */
.sec       { padding: 3.5rem 3rem; }
.sec-title { font-family: var(--fh); font-size: 1.75rem; font-weight: 800; letter-spacing: -.03em; margin-bottom: .25rem; color: var(--text); }
.sec-sub   { color: var(--text3); font-family: var(--fm); font-size: .73rem; letter-spacing: .1em; margin-bottom: 2.25rem; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--shadow); transition: all .25s; }
.card:hover { transform: translateY(-3px); border-color: var(--border2); box-shadow: 0 6px 24px rgba(0,0,0,.1); }

.btn         { padding: .6rem 1.4rem; border-radius: 8px; font-family: var(--fh); font-weight: 600; font-size: .85rem; cursor: pointer; border: none; transition: all .2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: .85; transform: translateY(-1px); }
.btn-ghost   { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm      { padding: .35rem .85rem; font-size: .78rem; }

.tag  { background: var(--surface); color: var(--text2); padding: .15rem .5rem; border-radius: 4px; font-family: var(--fm); font-size: .66rem; }
.tags { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .75rem; }

.ctrl-input  {
  background: var(--card); border: 1px solid var(--border2); color: var(--text);
  padding: .42rem .75rem; border-radius: 7px; font-family: var(--fb);
  font-size: .8rem; outline: none; height: 34px; transition: border-color .2s;
}
.ctrl-input:focus { border-color: var(--accent); }
.ctrl-select {
  background: var(--card); border: 1px solid var(--border2); color: var(--text);
  padding: .42rem .7rem; border-radius: 7px; font-size: .8rem;
  cursor: pointer; height: 34px; outline: none;
}

/* Page hero (shared top banner) */
.page-hero       { padding: 2.5rem 3rem 2rem; background: var(--bg2); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
.page-hero-glow  { position: absolute; right: -80px; top: -60px; width: 280px; height: 280px; background: radial-gradient(circle,rgba(91,82,232,.1),transparent 70%); pointer-events: none; }
.page-title      { font-family: var(--fh); font-size: 2.6rem; font-weight: 800; letter-spacing: -.04em; color: var(--text); line-height: 1; }
.page-title span { color: var(--accent); }
.page-desc       { color: var(--text2); max-width: 600px; line-height: 1.75; margin-top: .6rem; font-size: .9rem; }
.page-stats      { display: flex; gap: 2rem; margin-top: 1.4rem; flex-wrap: wrap; }
.pstat-num       { font-family: var(--fh); font-size: 1.75rem; font-weight: 800; color: var(--accent); display: block; }
.pstat-lbl       { font-family: var(--fm); font-size: .63rem; color: var(--text3); letter-spacing: .08em; }

.hero-tag         { font-family: var(--fm); font-size: .72rem; color: var(--accent3); letter-spacing: .15em; margin-bottom: 1.1rem; display: flex; align-items: center; gap: .5rem; }
.hero-tag::before { content: ''; width: 20px; height: 1px; background: var(--accent3); }

.section-divider        { display: flex; align-items: center; gap: .75rem; font-family: var(--fh); font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 1.25rem; }
.section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Animations */
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.fade-up { animation: fadeUp .5s ease forwards; }
.d1{animation-delay:.1s} .d2{animation-delay:.2s} .d3{animation-delay:.3s}
@keyframes blink {0%,100%{opacity:1}50%{opacity:0}}
.cursor { animation: blink 1s step-end infinite; color: var(--accent); }

/* ═══════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════ */
footer {
  background: var(--bg2); border-top: 1px solid var(--border);
  padding: 2rem 3rem; display: flex; justify-content: space-between;
  align-items: center; flex-wrap: wrap; gap: 1rem;
}
.footer-txt  { font-family: var(--fm); font-size: .7rem; color: var(--text3); }
.footer-links { display: flex; gap: 1.25rem; }
.footer-links a {
  color: var(--text3); text-decoration: none;
  font-family: var(--fm); font-size: .7rem; transition: color .2s;
}
.footer-links a:hover { color: var(--accent); }

/* Responsive */
@media(max-width:820px) {
  .sec { padding: 2.5rem 1.5rem; }
  .page-hero { padding: 2rem 1.5rem 1.5rem; }
}

/* ═══════════════════════════════════════════
   HOME PAGE
═══════════════════════════════════════════ */
.hero {
  display: flex; flex-direction: row; align-items: center;
  gap: 4rem; min-height: calc(100vh - 56px);
  padding: 3rem 4rem 2rem; position: relative; overflow: hidden;
}
.hero-grid-bg {
  position: absolute; inset: 0;
  background-image: linear-gradient(var(--border) 1px,transparent 1px),
                    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size: 50px 50px; opacity: .35; pointer-events: none;
}
[data-theme="dark"] .hero-grid-bg { opacity: .2; }
.hero-glow {
  position: absolute; top: -150px; right: -80px; width: 500px; height: 500px;
  background: radial-gradient(circle,rgba(91,82,232,.08),transparent 70%); pointer-events: none;
}
.hero-portrait-wrap { flex-shrink: 0; position: relative; order: -1; }
.hero-portrait-wrap::before {
  content: ''; position: absolute; inset: -16px; border-radius: 32px;
  background: radial-gradient(ellipse at center,rgba(91,82,232,.13) 0%,transparent 70%);
  z-index: -1; pointer-events: none;
}
.hero-portrait {
  display: block; width: 280px; height: 360px;
  object-fit: cover; object-position: center top;
  border-radius: 22px; border: 3px solid var(--border2);
  box-shadow: 0 24px 64px rgba(0,0,0,.18), 0 0 0 1px rgba(91,82,232,.07);
  transition: transform .45s, box-shadow .45s;
}
.hero-portrait:hover {
  transform: translateY(-6px);
  box-shadow: 0 32px 80px rgba(91,82,232,.22), 0 0 0 1px rgba(91,82,232,.15);
}
.hero-text    { flex: 1; min-width: 280px; }
.hero-name    { font-family: var(--fh); font-size: clamp(2.5rem,6vw,4.5rem); font-weight: 800; line-height: .95; letter-spacing: -.04em; margin-bottom: .6rem; }
.hero-name .n1 { color: var(--text); display: block; }
.hero-name .n2 {
  background: linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; display: block;
}
.hero-subtitle      { font-family: var(--fm); font-size: .88rem; color: var(--text2); margin-bottom: .65rem; }
.hero-subtitle span { color: var(--accent); }
.hero-desc          { font-size: .93rem; color: var(--text2); max-width: 480px; line-height: 1.8; margin-bottom: 1.75rem; }
.hero-cta           { display: flex; gap: .7rem; flex-wrap: wrap; }

/* Stats bar */
.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.stat-item  { background: var(--bg2); padding: 1.4rem; text-align: center; }
.stat-num   { font-family: var(--fh); font-size: 1.9rem; font-weight: 800; color: var(--accent); display: block; }
.stat-label { font-size: .7rem; color: var(--text3); font-family: var(--fm); letter-spacing: .08em; margin-top: .2rem; display: block; }

/* Skills */
.skills-grid  { display: grid; grid-template-columns: repeat(auto-fill,minmax(250px,1fr)); gap: 1.2rem; }
.skill-card   { padding: 1.4rem; }
.skill-icon   { font-size: 1.3rem; margin-bottom: .7rem; }
.skill-title  { font-family: var(--fh); font-weight: 700; margin-bottom: .35rem; font-size: .93rem; }
.skill-desc   { color: var(--text2); font-size: .8rem; line-height: 1.65; }

/* Projects */
.proj-grid    { display: grid; grid-template-columns: repeat(auto-fill,minmax(290px,1fr)); gap: 1.2rem; }
.proj-card    { padding: 1.4rem; text-decoration: none; display: block; color: inherit; }
.proj-top     { display: flex; justify-content: space-between; align-items: start; margin-bottom: .8rem; }
.proj-lang    { background: var(--surface); color: var(--text2); padding: .15rem .5rem; border-radius: 4px; font-family: var(--fm); font-size: .66rem; }
.proj-title   { font-family: var(--fh); font-weight: 700; margin-bottom: .35rem; font-size: .93rem; }
.proj-desc    { color: var(--text2); font-size: .8rem; line-height: 1.65; }

/* About */
.about-grid         { display: grid; grid-template-columns: 1fr 1fr; gap: 3.5rem; align-items: start; }
.about-portrait-row { display: flex; align-items: flex-start; gap: 1.75rem; margin-bottom: 1.4rem; }
.about-portrait-col { display: flex; flex-direction: column; align-items: center; gap: .55rem; flex-shrink: 0; }
.about-portrait {
  display: block; width: 136px; height: 136px;
  object-fit: cover; object-position: center top; border-radius: 50%;
  box-shadow: 0 0 0 3px var(--accent), 0 8px 28px rgba(0,0,0,.12);
  transition: transform .3s;
}
.about-portrait:hover { transform: scale(1.06); }
.about-portrait-name { font-family: var(--fm); font-size: .65rem; color: var(--text3); text-align: center; line-height: 1.5; max-width: 136px; }
.about-p             { color: var(--text2); line-height: 1.8; margin-bottom: .85rem; font-size: .9rem; }
.about-p strong      { color: var(--text); }

/* Timeline */
.tl::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(var(--accent),var(--accent2)); border-radius: 2px; }
.tl { position: relative; padding-left: 1.75rem; }
.tl-item { position: relative; margin-bottom: 1.3rem; }
.tl-item::before { content: ''; position: absolute; left: -2rem; top: .3rem; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
.tl-year { font-family: var(--fm); font-size: .7rem; color: var(--accent); margin-bottom: .12rem; }
.tl-ttl  { font-weight: 500; font-size: .86rem; color: var(--text); }
.tl-sub  { color: var(--text3); font-size: .76rem; }

/* Social */
.social-row  { display: flex; gap: .7rem; margin-top: 1.6rem; flex-wrap: wrap; }
.social-link {
  display: flex; align-items: center; gap: .35rem;
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text2); padding: .4rem .85rem; border-radius: 7px;
  text-decoration: none; font-size: .78rem; font-family: var(--fm); transition: all .2s;
}
.social-link:hover { border-color: var(--accent); color: var(--accent); }

@media(max-width:820px) {
  .hero { flex-direction: column; align-items: center; text-align: center; padding: 2.5rem 1.5rem; gap: 2rem; }
  .hero-portrait-wrap { order: 0; }
  .hero-portrait { width: 200px; height: 250px; }
  .hero-cta, .hero-tag { justify-content: center; }
  .about-grid { grid-template-columns: 1fr; }
  .stats-row  { grid-template-columns: repeat(2,1fr); }
}

/* ═══════════════════════════════════════════
   LIEBLINGSPHILOSOPHEN
═══════════════════════════════════════════ */
.favphil-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(320px,1fr)); gap: 1.5rem; }
.favphil-card { border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); transition: all .3s; }
.favphil-card:hover { transform: translateY(-4px); border-color: var(--accent); }
.favphil-header { padding: 1.5rem 1.75rem 1.25rem; position: relative; overflow: hidden; }
.favphil-era    { font-family: var(--fm); font-size: .68rem; letter-spacing: .1em; margin-bottom: .4rem; }
.favphil-name   { font-family: var(--fh); font-size: 1.5rem; font-weight: 800; letter-spacing: -.03em; color: var(--text); line-height: 1; }
.favphil-dates  { font-family: var(--fm); font-size: .72rem; color: var(--text3); margin-top: .2rem; }
.favphil-body   { padding: 0 1.75rem 1.5rem; background: var(--card); }
.favphil-quote  { font-size: .88rem; color: var(--text2); line-height: 1.75; margin-bottom: 1rem; padding: .75rem 1rem; background: var(--bg2); border-radius: 8px; border-left: 3px solid var(--accent); font-style: italic; }
.favphil-desc   { font-size: .84rem; color: var(--text2); line-height: 1.7; margin-bottom: 1rem; }
.favphil-ideas  { list-style: none; display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1rem; }
.favphil-ideas li { font-size: .8rem; color: var(--text2); padding: .4rem .75rem; background: var(--surface); border-radius: 6px; border-left: 2px solid var(--accent); }
.favphil-why      { padding: .75rem 1rem; background: var(--bg2); border-radius: 8px; }
.favphil-why-label { font-family: var(--fm); font-size: .65rem; color: var(--accent3); letter-spacing: .1em; margin-bottom: .3rem; }
.favphil-why-text  { font-size: .8rem; color: var(--text2); line-height: 1.65; }

/* ═══════════════════════════════════════════
   ZITATE
═══════════════════════════════════════════ */
.zitat-hero      { padding: 3.5rem 3rem 2.5rem; background: linear-gradient(135deg,var(--bg2),var(--bg)); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
.zitat-hero-glow { position: absolute; right: -60px; top: -60px; width: 320px; height: 320px; background: radial-gradient(circle,rgba(232,82,122,.1),transparent 70%); pointer-events: none; }

.zitat-motto        { background: var(--card); border: 1px solid var(--border); border-left: 5px solid var(--accent); border-radius: 0 var(--r) var(--r) 0; padding: 2rem 2.5rem; margin: 2rem 3rem; max-width: 800px; box-shadow: var(--shadow); position: relative; }
.zitat-motto::before { content: '\201C'; position: absolute; top: -10px; left: 20px; font-family: var(--fh); font-size: 5rem; font-weight: 800; color: var(--accent); opacity: .15; line-height: 1; }
.zitat-motto-text    { font-family: var(--fh); font-size: 1.05rem; font-weight: 600; color: var(--text); line-height: 1.7; margin-bottom: .75rem; padding-top: .25rem; }
.zitat-motto-source  { font-family: var(--fm); font-size: .72rem; color: var(--accent); letter-spacing: .05em; }
.zitat-motto-context { font-size: .82rem; color: var(--text3); margin-top: .5rem; font-style: italic; }

.zitat-filter { display: flex; gap: .4rem; flex-wrap: wrap; padding: 1.25rem 3rem 0; }
.zf-btn       { background: var(--surface); border: 1px solid var(--border); color: var(--text2); padding: .3rem .8rem; border-radius: 20px; cursor: pointer; font-size: .76rem; font-family: var(--fm); transition: all .15s; }
.zf-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.zitat-masonry { columns: 2; column-gap: 1.5rem; padding: 2rem 3rem 4rem; }
@media(max-width:700px) { .zitat-masonry { columns: 1; } }

.zitat-card         { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 1.65rem; margin-bottom: 1.5rem; break-inside: avoid; box-shadow: var(--shadow); transition: all .25s; position: relative; }
.zitat-card:hover   { transform: translateY(-3px); border-color: var(--border2); }
.zitat-card::before { content: '\201C'; position: absolute; top: .5rem; left: 1.1rem; font-family: var(--fh); font-size: 3.5rem; font-weight: 800; color: var(--accent); opacity: .12; line-height: 1; }
.zitat-text         { font-size: .92rem; color: var(--text); line-height: 1.8; font-style: italic; margin-bottom: .85rem; padding-top: .35rem; }
.zitat-text.large   { font-size: .88rem; line-height: 1.85; }
.zitat-author       { font-family: var(--fh); font-weight: 700; font-size: .82rem; color: var(--accent); }
.zitat-source       { font-family: var(--fm); font-size: .68rem; color: var(--text3); margin-top: .12rem; }
.zitat-kat          { display: inline-block; background: var(--surface); color: var(--text3); padding: .13rem .45rem; border-radius: 4px; font-size: .63rem; font-family: var(--fm); margin-top: .55rem; }

/* ═══════════════════════════════════════════
   T-SHIRTS
═══════════════════════════════════════════ */
.tshirt-grid   { display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 1.5rem; }
.tshirt-card   { border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); transition: all .3s; }
.tshirt-card:hover { transform: translateY(-4px); border-color: var(--accent); }
.tshirt-visual { width: 100%; height: 220px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.tshirt-body   { padding: 1.1rem 1.3rem; background: var(--card); }
.tshirt-name   { font-family: var(--fh); font-weight: 700; font-size: .9rem; color: var(--text); margin-bottom: .25rem; }
.tshirt-sub    { font-family: var(--fm); font-size: .7rem; margin-bottom: .45rem; }
.tshirt-desc   { font-size: .78rem; color: var(--text2); line-height: 1.6; }
.tshirt-badge  { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; font-family: var(--fm); font-size: .68rem; letter-spacing: .1em; }

/* ═══════════════════════════════════════════
   PHILOSOPHER TIMELINE
═══════════════════════════════════════════ */
.phil-header    { padding: 3rem 3rem 2rem; background: var(--bg2); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
.phil-glow      { position: absolute; left: 50%; top: -100px; transform: translateX(-50%); width: 400px; height: 300px; background: radial-gradient(ellipse,rgba(91,82,232,.1),transparent 70%); pointer-events: none; }

.phil-controls  { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; padding: .9rem 3rem; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 56px; z-index: 90; }
.phil-zoom-btns { display: flex; gap: .3rem; }
.phil-zoom-btn  { background: var(--surface); border: 1px solid var(--border); color: var(--text2); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: .85rem; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.phil-zoom-btn:hover { border-color: var(--accent); color: var(--accent); }

.epoch-btns { display: flex; gap: .35rem; flex-wrap: wrap; flex: 1; }
.epoch-btn  { background: var(--surface); border: 1px solid var(--border); color: var(--text2); padding: .28rem .65rem; border-radius: 16px; cursor: pointer; font-size: .72rem; font-family: var(--fm); transition: all .2s; white-space: nowrap; }
.epoch-btn.active { color: #fff; border-color: transparent; }

.tl-scroll-wrap { overflow-x: auto; cursor: grab; user-select: none; padding: 0 0 1rem; }
.tl-scroll-wrap:active { cursor: grabbing; }
.tl-inner  { position: relative; height: 480px; }
.tl-axis   { position: absolute; left: 0; right: 0; top: 240px; height: 2px; background: linear-gradient(90deg,var(--accent),var(--accent2)); }
.tl-node   { position: absolute; cursor: pointer; transition: opacity .3s; }
.tl-dot    { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg); position: absolute; left: 50%; transform: translateX(-50%); transition: all .2s; z-index: 2; }
.tl-node:hover .tl-dot { width: 16px; height: 16px; margin-top: -3px; }
.tl-line   { position: absolute; left: 50%; width: 1px; background: var(--border2); }
.tl-card   { position: absolute; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .55rem .8rem; width: 130px; text-align: center; transition: all .2s; box-shadow: var(--shadow); }
.tl-node:hover .tl-card { border-color: var(--accent); z-index: 10; width: 150px; }
.tl-card-name  { font-family: var(--fh); font-weight: 700; font-size: .75rem; margin-bottom: .12rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-card-dates { font-family: var(--fm); font-size: .6rem; color: var(--text3); }
.tl-yr         { position: absolute; top: 250px; font-family: var(--fm); font-size: .62rem; color: var(--text3); transform: translateX(-50%); }
.tl-yr-major   { font-size: .68rem; color: var(--text2); font-weight: 500; }

/* Phil modal */
.phil-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(5px); z-index: 700; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
.phil-modal-overlay.open { display: flex; }
.phil-modal-box    { background: var(--card); border: 1px solid var(--border2); border-radius: 18px; padding: 2rem 2.25rem; max-width: 560px; width: 100%; max-height: 82vh; overflow-y: auto; position: relative; box-shadow: 0 24px 64px rgba(0,0,0,.22); }
.phil-modal-close  { position: absolute; top: 1rem; right: 1rem; background: var(--surface); border: none; color: var(--text2); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; transition: all .2s; font-size: .9rem; }
.phil-modal-close:hover { background: var(--accent); color: #fff; }
.phil-modal-epoch  { font-family: var(--fm); font-size: .7rem; letter-spacing: .1em; margin-bottom: .35rem; }
.phil-modal-name   { font-family: var(--fh); font-size: 1.85rem; font-weight: 800; letter-spacing: -.03em; color: var(--text); margin-bottom: .15rem; }
.phil-modal-dates  { font-family: var(--fm); font-size: .75rem; color: var(--text3); margin-bottom: 1.1rem; }
.phil-modal-desc   { color: var(--text2); line-height: 1.8; font-size: .87rem; margin-bottom: 1.25rem; }
.phil-ideas        { list-style: none; display: flex; flex-direction: column; gap: .35rem; }
.phil-ideas li     { background: var(--surface); border-radius: 6px; padding: .5rem .85rem; font-size: .82rem; color: var(--text2); border-left: 3px solid var(--accent); }

/* ═══════════════════════════════════════════
   DISSERTATION
═══════════════════════════════════════════ */
.diss-hero      { padding: 3.5rem 3rem 2.5rem; background: linear-gradient(135deg,var(--bg2),var(--bg)); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
.diss-hero-glow { position: absolute; right: -60px; top: -80px; width: 360px; height: 360px; background: radial-gradient(circle,rgba(91,82,232,.12),transparent 70%); pointer-events: none; }
.diss-meta-row  { display: flex; gap: .45rem; flex-wrap: wrap; margin-bottom: 1.4rem; }
.diss-meta-badge { background: var(--surface); border: 1px solid var(--border2); color: var(--text2); padding: .28rem .7rem; border-radius: 6px; font-family: var(--fm); font-size: .7rem; }
.diss-meta-badge.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.diss-stats-row  { display: flex; gap: 1.25rem; flex-wrap: wrap; margin-top: 1.4rem; }
.diss-stat       { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1.4rem; text-align: center; }
.diss-stat-num   { font-family: var(--fh); font-size: 1.5rem; font-weight: 800; color: var(--accent); display: block; }
.diss-stat-lbl   { font-family: var(--fm); font-size: .62rem; color: var(--text3); letter-spacing: .1em; margin-top: .15rem; display: block; }
.diss-abstract       { background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 0 var(--r) var(--r) 0; padding: 1.4rem 2rem; margin: 1.75rem 3rem; font-size: .9rem; color: var(--text2); line-height: 1.85; max-width: 780px; }
.diss-abstract-label { font-family: var(--fm); font-size: .68rem; color: var(--accent); letter-spacing: .12em; margin-bottom: .65rem; display: block; }
.diss-toc      { padding: 0 3rem 2.5rem; }
.diss-toc-list { list-style: none; display: flex; flex-direction: column; gap: .35rem; max-width: 680px; }
.diss-toc-list li { display: flex; gap: 1rem; align-items: baseline; padding: .5rem .9rem; border-radius: 8px; background: var(--bg2); border: 1px solid var(--border); transition: all .2s; font-size: .86rem; }
.diss-toc-list li:hover { border-color: var(--accent); background: var(--surface); }
.diss-toc-num   { font-family: var(--fm); font-size: .73rem; color: var(--accent); flex-shrink: 0; min-width: 30px; }
.diss-toc-name  { color: var(--text2); flex: 1; }
.diss-toc-pages { font-family: var(--fm); font-size: .68rem; color: var(--text3); margin-left: auto; }

/* Wordclouds */
.wc-grid      { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 1.4rem; padding: 0 3rem 2.5rem; }
.wc-card      { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); transition: all .3s; }

.wc-info       { padding: .9rem 1.1rem; }
.wc-info-label { font-family: var(--fm); font-size: .63rem; color: var(--accent); letter-spacing: .1em; margin-bottom: .25rem; display: block; }
.wc-info-title { font-family: var(--fh); font-weight: 700; font-size: .88rem; color: var(--text); margin-bottom: .18rem; }
.wc-info-desc  { color: var(--text3); font-size: .76rem; line-height: 1.5; }

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
.pe-hero  { padding: 3.5rem 3rem 3rem; position: relative; overflow: hidden; background: var(--bg2); border-bottom: 1px solid var(--border); }
.pe-glow1 { position: absolute; left: -80px; bottom: -80px; width: 400px; height: 400px; background: radial-gradient(circle,rgba(232,82,122,.1),transparent 70%); pointer-events: none; }

.pe-thesis::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(var(--accent),var(--accent2)); }

.pe-concepts { display: grid; grid-template-columns: repeat(auto-fill,minmax(290px,1fr)); gap: 1.4rem; padding: 1.75rem 3rem 2.5rem; }
.pe-card     { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 1.6rem; box-shadow: var(--shadow); position: relative; overflow: hidden; transition: all .3s; }
.pe-card:hover { transform: translateY(-3px); border-color: var(--accent); }
.pe-card::after { content: ''; position: absolute; top: 0; right: 0; width: 55px; height: 55px; border-radius: 0 var(--r) 0 55px; opacity: .08; }
.pe-c1::after{background:var(--accent)}.pe-c2::after{background:var(--accent2)}.pe-c3::after{background:var(--accent3)}
.pe-c4::after{background:var(--accent4)}.pe-c5::after{background:#a78bfa}.pe-c6::after{background:#67e8f9}
.pe-icon  { font-size: 1.5rem; margin-bottom: .65rem; }
.pe-title { font-family: var(--fh); font-weight: 800; font-size: .97rem; color: var(--text); margin-bottom: .45rem; }
.pe-text  { color: var(--text2); font-size: .81rem; line-height: 1.7; }
.pe-key   { display: inline-block; background: var(--surface); color: var(--accent); padding: .13rem .45rem; border-radius: 4px; font-family: var(--fm); font-size: .66rem; margin-top: .65rem; }
.pe-tensions { padding: 0 3rem 2.5rem; }
.pe-tension  { display: grid; grid-template-columns: 1fr auto 1fr; gap: .75rem; align-items: center; margin-bottom: .75rem; background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: .9rem 1.4rem; }
.pe-ta { font-family: var(--fh); font-weight: 700; font-size: .86rem; color: var(--accent); text-align: right; }
.pe-tv { font-family: var(--fm); font-size: .68rem; color: var(--text3); text-align: center; }
.pe-tb { font-family: var(--fh); font-weight: 700; font-size: .86rem; color: var(--accent2); }
.pe-influences { padding: 0 3rem 3rem; }
.pe-chips  { display: flex; gap: .65rem; flex-wrap: wrap; }
.pe-chip   { background: var(--bg2); border: 1px solid var(--border2); color: var(--text2); padding: .38rem .85rem; border-radius: 20px; font-size: .78rem; transition: all .2s; cursor: default; }
.pe-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--surface); }
.pe-bridge       { margin-top: 1.75rem; background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--accent3); border-radius: 0 var(--r) var(--r) 0; padding: 1.4rem 1.85rem; max-width: 720px; box-shadow: var(--shadow); }
.pe-bridge-label { font-family: var(--fm); font-size: .68rem; color: var(--accent3); letter-spacing: .1em; margin-bottom: .6rem; }

.ph-ma  { background:#e8f8ee; color:#1a7a40 } [data-theme="dark"] .ph-ma  { background:#0a2a18; color:#55dd88 }

.ctx-badge { display: inline-block; padding: .1rem .42rem; border-radius: 3px; font-size: .63rem; font-family: var(--fm); font-weight: 600; white-space: nowrap; }

/* ═══════════════════════════════════════════

    m.appendChild(el('path', { d:'M0,0 L0,6 L9,3 z', fill:c }));
    defs.appendChild(m);
  });
  /* axis gradient */
  const ag = el('linearGradient', { id:'axGrad', x1:'0%', y1:'0%', x2:'100%', y2:'0%' });
  ag.innerHTML = `<stop offset="0%" stop-color="${cv('--accent')}"/><stop offset="100%" stop-color="${cv('--accent2')}"/>`;
  defs.appendChild(ag);
  svg.appendChild(defs);

  /* 1. EPOCH BANDS */
  const epochColors = {};
  (typeof EPOCHS_META_V2 !== 'undefined' ? EPOCHS_META_V2 : []).forEach(e => epochColors[e.name] = e.color);
  const epochRanges = {};
  phils().forEach(p => {
    if (!epochRanges[p.epoch]) epochRanges[p.epoch] = { min:Infinity, max:-Infinity, c: epochColors[p.epoch]||'#888' };
    const d = p.death > 0 ? p.death : Math.max(p.birth+40, 2020);
    epochRanges[p.epoch].min = Math.min(epochRanges[p.epoch].min, p.birth);
    epochRanges[p.epoch].max = Math.max(epochRanges[p.epoch].max, d);
  });
  const bandG = el('g');
  Object.entries(epochRanges).forEach(([eName, r]) => {
    const x1 = xOf(r.min - 20), x2 = xOf(r.max + 20);
    const isActive = epoch === eName;
    bandG.appendChild(el('rect', { x:x1, y:0, width:Math.max(1, x2-x1), height:SVG_H,
      fill: r.c + (isActive ? '22' : dk ? '0f' : '09') }));
    if (x2 - x1 > 50) {
      const lx = (x1+x2)/2;
      const sz = Math.min(12, Math.max(7, (x2-x1)*0.06));
      bandG.appendChild(el('text', { x:lx, y:AXIS_Y+34, 'text-anchor':'middle',
        fill:r.c, 'font-size':sz, 'font-family':"'JetBrains Mono',monospace", opacity:'0.45' }, eName));
    }
  });
  svg.appendChild(bandG);

  /* 2. AXIS */
  svg.appendChild(el('line', { x1:0, y1:AXIS_Y, x2:W, y2:AXIS_Y, stroke:'url(#axGrad)', 'stroke-width':2.5 }));
  const step = zoom >= 4 ? 25 : zoom >= 2.5 ? 50 : zoom >= 1.5 ? 100 : 200;
  const major = step * 2;
  for (let y = -600; y <= 2025; y += step) {
    const x = xOf(y), isMajor = y % major === 0;
    svg.appendChild(el('line', { x1:x, y1:AXIS_Y-(isMajor?9:5), x2:x, y2:AXIS_Y+(isMajor?9:5),
      stroke:borderCol, 'stroke-width':isMajor?1.5:0.8, opacity:isMajor?'1':'0.5' }));
    if (isMajor || zoom > 1.5) {
      const lbl = y < 0 ? Math.abs(y)+' v.Chr.' : y === 0 ? '0 n.Chr.' : String(y);
      svg.appendChild(el('text', { x, y:AXIS_Y+22, 'text-anchor':'middle',
        fill:mutedCol, 'font-size':isMajor?10:8, 'font-family':"'JetBrains Mono',monospace",
        opacity:isMajor?'0.85':'0.45' }, lbl));
    }
  }

  /* 3. INFLUENCE LINES (behind nodes) */
  const posMap = {};
  phils().forEach(p => {
    if (!visible(p)) return;
    posMap[p.name] = xOf((p.birth + (p.death > 0 ? p.death : 2020)) / 2);
  });

  const inflG = el('g', { id:'infl-g' });
  phils().forEach(p => {
    if (!visible(p) || !p.influences) return;
    p.influences.forEach(inf => {
      if (!inflOn[inf.type]) return;
      const tx = posMap[inf.to];
      if (tx === undefined) return;
      const fx = posMap[p.name];
      const c  = INFL_COL[inf.type];
      const isHighlighted = search && (p.name.toLowerCase().includes(search) || inf.to.toLowerCase().includes(search));
      const isDimmedLine  = (epoch && p.epoch !== epoch && (byName(inf.to)?.epoch) !== epoch) ||
                            (search && !isHighlighted);
      const dist = Math.abs(tx - fx);
      const curve = inf.type === 'student' ? -50 : inf.type === 'critic' ? 48 : -35;
      const mx = (fx + tx) / 2;
      const d  = `M${fx},${AXIS_Y} C${mx},${AXIS_Y+curve} ${mx},${AXIS_Y+curve} ${tx},${AXIS_Y}`;
      const dash = inf.type==='critic' ? '6,3' : inf.type==='develops' ? '3,3' : 'none';
      inflG.appendChild(el('path', { d, fill:'none', stroke:c, 'stroke-width':isHighlighted?2.5:1.5,
        'stroke-dasharray':dash, opacity:isDimmedLine?'0.04':isHighlighted?'0.75':'0.35',
        'marker-end':`url(#arr-${inf.type})` }));
    });
  });
  svg.appendChild(inflG);

  /* 4. PHILOSOPHER NODES */
  const nodeG = el('g', { id:'node-g' });
  let cnt = 0;

  phils().forEach(p => {
    if (!visible(p)) return;
    cnt++;
    const cx    = posMap[p.name];
    const above = p.above;
    const dm    = dimmed(p);
    const fsize = p.tier === 1 ? 11.5 : p.tier === 2 ? 10 : 9;
    const showDates = zoom >= 0.85;
    const showEpoch = zoom >= 1.25;
    const cH    = CARD_H + (showEpoch ? 13 : 0);
    const cardY = above ? AXIS_Y - PAD - cH : AXIS_Y + PAD;
    const ly1   = above ? cardY + cH + 2 : AXIS_Y + 6;
    const ly2   = above ? AXIS_Y - 6 : cardY - 2;
    const dotR  = p.tier === 1 ? 7 : p.tier === 2 ? 5 : 4;

    const g = el('g', { class:'phil-node-group', opacity: dm ? '0.08' : '1', transform:`translate(${cx},0)` });

    /* connector */
    g.appendChild(el('line', { x1:0, y1:ly1, x2:0, y2:ly2, stroke:p.color+'55', 'stroke-width':1.5 }));

    /* dot */
    g.appendChild(el('circle', { cx:0, cy:AXIS_Y, r:dotR, fill:p.color,
      stroke: dk?'#0a0a0f':'#ffffff', 'stroke-width':2.5 }));

    /* card shadow (tier 1 glow) */
    if (p.tier === 1 && !dm) {
      g.appendChild(el('rect', { x:-CARD_W/2-4, y:cardY-4, width:CARD_W+8, height:cH+8,
        fill:'none', stroke:p.color, 'stroke-width':0.7, rx:11, ry:11, opacity:'0.3' }));
    }

    /* card */
    const cardBg = bgCard + (p.tier===1?'':'ee');
    g.appendChild(el('rect', { x:-CARD_W/2, y:cardY, width:CARD_W, height:cH,
      fill:cardBg, stroke:p.color, 'stroke-width': p.tier===1 ? 2 : 0.8, rx:8, ry:8 }));

    /* name */
    const nameShort = p.name.length > 17 ? p.name.substring(0,16)+'…' : p.name;
    g.appendChild(el('text', { x:0, y:cardY+16, 'text-anchor':'middle',
      fill:textCol, 'font-size':fsize, 'font-weight':p.tier<=2?'700':'600',
      'font-family':"'Syne',sans-serif" }, nameShort));

    /* dates */
    if (showDates) {
      const bs = p.birth<0 ? Math.abs(p.birth)+'v' : String(p.birth);
      const ds = p.death<=0 ? '→' : p.death<0 ? Math.abs(p.death)+'v' : String(p.death);
      g.appendChild(el('text', { x:0, y:cardY+29, 'text-anchor':'middle',
        fill:mutedCol, 'font-size':7.5, 'font-family':"'JetBrains Mono',monospace" }, bs+'–'+ds));
    }

    /* epoch */
    if (showEpoch) {
      const eShort = p.epoch.length>15 ? p.epoch.substring(0,14)+'…' : p.epoch;
      g.appendChild(el('text', { x:0, y:cardY+cH-7, 'text-anchor':'middle',
        fill:p.color, 'font-size':7, 'font-family':"'JetBrains Mono',monospace", opacity:'0.8' }, eShort));
    }

    /* invisible hit rect */
    const hit = el('rect', { x:-CARD_W/2, y:cardY, width:CARD_W, height:cH, fill:'transparent' });
    hit.addEventListener('click', () => tlOpenModal(p));
    g.appendChild(hit);
    nodeG.appendChild(g);
  });

  svg.appendChild(nodeG);

  /* update count */
  const vc = document.getElementById('vis-count');
  if (vc) vc.textContent = cnt + ' Philosophen sichtbar';
}

/* ── Zoom ── */
window.tlZoom = function(f) {
  const wrap = document.getElementById('tl-wrap');
  const ratio = wrap ? wrap.scrollLeft / Math.max(1, wrap.scrollWidth) : 0;
  zoom = Math.max(0.4, Math.min(5.5, zoom * f));
  document.getElementById('zoom-lbl').textContent = '×' + zoom.toFixed(1);
  render();
  if (wrap) requestAnimationFrame(() => { wrap.scrollLeft = ratio * wrap.scrollWidth; });
};

window.tlReset = function() {
  zoom = 1.0;
  document.getElementById('zoom-lbl').textContent = '×1.0';
  epoch = ''; search = '';
  document.getElementById('phil-search').value = '';
  document.querySelectorAll('.epoch-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.epoch-btn')?.classList.add('active');
  render();
  const wrap = document.getElementById('tl-wrap');
  if (wrap) setTimeout(() => { wrap.scrollLeft = BASE_W * 0.22; }, 60);
};

/* ── Search ── */
window.tlSearch = function(val) {
  search = val.toLowerCase().trim();
  render();
  if (search.length > 1) {
    const found = phils().find(p => p.name.toLowerCase().includes(search));
    if (found) {
      const wrap = document.getElementById('tl-wrap');
      const cx = ((found.birth + (found.death>0?found.death:2020))/2 - YEAR_MIN) / YEAR_RANGE * svgW();
      if (wrap) wrap.scrollLeft = cx - wrap.clientWidth / 2;
    }
  }
};

/* ── Influence toggles ── */
function buildInflToggles() {
  const c = document.getElementById('infl-toggles');
  if (!c) return;
  const labels = { student:'Lehrer→Schüler', inspires:'Inspiration', critic:'Kritik', develops:'Weiterentwicklung' };
  Object.entries(INFL_COL).forEach(([type, color]) => {
    const b = document.createElement('button');
    b.className = 'itbtn active'; b.id = 'itb-'+type;
    b.style.background = color; b.style.color = '#fff'; b.style.borderColor = 'transparent';
    b.innerHTML = `<div class="itbtn-dot" style="background:#ffffff99"></div>${labels[type]}`;
    b.onclick = () => {
      inflOn[type] = !inflOn[type];
      b.classList.toggle('active', inflOn[type]);
      b.style.background = inflOn[type] ? color : '';
      b.style.color      = inflOn[type] ? '#fff' : '';
      b.style.borderColor= inflOn[type] ? 'transparent' : '';
      render();
    };
    c.appendChild(b);
  });
}

/* ── Epoch filter ── */
function buildEpochFilter() {
  const c = document.getElementById('epoch-filter-row');
  if (!c) return;
  c.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'epoch-btn active'; all.textContent = 'Alle Epochen';
  all.onclick = () => { epoch=''; c.querySelectorAll('.epoch-btn').forEach(b=>b.classList.remove('active')); all.classList.add('active'); all.style.background=''; all.style.color=''; render(); };
  c.appendChild(all);
  (typeof EPOCHS_META_V2 !== 'undefined' ? EPOCHS_META_V2 : []).forEach(e => {
    const b = document.createElement('button');
    b.className = 'epoch-btn'; b.style.borderColor = e.color+'55';
    b.innerHTML = `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${e.color};margin-right:4px;vertical-align:middle"></span>${e.name}`;
    b.onclick = () => {
      epoch = e.name;
      c.querySelectorAll('.epoch-btn').forEach(x=>{ x.classList.remove('active'); x.style.background=''; x.style.color=''; });
      b.classList.add('active'); b.style.background=e.color; b.style.color='#fff';
      render();
    };
    c.appendChild(b);
  });
}

/* ── Drag scroll ── */
function setupDrag() {
  const w = document.getElementById('tl-wrap');
  if (!w) return;
  let dn=false, sx, sl;
  w.addEventListener('mousedown', e=>{dn=true; sx=e.pageX-w.offsetLeft; sl=w.scrollLeft;});
  w.addEventListener('mouseleave',()=>{dn=false;});
  w.addEventListener('mouseup',  ()=>{dn=false;});
  w.addEventListener('mousemove', e=>{if(!dn)return; e.preventDefault(); w.scrollLeft=sl-(e.pageX-w.offsetLeft-sx);});
  let ts, tsl;
  w.addEventListener('touchstart', e=>{ts=e.touches[0].pageX-w.offsetLeft; tsl=w.scrollLeft;},{passive:true});
  w.addEventListener('touchmove',  e=>{w.scrollLeft=tsl-(e.touches[0].pageX-w.offsetLeft-ts);},{passive:true});
}

/* ── Modal ── */
window.tlOpenModal = function(p) {
  const modal = document.getElementById('pmodal');
  if (!modal) return;
  document.getElementById('pm-epoch').innerHTML = `<span style="color:${p.color}">${p.epoch}</span><span class="tier-badge">Tier ${p.tier}</span>`;
  document.getElementById('pm-name').textContent  = p.name;
  const b = p.birth<0 ? Math.abs(p.birth)+' v.&thinsp;Chr.' : p.birth;
  const d = p.death<=0 ? 'heute' : p.death<0 ? Math.abs(p.death)+' v.&thinsp;Chr.' : p.death;
  document.getElementById('pm-dates').innerHTML = `${b} &ndash; ${d}`;
  document.getElementById('pm-desc').textContent  = p.desc;
  document.getElementById('pm-ideas').innerHTML   = (p.ideas||[]).map(i=>`<li>${i}</li>`).join('');

  /* influence section */
  const out = (p.influences||[]);
  const inc = phils().filter(q=>(q.influences||[]).some(i=>i.to===p.name))
                     .map(q=>({from:q.name, type:q.influences.find(i=>i.to===p.name).type}));
  let html = '';
  if (out.length) {
    html += `<span class="pmodal-infl-lbl">Hat beeinflusst:</span><div class="pmodal-chips">`;
    out.forEach(i=>{
      const c=INFL_COL[i.type];
      const safeN = i.to.replace(/'/g,"\\'");
      html+=`<span class="pmodal-chip" style="background:${c}20;border-color:${c}55;color:${c}"
        onclick="tlCloseModal();setTimeout(()=>{const q=tlByName('${safeN}');if(q)tlOpenModal(q)},200)">
        <div class="chip-dot" style="background:${c}"></div>${i.to}
        <span style="opacity:.55;font-size:.63rem">${i.type}</span></span>`;
    });
    html += '</div>';
  }
  if (inc.length) {
    html += `<span class="pmodal-infl-lbl">Wurde beeinflusst durch:</span><div class="pmodal-chips">`;
    inc.forEach(i=>{
      const c=INFL_COL[i.type];
      const safeN = i.from.replace(/'/g,"\\'");
      html+=`<span class="pmodal-chip" style="background:${c}20;border-color:${c}55;color:${c}"
        onclick="tlCloseModal();setTimeout(()=>{const q=tlByName('${safeN}');if(q)tlOpenModal(q)},200)">
        <div class="chip-dot" style="background:${c}"></div>${i.from}
        <span style="opacity:.55;font-size:.63rem">${i.type}</span></span>`;
    });
    html += '</div>';
  }
  document.getElementById('pm-infl').innerHTML = html;
  modal.classList.add('open');
};
window.tlCloseModal = function() { document.getElementById('pmodal')?.classList.remove('open'); };
window.tlByName     = byName;

/* ── Responsive height ── */
function setH() {
  const h = Math.max(400, window.innerHeight - 290);
  const w = document.getElementById('tl-wrap');
  const o = document.getElementById('tl-outer');
  if (w) w.style.height = h+'px';
  if (o) o.style.height = h+'px';
}

/* ── Init ── */
function init() {
  // rAF ensures DOM is laid out so height calculations work
  requestAnimationFrame(() => {
    setH();
    window.addEventListener('resize', ()=>{ setH(); render(); });
    new MutationObserver(()=>render()).observe(document.documentElement,
      { attributes:true, attributeFilter:['data-theme'] });

    buildInflToggles();
    buildEpochFilter();
    setupDrag();

    const tryRender = (attempts) => {
      if (typeof PHILS_V2 !== 'undefined' && typeof EPOCHS_META_V2 !== 'undefined') {
        render();
        setTimeout(()=>{
          const w = document.getElementById('tl-wrap');
          if (w) w.scrollLeft = BASE_W * 0.20;
        }, 100);
      } else if ((attempts||0) < 50) {
        setTimeout(() => tryRender((attempts||0)+1), 100);
      }
    };
    tryRender(0);
  });
}

// Always call init directly — this script runs after innerHTML injection
init();

})();
</script>

  filtPoke.slice(pokeOff,pokeOff+BATCH).forEach(p=>grid.appendChild(makePokeCard(p)));
  pokeOff+=BATCH;
  const more=document.getElementById('poke-more');
  if(more)more.style.display=pokeOff<filtPoke.length?'block':'none';
}
function makePokeCard(p){
  const c=document.createElement('div');c.className='poke-card';
  c.innerHTML='<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/'+p.id+'.png" alt="'+p.name+'" loading="lazy">'
    +'<div class="poke-name">'+p.name+'</div>'
    +'<div class="poke-num">#'+String(p.id).padStart(3,'0')+'</div>'
    +'<div class="poke-types" id="pt-'+p.id+'"><span class="type-badge type-normal">?</span></div>';
  c.onclick=()=>showPokeDet(p.id);
  loadPokeTypes(p.id);return c;
}
async function loadPokeTypes(id){
  if(typeCache[id])return;
  try{const r=await fetch('https://pokeapi.co/api/v2/pokemon/'+id);const d=await r.json();typeCache[id]=d;
  const el=document.getElementById('pt-'+id);
  if(el)el.innerHTML=d.types.map(t=>'<span class="type-badge type-'+t.type.name+'">'+t.type.name+'</span>').join('');}catch(e){}
}
async function showPokeDet(id){
  const det=document.getElementById('poke-detail');
  det.innerHTML='<div style="color:var(--text3);font-family:var(--fm);padding:1rem">Lade…</div>';
  det.classList.add('show');
  try{
    let d=typeCache[id];
    if(!d){const r=await fetch('https://pokeapi.co/api/v2/pokemon/'+id);d=await r.json();typeCache[id]=d;}
    const sc={hp:'#ff6b35',attack:'#f7c948',defense:'#5aa0e8','special-attack':'#e85878','special-defense':'#3ba844',speed:'#a890f0'};
    det.innerHTML='<img class="poke-big-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/'+id+'.png" alt="'+d.name+'">'
      +'<div style="flex:1;min-width:200px"><div class="poke-big-name">'+d.name+'</div>'
      +'<div style="display:flex;gap:.4rem;margin-bottom:.85rem">'+d.types.map(t=>'<span class="type-badge type-'+t.type.name+'">'+t.type.name+'</span>').join('')+'</div>'
      +'<div style="display:flex;gap:1.25rem;margin-bottom:.85rem;flex-wrap:wrap">'
      +'<div><div style="font-family:var(--fm);font-size:.65rem;color:var(--text3)">HÖHE</div><div style="font-weight:500">'+d.height/10+'m</div></div>'
      +'<div><div style="font-family:var(--fm);font-size:.65rem;color:var(--text3)">GEWICHT</div><div style="font-weight:500">'+d.weight/10+'kg</div></div>'
      +'</div>'
      +d.stats.map(s=>'<div class="stat-bar"><span class="stat-label-sm">'+s.stat.name.replace('special-','sp.')+'</span><span class="stat-val">'+s.base_stat+'</span><div class="stat-track"><div class="stat-fill" style="width:'+Math.min(100,s.base_stat/255*100)+'%;background:'+(sc[s.stat.name]||'var(--accent)')+'"></div></div></div>').join('')
      +'</div>';
    det.scrollIntoView({behavior:'smooth',block:'nearest'});
  }catch(e){det.innerHTML='<div style="color:var(--accent2);padding:1rem">Fehler.</div>';}
}
window.filterPoke=function(){
  const q=document.getElementById('poke-search').value.toLowerCase();
  const type=document.getElementById('type-filter').value;
  const gen=parseInt(document.getElementById('gen-filter').value)||0;
  filtPoke=allPoke.filter(p=>{
    if(q&&p.name.indexOf(q)<0)return false;
    if(gen){const r=[[1,151],[152,251],[252,386],[387,493]];const mm=r[gen-1];if(p.id<mm[0]||p.id>mm[1])return false;}
    if(type&&typeCache[p.id]&&typeCache[p.id].types.map(t=>t.type.name).indexOf(type)<0)return false;
    return true;
  });
  pokeOff=0;renderPokeGrid();
};
window.loadMorePoke=function(){renderPokeGrid();};

// Init
renderGameCards();
})();
</script>

// ── Page inits (called every visit) ──────────────
const _pageInits = {};
function registerPageInit(id, fn) { _pageInits[id] = fn; }

// ── HTML cache (content only — not init state) ───
const _htmlCache = {};

async function getPageHTML(id) {
  if (_htmlCache[id]) return _htmlCache[id];

  // Try embedded <template> first (works with file://)
  const tpl = document.getElementById('page-' + id);
  if (tpl) {
    const div = document.createElement('div');
    if (tpl.content) div.appendChild(tpl.content.cloneNode(true));
    else div.innerHTML = tpl.innerHTML;
    _htmlCache[id] = div.innerHTML;
    return _htmlCache[id];
  }

  // Fall back to fetch (http://)
  try {
    const r = await fetch('pages/' + id + '.html');
    if (r.ok) { _htmlCache[id] = await r.text(); return _htmlCache[id]; }
  } catch(e) {}
  return null;
}

// ── Router ────────────────────────────────────────
let _busy = false;

async function showPage(id) {
  if (_busy) return;
  _busy = true;

  // Update hash URL for direct links
  const newHash = '#' + id;
  if (location.hash !== newHash) history.pushState({page:id}, '', newHash);

  const root = document.getElementById('page-root');
  if (!root) { _busy = false; return; }

  root.style.transition = 'opacity .15s';
  root.style.opacity    = '0';

  const html = await getPageHTML(id);

  if (!html) {
    root.innerHTML = `<div style="padding:4rem 3rem;font-family:var(--fm);color:var(--text2)">
      <h2 style="font-family:var(--fh);color:var(--text);margin-bottom:1rem">Seite nicht gefunden</h2>
      <p>Starte einen lokalen Server: <code style="background:var(--surface);padding:.2rem .5rem;border-radius:4px">python3 -m http.server 8080</code></p>
    </div>`;
    root.style.opacity = '1';
    _busy = false;
    return;
  }

  // Inject HTML
  root.innerHTML = html;

  // Re-execute <script> tags (innerHTML doesn't run them)
  root.querySelectorAll('script').forEach(old => {
    const s = document.createElement('script');
    s.textContent = old.textContent;
    old.replaceWith(s);
  });

  requestAnimationFrame(() => { root.style.opacity = '1'; });

  updateNavActive(id);
  window.scrollTo(0, 0);

  // Audio
  if (PAGE_AUDIO[id]) setTimeout(PAGE_AUDIO[id], 350);

  // Run page init — EVERY time (not cached)
  if (_pageInits[id]) {
    setTimeout(() => {
      try { _pageInits[id](); } catch(e) { console.warn('init error', id, e); }
      _busy = false;
    }, 60);
  } else {
    _busy = false;

function updateNavActive(id) {
  document.querySelectorAll('.nav-direct,.nav-group-btn').forEach(b => b.classList.remove('active','group-active'));
  const d = document.getElementById('navbtn-' + id);
  if (d) { d.classList.add('active'); return; }
  NAV.forEach(g => {
    if (g.type !== 'group') return;
    if ((g.items||[]).some(it => it.id === id)) {
      const gb = document.getElementById('navgrp-' + g.label);
      if (gb) gb.classList.add('group-active');
    }
  });
}

// ── Nav builder ───────────────────────────────────
function buildNav() {
  const ul = document.getElementById('nav-groups');
  if (!ul) return;
  ul.innerHTML = '';

  NAV.forEach(item => {
    const li = document.createElement('li');

    if (item.type === 'direct') {
      const b = document.createElement('button');
      b.className = 'nav-direct'; b.id = 'navbtn-' + item.id;
      b.textContent = item.label;
      b.onclick = () => showPage(item.id);
      li.appendChild(b);

    } else {
      li.className = 'nav-group';
      const btn = document.createElement('button');
      btn.className = 'nav-group-btn'; btn.id = 'navgrp-' + item.label;
      btn.innerHTML = item.label + ' <span class="arr">▾</span>';
      btn.addEventListener('click', e => {
        e.stopPropagation();
        document.querySelectorAll('.nav-group').forEach(g => { if (g !== li) g.classList.remove('open'); });
        li.classList.toggle('open');
      });

      const dd = document.createElement('div');
      dd.className = 'nav-dropdown';
      (item.items||[]).forEach(it => {
        if (it.divider) { dd.appendChild(Object.assign(document.createElement('div'), {className:'nav-dropdown-divider'})); return; }
        const di = document.createElement('div');
        di.className = 'nav-dropdown-item';
        di.innerHTML = `<span class="icon">${it.icon}</span>${it.label}`;
        di.onclick = () => { li.classList.remove('open'); showPage(it.id); };
        dd.appendChild(di);
      });
      li.appendChild(btn); li.appendChild(dd);
    }
    ul.appendChild(li);
  });
}

}

var pokeLoaded=false,allPoke=[],filtPoke=[],pokeOff=0,typeCache={},BATCH=24;
async function loadPoke(){
  if(pokeLoaded)return;pokeLoaded=true;
  try{
    var r=await fetch('https://pokeapi.co/api/v2/pokemon?limit=493');
    var d=await r.json();
    allPoke=d.results.map(function(p,i){return{name:p.name,id:i+1};});
    filtPoke=allPoke.slice();renderPokeGrid();
  }catch(e){document.getElementById('poke-grid').innerHTML='<div class="poke-loading-msg">PokeAPI nicht erreichbar.</div>';}
}
function renderPokeGrid(){
  var grid=document.getElementById('poke-grid');
  if(pokeOff===0)grid.innerHTML='';

  pokeOff+=BATCH;

  if(el)el.innerHTML=d.types.map(function(t){return'<span class="type-badge type-'+t.type.name+'">'+t.type.name+'</span>';}).join('');}catch(e){}

var philZoomLevel=1;
var philBaseW=3600;
var philActiveEpoch='';
var philSearchTerm='';

function buildPhil(){
  
  // Epoch buttons
  var btns=document.getElementById('epoch-btns');
  btns.innerHTML='<button class="epoch-btn active" onclick="philFilterEpoch(\'\',this)">Alle</button>';
  EPOCHS_META.forEach(function(e){
    var b=document.createElement('button');b.className='epoch-btn';
    b.style.borderColor=e.color+'55';
    b.innerHTML='<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+e.color+';margin-right:4px;vertical-align:middle"></span>'+e.name;
    b.onclick=function(){philFilterEpoch(e.name,this);};
    btns.appendChild(b);
  });
  renderTimeline();
  // Drag to scroll
  var sc=document.getElementById('tl-scroll');
  var isDown=false,sX,sL;
  sc.addEventListener('mousedown',function(e){isDown=true;sX=e.pageX-sc.offsetLeft;sL=sc.scrollLeft;});
  sc.addEventListener('mouseleave',function(){isDown=false;});
  sc.addEventListener('mouseup',function(){isDown=false;});
  sc.addEventListener('mousemove',function(e){if(!isDown)return;e.preventDefault();sc.scrollLeft=sL-(e.pageX-sc.offsetLeft-sX);});
}

function renderTimeline(){
  var W=philBaseW*philZoomLevel;
  var AY=240;
  var inner=document.getElementById('tl-inner');
  inner.innerHTML='<div class="tl-axis"></div>';
  inner.style.width=W+'px';
  inner.style.height='480px';
  // Year marks
  var years=[-600,-400,-200,0,200,400,600,800,1000,1200,1400,1500,1600,1700,1750,1800,1850,1900,1925,1950,1975,2000,2025];
  years.forEach(function(y){
    var pct=(y+700)/2800;
    var x=pct*W;
    var lbl=document.createElement('div');
    lbl.className='tl-yr'+(Math.abs(y)%400===0?' tl-yr-major':'');
    lbl.style.left=x+'px';
    lbl.textContent=y<0?Math.abs(y)+' v.Chr.':y===0?'0':y+'';
    inner.appendChild(lbl);
    // tick
    var tick=document.createElement('div');
    tick.style.cssText='position:absolute;left:'+x+'px;top:'+(AY+2)+'px;width:1px;height:'+(Math.abs(y)%400===0?10:6)+'px;background:rgba(128,128,128,'+(Math.abs(y)%400===0?.35:.2)+')';
    inner.appendChild(tick);
  });
  // Philosopher nodes
  PHILS_DATA.forEach(function(p,i){
    var px=p.x*W;
    var node=document.createElement('div');
    node.className='tl-node';
    node.setAttribute('data-epoch',p.epoch);
    node.setAttribute('data-name',p.name.toLowerCase());
    var LH=60;
    var above=p.above;
    var dotTop=AY-5;
    var lineTop=above?AY-LH:AY+2;
    var cardTop=above?AY-LH-80:AY+LH+2;
    node.style.cssText='left:'+px+'px;top:0;position:absolute;';
    node.innerHTML='<div class="tl-dot" style="background:'+p.color+';top:'+dotTop+'px;"></div>'
      +'<div class="tl-line" style="top:'+lineTop+'px;height:'+LH+'px;"></div>'
      +'<div class="tl-card" style="top:'+cardTop+'px;">'
      +'<div class="tl-card-name" style="color:'+p.color+'">'+p.name+'</div>'
      +'<div class="tl-card-dates">'+(p.birth<0?Math.abs(p.birth)+' v.Chr.':p.birth)+'–'+(p.death===0?'heute':(p.death<0?Math.abs(p.death)+' v.Chr.':p.death))+'</div>'
      +'<div class="tl-card-dates" style="margin-top:2px;opacity:.7">'+p.epoch+'</div>'
      +'</div>';
    node.onclick=function(){openPhilModal(p);};
    inner.appendChild(node);
  });
  applyPhilFilters();
}

function philZoom(factor){
  philZoomLevel=Math.max(0.5,Math.min(4,philZoomLevel*factor));
  var sc=document.getElementById('tl-scroll');
  var ratio=sc.scrollLeft/sc.scrollWidth;
  renderTimeline();
  sc.scrollLeft=ratio*sc.scrollWidth;
}
function philZoomReset(){philZoomLevel=1;renderTimeline();}

function philFilterEpoch(ep,btn){
  philActiveEpoch=ep;
  document.querySelectorAll('.epoch-btn').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  applyPhilFilters();
}
function filterPhilSearch(){
  philSearchTerm=document.getElementById('phil-search').value.toLowerCase();

}
function applyPhilFilters(){
  document.querySelectorAll('.tl-node').forEach(function(n){
    var epochMatch=!philActiveEpoch||n.getAttribute('data-epoch')===philActiveEpoch;
    var nameMatch=!philSearchTerm||n.getAttribute('data-name').indexOf(philSearchTerm)>=0;
    n.style.opacity=(epochMatch&&nameMatch)?'1':'0.1';
    n.style.pointerEvents=(epochMatch&&nameMatch)?'auto':'none';
  });
}

function openPhilModal(p){
  document.getElementById('m-epoch').innerHTML='<span style="color:'+p.color+'">'+p.epoch+'</span>';
  document.getElementById('m-name').textContent=p.name;
  document.getElementById('m-dates').textContent=(p.birth<0?Math.abs(p.birth)+' v. Chr.':p.birth)+' – '+(p.death===0?'heute':(p.death<0?Math.abs(p.death)+' v. Chr.':p.death));
  document.getElementById('m-desc').textContent=p.desc;
  document.getElementById('m-ideas').innerHTML=p.ideas.map(function(i){return'<li>'+i+'</li>';}).join('');
  document.getElementById('phil-modal').classList.add('open');
}

var mbV={x:-2.5,y:-1.25,w:3.5,h:2.5};
function drawMB(){
  var c=document.getElementById('mb-canvas');if(!c)return;
  var ctx=c.getContext('2d'),W=c.width,H=c.height,mi=parseInt(document.getElementById('mb-iter').value);
  var vl=document.getElementById('mb-val');if(vl)vl.textContent=mi;
  var img=ctx.createImageData(W,H);
  for(var px=0;px<W;px++)for(var py=0;py<H;py++){
    var x0=mbV.x+px/W*mbV.w,y0=mbV.y+py/H*mbV.h,x=0,y=0,i=0;
    while(x*x+y*y<=4&&i<mi){var xt=x*x-y*y+x0;y=2*x*y+y0;x=xt;i++;}
    var idx=(py*W+px)*4;
    if(i===mi){img.data[idx]=10;img.data[idx+1]=10;img.data[idx+2]=20;img.data[idx+3]=255;}
    else{var t=i/mi;img.data[idx]=Math.floor(9*(1-t)*t*t*t*255);img.data[idx+1]=Math.floor(15*Math.pow(1-t,2)*t*t*255);img.data[idx+2]=Math.floor(8.5*Math.pow(1-t,3)*t*255);img.data[idx+3]=255;}
  }
  ctx.putImageData(img,0,0);
}

document.addEventListener('click',function(e){

var sortArr=[],sortRunning=false;
function initSort(){
  sortRunning=false;
  var n=parseInt((document.getElementById('sort-size')||{value:60}).value);
  sortArr=Array.from({length:n},function(){return Math.floor(Math.random()*300)+20;});
  drawSort(sortArr);
}
function drawSort(arr,h1,h2){
  h1=h1==null?-1:h1;h2=h2==null?-1:h2;
  var c=document.getElementById('sort-canvas');if(!c)return;
  var ctx=c.getContext('2d'),W=c.width,H=c.height;
  var dark=document.documentElement.getAttribute('data-theme')==='dark';
  ctx.fillStyle=dark?'#111118':'#f0f0f8';ctx.fillRect(0,0,W,H);
  var bw=Math.max(1,(W-20)/arr.length-1);
  arr.forEach(function(v,i){
    ctx.fillStyle=i===h1?'#e8527a':i===h2?'#22c55e':'#5b52e8';
    ctx.fillRect(10+i*(bw+1),H-v-5,bw,v);
  });
}
async function runSort(){
  if(sortRunning)return;sortRunning=true;
  var algo=document.getElementById('sort-algo').value,arr=sortArr.slice();
  var delay=function(ms){return new Promise(function(r){setTimeout(r,ms);});};
  var d=function(a,i,j){sortArr=a.slice();drawSort(sortArr,i,j);};
  if(algo==='bubble'){for(var i=0;i<arr.length-1;i++)for(var j=0;j<arr.length-i-1;j++){if(!sortRunning)return;if(arr[j]>arr[j+1]){var tmp=arr[j];arr[j]=arr[j+1];arr[j+1]=tmp;}d(arr,j,j+1);await delay(6);}}
  else if(algo==='insertion'){for(var i=1;i<arr.length;i++){var j=i;while(j>0&&arr[j-1]>arr[j]){var t=arr[j-1];arr[j-1]=arr[j];arr[j]=t;j--;if(!sortRunning)return;d(arr,j,j+1);await delay(10);}}}
  else if(algo==='quick'){
    async function qs(a,lo,hi){if(lo>=hi||!sortRunning)return;var p=a[hi],i2=lo;for(var j=lo;j<hi;j++){if(a[j]<p){var t=a[i2];a[i2]=a[j];a[j]=t;i2++;}d(arr,j,i2);await delay(4);if(!sortRunning)return;}var t=a[i2];a[i2]=a[hi];a[hi]=t;await qs(a,lo,i2-1);await qs(a,i2+1,hi);}
    await qs(arr,0,arr.length-1);
  }else{
    async function ms(a,lo,hi){if(lo>=hi||!sortRunning)return;var mid=Math.floor((lo+hi)/2);await ms(a,lo,mid);await ms(a,mid+1,hi);var tmp=[],i2=lo,j=mid+1;while(i2<=mid&&j<=hi)tmp.push(a[i2]<=a[j]?a[i2++]:a[j++]);while(i2<=mid)tmp.push(a[i2++]);while(j<=hi)tmp.push(a[j++]);for(var k=0;k<tmp.length;k++){a[lo+k]=tmp[k];d(arr,lo+k,-1);await delay(3);}}
    await ms(arr,0,arr.length-1);
  }
  if(sortRunning){sortArr=arr.slice();drawSort(sortArr);}sortRunning=false;
}
function drawFourier(){
  var terms=parseInt((document.getElementById('f-terms')||{value:5}).value);
  var fv=document.getElementById('f-val');if(fv)fv.textContent=terms;
  var shape=(document.getElementById('f-shape')||{value:'square'}).value;
  var c=document.getElementById('f-canvas');if(!c)return;
  var ctx=c.getContext('2d'),W=c.width,H=c.height;
  var dark=document.documentElement.getAttribute('data-theme')==='dark';
  ctx.fillStyle=dark?'#111118':'#f0f0f8';ctx.fillRect(0,0,W,H);
  var freqs=[],totalR=0;
  for(var k=0;k<terms;k++){
    var n=2*k+1;
    var amp=shape==='square'?4/(Math.PI*n):shape==='sawtooth'?2/(Math.PI*n):8/(Math.PI*Math.PI*n*n)*(k%2===0?1:-1);
    freqs.push({n:n,amp:Math.abs(amp),phase:amp<0?Math.PI:0});totalR+=Math.abs(amp);
  }
  var sc=60/totalR,pts=[];
  for(var xi=0;xi<W-160;xi++){var t=xi/400*2*Math.PI,y=H/2;freqs.forEach(function(f){y+=f.amp*sc*Math.sin(f.n*t+f.phase);});pts.push({x:xi+160,y:y});}
  ctx.beginPath();pts.forEach(function(p,i){ctx[i?'lineTo':'moveTo'](p.x,p.y);});
  ctx.strokeStyle='#5b52e8';ctx.lineWidth=2;ctx.stroke();
  var bx=80,by=H/2;
  freqs.forEach(function(f,k){
    var r=f.amp*sc;
    ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);
    ctx.strokeStyle='hsl('+(200+k*18)+',65%,'+(dark?'55%':'40%')+')';ctx.lineWidth=0.8;ctx.stroke();
    var ex=bx+r*Math.cos(f.phase),ey=by+r*Math.sin(f.phase);
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(ex,ey);
    ctx.strokeStyle='hsl('+(200+k*18)+',65%,'+(dark?'65%':'45%')+')';ctx.lineWidth=1.5;ctx.stroke();
    bx=ex;by=ey;
  });
}

  f.sort(function(a,b){
    var va=a[buchSort]||'',vb=b[buchSort]||'';
    if(buchSort==='jahr'){return(parseInt(va.replace(/\D/g,''))||0)-(parseInt(vb.replace(/\D/g,''))||0)*buchDir;}
    return va.localeCompare(vb,'de')*buchDir;
  });
  var tb=document.getElementById('buch-tbody');
  if(!tb)return;
  tb.innerHTML='';
  f.forEach(function(b){
    var tr=document.createElement('tr');
    tr.innerHTML='<td>'+b.jahr+'</td><td>'+b.autor+'</td>'
      +'<td><span class="b-title">'+b.titel+'</span></td>'
      +'<td class="b-year">'+b.erschj+'</td>'
      +'<td><span class="ctx-badge '+(ctxCls[b.bereich]||'ctx-sach')+'">'+b.bereich+'</span></td>'
      +'<td><span class="status-badge '+(stCls[b.status]||'st-gelesen')+'">'+b.status+'</span></td>'
      +'<td class="b-notes">'+(b.notes||'—')+'</td>';
    tb.appendChild(tr);
  });
  var stats=document.getElementById('buch-stats');
  if(stats){
    stats.innerHTML='<div class="pstat"><span class="pstat-num">'+f.length+'</span><span class="pstat-lbl">BÜCHER</span></div>'
      +'<div class="pstat"><span class="pstat-num">'+f.filter(function(b){return b.bereich==='Philosophie';}).length+'</span><span class="pstat-lbl">PHILOSOPHIE</span></div>'
      +'<div class="pstat"><span class="pstat-num">'+f.filter(function(b){return b.status==='intensiv gelesen';}).length+'</span><span class="pstat-lbl">INTENSIV</span></div>'
      +'<div class="pstat"><span class="pstat-num">'+new Set(f.map(function(b){return b.bereich;})).size+'</span><span class="pstat-lbl">BEREICHE</span></div>';
  }
}

// STUDIUM
// ════════════════════════════════════════════════
var studiumBuilt=false,activeFach='',openSems=new Set();
var fachColors={Philosophie:'phil',Mathematik:'math',Informatik:'info',Griechisch:'gr',Französisch:'fr'};
function fachCls(f){return 'fach-'+(fachColors[f]||'sonstig');}

function buildFachFilter(){
  var div=document.getElementById('fach-filter');if(!div)return;
  ['Alle','Philosophie','Mathematik','Informatik','Griechisch','Französisch'].forEach(function(f){
    var b=document.createElement('button');
    b.className='ff-btn'+(f==='Alle'?' active ff-all':'');
    b.textContent=f;
    if(f!=='Alle')b.classList.add('ff-'+(fachColors[f]||'sonstig'));
    b.onclick=function(){
      activeFach=f==='Alle'?'':f;
      document.querySelectorAll('.ff-btn').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');
      if(f==='Alle')b.style.background='var(--accent)';
      renderKurse();
    };
    div.appendChild(b);
  });
}
function renderKurse(){
  var q=(document.getElementById('kurs-search')||{value:''}).value.toLowerCase();
  var dir=(document.getElementById('sort-sem')||{value:'asc'}).value==='asc'?1:-1;
  var f=kurseData.filter(function(k){
    if(activeFach&&k.fach!==activeFach)return false;
    if(q&&k.name.toLowerCase().indexOf(q)<0&&k.fach.toLowerCase().indexOf(q)<0&&k.sem.toLowerCase().indexOf(q)<0&&(k.dozent||'').toLowerCase().indexOf(q)<0)return false;
    return true;
  });
  var groups={};
  f.forEach(function(k){
    var key=k.semNr+'|'+k.sem;
    if(!groups[key])groups[key]={semNr:k.semNr,sem:k.sem,phase:k.phase,kurse:[]};
    groups[key].kurse.push(k);
  });
  var keys=Object.keys(groups).sort(function(a,b){return(groups[a].semNr-groups[b].semNr)*dir;});
  var list=document.getElementById('kurs-list');if(!list)return;
  list.innerHTML='';
  if(!keys.length){list.innerHTML='<div class="no-results">Keine Veranstaltungen gefunden.</div>';return;}
  keys.forEach(function(key){
    var g=groups[key];
    var isOpen=openSems.has(key)||q.length>0;
    var phCls={BA:'ph-ba',MA:'ph-ma',Prom:'ph-prom'}[g.phase]||'ph-ba';
    var phLbl={BA:'Bachelor',MA:'Master',Prom:'Promotion'}[g.phase]||g.phase;
    var semLbl=g.phase==='BA'?g.semNr+'. Sem. (BA)':g.phase==='MA'?(g.semNr-9)+'. Sem. (MA)':(g.semNr-15)+'. Sem. (Prom)';
    var wrap=document.createElement('div');wrap.className='sem-group';
    var hdr=document.createElement('div');hdr.className='sem-header';
    hdr.innerHTML='<span class="sem-badge">'+g.sem+'</span><span class="sem-name">'+semLbl+'</span>'
      +'<span class="sem-phase '+phCls+'">'+phLbl+'</span>'
      +'<span class="sem-count">'+g.kurse.length+' Kurse</span>'
      +'<span class="sem-toggle'+(isOpen?' open':'')+'">&#9654;</span>';
    var tw=document.createElement('div');tw.className='kurs-wrap'+(isOpen?' open':'');
    var tbl=document.createElement('table');tbl.className='kurs-table';
    tbl.innerHTML='<thead><tr><th>Fach</th><th>Veranstaltung</th><th>Art</th><th>Dozent/in</th></tr></thead>';
    var tbody=document.createElement('tbody');
    g.kurse.forEach(function(k){
      var tr=document.createElement('tr');
      tr.innerHTML='<td><span class="fach-dot '+fachCls(k.fach)+'"></span>'+k.fach+'</td>'
        +'<td>'+k.name+'</td>'
        +'<td>'+(k.art?'<span class="veranst-badge">'+k.art+'</span>':'')+'</td>'
        +'<td class="dozent-cell">'+(k.dozent||'')+'</td>';
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);tw.appendChild(tbl);
    hdr.onclick=function(){
      var tog=hdr.querySelector('.sem-toggle');
      var open=tw.classList.toggle('open');
      tog.classList.toggle('open',open);
      if(open)openSems.add(key);else openSems.delete(key);
    };
    wrap.appendChild(hdr);wrap.appendChild(tw);list.appendChild(wrap);
  });
  var stats=document.getElementById('studium-stats');
  if(stats){
    stats.innerHTML='<div class="pstat"><span class="pstat-num">'+f.length+'</span><span class="pstat-lbl">KURSE GESAMT</span></div>'
      +'<div class="pstat"><span class="pstat-num">'+new Set(f.map(function(k){return k.semNr;})).size+'</span><span class="pstat-lbl">SEMESTER</span></div>'
      +'<div class="pstat"><span class="pstat-num">'+f.filter(function(k){return k.fach==='Philosophie';}).length+'</span><span class="pstat-lbl">PHILOSOPHIE</span></div>'
      +'<div class="pstat"><span class="pstat-num">'+f.filter(function(k){return k.fach==='Mathematik';}).length+'</span><span class="pstat-lbl">MATHEMATIK</span></div>';
  }
}
