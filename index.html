<!DOCTYPE html>
<html lang="de" data-theme="light" data-publish="github"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexander Schmidt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>/* ═══════════════════════════════════════════
   DESIGN TOKENS — alexander-schmidt.dev
   Edit here to retheme the entire site.
═══════════════════════════════════════════ */
:root {
  /* Backgrounds */
  --bg:       #ffffff;
  --bg2:      #f8f8fc;
  --bg3:      #f0f0f8;
  --surface:  #f0f0f8;
  --surface2: #e4e4f0;

  /* Accent colours */
  --accent:  #5b52e8;
  --accent2: #e8527a;
  --accent3: #22c55e;
  --accent4: #f59e0b;

  /* Text */
  --text:  #18181f;
  --text2: #52526a;
  --text3: #9090a8;

  /* Borders */
  --border:  #e0e0ec;
  --border2: #d0d0e0;

  /* Cards */
  --card:   #ffffff;
  --shadow: 0 2px 12px rgba(0,0,0,.07);

  /* Typography */
  --fh: 'Syne', sans-serif;
  --fb: 'DM Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;

  /* Border radius */
  --r: 14px;
}

[data-theme="dark"] {
  --bg:       #0a0a0f;
  --bg2:      #111118;
  --bg3:      #181824;
  --surface:  #22223a;
  --surface2: #2a2a40;

  --accent:  #7c73ff;
  --accent2: #ff6584;
  --accent3: #43e97b;
  --accent4: #f7971e;

  --text:  #e8e8f0;
  --text2: #a0a0b8;
  --text3: #606078;

  --border:  #2a2a42;
  --border2: #3a3a55;

  --card:   #181824;
  --shadow: 0 2px 12px rgba(0,0,0,.3);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--fb);
  overflow-x: hidden;
  transition: background .3s, color .3s;
}

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  height: 56px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 1.5rem;
  background: var(--bg); border-bottom: 1px solid var(--border);
  transition: background .3s;
}
.nav-logo {
  font-family: var(--fh); font-size: 1.1rem; font-weight: 800;
  color: var(--text); text-decoration: none; letter-spacing: -.02em;
  cursor: pointer; flex-shrink: 0;
}
.nav-logo span { color: var(--accent); }

/* Grouped nav */
.nav-groups { display: flex; gap: 0; list-style: none; align-items: center; }
.nav-group  { position: relative; }

.nav-group-btn {
  background: none; border: none; color: var(--text2);
  font-family: var(--fm); font-size: .73rem;
  padding: .3rem .7rem; border-radius: 6px;
  cursor: pointer; display: flex; align-items: center; gap: .3rem;
  transition: all .15s; white-space: nowrap;
}
.nav-group-btn:hover,
.nav-group-btn.group-active { background: var(--surface); color: var(--accent); }
.nav-group-btn .arr { font-size: .55rem; opacity: .5; transition: transform .2s; }
.nav-group:hover .arr { transform: rotate(180deg); }

.nav-direct {
  background: none; border: none; color: var(--text2);
  font-family: var(--fm); font-size: .73rem;
  padding: .3rem .7rem; border-radius: 6px;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.nav-direct:hover,
.nav-direct.active { background: var(--surface); color: var(--accent); }

/* Dropdown */
.nav-dropdown {
  position: absolute; top: 100%; left: 0;
  min-width: 220px; background: var(--card);
  border: 1px solid var(--border); border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,.12);
  opacity: 0; pointer-events: none;
  transform: translateY(-4px); transition: opacity .18s, transform .18s; z-index: 600;
  /* padding-top creates an invisible bridge so mouse can move from button to dropdown */
  padding-top: 8px;
  margin-top: 0;
}
/* Extend hover area downward to cover the gap between button and dropdown */
.nav-group::after {
  content: ''; display: block; position: absolute;
  top: 100%; left: 0; width: 100%; height: 12px;
  background: transparent;
}
.nav-group:hover .nav-dropdown,
.nav-group.open .nav-dropdown {
  opacity: 1; pointer-events: all; transform: translateY(0);
}

.nav-dropdown-item {
  display: flex; align-items: center; gap: .6rem;
  padding: .6rem 1rem; cursor: pointer;
  font-family: var(--fm); font-size: .73rem; color: var(--text2);
  transition: all .15s; border-radius: 6px; margin: .2rem;
}
.nav-dropdown-item:hover { background: var(--surface); color: var(--accent); }
.nav-dropdown-item .icon { font-size: .9rem; width: 18px; text-align: center; }
.nav-dropdown-divider { height: 1px; background: var(--border); margin: .3rem .8rem; }

.nav-right { display: flex; gap: .4rem; align-items: center; }
.theme-btn {
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text2); width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer; font-size: .95rem; transition: all .2s;
}
.theme-btn:hover { border-color: var(--accent); color: var(--accent); }
.lang-btn {
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text2); padding: .25rem .6rem; border-radius: 6px;
  cursor: pointer; font-family: var(--fm); font-size: .68rem; transition: all .2s;
}
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ═══════════════════════════════════════════
   PAGE SYSTEM  (content loaded via JS into #page-root)
═══════════════════════════════════════════ */
#page-root { padding-top: 56px; min-height: 100vh; }

/* ═══════════════════════════════════════════
   SHARED COMPONENTS
═══════════════════════════════════════════ */
.sec       { padding: 3.5rem 3rem; }
.sec-title { font-family: var(--fh); font-size: 1.75rem; font-weight: 800; letter-spacing: -.03em; margin-bottom: .25rem; color: var(--text); }
.sec-sub   { color: var(--text3); font-family: var(--fm); font-size: .73rem; letter-spacing: .1em; margin-bottom: 2.25rem; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--shadow); transition: all .25s; }
.card:hover { transform: translateY(-3px); border-color: var(--border2); box-shadow: 0 6px 24px rgba(0,0,0,.1); }

.btn         { padding: .6rem 1.4rem; border-radius: 8px; font-family: var(--fh); font-weight: 600; font-size: .85rem; cursor: pointer; border: none; transition: all .2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: .85; transform: translateY(-1px); }
.btn-ghost   { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm      { padding: .35rem .85rem; font-size: .78rem; }

.tag  { background: var(--surface); color: var(--text2); padding: .15rem .5rem; border-radius: 4px; font-family: var(--fm); font-size: .66rem; }
.tags { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .75rem; }

.ctrl-input  {
  background: var(--card); border: 1px solid var(--border2); color: var(--text);
  padding: .42rem .75rem; border-radius: 7px; font-family: var(--fb);
  font-size: .8rem; outline: none; height: 34px; transition: border-color .2s;
}
.ctrl-input:focus { border-color: var(--accent); }
.ctrl-select {
  background: var(--card); border: 1px solid var(--border2); color: var(--text);
  padding: .42rem .7rem; border-radius: 7px; font-size: .8rem;
  cursor: pointer; height: 34px; outline: none;
}

/* Page hero (shared top banner) */
.page-hero       { padding: 2.5rem 3rem 2rem; background: var(--bg2); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
.page-hero-glow  { position: absolute; right: -80px; top: -60px; width: 280px; height: 280px; background: radial-gradient(circle,rgba(91,82,232,.1),transparent 70%); pointer-events: none; }
.page-title      { font-family: var(--fh); font-size: 2.6rem; font-weight: 800; letter-spacing: -.04em; color: var(--text); line-height: 1; }
.page-title span { color: var(--accent); }
.page-desc       { color: var(--text2); max-width: 600px; line-height: 1.75; margin-top: .6rem; font-size: .9rem; }
.page-stats      { display: flex; gap: 2rem; margin-top: 1.4rem; flex-wrap: wrap; }
/* ── Veröffentlichungs-Profil GitHub Pages (greift nur bei <html data-publish="github">) ── */
html[data-publish="github"] .pub-hide-github { display: none !important; }
.pstat-num       { font-family: var(--fh); font-size: 1.75rem; font-weight: 800; color: var(--accent); display: block; }
.pstat-lbl       { font-family: var(--fm); font-size: .63rem; color: var(--text3); letter-spacing: .08em; }

.hero-tag         { font-family: var(--fm); font-size: .72rem; color: var(--accent3); letter-spacing: .15em; margin-bottom: 1.1rem; display: flex; align-items: center; gap: .5rem; }
.hero-tag::before { content: ''; width: 20px; height: 1px; background: var(--accent3); }

.section-divider        { display: flex; align-items: center; gap: .75rem; font-family: var(--fh); font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 1.25rem; }
.section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Animations */
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.fade-up { animation: fadeUp .5s ease forwards; }
.d1{animation-delay:.1s} .d2{animation-delay:.2s} .d3{animation-delay:.3s}
@keyframes blink {0%,100%{opacity:1}50%{opacity:0}}
.cursor { animation: blink 1s step-end infinite; color: var(--accent); }

/* ═══════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════ */
footer {
  background: var(--bg2); border-top: 1px solid var(--border);
  padding: 2rem 3rem; display: flex; justify-content: space-between;
  align-items: center; flex-wrap: wrap; gap: 1rem;
}
.footer-txt  { font-family: var(--fm); font-size: .7rem; color: var(--text3); }
.footer-links { display: flex; gap: 1.25rem; }
.footer-links a {
  color: var(--text3); text-decoration: none;
  font-family: var(--fm); font-size: .7rem; transition: color .2s;
}
.footer-links a:hover { color: var(--accent); }

/* Responsive */
@media(max-width:820px) {
  .sec { padding: 2.5rem 1.5rem; }
  .page-hero { padding: 2rem 1.5rem 1.5rem; }
}

/* ═══════════════════════════════════════════
   HOME PAGE
═══════════════════════════════════════════ */
.hero {
  display: flex; flex-direction: row; align-items: center;
  gap: 4rem; min-height: calc(100vh - 56px);
  padding: 3rem 4rem 2rem; position: relative; overflow: hidden;
}
.hero-grid-bg {
  position: absolute; inset: 0;
  background-image: linear-gradient(var(--border) 1px,transparent 1px),
                    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size: 50px 50px; opacity: .35; pointer-events: none;
}
[data-theme="dark"] .hero-grid-bg { opacity: .2; }
.hero-glow {
  position: absolute; top: -150px; right: -80px; width: 500px; height: 500px;
  background: radial-gradient(circle,rgba(91,82,232,.08),transparent 70%); pointer-events: none;
}
.hero-portrait-wrap { flex-shrink: 0; position: relative; order: -1; }
.hero-portrait-wrap::before {
  content: ''; position: absolute; inset: -16px; border-radius: 32px;
  background: radial-gradient(ellipse at center,rgba(91,82,232,.13) 0%,transparent 70%);
  z-index: -1; pointer-events: none;
}
.hero-portrait {
  display: block; width: 280px; height: 360px;
  object-fit: cover; object-position: center top;
  border-radius: 22px; border: 3px solid var(--border2);
  box-shadow: 0 24px 64px rgba(0,0,0,.18), 0 0 0 1px rgba(91,82,232,.07);
  transition: transform .45s, box-shadow .45s;
}
.hero-portrait:hover {
  transform: translateY(-6px);
  box-shadow: 0 32px 80px rgba(91,82,232,.22), 0 0 0 1px rgba(91,82,232,.15);
}
.hero-text    { flex: 1; min-width: 280px; }
.hero-name    { font-family: var(--fh); font-size: clamp(2.5rem,6vw,4.5rem); font-weight: 800; line-height: .95; letter-spacing: -.04em; margin-bottom: .6rem; }
.hero-name .n1 { color: var(--text); display: block; }
.hero-name .n2 {
  background: linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; display: block;
}
.hero-subtitle      { font-family: var(--fm); font-size: .88rem; color: var(--text2); margin-bottom: .65rem; }
.hero-subtitle span { color: var(--accent); }
.hero-desc          { font-size: .93rem; color: var(--text2); max-width: 480px; line-height: 1.8; margin-bottom: 1.75rem; }
.hero-cta           { display: flex; gap: .7rem; flex-wrap: wrap; }

/* Stats bar */
.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.stat-item  { background: var(--bg2); padding: 1.4rem; text-align: center; }
.stat-num   { font-family: var(--fh); font-size: 1.9rem; font-weight: 800; color: var(--accent); display: block; }
.stat-label { font-size: .7rem; color: var(--text3); font-family: var(--fm); letter-spacing: .08em; margin-top: .2rem; display: block; }

/* Skills */
.skills-grid  { display: grid; grid-template-columns: repeat(auto-fill,minmax(250px,1fr)); gap: 1.2rem; }
.skill-card   { padding: 1.4rem; }
.skill-icon   { font-size: 1.3rem; margin-bottom: .7rem; }
.skill-title  { font-family: var(--fh); font-weight: 700; margin-bottom: .35rem; font-size: .93rem; }
.skill-desc   { color: var(--text2); font-size: .8rem; line-height: 1.65; }

/* Projects */
.proj-grid    { display: grid; grid-template-columns: repeat(auto-fill,minmax(290px,1fr)); gap: 1.2rem; }
.proj-card    { padding: 1.4rem; text-decoration: none; display: block; color: inherit; }
.proj-top     { display: flex; justify-content: space-between; align-items: start; margin-bottom: .8rem; }
.proj-lang    { background: var(--surface); color: var(--text2); padding: .15rem .5rem; border-radius: 4px; font-family: var(--fm); font-size: .66rem; }
.proj-title   { font-family: var(--fh); font-weight: 700; margin-bottom: .35rem; font-size: .93rem; }
.proj-desc    { color: var(--text2); font-size: .8rem; line-height: 1.65; }

/* About */
.about-grid         { display: grid; grid-template-columns: 1fr 1fr; gap: 3.5rem; align-items: start; }
.about-portrait-row { display: flex; align-items: flex-start; gap: 1.75rem; margin-bottom: 1.4rem; }
.about-portrait-col { display: flex; flex-direction: column; align-items: center; gap: .55rem; flex-shrink: 0; }
.about-portrait {
  display: block; width: 136px; height: 136px;
  object-fit: cover; object-position: center top; border-radius: 50%;
  box-shadow: 0 0 0 3px var(--accent), 0 8px 28px rgba(0,0,0,.12);
  transition: transform .3s;
}
.about-portrait:hover { transform: scale(1.06); }
.about-portrait-name { font-family: var(--fm); font-size: .65rem; color: var(--text3); text-align: center; line-height: 1.5; max-width: 136px; }
.about-p             { color: var(--text2); line-height: 1.8; margin-bottom: .85rem; font-size: .9rem; }
.about-p strong      { color: var(--text); }

/* Timeline */
.tl::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(var(--accent),var(--accent2)); border-radius: 2px; }
.tl { position: relative; padding-left: 1.75rem; }
.tl-item { position: relative; margin-bottom: 1.3rem; }
.tl-item::before { content: ''; position: absolute; left: -2rem; top: .3rem; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
.tl-year { font-family: var(--fm); font-size: .7rem; color: var(--accent); margin-bottom: .12rem; }
.tl-ttl  { font-weight: 500; font-size: .86rem; color: var(--text); }
.tl-sub  { color: var(--text3); font-size: .76rem; }

/* Social */
.social-row  { display: flex; gap: .7rem; margin-top: 1.6rem; flex-wrap: wrap; }
.social-link {
  display: flex; align-items: center; gap: .35rem;
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text2); padding: .4rem .85rem; border-radius: 7px;
  text-decoration: none; font-size: .78rem; font-family: var(--fm); transition: all .2s;
}
.social-link:hover { border-color: var(--accent); color: var(--accent); }

@media(max-width:820px) {
  .hero { flex-direction: column; align-items: center; text-align: center; padding: 2.5rem 1.5rem; gap: 2rem; }
  .hero-portrait-wrap { order: 0; }
  .hero-portrait { width: 200px; height: 250px; }
  .hero-cta, .hero-tag { justify-content: center; }
  .about-grid { grid-template-columns: 1fr; }
  .stats-row  { grid-template-columns: repeat(2,1fr); }
}

/* ══ Favphil — rich cards ══════════════════════════════════════ */
.favphil-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:1.5rem;padding:2rem 3rem 4rem;
}
.favphil-card{
  background:var(--bg);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  display:flex;flex-direction:column;
  transition:all .25s;
}
.favphil-card:hover{
  transform:translateY(-4px);box-shadow:var(--shadow-hover);
}
.favphil-portrait{
  height:200px;overflow:hidden;background:var(--surface);
  position:relative;flex-shrink:0;
}
.favphil-portrait img{
  width:100%;height:100%;object-fit:cover;object-position:center 22%;
  display:block;filter:grayscale(.2) contrast(1.04);
  transition:filter .25s, transform .5s ease-out;
}
.favphil-card:hover .favphil-portrait img{
  filter:grayscale(0) contrast(1.06);transform:scale(1.04);
}
.favphil-mono{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--surface),var(--bg2));
  font-family:var(--fh);font-size:4.5rem;font-weight:800;
  opacity:.45;letter-spacing:-.05em;
}
.favphil-portrait-era{
  position:absolute;left:.85rem;bottom:.85rem;
  font-family:var(--fm);font-size:.62rem;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;color:#fff;
  padding:.25rem .65rem;border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.3);backdrop-filter:blur(4px);
}
.favphil-body{padding:1.25rem 1.4rem 1.4rem;display:flex;flex-direction:column;gap:.65rem;}
.favphil-name{
  font-family:var(--fh);font-size:1.3rem;font-weight:800;
  letter-spacing:-.02em;color:var(--text);line-height:1.15;
}
.favphil-dates{
  font-family:var(--fm);font-size:.74rem;color:var(--text3);
  letter-spacing:.04em;margin-top:-.4rem;
}
.favphil-quote{
  font-family:var(--fh);font-size:.95rem;font-style:italic;
  color:var(--text);line-height:1.55;
  padding:.7rem 0 .7rem 1rem;border-left:3px solid var(--accent2);
  margin:.2rem 0;
}
.favphil-desc{
  color:var(--text2);font-size:.86rem;line-height:1.7;
}
.favphil-ideas{
  list-style:none;padding:0;margin:.4rem 0 0;
  display:flex;flex-direction:column;gap:.35rem;
}
.favphil-ideas li{
  position:relative;padding-left:1.1rem;
  font-size:.82rem;color:var(--text2);line-height:1.5;
}
.favphil-ideas li::before{
  content:'';position:absolute;left:0;top:.55rem;
  width:5px;height:5px;border-radius:50%;background:var(--accent);
}
.favphil-why{
  margin-top:.6rem;padding-top:.9rem;border-top:1px dashed var(--border);
}
.favphil-why-label{
  font-family:var(--fm);font-size:.62rem;letter-spacing:.12em;
  text-transform:uppercase;color:var(--accent);margin-bottom:.45rem;
}
.favphil-why-text{
  font-size:.85rem;line-height:1.65;color:var(--text2);font-style:italic;
}

/* ═══════════════════════════════════════════
   LIEBLINGSPHILOSOPHEN
═══════════════════════════════════════════ */
.favphil-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(320px,1fr)); gap: 1.5rem; }
.favphil-card { border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); transition: all .3s; }
.favphil-card:hover { transform: translateY(-4px); border-color: var(--accent); }
.favphil-header { padding: 1.5rem 1.75rem 1.25rem; position: relative; overflow: hidden; }
.favphil-era    { font-family: var(--fm); font-size: .68rem; letter-spacing: .1em; margin-bottom: .4rem; }
.favphil-name   { font-family: var(--fh); font-size: 1.5rem; font-weight: 800; letter-spacing: -.03em; color: var(--text); line-height: 1; }
.favphil-dates  { font-family: var(--fm); font-size: .72rem; color: var(--text3); margin-top: .2rem; }
.favphil-body   { padding: 0 1.75rem 1.5rem; background: var(--card); }
.favphil-quote  { font-size: .88rem; color: var(--text2); line-height: 1.75; margin-bottom: 1rem; padding: .75rem 1rem; background: var(--bg2); border-radius: 8px; border-left: 3px solid var(--accent); font-style: italic; }
.favphil-desc   { font-size: .84rem; color: var(--text2); line-height: 1.7; margin-bottom: 1rem; }
.favphil-ideas  { list-style: none; display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1rem; }
.favphil-ideas li { font-size: .8rem; color: var(--text2); padding: .4rem .75rem; background: var(--surface); border-radius: 6px; border-left: 2px solid var(--accent); }
.favphil-why      { padding: .75rem 1rem; background: var(--bg2); border-radius: 8px; }
.favphil-why-label { font-family: var(--fm); font-size: .65rem; color: var(--accent3); letter-spacing: .1em; margin-bottom: .3rem; }
.favphil-why-text  { font-size: .8rem; color: var(--text2); line-height: 1.65; }

/* ═══════════════════════════════════════════
   ZITATE
═══════════════════════════════════════════ */
.zitat-hero      { padding: 3.5rem 3rem 2.5rem; background: linear-gradient(135deg,var(--bg2),var(--bg)); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
.zitat-hero-glow { position: absolute; right: -60px; top: -60px; width: 320px; height: 320px; background: radial-gradient(circle,rgba(232,82,122,.1),transparent 70%); pointer-events: none; }

.zitat-motto        { background: var(--card); border: 1px solid var(--border); border-left: 5px solid var(--accent); border-radius: 0 var(--r) var(--r) 0; padding: 2rem 2.5rem; margin: 2rem 3rem; max-width: 800px; box-shadow: var(--shadow); position: relative; }
.zitat-motto::before { content: '\201C'; position: absolute; top: -10px; left: 20px; font-family: var(--fh); font-size: 5rem; font-weight: 800; color: var(--accent); opacity: .15; line-height: 1; }
.zitat-motto-text    { font-family: var(--fh); font-size: 1.05rem; font-weight: 600; color: var(--text); line-height: 1.7; margin-bottom: .75rem; padding-top: .25rem; }
.zitat-motto-source  { font-family: var(--fm); font-size: .72rem; color: var(--accent); letter-spacing: .05em; }
.zitat-motto-context { font-size: .82rem; color: var(--text3); margin-top: .5rem; font-style: italic; }

.zitat-filter { display: flex; gap: .4rem; flex-wrap: wrap; padding: 1.25rem 3rem 0; }
.zf-btn       { background: var(--surface); border: 1px solid var(--border); color: var(--text2); padding: .3rem .8rem; border-radius: 20px; cursor: pointer; font-size: .76rem; font-family: var(--fm); transition: all .15s; }
.zf-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.zitat-masonry { columns: 2; column-gap: 1.5rem; padding: 2rem 3rem 4rem; }
@media(max-width:700px) { .zitat-masonry { columns: 1; } }

.zitat-card         { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 1.65rem; margin-bottom: 1.5rem; break-inside: avoid; box-shadow: var(--shadow); transition: all .25s; position: relative; }
.zitat-card:hover   { transform: translateY(-3px); border-color: var(--border2); }
.zitat-card::before { content: '\201C'; position: absolute; top: .5rem; left: 1.1rem; font-family: var(--fh); font-size: 3.5rem; font-weight: 800; color: var(--accent); opacity: .12; line-height: 1; }
.zitat-text         { font-size: .92rem; color: var(--text); line-height: 1.8; font-style: italic; margin-bottom: .85rem; padding-top: .35rem; }
.zitat-text.large   { font-size: .88rem; line-height: 1.85; }
.zitat-author       { font-family: var(--fh); font-weight: 700; font-size: .82rem; color: var(--accent); }
.zitat-source       { font-family: var(--fm); font-size: .68rem; color: var(--text3); margin-top: .12rem; }
.zitat-kat          { display: inline-block; background: var(--surface); color: var(--text3); padding: .13rem .45rem; border-radius: 4px; font-size: .63rem; font-family: var(--fm); margin-top: .55rem; }

/* ═══════════════════════════════════════════
   T-SHIRTS
═══════════════════════════════════════════ */
.tshirt-grid   { display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 1.5rem; }
.tshirt-card   { border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); transition: all .3s; }
.tshirt-card:hover { transform: translateY(-4px); border-color: var(--accent); }
.tshirt-visual { width: 100%; height: 220px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.tshirt-body   { padding: 1.1rem 1.3rem; background: var(--card); }
.tshirt-name   { font-family: var(--fh); font-weight: 700; font-size: .9rem; color: var(--text); margin-bottom: .25rem; }
.tshirt-sub    { font-family: var(--fm); font-size: .7rem; margin-bottom: .45rem; }
.tshirt-desc   { font-size: .78rem; color: var(--text2); line-height: 1.6; }
.tshirt-badge  { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; font-family: var(--fm); font-size: .68rem; letter-spacing: .1em; }

/* ═══════════════════════════════════════════
   PHILOSOPHER TIMELINE
═══════════════════════════════════════════ */
.phil-header    { padding: 3rem 3rem 2rem; background: var(--bg2); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
.phil-glow      { position: absolute; left: 50%; top: -100px; transform: translateX(-50%); width: 400px; height: 300px; background: radial-gradient(ellipse,rgba(91,82,232,.1),transparent 70%); pointer-events: none; }

.phil-controls  { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; padding: .9rem 3rem; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 56px; z-index: 90; }
.phil-zoom-btns { display: flex; gap: .3rem; }
.phil-zoom-btn  { background: var(--surface); border: 1px solid var(--border); color: var(--text2); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: .85rem; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.phil-zoom-btn:hover { border-color: var(--accent); color: var(--accent); }

.epoch-btns { display: flex; gap: .35rem; flex-wrap: wrap; flex: 1; }
.epoch-btn  { background: var(--surface); border: 1px solid var(--border); color: var(--text2); padding: .28rem .65rem; border-radius: 16px; cursor: pointer; font-size: .72rem; font-family: var(--fm); transition: all .2s; white-space: nowrap; }
.epoch-btn.active { color: #fff; border-color: transparent; }

.tl-scroll-wrap { overflow-x: auto; cursor: grab; user-select: none; padding: 0 0 1rem; }
.tl-scroll-wrap:active { cursor: grabbing; }
.tl-inner  { position: relative; height: 480px; }
.tl-axis   { position: absolute; left: 0; right: 0; top: 240px; height: 2px; background: linear-gradient(90deg,var(--accent),var(--accent2)); }
.tl-node   { position: absolute; cursor: pointer; transition: opacity .3s; }
.tl-dot    { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg); position: absolute; left: 50%; transform: translateX(-50%); transition: all .2s; z-index: 2; }
.tl-node:hover .tl-dot { width: 16px; height: 16px; margin-top: -3px; }
.tl-line   { position: absolute; left: 50%; width: 1px; background: var(--border2); }
.tl-card   { position: absolute; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .55rem .8rem; width: 130px; text-align: center; transition: all .2s; box-shadow: var(--shadow); }
.tl-node:hover .tl-card { border-color: var(--accent); z-index: 10; width: 150px; }
.tl-card-name  { font-family: var(--fh); font-weight: 700; font-size: .75rem; margin-bottom: .12rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-card-dates { font-family: var(--fm); font-size: .6rem; color: var(--text3); }
.tl-yr         { position: absolute; top: 250px; font-family: var(--fm); font-size: .62rem; color: var(--text3); transform: translateX(-50%); }
.tl-yr-major   { font-size: .68rem; color: var(--text2); font-weight: 500; }

/* Phil modal */
.phil-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(5px); z-index: 700; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
.phil-modal-overlay.open { display: flex; }
.phil-modal-box    { background: var(--card); border: 1px solid var(--border2); border-radius: 18px; padding: 2rem 2.25rem; max-width: 560px; width: 100%; max-height: 82vh; overflow-y: auto; position: relative; box-shadow: 0 24px 64px rgba(0,0,0,.22); }
.phil-modal-close  { position: absolute; top: 1rem; right: 1rem; background: var(--surface); border: none; color: var(--text2); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; transition: all .2s; font-size: .9rem; }
.phil-modal-close:hover { background: var(--accent); color: #fff; }
.phil-modal-epoch  { font-family: var(--fm); font-size: .7rem; letter-spacing: .1em; margin-bottom: .35rem; }
.phil-modal-name   { font-family: var(--fh); font-size: 1.85rem; font-weight: 800; letter-spacing: -.03em; color: var(--text); margin-bottom: .15rem; }
.phil-modal-dates  { font-family: var(--fm); font-size: .75rem; color: var(--text3); margin-bottom: 1.1rem; }
.phil-modal-desc   { color: var(--text2); line-height: 1.8; font-size: .87rem; margin-bottom: 1.25rem; }
.phil-ideas        { list-style: none; display: flex; flex-direction: column; gap: .35rem; }
.phil-ideas li     { background: var(--surface); border-radius: 6px; padding: .5rem .85rem; font-size: .82rem; color: var(--text2); border-left: 3px solid var(--accent); }

/* ═══════════════════════════════════════════
   DISSERTATION
═══════════════════════════════════════════ */
.diss-hero      { padding: 3.5rem 3rem 2.5rem; background: linear-gradient(135deg,var(--bg2),var(--bg)); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
.diss-hero-glow { position: absolute; right: -60px; top: -80px; width: 360px; height: 360px; background: radial-gradient(circle,rgba(91,82,232,.12),transparent 70%); pointer-events: none; }
.diss-meta-row  { display: flex; gap: .45rem; flex-wrap: wrap; margin-bottom: 1.4rem; }
.diss-meta-badge { background: var(--surface); border: 1px solid var(--border2); color: var(--text2); padding: .28rem .7rem; border-radius: 6px; font-family: var(--fm); font-size: .7rem; }
.diss-meta-badge.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.diss-stats-row  { display: flex; gap: 1.25rem; flex-wrap: wrap; margin-top: 1.4rem; }
.diss-stat       { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1.4rem; text-align: center; }
.diss-stat-num   { font-family: var(--fh); font-size: 1.5rem; font-weight: 800; color: var(--accent); display: block; }
.diss-stat-lbl   { font-family: var(--fm); font-size: .62rem; color: var(--text3); letter-spacing: .1em; margin-top: .15rem; display: block; }
.diss-abstract       { background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 0 var(--r) var(--r) 0; padding: 1.4rem 2rem; margin: 1.75rem 3rem; font-size: .9rem; color: var(--text2); line-height: 1.85; max-width: 780px; }
.diss-abstract-label { font-family: var(--fm); font-size: .68rem; color: var(--accent); letter-spacing: .12em; margin-bottom: .65rem; display: block; }
.diss-toc      { padding: 0 3rem 2.5rem; }
.diss-toc-list { list-style: none; display: flex; flex-direction: column; gap: .35rem; max-width: 680px; }
.diss-toc-list li { display: flex; gap: 1rem; align-items: baseline; padding: .5rem .9rem; border-radius: 8px; background: var(--bg2); border: 1px solid var(--border); transition: all .2s; font-size: .86rem; }
.diss-toc-list li:hover { border-color: var(--accent); background: var(--surface); }
.diss-toc-num   { font-family: var(--fm); font-size: .73rem; color: var(--accent); flex-shrink: 0; min-width: 30px; }
.diss-toc-name  { color: var(--text2); flex: 1; }
.diss-toc-pages { font-family: var(--fm); font-size: .68rem; color: var(--text3); margin-left: auto; }

/* Wordclouds */
.wc-grid      { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 1.4rem; padding: 0 3rem 2.5rem; }
.wc-card      { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); transition: all .3s; }
.wc-card:hover { transform: translateY(-4px); border-color: var(--accent); }
.wc-img-area  { width: 100%; aspect-ratio: 4/3; overflow: hidden; }
.wc-real-img  { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .45s; }
.wc-card:hover .wc-real-img { transform: scale(1.04); }
.wc-info       { padding: .9rem 1.1rem; }
.wc-info-label { font-family: var(--fm); font-size: .63rem; color: var(--accent); letter-spacing: .1em; margin-bottom: .25rem; display: block; }
.wc-info-title { font-family: var(--fh); font-weight: 700; font-size: .88rem; color: var(--text); margin-bottom: .18rem; }
.wc-info-desc  { color: var(--text3); font-size: .76rem; line-height: 1.5; }

/* ═══════════════════════════════════════════
   MEINE PHILOSOPHIE
═══════════════════════════════════════════ */
.pe-hero  { padding: 3.5rem 3rem 3rem; position: relative; overflow: hidden; background: var(--bg2); border-bottom: 1px solid var(--border); }
.pe-glow1 { position: absolute; left: -80px; bottom: -80px; width: 400px; height: 400px; background: radial-gradient(circle,rgba(232,82,122,.1),transparent 70%); pointer-events: none; }
.pe-glow2 { position: absolute; right: -60px; top: -60px; width: 300px; height: 300px; background: radial-gradient(circle,rgba(91,82,232,.08),transparent 70%); pointer-events: none; }
.pe-thesis        { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 1.85rem 2.25rem; margin: 1.75rem 3rem; max-width: 800px; position: relative; overflow: hidden; box-shadow: var(--shadow); }
.pe-thesis::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(var(--accent),var(--accent2)); }
.pe-thesis-quote  { font-family: var(--fh); font-size: 1.1rem; font-weight: 600; color: var(--text); line-height: 1.65; margin-bottom: .85rem; }
.pe-thesis-sub    { font-size: .83rem; color: var(--text3); font-style: italic; line-height: 1.7; }
.pe-concepts { display: grid; grid-template-columns: repeat(auto-fill,minmax(290px,1fr)); gap: 1.4rem; padding: 1.75rem 3rem 2.5rem; }
.pe-card     { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 1.6rem; box-shadow: var(--shadow); position: relative; overflow: hidden; transition: all .3s; }
.pe-card:hover { transform: translateY(-3px); border-color: var(--accent); }
.pe-card::after { content: ''; position: absolute; top: 0; right: 0; width: 55px; height: 55px; border-radius: 0 var(--r) 0 55px; opacity: .08; }
.pe-c1::after{background:var(--accent)}.pe-c2::after{background:var(--accent2)}.pe-c3::after{background:var(--accent3)}
.pe-c4::after{background:var(--accent4)}.pe-c5::after{background:#a78bfa}.pe-c6::after{background:#67e8f9}
.pe-icon  { font-size: 1.5rem; margin-bottom: .65rem; }
.pe-title { font-family: var(--fh); font-weight: 800; font-size: .97rem; color: var(--text); margin-bottom: .45rem; }
.pe-text  { color: var(--text2); font-size: .81rem; line-height: 1.7; }
.pe-key   { display: inline-block; background: var(--surface); color: var(--accent); padding: .13rem .45rem; border-radius: 4px; font-family: var(--fm); font-size: .66rem; margin-top: .65rem; }
.pe-tensions { padding: 0 3rem 2.5rem; }
.pe-tension  { display: grid; grid-template-columns: 1fr auto 1fr; gap: .75rem; align-items: center; margin-bottom: .75rem; background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: .9rem 1.4rem; }
.pe-ta { font-family: var(--fh); font-weight: 700; font-size: .86rem; color: var(--accent); text-align: right; }
.pe-tv { font-family: var(--fm); font-size: .68rem; color: var(--text3); text-align: center; }
.pe-tb { font-family: var(--fh); font-weight: 700; font-size: .86rem; color: var(--accent2); }
.pe-influences { padding: 0 3rem 3rem; }
.pe-chips  { display: flex; gap: .65rem; flex-wrap: wrap; }
.pe-chip   { background: var(--bg2); border: 1px solid var(--border2); color: var(--text2); padding: .38rem .85rem; border-radius: 20px; font-size: .78rem; transition: all .2s; cursor: default; }
.pe-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--surface); }
.pe-bridge       { margin-top: 1.75rem; background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--accent3); border-radius: 0 var(--r) var(--r) 0; padding: 1.4rem 1.85rem; max-width: 720px; box-shadow: var(--shadow); }
.pe-bridge-label { font-family: var(--fm); font-size: .68rem; color: var(--accent3); letter-spacing: .1em; margin-bottom: .6rem; }
.pe-bridge-text  { color: var(--text2); font-size: .86rem; line-height: 1.75; }

/* ═══════════════════════════════════════════
   STUDIUM
═══════════════════════════════════════════ */
.studium-controls {
  display: flex; gap: .55rem; align-items: center; flex-wrap: wrap;
  padding: .9rem 3rem; background: var(--bg); border-bottom: 1px solid var(--border);
  position: sticky; top: 56px; z-index: 90;
}
.fach-filter { display: flex; gap: .3rem; flex-wrap: wrap; }
.ff-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text2); padding: .23rem .6rem; border-radius: 5px; cursor: pointer; font-size: .7rem; font-family: var(--fm); transition: all .15s; white-space: nowrap; }
.ff-btn.active { color: #fff !important; border-color: transparent !important; }
.ff-all.active  { background: var(--accent) !important; }
.ff-phil  { background:#5b52e8; color:#fff !important; border-color:#5b52e8 !important }
.ff-math  { background:#e8527a; color:#fff !important; border-color:#e8527a !important }
.ff-info  { background:#22c55e; color:#fff !important; border-color:#22c55e !important }
.ff-gr    { background:#f59e0b; color:#fff !important; border-color:#f59e0b !important }
.ff-fr    { background:#06b6d4; color:#fff !important; border-color:#06b6d4 !important }
.ff-sonstig { background:#a78bfa; color:#fff !important; border-color:#a78bfa !important }

.sem-group  { margin-bottom: 0; }
.sem-header { display: flex; align-items: center; gap: .7rem; padding: .6rem 3rem; background: var(--bg2); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; transition: background .15s; }
.sem-header:hover { background: var(--bg3); }
.sem-badge  { font-family: var(--fm); font-size: .73rem; font-weight: 700; color: var(--text3); background: var(--surface); padding: .18rem .55rem; border-radius: 4px; white-space: nowrap; }
.sem-name   { font-family: var(--fh); font-size: .86rem; font-weight: 700; color: var(--text); }
.sem-count  { font-family: var(--fm); font-size: .68rem; color: var(--text3); margin-left: auto; white-space: nowrap; }
.sem-phase  { font-family: var(--fm); font-size: .66rem; padding: .13rem .45rem; border-radius: 3px; white-space: nowrap; }
.ph-ba  { background:#e8f0fe; color:#3c5acd } [data-theme="dark"] .ph-ba  { background:#1a2050; color:#8899ff }
.ph-ma  { background:#e8f8ee; color:#1a7a40 } [data-theme="dark"] .ph-ma  { background:#0a2a18; color:#55dd88 }
.ph-prom{ background:#fef3e8; color:#8a4a00 } [data-theme="dark"] .ph-prom{ background:#2a1500; color:#ffaa44 }
.sem-toggle      { color: var(--text3); font-size: .78rem; transition: transform .2s; flex-shrink: 0; }
.sem-toggle.open { transform: rotate(90deg); }

.kurs-wrap      { overflow-x: auto; display: none; }
.kurs-wrap.open { display: block; }
.kurs-table     { width: 100%; border-collapse: collapse; font-size: .8rem; }
.kurs-table th  { background: var(--bg3); color: var(--text3); font-family: var(--fm); font-size: .66rem; letter-spacing: .08em; padding: .5rem .9rem; text-align: left; font-weight: 500; border-bottom: 1px solid var(--border); }
.kurs-table td  { padding: .52rem .9rem; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: top; line-height: 1.5; }
.kurs-table tr:last-child td { border-bottom: none; }
.kurs-table tr:hover td { background: var(--bg2); }
.kurs-table td:first-child, .kurs-table th:first-child { padding-left: 3rem; }
.fach-dot     { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
.fach-phil    { background:#5b52e8 } .fach-math  { background:#e8527a }
.fach-info    { background:#22c55e } .fach-gr    { background:#f59e0b }
.fach-fr      { background:#06b6d4 } .fach-sonstig { background:#a78bfa }
.veranst-badge { background: var(--surface); color: var(--text3); padding: .1rem .42rem; border-radius: 3px; font-family: var(--fm); font-size: .63rem; }
.dozent-cell   { color: var(--accent); font-size: .78rem; font-family: var(--fm); }
.no-results    { text-align: center; color: var(--text3); font-family: var(--fm); font-size: .8rem; padding: 2.5rem; }

/* ═══════════════════════════════════════════
   BÜCHER
═══════════════════════════════════════════ */
.books-controls {
  display: flex; gap: .55rem; align-items: center; flex-wrap: wrap;
  padding: .9rem 3rem; background: var(--bg); border-bottom: 1px solid var(--border);

/* Neon Noir CSS — scoped to html[data-style="neon-noir"] */

/* ═══════════════════════════════════════════════════════
   DESIGN SYSTEM — "NEON NOIR"

   Light mode = dunkles Blaugrau (deutlich heller als Dark)
   Dark mode  = fast-Schwarz mit starken Neons

   Differenz Light↔Dark ist jetzt klar sichtbar.
═══════════════════════════════════════════════════════ */

html[data-style="neon-noir"] {
  /* ── Backgrounds: dunkles Mitternachtsblau (NICHT fast-schwarz) */
  --bg:       #1a1f2e;
  --bg2:      #232940;
  --bg3:      #2c3452;
  --surface:  #2c3452;
  --surface2: #36406a;

  /* ── Neon accents (etwas gedämpfter im Light-Mode) */
  --accent:   #f5c842;
  --accent2:  #e84aaa;
  --accent3:  #3dd8b8;
  --accent4:  #9f7af5;

  --glow-accent:  rgba(245,200,66,.30);
  --glow-accent2: rgba(232,74,170,.30);
  --glow-accent3: rgba(61,216,184,.25);
  --glow-accent4: rgba(159,122,245,.25);

  /* ── Text (etwas wärmer im Light-Mode) */
  --text:  #eceaf4;
  --text2: #9aa2bc;
  --text3: #5a6480;

  /* ── Borders (leicht sichtbarer im Light-Mode) */
  --border:  rgba(255,255,255,.10);
  --border2: rgba(255,255,255,.18);

  /* ── Cards */
  --card:         rgba(35,41,64,.90);
  --card-glass:   rgba(255,255,255,.05);
  --card-border:  rgba(255,255,255,.12);
  --shadow:       0 4px 24px rgba(0,0,0,.35);
  --shadow-hover: 0 8px 48px rgba(0,0,0,.50);

  /* ── Typography */
  --fh: 'Syne', sans-serif;
  --fb: 'DM Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;

  --r: 16px;
  --r-sm: 10px;

  --grad-accent:  linear-gradient(135deg, #f5c842, #e84aaa);
  --grad-accent2: linear-gradient(135deg, #3dd8b8, #9f7af5);
  --grad-text:    linear-gradient(135deg, #f5c842 0%, #e84aaa 50%, #9f7af5 100%);
}

/* Dark mode = echtes Schwarz, stärkere Neons, maximaler Kontrast */
html[data-style="neon-noir"][data-theme="dark"] {
  --bg:       #000000;
  --bg2:      #07090f;
  --bg3:      #0d1020;
  --surface:  #0d1020;
  --surface2: #141929;

  --accent:   #ffd040;
  --accent2:  #ff40b0;
  --accent3:  #40ffcc;
  --accent4:  #b090ff;

  --glow-accent:  rgba(255,208,64,.50);
  --glow-accent2: rgba(255,64,176,.50);
  --glow-accent3: rgba(64,255,204,.42);
  --glow-accent4: rgba(176,144,255,.42);

  --text:  #ffffff;
  --text2: #8090aa;
  --text3: #384050;

  --border:  rgba(255,255,255,.05);
  --border2: rgba(255,255,255,.09);

  --card:         rgba(7,9,15,.92);
  --card-glass:   rgba(255,255,255,.03);
  --card-border:  rgba(255,255,255,.07);
  --shadow:       0 4px 32px rgba(0,0,0,.75);
  --shadow-hover: 0 8px 60px rgba(0,0,0,.90);
}


/* ═══════════════════════════════════════════
   BASE ALT — Neon Noir
═══════════════════════════════════════════ */
html[data-style="neon-noir"],
html[data-style="neon-noir"] *::before,
html[data-style="neon-noir"] *::after { box-sizing: border-box; margin: 0; padding: 0; }
html[data-style="neon-noir"] { scroll-behavior: smooth; font-size: 16px; }
html[data-style="neon-noir"] {
  background: var(--bg);
  color: var(--text);
  font-family: var(--fb);
  overflow-x: hidden;
  transition: background .4s, color .4s;
}
html[data-style="neon-noir"] /* Scanline texture overlay — subtle */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.03) 2px,
    rgba(0,0,0,.03) 4px
  );
}
html[data-style="neon-noir"][data-theme="dark"] body::before { opacity: .6; }

/* ═══════════════════════════════════════════════════════
   BRUTALIST EDITORIAL
   Scoped to html[data-style="brutalist"]

   Concept: Swiss/International Typographic Style meets
   digital brutalism. Bold structure, sharp edges,
   high-contrast, magazine-grid aesthetic.

   Light: stark white + jet black + one signal colour (red)
   Dark:  jet black + off-white + electric red
═══════════════════════════════════════════════════════ */

/* ── Variables ────────────────────────────────────────── */
html[data-style="brutalist"] {
  --bg:       #f5f5f0;
  --bg2:      #ebebе4;
  --bg3:      #ddddd6;
  --surface:  #e4e4dc;
  --surface2: #d5d5cc;

  --accent:   #d42b2b;   /* signal red    */
  --accent2:  #1a1a1a;   /* near-black    */
  --accent3:  #d42b2b;
  --accent4:  #d42b2b;

  --glow-accent:  rgba(212,43,43,.2);
  --glow-accent2: rgba(26,26,26,.15);
  --glow-accent3: rgba(212,43,43,.2);
  --glow-accent4: rgba(212,43,43,.2);

  --text:  #0a0a08;
  --text2: #3a3a36;
  --text3: #8a8a82;

  --border:  #c8c8c0;
  --border2: #a0a098;

  --card:         #ffffff;
  --card-glass:   #ffffff;
  --card-border:  #0a0a08;
  --shadow:       4px 4px 0 #0a0a08;
  --shadow-hover: 6px 6px 0 #d42b2b;

  --fh: 'Syne', sans-serif;
  --fb: 'DM Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --r:    0px;   /* NO border radius — brutalist */
  --r-sm: 0px;

  --grad-accent:  linear-gradient(90deg, #d42b2b, #8b0000);
  --grad-accent2: linear-gradient(90deg, #0a0a08, #3a3a36);
  --grad-text:    linear-gradient(90deg, #d42b2b, #0a0a08);
}

html[data-style="brutalist"][data-theme="dark"] {
  --bg:       #0a0a08;
  --bg2:      #111110;
  --bg3:      #1a1a18;
  --surface:  #1a1a18;
  --surface2: #222220;

  --accent:   #ff3333;
  --accent2:  #f0ede8;
  --accent3:  #ff3333;
  --accent4:  #ff3333;

  --glow-accent:  rgba(255,51,51,.3);
  --glow-accent2: rgba(240,237,232,.1);
  --glow-accent3: rgba(255,51,51,.3);
  --glow-accent4: rgba(255,51,51,.3);

  --text:  #f0ede8;
  --text2: #b0ada8;
  --text3: #606060;

  --border:  #2a2a28;
  --border2: #3a3a38;

  --card:         #111110;
  --card-glass:   #111110;
  --card-border:  #f0ede8;
  --shadow:       4px 4px 0 #f0ede8;
  --shadow-hover: 6px 6px 0 #ff3333;
}

/* ── Global overrides ─────────────────────────────────── */
html[data-style="brutalist"] body {
  background: var(--bg);
  color: var(--text);
}

/* ── NAV ─────────────────────────────────────────────── */
html[data-style="brutalist"] nav {
  background: var(--bg);
  border-bottom: 3px solid var(--text);
  backdrop-filter: none;
  height: 56px;
}
html[data-style="brutalist"] .nav-logo {
  font-family: var(--fh);
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: .02em;
  text-transform: uppercase;
}
html[data-style="brutalist"] .nav-logo span {
  color: var(--accent);
  background: none;
  -webkit-text-fill-color: var(--accent);
}
html[data-style="brutalist"] .nav-group-btn,
html[data-style="brutalist"] .nav-direct {
  font-family: var(--fm);
  font-size: .7rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text2);
}
html[data-style="brutalist"] .nav-group-btn:hover,
html[data-style="brutalist"] .nav-group-btn.group-active,
html[data-style="brutalist"] .nav-direct:hover,
html[data-style="brutalist"] .nav-direct.active {
  color: var(--accent);
  background: none;
  text-shadow: none;
  text-decoration: underline;
  text-decoration-thickness: 2px;
  text-underline-offset: 3px;
}
html[data-style="brutalist"] .nav-dropdown {
  border-radius: 0;
  border: 2px solid var(--text);
  backdrop-filter: none;
  background: var(--bg);
  box-shadow: 4px 4px 0 var(--text);
}
html[data-style="brutalist"] .nav-dropdown-item {
  font-family: var(--fm);
  font-size: .7rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  border-radius: 0;

html[data-style="brutalist"] .nav-dropdown-item:hover {
  background: var(--text);
  color: var(--bg);
}
html[data-style="brutalist"] .theme-btn,
html[data-style="brutalist"] .lang-btn {
  border-radius: 0;
  border: 2px solid var(--text);
  background: var(--bg);
  color: var(--text);
  font-family: var(--fm);
  font-size: .65rem;
}
html[data-style="brutalist"] .theme-btn:hover,
html[data-style="brutalist"] .lang-btn:hover {
  background: var(--text);
  color: var(--bg);
  box-shadow: none;
  border-color: var(--text);
}

/* ── CARDS ────────────────────────────────────────────── */
html[data-style="brutalist"] .card {
  border-radius: 0;
  border: 2px solid var(--card-border);
  background: var(--card);
  box-shadow: var(--shadow);
  backdrop-filter: none;
}
html[data-style="brutalist"] .card:hover {
  transform: translate(-2px, -2px);
  box-shadow: var(--shadow-hover);
  border-color: var(--accent);
}

/* ── BUTTONS ──────────────────────────────────────────── */
html[data-style="brutalist"] .btn {
  border-radius: 0;
  letter-spacing: .08em;
  text-transform: uppercase;
  font-size: .8rem;
}

  background: var(--accent);
  color: #fff;
  box-shadow: 3px 3px 0 var(--text);

  transform: translate(-2px, -2px);
  box-shadow: 5px 5px 0 var(--text);
}
html[data-style="brutalist"] .btn-ghost {
  background: transparent;
  color: var(--text);
  border: 2px solid var(--text);
  box-shadow: 3px 3px 0 var(--text);

html[data-style="brutalist"] .btn-ghost:hover {
  background: var(--text);
  color: var(--bg);
  box-shadow: 5px 5px 0 var(--accent);
}

/* ── PAGE HERO ────────────────────────────────────────── */
html[data-style="brutalist"] .page-hero {
  border-bottom: 3px solid var(--text);
  background: var(--bg);
}
html[data-style="brutalist"] .page-title {
  font-size: 3.5rem;
  letter-spacing: -.05em;
}
html[data-style="brutalist"] .page-title span {
  color: var(--accent);
  text-shadow: none;
}
html[data-style="brutalist"] .hero-tag {
  color: var(--accent);
  text-shadow: none;
  letter-spacing: .2em;
}
html[data-style="brutalist"] .hero-tag::before {
  background: var(--accent);
  box-shadow: none;
}
html[data-style="brutalist"] .pstat-num {
  color: var(--accent);
  background: none;
  -webkit-text-fill-color: var(--accent);
}

/* ── SECTION DIVIDERS ─────────────────────────────────── */
html[data-style="brutalist"] .section-divider {
  font-size: 1.3rem;

  font-weight: 800;

}
html[data-style="brutalist"] .section-divider::after {
  display: none;
}
html[data-style="brutalist"] .sec-title {
  text-transform: uppercase;
  letter-spacing: .02em;
}
html[data-style="brutalist"] .sec-sub {
  letter-spacing: .15em;
}

/* ── TAGS ─────────────────────────────────────────────── */
html[data-style="brutalist"] .tag {
  border-radius: 0;
  border: 1px solid var(--text);
  background: transparent;
  color: var(--text2);
  font-size: .65rem;
  letter-spacing: .06em;
  text-transform: uppercase;
}

/* ── INPUTS ───────────────────────────────────────────── */
html[data-style="brutalist"] .ctrl-input,
html[data-style="brutalist"] .ctrl-select {
  border-radius: 0;
  border: 2px solid var(--border2);
  background: var(--bg);
}
html[data-style="brutalist"] .ctrl-input:focus {
  border-color: var(--accent);
  box-shadow: 2px 2px 0 var(--accent);
}

/* ── HOME HERO ────────────────────────────────────────── */
html[data-style="brutalist"] .hero-name .n1 { color: var(--text); }

  color: var(--accent);
  background: none;
  -webkit-text-fill-color: var(--accent);
  filter: none;
}
html[data-style="brutalist"] .cursor { color: var(--accent); text-shadow: none; }
html[data-style="brutalist"] .hero-portrait-wrap::before { display: none; }
html[data-style="brutalist"] .hero-portrait-wrap::after  { display: none; }
html[data-style="brutalist"] .hero-portrait {
  border-radius: 0;
  border: 3px solid var(--text);
  box-shadow: 8px 8px 0 var(--text);
  filter: none;
}
html[data-style="brutalist"] .hero-portrait:hover {
  box-shadow: 12px 12px 0 var(--accent);

}
html[data-style="brutalist"] .hero-grid-bg,
html[data-style="brutalist"] .hero-glow { display: none; }

html[data-style="brutalist"] .hero::before {
  content: '';

  left: 0; right: 0; top: 0; height: 3px;

  z-index: 0;
}
html[data-style="brutalist"] .stat-item { border-right: 2px solid var(--text); }
html[data-style="brutalist"] .stat-num {

  background: none;
  -webkit-text-fill-color: var(--accent);
}
html[data-style="brutalist"] .stats-row {
  border-top: 3px solid var(--text);
  border-bottom: 3px solid var(--text);
  background: var(--border);
}
html[data-style="brutalist"] .social-link {
  border-radius: 0;
  border: 2px solid var(--text2);
}
html[data-style="brutalist"] .social-link:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 2px 2px 0 var(--accent);
  background: transparent;
}
html[data-style="brutalist"] .about-portrait {

  border: 3px solid var(--text);

}
html[data-style="brutalist"] .tl-item::before {
  background: var(--accent);
  box-shadow: none;
  border-radius: 0;
}
html[data-style="brutalist"] .tl::before {

}
html[data-style="brutalist"] .tl-year { color: var(--accent); }

/* ── PHILOSOPHY ───────────────────────────────────────── */
html[data-style="brutalist"] .favphil-card {
  border-radius: 0;
  border: 2px solid var(--text);
  box-shadow: var(--shadow);
}
html[data-style="brutalist"] .favphil-card:hover {

  box-shadow: var(--shadow-hover);

html[data-style="brutalist"] .zitat-card {

html[data-style="brutalist"] .zitat-motto {

}
html[data-style="brutalist"] .zf-btn { border-radius: 0; }
html[data-style="brutalist"] .zf-btn.active { background: var(--accent); border-color: var(--accent); }

/* ── GAMING ───────────────────────────────────────────── */
html[data-style="brutalist"] .game-card {

  border: 2px solid var(--text);
  box-shadow: var(--shadow);
  backdrop-filter: none;
}
html[data-style="brutalist"] .game-card:hover {

  box-shadow: var(--shadow-hover);
  border-color: var(--accent);
}
html[data-style="brutalist"] .gtab { border-radius: 0; font-family: var(--fm); text-transform: uppercase; font-size: .67rem; letter-spacing: .06em; }
html[data-style="brutalist"] .gtab.active { background: var(--text); color: var(--bg); }
html[data-style="brutalist"] .g-tabs { border-radius: 0; border: 2px solid var(--text); }

/* ── PODCASTS ─────────────────────────────────────────── */
html[data-style="brutalist"] .pod-card2 {
  border-radius: 0;
  border: 2px solid var(--text);
  box-shadow: var(--shadow);
  backdrop-filter: none;
}
html[data-style="brutalist"] .pod-card2:hover {
  transform: translate(-2px, -2px);
  box-shadow: 4px 4px 0 var(--accent);
}
html[data-style="brutalist"] .pod-cat-btn { border-radius: 0; }
html[data-style="brutalist"] .pod-cat-btn.active { background: var(--accent); border-color: var(--accent); }

/* ── BÜCHER / STUDIUM ─────────────────────────────────── */
html[data-style="brutalist"] .books-table th,
html[data-style="brutalist"] .kurs-table th { background: var(--text); color: var(--bg); }
html[data-style="brutalist"] .sort-btn { border-radius: 0; }
html[data-style="brutalist"] .sort-btn.active { background: var(--accent); border-color: var(--accent); }
html[data-style="brutalist"] .sem-header:hover { background: var(--surface); }
html[data-style="brutalist"] .ff-btn { border-radius: 0; }

/* ── NATUR ────────────────────────────────────────────── */
html[data-style="brutalist"] .nature-card {
  border-radius: 0;
  border: 2px solid var(--text);
  box-shadow: var(--shadow);
}
html[data-style="brutalist"] .nature-card:hover {
  transform: translate(-3px, -3px);
  box-shadow: var(--shadow-hover);
}
html[data-style="brutalist"] .nature-cat-btn { border-radius: 0; }
html[data-style="brutalist"] .nature-cat-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: none; }

/* ── MATH ─────────────────────────────────────────────── */
html[data-style="brutalist"] .math-tabs { border-radius: 0; border: 2px solid var(--text); }
html[data-style="brutalist"] .mtab { border-radius: 0; font-family: var(--fm); text-transform: uppercase; font-size: .7rem; }
html[data-style="brutalist"] .mtab.active { background: var(--accent); }
html[data-style="brutalist"] .math-canvas { border-radius: 0; border: 2px solid var(--text); box-shadow: 4px 4px 0 var(--text); }

/* ── PHILOSOPHY TIMELINE ──────────────────────────────── */
html[data-style="brutalist"] .pmodal-box {
  border-radius: 0;
  border: 2px solid var(--text);
  box-shadow: 8px 8px 0 var(--text);
  backdrop-filter: none;
}
html[data-style="brutalist"] .pmodal-close { border-radius: 0; }
html[data-style="brutalist"] .pmodal-name { color: var(--accent); }
html[data-style="brutalist"] .epoch-btn { border-radius: 0; }
html[data-style="brutalist"] .tier-item .tier-pip { border-radius: 0; }

/* ── DISSERTATION ─────────────────────────────────────── */
html[data-style="brutalist"] .diss-meta-badge { border-radius: 0; border: 2px solid var(--border2); }
html[data-style="brutalist"] .diss-meta-badge.accent { background: var(--accent); border-color: var(--accent); }
html[data-style="brutalist"] .diss-stat { border-radius: 0; border: 2px solid var(--border); }
html[data-style="brutalist"] .diss-stat-num { color: var(--accent); background: none; -webkit-text-fill-color: var(--accent); }
html[data-style="brutalist"] .diss-abstract { border-left: 5px solid var(--accent); border-radius: 0; background: var(--bg2); }
html[data-style="brutalist"] .toc-row:hover { background: var(--text); color: var(--bg); }
html[data-style="brutalist"] .toc-row:hover .toc-num,
html[data-style="brutalist"] .toc-row:hover .toc-name,
html[data-style="brutalist"] .toc-row:hover .toc-pg { color: var(--bg); }
html[data-style="brutalist"] .toc-num { color: var(--accent); }

/* ── KONTAKT ──────────────────────────────────────────── */
html[data-style="brutalist"] .contact-card {
  border-radius: 0;
  border: 2px solid var(--text);
  box-shadow: var(--shadow);
}
html[data-style="brutalist"] .contact-card:hover {
  transform: translate(-2px, 0);
  box-shadow: 4px 4px 0 var(--accent);
  border-color: var(--accent);
}
html[data-style="brutalist"] .contact-icon { border-radius: 0; border: 1px solid var(--border2); }

/* ── FOOTER ───────────────────────────────────────────── */
html[data-style="brutalist"] footer {
  border-top: 3px solid var(--text);
  background: var(--bg2);
}
html[data-style="brutalist"] .footer-links a:hover { color: var(--accent); text-shadow: none; }

/* ── MEINE PHILOSOPHIE ────────────────────────────────── */
html[data-style="brutalist"] .pe-card {
  border-radius: 0;
  border: 2px solid var(--text);
  box-shadow: var(--shadow);
  backdrop-filter: none;
}
html[data-style="brutalist"] .pe-card:hover {
  transform: translate(-3px, -3px);
  box-shadow: var(--shadow-hover);
  border-color: var(--accent);
}
html[data-style="brutalist"] .pe-tension { border-radius: 0; }
html[data-style="brutalist"] .pe-ta { color: var(--accent); text-shadow: none; }
html[data-style="brutalist"] .pe-tb { color: var(--text); }

/* ── SCROLLBAR ────────────────────────────────────────── */
html[data-style="brutalist"] ::-webkit-scrollbar-thumb { border-radius: 0; background: var(--text2); }
html[data-style="brutalist"] .tl-canvas-wrap::-webkit-scrollbar-thumb { background: var(--accent); }

/* ── ACCENT BADGE / LABEL elements ───────────────────── */
html[data-style="brutalist"] .diss-abstract-label,
html[data-style="brutalist"] .wc-info-label { color: var(--accent); }
html[data-style="brutalist"] .diss-wc-label { color: var(--accent); }

/* ── GAME LIGHTBOX ────────────────────────────────────── */
html[data-style="brutalist"] .game-lb img { border-radius: 0; box-shadow: 8px 8px 0 rgba(255,255,255,.3); }

/* ── WC LIGHTBOX ──────────────────────────────────────── */
html[data-style="brutalist"] .wc-lb img { border-radius: 0; }
html[data-style="brutalist"] .wc-thumb-wrap { border-radius: 0; }

/* ── POKE CARDS ───────────────────────────────────────── */
html[data-style="brutalist"] .poke-card {
  border-radius: 0;
  border: 2px solid var(--text);
  box-shadow: 3px 3px 0 var(--text);
}
html[data-style="brutalist"] .poke-card:hover {
  transform: translate(-2px, -2px);
  box-shadow: 4px 4px 0 var(--accent);
  border-color: var(--accent);
}
html[data-style="brutalist"] .poke-detail-area { border-radius: 0; border: 2px solid var(--text); }

/* ── HERO-TAG for pages ───────────────────────────────── */
html[data-style="brutalist"] .page-hero-glow { display: none; }
html[data-style="brutalist"] .page-hero { border-bottom: 3px solid var(--text); }

/* ═══════════════════════════════════════════════════════
   SOFT & ELEGANT
   Scoped to html[data-style="elegant"]

   Concept: Art catalogue meets Swiss editorial.
   Warm crème paper, deep charcoal, brushed gold accents.
   Generous whitespace, refined serif-inspired headings.

   Light: warm crème + charcoal + gold
   Dark:  deep warm charcoal + cream + gold
═══════════════════════════════════════════════════════ */

html[data-style="elegant"] {
  --bg:       #f9f6f0;
  --bg2:      #f2ede4;
  --bg3:      #e8e1d6;
  --surface:  #ede8de;
  --surface2: #e0d9cc;

  --accent:   #b8943f;
  --accent2:  #8a6820;
  --accent3:  #c8a855;
  --accent4:  #6b4f1a;

  --glow-accent:  rgba(184,148,63,.25);
  --glow-accent2: rgba(138,104,32,.2);
  --glow-accent3: rgba(200,168,85,.2);
  --glow-accent4: rgba(107,79,26,.2);

  --text:  #1c1a16;
  --text2: #4a4640;
  --text3: #9a9288;

  --border:  #d8d0c4;
  --border2: #c4bab0;

  --card:         #fefcf8;
  --card-glass:   rgba(254,252,248,.9);
  --card-border:  #d8d0c4;
  --shadow:       0 2px 16px rgba(28,26,22,.08), 0 1px 4px rgba(28,26,22,.05);
  --shadow-hover: 0 8px 32px rgba(184,148,63,.2), 0 2px 8px rgba(28,26,22,.08);

  --fh: 'Syne', sans-serif;
  --fb: 'DM Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --r:    10px;
  --r-sm: 6px;

  --grad-accent:  linear-gradient(135deg, #c8a855, #8a6820);
  --grad-accent2: linear-gradient(135deg, #b8943f, #6b4f1a);
  --grad-text:    linear-gradient(135deg, #c8a855 0%, #8a6820 100%);
}

html[data-style="elegant"][data-theme="dark"] {
  --bg:       #1c1a16;
  --bg2:      #252220;
  --bg3:      #2e2a26;
  --surface:  #2e2a26;
  --surface2: #383430;

  --accent:   #d4a84a;
  --accent2:  #f0c870;
  --accent3:  #b8943f;
  --accent4:  #e8b855;

  --glow-accent:  rgba(212,168,74,.35);
  --glow-accent2: rgba(240,200,112,.3);
  --glow-accent3: rgba(184,148,63,.3);
  --glow-accent4: rgba(232,184,85,.3);

  --text:  #f0ece4;
  --text2: #b0a898;
  --text3: #706860;

  --border:  #3a3630;
  --border2: #4a4640;

  --card:         #252220;
  --card-glass:   rgba(37,34,32,.92);
  --card-border:  #3a3630;
  --shadow:       0 4px 24px rgba(0,0,0,.35);
  --shadow-hover: 0 8px 40px rgba(212,168,74,.3), 0 4px 12px rgba(0,0,0,.2);
}

/* Global */
html[data-style="elegant"] body { background: var(--bg); color: var(--text); }

/* NAV */
html[data-style="elegant"] nav {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}
html[data-style="elegant"] .nav-logo { font-weight: 800; letter-spacing: .02em; }
html[data-style="elegant"] .nav-logo span {
  background: var(--grad-accent);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
html[data-style="elegant"] .nav-group-btn:hover,
html[data-style="elegant"] .nav-group-btn.group-active,
html[data-style="elegant"] .nav-direct:hover,
html[data-style="elegant"] .nav-direct.active { color: var(--accent); text-shadow: none; }
html[data-style="elegant"] .nav-dropdown {
  border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 32px rgba(28,26,22,.12);
  background: var(--card);
}
html[data-style="elegant"] .nav-dropdown-item:hover { background: var(--surface); color: var(--accent); }
html[data-style="elegant"] .theme-btn,
html[data-style="elegant"] .lang-btn { border-color: var(--border2); }
html[data-style="elegant"] .theme-btn:hover,
html[data-style="elegant"] .lang-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: none; }

/* Cards */
html[data-style="elegant"] .card {
  background: var(--card); border: 1px solid var(--card-border); border-radius: var(--r);
  box-shadow: var(--shadow); backdrop-filter: none;
}
html[data-style="elegant"] .card:hover {
  transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--accent);
}

/* Buttons */
html[data-style="elegant"] .btn { border-radius: 6px; }
html[data-style="elegant"] .btn-primary {
  background: var(--grad-accent); color: var(--bg);
  font-weight: 700; box-shadow: 0 4px 16px var(--glow-accent);
}
html[data-style="elegant"] .btn-primary:hover { box-shadow: 0 6px 24px var(--glow-accent); }
html[data-style="elegant"] .btn-ghost { border: 1px solid var(--border2); }
html[data-style="elegant"] .btn-ghost:hover { border-color: var(--accent); color: var(--accent); box-shadow: none; }

/* Hero */
html[data-style="elegant"] .hero-name .n1 { color: var(--text); }
html[data-style="elegant"] .hero-name .n2 {
  background: var(--grad-text);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
html[data-style="elegant"] .cursor { color: var(--accent); text-shadow: none; animation: blink 1.2s step-end infinite; }
html[data-style="elegant"] .hero-tag { color: var(--accent); text-shadow: none; letter-spacing: .18em; }
html[data-style="elegant"] .hero-tag::before { background: var(--accent); box-shadow: none; }
html[data-style="elegant"] .hero-portrait-wrap::before { background: radial-gradient(ellipse, rgba(184,148,63,.15), transparent 70%); }
html[data-style="elegant"] .hero-portrait-wrap::after { display: none; }
html[data-style="elegant"] .hero-portrait {
  border: 2px solid var(--accent); border-radius: 16px;
  box-shadow: 0 8px 32px rgba(184,148,63,.2);
}
html[data-style="elegant"] .hero-portrait:hover { box-shadow: 0 16px 48px rgba(184,148,63,.3); }
html[data-style="elegant"] .stat-num { background: var(--grad-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
html[data-style="elegant"] .stats-row { background: var(--bg2); border-color: var(--border); }
html[data-style="elegant"] .stat-item:hover { background: var(--surface); }
html[data-style="elegant"] .social-link { border-color: var(--border2); border-radius: 6px; }
html[data-style="elegant"] .social-link:hover { border-color: var(--accent); color: var(--accent); box-shadow: none; background: var(--surface); }
html[data-style="elegant"] .tl-item::before { background: var(--accent); box-shadow: 0 0 6px var(--glow-accent); }
html[data-style="elegant"] .tl-year { color: var(--accent); }
html[data-style="elegant"] .tl::before { background: linear-gradient(var(--accent), var(--accent2)); }
html[data-style="elegant"] .about-portrait {
  border: 2px solid var(--accent);
  box-shadow: 0 4px 16px var(--glow-accent);
  background: linear-gradient(var(--bg2),var(--bg2)) padding-box, var(--grad-accent) border-box;
}

/* Sections */
html[data-style="elegant"] .pstat-num { background: var(--grad-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
html[data-style="elegant"] .sec-title { color: var(--text); }
html[data-style="elegant"] .section-divider { color: var(--text); }
html[data-style="elegant"] .section-divider::after { background: linear-gradient(90deg, var(--border2), transparent); }
html[data-style="elegant"] .page-title span { color: var(--accent); text-shadow: none; }
html[data-style="elegant"] .page-hero-glow { background: radial-gradient(circle, rgba(184,148,63,.12), transparent 70%); }
html[data-style="elegant"] .hero-tag { color: var(--accent); text-shadow: none; }

/* Tags */
html[data-style="elegant"] .tag { border: 1px solid var(--border); background: var(--bg3); border-radius: 4px; }

/* Inputs */
html[data-style="elegant"] .ctrl-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--glow-accent); }
html[data-style="elegant"] .ctrl-input,
html[data-style="elegant"] .ctrl-select { border-radius: 6px; }

/* Zitate */
html[data-style="elegant"] .zitat-author { color: var(--accent); text-shadow: none; }
html[data-style="elegant"] .zitat-card { border-radius: var(--r); border-color: var(--border); }
html[data-style="elegant"] .zitat-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="elegant"] .zitat-motto { border-left-color: var(--accent); border-radius: 0 var(--r) var(--r) 0; }

html[data-style="elegant"] .gtab.active { background: var(--grad-accent); color: var(--bg); }

html[data-style="elegant"] .pod-card2 { border: 1px solid var(--border); border-radius: var(--r); }

html[data-style="elegant"] .pod-cat-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

html[data-style="elegant"] .nature-cat-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); box-shadow: none; }

html[data-style="elegant"] .sort-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

html[data-style="elegant"] .diss-abstract-label { color: var(--accent); }

html[data-style="elegant"] .pmodal-box { border: 1px solid var(--border); border-radius: 16px; backdrop-filter: none; }

html[data-style="elegant"] .epoch-btn.active { color: var(--bg) !important; }

/* Math */
html[data-style="elegant"] .mtab.active { background: var(--grad-accent); color: var(--bg); }

html[data-style="elegant"] .favphil-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }

/* Pe */
html[data-style="elegant"] .pe-card { border: 1px solid var(--border); border-radius: var(--r); }
html[data-style="elegant"] .pe-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
