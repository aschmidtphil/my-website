<!DOCTYPE html>
<html lang="de" data-theme="light"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexander Schmidt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>/* ═══════════════════════════════════════════
   DESIGN TOKENS — alexander-schmidt.dev
   Edit here to retheme the entire site.
═══════════════════════════════════════════ */
:root {
  /* Backgrounds */
  --bg:       #ffffff;
  --bg2:      #f8f8fc;
  --bg3:      #f0f0f8;
  --surface:  #f0f0f8;
  --surface2: #e4e4f0;

  /* Accent colours */
  --accent:  #5b52e8;
  --accent2: #e8527a;
  --accent3: #22c55e;
  --accent4: #f59e0b;

  /* Text */
  --text:  #18181f;
  --text2: #52526a;
  --text3: #9090a8;

  /* Borders */
  --border:  #e0e0ec;
  --border2: #d0d0e0;

  /* Cards */
  --card:   #ffffff;
  --shadow: 0 2px 12px rgba(0,0,0,.07);

  /* Typography */
  --fh: 'Syne', sans-serif;
  --fb: 'DM Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;

  /* Border radius */
  --r: 14px;
}

[data-theme="dark"] {
  --bg:       #0a0a0f;
  --bg2:      #111118;
  --bg3:      #181824;
  --surface:  #22223a;
  --surface2: #2a2a40;

  --accent:  #7c73ff;
  --accent2: #ff6584;
  --accent3: #43e97b;
  --accent4: #f7971e;

  --text:  #e8e8f0;
  --text2: #a0a0b8;
  --text3: #606078;

  --border:  #2a2a42;
  --border2: #3a3a55;

  --card:   #181824;
  --shadow: 0 2px 12px rgba(0,0,0,.3);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--fb);
  overflow-x: hidden;
  transition: background .3s, color .3s;
}

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  height: 56px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 1.5rem;
  background: var(--bg); border-bottom: 1px solid var(--border);
  transition: background .3s;
}
.nav-logo {
  font-family: var(--fh); font-size: 1.1rem; font-weight: 800;
  color: var(--text); text-decoration: none; letter-spacing: -.02em;
  cursor: pointer; flex-shrink: 0;
}
.nav-logo span { color: var(--accent); }

/* Grouped nav */
.nav-groups { display: flex; gap: 0; list-style: none; align-items: center; }
.nav-group  { position: relative; }

.nav-group-btn {
  background: none; border: none; color: var(--text2);
  font-family: var(--fm); font-size: .73rem;
  padding: .3rem .7rem; border-radius: 6px;
  cursor: pointer; display: flex; align-items: center; gap: .3rem;
  transition: all .15s; white-space: nowrap;
}
.nav-group-btn:hover,
.nav-group-btn.group-active { background: var(--surface); color: var(--accent); }
.nav-group-btn .arr { font-size: .55rem; opacity: .5; transition: transform .2s; }
.nav-group:hover .arr { transform: rotate(180deg); }

.nav-direct {
  background: none; border: none; color: var(--text2);
  font-family: var(--fm); font-size: .73rem;
  padding: .3rem .7rem; border-radius: 6px;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.nav-direct:hover,
.nav-direct.active { background: var(--surface); color: var(--accent); }

/* Dropdown */
.nav-dropdown {
  position: absolute; top: 100%; left: 0;
  min-width: 220px; background: var(--card);
  border: 1px solid var(--border); border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,.12);
  opacity: 0; pointer-events: none;
  transform: translateY(-4px); transition: opacity .18s, transform .18s; z-index: 600;
  /* padding-top creates an invisible bridge so mouse can move from button to dropdown */
  padding-top: 8px;
  margin-top: 0;
}
/* Extend hover area downward to cover the gap between button and dropdown */
.nav-group::after {
  content: ''; display: block; position: absolute;
  top: 100%; left: 0; width: 100%; height: 12px;
  background: transparent;
}
.nav-group:hover .nav-dropdown,
.nav-group.open .nav-dropdown {
  opacity: 1; pointer-events: all; transform: translateY(0);
}

.nav-dropdown-item {
  display: flex; align-items: center; gap: .6rem;
  padding: .6rem 1rem; cursor: pointer;
  font-family: var(--fm); font-size: .73rem; color: var(--text2);
  transition: all .15s; border-radius: 6px; margin: .2rem;
}
.nav-dropdown-item:hover { background: var(--surface); color: var(--accent); }
.nav-dropdown-item .icon { font-size: .9rem; width: 18px; text-align: center; }
.nav-dropdown-divider { height: 1px; background: var(--border); margin: .3rem .8rem; }

.nav-right { display: flex; gap: .4rem; align-items: center; }
.theme-btn {
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text2); width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer; font-size: .95rem; transition: all .2s;
}
.theme-btn:hover { border-color: var(--accent); color: var(--accent); }
.lang-btn {
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text2); padding: .25rem .6rem; border-radius: 6px;
  cursor: pointer; font-family: var(--fm); font-size: .68rem; transition: all .2s;
}
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ═══════════════════════════════════════════
   PAGE SYSTEM  (content loaded via JS into #page-root)
═══════════════════════════════════════════ */
#page-root { padding-top: 56px; min-height: 100vh; }

/* ═══════════════════════════════════════════
   SHARED COMPONENTS
═══════════════════════════════════════════ */
.sec       { padding: 3.5rem 3rem; }
.sec-title { font-family: var(--fh); font-size: 1.75rem; font-weight: 800; letter-spacing: -.03em; margin-bottom: .25rem; color: var(--text); }
.sec-sub   { color: var(--text3); font-family: var(--fm); font-size: .73rem; letter-spacing: .1em; margin-bottom: 2.25rem; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--shadow); transition: all .25s; }
.card:hover { transform: translateY(-3px); border-color: var(--border2); box-shadow: 0 6px 24px rgba(0,0,0,.1); }

.btn         { padding: .6rem 1.4rem; border-radius: 8px; font-family: var(--fh); font-weight: 600; font-size: .85rem; cursor: pointer; border: none; transition: all .2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: .85; transform: translateY(-1px); }
.btn-ghost   { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm      { padding: .35rem .85rem; font-size: .78rem; }

.tag  { background: var(--surface); color: var(--text2); padding: .15rem .5rem; border-radius: 4px; font-family: var(--fm); font-size: .66rem; }
.tags { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .75rem; }

.ctrl-input  {
  background: var(--card); border: 1px solid var(--border2); color: var(--text);
  padding: .42rem .75rem; border-radius: 7px; font-family: var(--fb);
  font-size: .8rem; outline: none; height: 34px; transition: border-color .2s;
}
.ctrl-input:focus { border-color: var(--accent); }
.ctrl-select {
  background: var(--card); border: 1px solid var(--border2); color: var(--text);
  padding: .42rem .7rem; border-radius: 7px; font-size: .8rem;
  cursor: pointer; height: 34px; outline: none;
}

/* Page hero (shared top banner) */
.page-hero       { padding: 2.5rem 3rem 2rem; background: var(--bg2); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
.page-hero-glow  { position: absolute; right: -80px; top: -60px; width: 280px; height: 280px; background: radial-gradient(circle,rgba(91,82,232,.1),transparent 70%); pointer-events: none; }
.page-title      { font-family: var(--fh); font-size: 2.6rem; font-weight: 800; letter-spacing: -.04em; color: var(--text); line-height: 1; }
.page-title span { color: var(--accent); }
.page-desc       { color: var(--text2); max-width: 600px; line-height: 1.75; margin-top: .6rem; font-size: .9rem; }
.page-stats      { display: flex; gap: 2rem; margin-top: 1.4rem; flex-wrap: wrap; }
.pstat-num       { font-family: var(--fh); font-size: 1.75rem; font-weight: 800; color: var(--accent); display: block; }
.pstat-lbl       { font-family: var(--fm); font-size: .63rem; color: var(--text3); letter-spacing: .08em; }

.hero-tag         { font-family: var(--fm); font-size: .72rem; color: var(--accent3); letter-spacing: .15em; margin-bottom: 1.1rem; display: flex; align-items: center; gap: .5rem; }
.hero-tag::before { content: ''; width: 20px; height: 1px; background: var(--accent3); }

.section-divider        { display: flex; align-items: center; gap: .75rem; font-family: var(--fh); font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 1.25rem; }
.section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Animations */
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.fade-up { animation: fadeUp .5s ease forwards; }
.d1{animation-delay:.1s} .d2{animation-delay:.2s} .d3{animation-delay:.3s}
@keyframes blink {0%,100%{opacity:1}50%{opacity:0}}
.cursor { animation: blink 1s step-end infinite; color: var(--accent); }

/* ═══════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════ */
footer {
  background: var(--bg2); border-top: 1px solid var(--border);
  padding: 2rem 3rem; display: flex; justify-content: space-between;
  align-items: center; flex-wrap: wrap; gap: 1rem;
}
.footer-txt  { font-family: var(--fm); font-size: .7rem; color: var(--text3); }
.footer-links { display: flex; gap: 1.25rem; }
.footer-links a {
  color: var(--text3); text-decoration: none;
  font-family: var(--fm); font-size: .7rem; transition: color .2s;
}
.footer-links a:hover { color: var(--accent); }

/* Responsive */
@media(max-width:820px) {
  .sec { padding: 2.5rem 1.5rem; }
  .page-hero { padding: 2rem 1.5rem 1.5rem; }
}

/* ═══════════════════════════════════════════
   HOME PAGE
═══════════════════════════════════════════ */
.hero {
  display: flex; flex-direction: row; align-items: center;
  gap: 4rem; min-height: calc(100vh - 56px);
  padding: 3rem 4rem 2rem; position: relative; overflow: hidden;
}
.hero-grid-bg {
  position: absolute; inset: 0;
  background-image: linear-gradient(var(--border) 1px,transparent 1px),
                    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size: 50px 50px; opacity: .35; pointer-events: none;
}
[data-theme="dark"] .hero-grid-bg { opacity: .2; }
.hero-glow {
  position: absolute; top: -150px; right: -80px; width: 500px; height: 500px;
  background: radial-gradient(circle,rgba(91,82,232,.08),transparent 70%); pointer-events: none;
}
.hero-portrait-wrap { flex-shrink: 0; position: relative; order: -1; }
.hero-portrait-wrap::before {
  content: ''; position: absolute; inset: -16px; border-radius: 32px;
  background: radial-gradient(ellipse at center,rgba(91,82,232,.13) 0%,transparent 70%);
  z-index: -1; pointer-events: none;
}
.hero-portrait {
  display: block; width: 280px; height: 360px;
  object-fit: cover; object-position: center top;
  border-radius: 22px; border: 3px solid var(--border2);
  box-shadow: 0 24px 64px rgba(0,0,0,.18), 0 0 0 1px rgba(91,82,232,.07);
  transition: transform .45s, box-shadow .45s;
}
.hero-portrait:hover {
  transform: translateY(-6px);
  box-shadow: 0 32px 80px rgba(91,82,232,.22), 0 0 0 1px rgba(91,82,232,.15);
}
.hero-text    { flex: 1; min-width: 280px; }
.hero-name    { font-family: var(--fh); font-size: clamp(2.5rem,6vw,4.5rem); font-weight: 800; line-height: .95; letter-spacing: -.04em; margin-bottom: .6rem; }
.hero-name .n1 { color: var(--text); display: block; }
.hero-name .n2 {
  background: linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; display: block;
}
.hero-subtitle      { font-family: var(--fm); font-size: .88rem; color: var(--text2); margin-bottom: .65rem; }
.hero-subtitle span { color: var(--accent); }
.hero-desc          { font-size: .93rem; color: var(--text2); max-width: 480px; line-height: 1.8; margin-bottom: 1.75rem; }
.hero-cta           { display: flex; gap: .7rem; flex-wrap: wrap; }

/* Stats bar */
.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.stat-item  { background: var(--bg2); padding: 1.4rem; text-align: center; }
.stat-num   { font-family: var(--fh); font-size: 1.9rem; font-weight: 800; color: var(--accent); display: block; }
.stat-label { font-size: .7rem; color: var(--text3); font-family: var(--fm); letter-spacing: .08em; margin-top: .2rem; display: block; }

/* Skills */
.skills-grid  { display: grid; grid-template-columns: repeat(auto-fill,minmax(250px,1fr)); gap: 1.2rem; }
.skill-card   { padding: 1.4rem; }
.skill-icon   { font-size: 1.3rem; margin-bottom: .7rem; }
.skill-title  { font-family: var(--fh); font-weight: 700; margin-bottom: .35rem; font-size: .93rem; }
.skill-desc   { color: var(--text2); font-size: .8rem; line-height: 1.65; }

/* Projects */
.proj-grid    { display: grid; grid-template-columns: repeat(auto-fill,minmax(290px,1fr)); gap: 1.2rem; }
.proj-card    { padding: 1.4rem; text-decoration: none; display: block; color: inherit; }
.proj-top     { display: flex; justify-content: space-between; align-items: start; margin-bottom: .8rem; }
.proj-lang    { background: var(--surface); color: var(--text2); padding: .15rem .5rem; border-radius: 4px; font-family: var(--fm); font-size: .66rem; }
.proj-title   { font-family: var(--fh); font-weight: 700; margin-bottom: .35rem; font-size: .93rem; }
.proj-desc    { color: var(--text2); font-size: .8rem; line-height: 1.65; }

/* About */
.about-grid         { display: grid; grid-template-columns: 1fr 1fr; gap: 3.5rem; align-items: start; }
.about-portrait-row { display: flex; align-items: flex-start; gap: 1.75rem; margin-bottom: 1.4rem; }
.about-portrait-col { display: flex; flex-direction: column; align-items: center; gap: .55rem; flex-shrink: 0; }
.about-portrait {
  display: block; width: 136px; height: 136px;
  object-fit: cover; object-position: center top; border-radius: 50%;
  box-shadow: 0 0 0 3px var(--accent), 0 8px 28px rgba(0,0,0,.12);
  transition: transform .3s;
}
.about-portrait:hover { transform: scale(1.06); }
.about-portrait-name { font-family: var(--fm); font-size: .65rem; color: var(--text3); text-align: center; line-height: 1.5; max-width: 136px; }
.about-p             { color: var(--text2); line-height: 1.8; margin-bottom: .85rem; font-size: .9rem; }
.about-p strong      { color: var(--text); }

/* Timeline */
.tl::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(var(--accent),var(--accent2)); border-radius: 2px; }
.tl { position: relative; padding-left: 1.75rem; }
.tl-item { position: relative; margin-bottom: 1.3rem; }
.tl-item::before { content: ''; position: absolute; left: -2rem; top: .3rem; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
.tl-year { font-family: var(--fm); font-size: .7rem; color: var(--accent); margin-bottom: .12rem; }
.tl-ttl  { font-weight: 500; font-size: .86rem; color: var(--text); }
.tl-sub  { color: var(--text3); font-size: .76rem; }

/* Social */
.social-row  { display: flex; gap: .7rem; margin-top: 1.6rem; flex-wrap: wrap; }
.social-link {
  display: flex; align-items: center; gap: .35rem;
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text2); padding: .4rem .85rem; border-radius: 7px;
  text-decoration: none; font-size: .78rem; font-family: var(--fm); transition: all .2s;
}
.social-link:hover { border-color: var(--accent); color: var(--accent); }

@media(max-width:820px) {
  .hero { flex-direction: column; align-items: center; text-align: center; padding: 2.5rem 1.5rem; gap: 2rem; }
  .hero-portrait-wrap { order: 0; }
  .hero-portrait { width: 200px; height: 250px; }
  .hero-cta, .hero-tag { justify-content: center; }
  .about-grid { grid-template-columns: 1fr; }
  .stats-row  { grid-template-columns: repeat(2,1fr); }
}

/* ═══════════════════════════════════════════
   LIEBLINGSPHILOSOPHEN
═══════════════════════════════════════════ */
.favphil-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(320px,1fr)); gap: 1.5rem; }
.favphil-card { border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); transition: all .3s; }
.favphil-card:hover { transform: translateY(-4px); border-color: var(--accent); }
.favphil-header { padding: 1.5rem 1.75rem 1.25rem; position: relative; overflow: hidden; }
.favphil-era    { font-family: var(--fm); font-size: .68rem; letter-spacing: .1em; margin-bottom: .4rem; }
.favphil-name   { font-family: var(--fh); font-size: 1.5rem; font-weight: 800; letter-spacing: -.03em; color: var(--text); line-height: 1; }
.favphil-dates  { font-family: var(--fm); font-size: .72rem; color: var(--text3); margin-top: .2rem; }
.favphil-body   { padding: 0 1.75rem 1.5rem; background: var(--card); }
.favphil-quote  { font-size: .88rem; color: var(--text2); line-height: 1.75; margin-bottom: 1rem; padding: .75rem 1rem; background: var(--bg2); border-radius: 8px; border-left: 3px solid var(--accent); font-style: italic; }
.favphil-desc   { font-size: .84rem; color: var(--text2); line-height: 1.7; margin-bottom: 1rem; }
.favphil-ideas  { list-style: none; display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1rem; }
.favphil-ideas li { font-size: .8rem; color: var(--text2); padding: .4rem .75rem; background: var(--surface); border-radius: 6px; border-left: 2px solid var(--accent); }
.favphil-why      { padding: .75rem 1rem; background: var(--bg2); border-radius: 8px; }
.favphil-why-label { font-family: var(--fm); font-size: .65rem; color: var(--accent3); letter-spacing: .1em; margin-bottom: .3rem; }
.favphil-why-text  { font-size: .8rem; color: var(--text2); line-height: 1.65; }

/* ═══════════════════════════════════════════
   ZITATE
═══════════════════════════════════════════ */
.zitat-hero      { padding: 3.5rem 3rem 2.5rem; background: linear-gradient(135deg,var(--bg2),var(--bg)); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
.zitat-hero-glow { position: absolute; right: -60px; top: -60px; width: 320px; height: 320px; background: radial-gradient(circle,rgba(232,82,122,.1),transparent 70%); pointer-events: none; }

.zitat-motto        { background: var(--card); border: 1px solid var(--border); border-left: 5px solid var(--accent); border-radius: 0 var(--r) var(--r) 0; padding: 2rem 2.5rem; margin: 2rem 3rem; max-width: 800px; box-shadow: var(--shadow); position: relative; }
.zitat-motto::before { content: '\201C'; position: absolute; top: -10px; left: 20px; font-family: var(--fh); font-size: 5rem; font-weight: 800; color: var(--accent); opacity: .15; line-height: 1; }
.zitat-motto-text    { font-family: var(--fh); font-size: 1.05rem; font-weight: 600; color: var(--text); line-height: 1.7; margin-bottom: .75rem; padding-top: .25rem; }
.zitat-motto-source  { font-family: var(--fm); font-size: .72rem; color: var(--accent); letter-spacing: .05em; }
.zitat-motto-context { font-size: .82rem; color: var(--text3); margin-top: .5rem; font-style: italic; }

.zitat-filter { display: flex; gap: .4rem; flex-wrap: wrap; padding: 1.25rem 3rem 0; }
.zf-btn       { background: var(--surface); border: 1px solid var(--border); color: var(--text2); padding: .3rem .8rem; border-radius: 20px; cursor: pointer; font-size: .76rem; font-family: var(--fm); transition: all .15s; }
.zf-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.zitat-masonry { columns: 2; column-gap: 1.5rem; padding: 2rem 3rem 4rem; }
@media(max-width:700px) { .zitat-masonry { columns: 1; } }

.zitat-card         { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 1.65rem; margin-bottom: 1.5rem; break-inside: avoid; box-shadow: var(--shadow); transition: all .25s; position: relative; }
.zitat-card:hover   { transform: translateY(-3px); border-color: var(--border2); }
.zitat-card::before { content: '\201C'; position: absolute; top: .5rem; left: 1.1rem; font-family: var(--fh); font-size: 3.5rem; font-weight: 800; color: var(--accent); opacity: .12; line-height: 1; }

.zitat-kat          { display: inline-block; background: var(--surface); color: var(--text3); padding: .13rem .45rem; border-radius: 4px; font-size: .63rem; font-family: var(--fm); margin-top: .55rem; }

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */

.tshirt-sub    { font-family: var(--fm); font-size: .7rem; margin-bottom: .45rem; }
.tshirt-desc   { font-size: .78rem; color: var(--text2); line-height: 1.6; }

/* ═══════════════════════════════════════════
   PHILOSOPHER TIMELINE
═══════════════════════════════════════════ */

.phil-glow      { position: absolute; left: 50%; top: -100px; transform: translateX(-50%); width: 400px; height: 300px; background: radial-gradient(ellipse,rgba(91,82,232,.1),transparent 70%); pointer-events: none; }

.phil-controls  { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; padding: .9rem 3rem; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 56px; z-index: 90; }
.phil-zoom-btns { display: flex; gap: .3rem; }
.phil-zoom-btn  { background: var(--surface); border: 1px solid var(--border); color: var(--text2); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: .85rem; display: flex; align-items: center; justify-content: center; transition: all .15s; }

.epoch-btns { display: flex; gap: .35rem; flex-wrap: wrap; flex: 1; }
.epoch-btn  { background: var(--surface); border: 1px solid var(--border); color: var(--text2); padding: .28rem .65rem; border-radius: 16px; cursor: pointer; font-size: .72rem; font-family: var(--fm); transition: all .2s; white-space: nowrap; }
.epoch-btn.active { color: #fff; border-color: transparent; }

.tl-scroll-wrap { overflow-x: auto; cursor: grab; user-select: none; padding: 0 0 1rem; }
.tl-scroll-wrap:active { cursor: grabbing; }
.tl-inner  { position: relative; height: 480px; }
.tl-axis   { position: absolute; left: 0; right: 0; top: 240px; height: 2px; background: linear-gradient(90deg,var(--accent),var(--accent2)); }
.tl-node   { position: absolute; cursor: pointer; transition: opacity .3s; }
.tl-dot    { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg); position: absolute; left: 50%; transform: translateX(-50%); transition: all .2s; z-index: 2; }
.tl-node:hover .tl-dot { width: 16px; height: 16px; margin-top: -3px; }
.tl-line   { position: absolute; left: 50%; width: 1px; background: var(--border2); }
.tl-card   { position: absolute; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .55rem .8rem; width: 130px; text-align: center; transition: all .2s; box-shadow: var(--shadow); }

.tl-card-dates { font-family: var(--fm); font-size: .6rem; color: var(--text3); }
.tl-yr         { position: absolute; top: 250px; font-family: var(--fm); font-size: .62rem; color: var(--text3); transform: translateX(-50%); }
.tl-yr-major   { font-size: .68rem; color: var(--text2); font-weight: 500; }

/* Phil modal */
.phil-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(5px); z-index: 700; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
.phil-modal-overlay.open { display: flex; }
.phil-modal-box    { background: var(--card); border: 1px solid var(--border2); border-radius: 18px; padding: 2rem 2.25rem; max-width: 560px; width: 100%; max-height: 82vh; overflow-y: auto; position: relative; box-shadow: 0 24px 64px rgba(0,0,0,.22); }
.phil-modal-close  { position: absolute; top: 1rem; right: 1rem; background: var(--surface); border: none; color: var(--text2); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; transition: all .2s; font-size: .9rem; }
.phil-modal-close:hover { background: var(--accent); color: #fff; }
.phil-modal-epoch  { font-family: var(--fm); font-size: .7rem; letter-spacing: .1em; margin-bottom: .35rem; }
.phil-modal-name   { font-family: var(--fh); font-size: 1.85rem; font-weight: 800; letter-spacing: -.03em; color: var(--text); margin-bottom: .15rem; }
.phil-modal-dates  { font-family: var(--fm); font-size: .75rem; color: var(--text3); margin-bottom: 1.1rem; }
.phil-modal-desc   { color: var(--text2); line-height: 1.8; font-size: .87rem; margin-bottom: 1.25rem; }
.phil-ideas        { list-style: none; display: flex; flex-direction: column; gap: .35rem; }
.phil-ideas li     { background: var(--surface); border-radius: 6px; padding: .5rem .85rem; font-size: .82rem; color: var(--text2); border-left: 3px solid var(--accent); }

/* ═══════════════════════════════════════════
   DISSERTATION
═══════════════════════════════════════════ */

.diss-hero-glow { position: absolute; right: -60px; top: -80px; width: 360px; height: 360px; background: radial-gradient(circle,rgba(91,82,232,.12),transparent 70%); pointer-events: none; }

/* Wordclouds */
.wc-grid      { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 1.4rem; padding: 0 3rem 2.5rem; }
.wc-card      { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); transition: all .3s; }

.pe-key   { display: inline-block; background: var(--surface); color: var(--accent); padding: .13rem .45rem; border-radius: 4px; font-family: var(--fm); font-size: .66rem; margin-top: .65rem; }

.pe-chips  { display: flex; gap: .65rem; flex-wrap: wrap; }

═══════════════════════════════════════════ */
.pod-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(275px,1fr)); gap: 1.2rem; }
.pod-card { padding: 1.4rem; display: flex; gap: .9rem; align-items: start; }
.pod-icon { width: 50px; height: 50px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.35rem; flex-shrink: 0; }
.pod-name { font-family: var(--fh); font-weight: 700; font-size: .9rem; color: var(--text); margin-bottom: .18rem; }
.pod-host { color: var(--text3); font-size: .73rem; font-family: var(--fm); margin-bottom: .35rem; }
.pod-desc { color: var(--text2); font-size: .78rem; line-height: 1.6; }

/* ═══════════════════════════════════════════
   GAMING
═══════════════════════════════════════════ */
.gaming-hero-area { padding: 3rem 3rem 1.75rem; background: var(--bg2); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
.gaming-hero-glow { position: absolute; right: -60px; top: -60px; width: 300px; height: 300px; background: radial-gradient(circle,rgba(34,197,94,.1),transparent 70%); pointer-events: none; }

.g-tabs { display: flex; gap: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin: .65rem 3rem .5rem; width: fit-content; flex-wrap: wrap; }
.gtab   { padding: .55rem 1rem; background: transparent; border: none; color: var(--text2); cursor: pointer; font-family: var(--fh); font-size: .76rem; font-weight: 600; transition: all .2s; border-right: 1px solid var(--border); white-space: nowrap; }
.gtab:last-child { border-right: none; }
.gtab.active { background: var(--accent); color: #fff; }
.gtab:hover:not(.active) { background: var(--bg3); color: var(--text); }

.g-section        { display: none; padding: 1.75rem 3rem 3rem; }
.g-section.active { display: block; }
.game-grid        { display: grid; grid-template-columns: repeat(auto-fill,minmax(290px,1fr)); gap: 1.4rem; }
.game-card        { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); transition: all .3s; }
.game-card:hover  { transform: translateY(-4px); border-color: var(--border2); box-shadow: 0 12px 32px rgba(0,0,0,.1); }
.game-card-cover-wrap { overflow: hidden; height: 155px; }
.game-card-cover       { width: 100%; height: 155px; object-fit: cover; display: block; transition: transform .4s; }
.game-card:hover .game-card-cover { transform: scale(1.04); }
.game-card-cover-placeholder { width: 100%; height: 155px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; background: linear-gradient(135deg,var(--bg3),var(--surface)); }
.game-card-body  { padding: 1.1rem 1.25rem; }
.game-badge      { display: inline-block; padding: .13rem .5rem; border-radius: 4px; font-size: .63rem; font-weight: 700; font-family: var(--fm); margin-bottom: .55rem; letter-spacing: .04em; }
.game-card-title { font-family: var(--fh); font-weight: 700; margin-bottom: .35rem; font-size: .92rem; color: var(--text); }
.game-card-text  { color: var(--text2); font-size: .8rem; line-height: 1.65; }

/* Neon Noir CSS — scoped to html[data-style="neon-noir"] */

/* ═══════════════════════════════════════════════════════
   DESIGN SYSTEM — "NEON NOIR"

   Light mode = dunkles Blaugrau (deutlich heller als Dark)
   Dark mode  = fast-Schwarz mit starken Neons

   Differenz Light↔Dark ist jetzt klar sichtbar.
═══════════════════════════════════════════════════════ */

html[data-style="neon-noir"] {
  /* ── Backgrounds: dunkles Mitternachtsblau (NICHT fast-schwarz) */
  --bg:       #1a1f2e;
  --bg2:      #232940;
  --bg3:      #2c3452;
  --surface:  #2c3452;
  --surface2: #36406a;

  /* ── Neon accents (etwas gedämpfter im Light-Mode) */
  --accent:   #f5c842;
  --accent2:  #e84aaa;
  --accent3:  #3dd8b8;
  --accent4:  #9f7af5;

  --glow-accent:  rgba(245,200,66,.30);
  --glow-accent2: rgba(232,74,170,.30);
  --glow-accent3: rgba(61,216,184,.25);
  --glow-accent4: rgba(159,122,245,.25);

  /* ── Text (etwas wärmer im Light-Mode) */
  --text:  #eceaf4;
  --text2: #9aa2bc;
  --text3: #5a6480;

  /* ── Borders (leicht sichtbarer im Light-Mode) */
  --border:  rgba(255,255,255,.10);
  --border2: rgba(255,255,255,.18);

  /* ── Cards */
  --card:         rgba(35,41,64,.90);
  --card-glass:   rgba(255,255,255,.05);
  --card-border:  rgba(255,255,255,.12);
  --shadow:       0 4px 24px rgba(0,0,0,.35);
  --shadow-hover: 0 8px 48px rgba(0,0,0,.50);

  /* ── Typography */
  --fh: 'Syne', sans-serif;
  --fb: 'DM Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;

  --r: 16px;
  --r-sm: 10px;

  --grad-accent:  linear-gradient(135deg, #f5c842, #e84aaa);
  --grad-accent2: linear-gradient(135deg, #3dd8b8, #9f7af5);
  --grad-text:    linear-gradient(135deg, #f5c842 0%, #e84aaa 50%, #9f7af5 100%);
}

/* Dark mode = echtes Schwarz, stärkere Neons, maximaler Kontrast */
html[data-style="neon-noir"][data-theme="dark"] {
  --bg:       #000000;
  --bg2:      #07090f;
  --bg3:      #0d1020;
  --surface:  #0d1020;
  --surface2: #141929;

  --accent:   #ffd040;
  --accent2:  #ff40b0;
  --accent3:  #40ffcc;
  --accent4:  #b090ff;

  --glow-accent:  rgba(255,208,64,.50);
  --glow-accent2: rgba(255,64,176,.50);
  --glow-accent3: rgba(64,255,204,.42);
  --glow-accent4: rgba(176,144,255,.42);

  --text:  #ffffff;
  --text2: #8090aa;
  --text3: #384050;

  --border:  rgba(255,255,255,.05);
  --border2: rgba(255,255,255,.09);

  --card:         rgba(7,9,15,.92);
  --card-glass:   rgba(255,255,255,.03);
  --card-border:  rgba(255,255,255,.07);
  --shadow:       0 4px 32px rgba(0,0,0,.75);
  --shadow-hover: 0 8px 60px rgba(0,0,0,.90);
}


/* ═══════════════════════════════════════════
   BASE ALT — Neon Noir
═══════════════════════════════════════════ */
html[data-style="neon-noir"],
html[data-style="neon-noir"] *::before,
html[data-style="neon-noir"] *::after { box-sizing: border-box; margin: 0; padding: 0; }
html[data-style="neon-noir"] { scroll-behavior: smooth; font-size: 16px; }
html[data-style="neon-noir"] {
  background: var(--bg);
  color: var(--text);
  font-family: var(--fb);
  overflow-x: hidden;
  transition: background .4s, color .4s;
}
html[data-style="neon-noir"] /* Scanline texture overlay — subtle */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.03) 2px,
    rgba(0,0,0,.03) 4px
  );
}
html[data-style="neon-noir"][data-theme="dark"] body::before { opacity: .6; }
html[data-style="neon-noir"] /* ── NAV ────────────────────────────────── */
html[data-style="neon-noir"] nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  height: 60px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 2rem;
  background: rgba(15,17,23,.85);
  backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  transition: background .4s;
}
html[data-style="neon-noir"][data-theme="dark"] nav {
  background: rgba(0,0,0,.88);
}
html[data-style="neon-noir"] .nav-logo {
  font-family: var(--fh); font-size: 1.15rem; font-weight: 800;
  color: var(--text); text-decoration: none; letter-spacing: -.01em;
  cursor: pointer; flex-shrink: 0; position: relative;
}
html[data-style="neon-noir"] .nav-logo span {
  background: var(--grad-accent);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
html[data-style="neon-noir"] .nav-groups { display: flex; gap: 0; list-style: none; align-items: center; }
html[data-style="neon-noir"] .nav-group { position: relative; }
html[data-style="neon-noir"] .nav-group-btn {
  background: none; border: none; color: var(--text2);
  font-family: var(--fm); font-size: .72rem; letter-spacing: .04em;
  padding: .32rem .75rem; border-radius: 6px;
  cursor: pointer; display: flex; align-items: center; gap: .3rem;
  transition: all .2s; white-space: nowrap; text-transform: uppercase;
}
html[data-style="neon-noir"] .nav-group-btn:hover,
html[data-style="neon-noir"] .nav-group-btn.group-active {
  color: var(--accent);
  text-shadow: 0 0 12px var(--glow-accent);
}
html[data-style="neon-noir"] .nav-group-btn .arr { font-size: .5rem; opacity: .4; transition: transform .2s; }
html[data-style="neon-noir"] .nav-group:hover .arr { transform: rotate(180deg); }
html[data-style="neon-noir"] .nav-direct {
  background: none; border: none; color: var(--text2);
  font-family: var(--fm); font-size: .72rem; letter-spacing: .04em;
  text-transform: uppercase;
  padding: .32rem .75rem; border-radius: 6px;
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
html[data-style="neon-noir"] .nav-direct:hover,
html[data-style="neon-noir"] .nav-direct.active {
  color: var(--accent);
  text-shadow: 0 0 12px var(--glow-accent);
}
html[data-style="neon-noir"] /* Dropdown */
.nav-dropdown {
  position: absolute; top: 100%; left: 0;
  min-width: 230px;
  background: rgba(15,17,23,.95);
  backdrop-filter: blur(24px);
  border: 1px solid var(--border2);
  border-radius: 12px;
  box-shadow: 0 16px 48px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.07);
  opacity: 0; pointer-events: none;
  transform: translateY(-6px) scale(.98);
  transition: opacity .2s, transform .2s; z-index: 600;
  padding-top: 8px;
}
html[data-style="neon-noir"][data-theme="dark"] .nav-dropdown {
  background: rgba(0,0,0,.96);
}
html[data-style="neon-noir"] .nav-group::after {
  content: ''; display: block; position: absolute;
  top: 100%; left: 0; width: 100%; height: 12px; background: transparent;
}
html[data-style="neon-noir"] .nav-group:hover .nav-dropdown,
html[data-style="neon-noir"] .nav-group.open .nav-dropdown {
  opacity: 1; pointer-events: all; transform: translateY(0) scale(1);
}
html[data-style="neon-noir"] .nav-dropdown-item {
  display: flex; align-items: center; gap: .65rem;
  padding: .65rem 1rem; cursor: pointer;
  font-family: var(--fm); font-size: .72rem;
  letter-spacing: .03em; text-transform: uppercase;
  color: var(--text2); transition: all .15s;
  border-radius: 8px; margin: .15rem .3rem;
}
html[data-style="neon-noir"] .nav-dropdown-item:hover {
  background: rgba(240,192,64,.08);
  color: var(--accent);
  text-shadow: 0 0 10px var(--glow-accent);
}

/* ═══════════════════════════════════════════════════════
   BRUTALIST EDITORIAL
   Scoped to html[data-style="brutalist"]

   Concept: Swiss/International Typographic Style meets
   digital brutalism. Bold structure, sharp edges,
   high-contrast, magazine-grid aesthetic.

   Light: stark white + jet black + one signal colour (red)
   Dark:  jet black + off-white + electric red
═══════════════════════════════════════════════════════ */

/* ── Variables ────────────────────────────────────────── */
html[data-style="brutalist"] {
  --bg:       #f5f5f0;
  --bg2:      #ebebе4;
  --bg3:      #ddddd6;
  --surface:  #e4e4dc;
  --surface2: #d5d5cc;

  --accent:   #d42b2b;   /* signal red    */
  --accent2:  #1a1a1a;   /* near-black    */
  --accent3:  #d42b2b;
  --accent4:  #d42b2b;

  --glow-accent:  rgba(212,43,43,.2);
  --glow-accent2: rgba(26,26,26,.15);
  --glow-accent3: rgba(212,43,43,.2);
  --glow-accent4: rgba(212,43,43,.2);

  --text:  #0a0a08;
  --text2: #3a3a36;
  --text3: #8a8a82;

  --border:  #c8c8c0;
  --border2: #a0a098;

  --card:         #ffffff;
  --card-glass:   #ffffff;
  --card-border:  #0a0a08;
  --shadow:       4px 4px 0 #0a0a08;
  --shadow-hover: 6px 6px 0 #d42b2b;

  --fh: 'Syne', sans-serif;
  --fb: 'DM Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --r:    0px;   /* NO border radius — brutalist */
  --r-sm: 0px;

  --grad-accent:  linear-gradient(90deg, #d42b2b, #8b0000);
  --grad-accent2: linear-gradient(90deg, #0a0a08, #3a3a36);
  --grad-text:    linear-gradient(90deg, #d42b2b, #0a0a08);
}

html[data-style="brutalist"][data-theme="dark"] {
  --bg:       #0a0a08;
  --bg2:      #111110;
  --bg3:      #1a1a18;
  --surface:  #1a1a18;
  --surface2: #222220;

  --accent:   #ff3333;
  --accent2:  #f0ede8;
  --accent3:  #ff3333;
  --accent4:  #ff3333;

  --glow-accent:  rgba(255,51,51,.3);
  --glow-accent2: rgba(240,237,232,.1);
  --glow-accent3: rgba(255,51,51,.3);
  --glow-accent4: rgba(255,51,51,.3);

  --text:  #f0ede8;
  --text2: #b0ada8;
  --text3: #606060;

  --border:  #2a2a28;
  --border2: #3a3a38;

  --card:         #111110;
  --card-glass:   #111110;
  --card-border:  #f0ede8;
  --shadow:       4px 4px 0 #f0ede8;
  --shadow-hover: 6px 6px 0 #ff3333;
}

/* ── Global overrides ─────────────────────────────────── */
html[data-style="brutalist"] body {
  background: var(--bg);
  color: var(--text);
}

/* ── NAV ─────────────────────────────────────────────── */
html[data-style="brutalist"] nav {
  background: var(--bg);
  border-bottom: 3px solid var(--text);
  backdrop-filter: none;
  height: 56px;
}
html[data-style="brutalist"] .nav-logo {
  font-family: var(--fh);
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: .02em;
  text-transform: uppercase;
}
html[data-style="brutalist"] .nav-logo span {
  color: var(--accent);
  background: none;
  -webkit-text-fill-color: var(--accent);
}
html[data-style="brutalist"] .nav-group-btn,
html[data-style="brutalist"] .nav-direct {
  font-family: var(--fm);
  font-size: .7rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text2);
}
html[data-style="brutalist"] .nav-group-btn:hover,
html[data-style="brutalist"] .nav-group-btn.group-active,
html[data-style="brutalist"] .nav-direct:hover,
html[data-style="brutalist"] .nav-direct.active {
  color: var(--accent);
  background: none;
  text-shadow: none;
  text-decoration: underline;
  text-decoration-thickness: 2px;
  text-underline-offset: 3px;
}
html[data-style="brutalist"] .nav-dropdown {
  border-radius: 0;
  border: 2px solid var(--text);
  backdrop-filter: none;
  background: var(--bg);
  box-shadow: 4px 4px 0 var(--text);
}
html[data-style="brutalist"] .nav-dropdown-item {
  font-family: var(--fm);
  font-size: .7rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  border-radius: 0;
}
html[data-style="brutalist"] .nav-dropdown-item:hover {
  background: var(--text);
  color: var(--bg);
}
html[data-style="brutalist"] .theme-btn,
html[data-style="brutalist"] .lang-btn {
  border-radius: 0;
  border: 2px solid var(--text);
  background: var(--bg);
  color: var(--text);
  font-family: var(--fm);
  font-size: .65rem;
}
html[data-style="brutalist"] .theme-btn:hover,
html[data-style="brutalist"] .lang-btn:hover {
  background: var(--text);
  color: var(--bg);
  box-shadow: none;
  border-color: var(--text);
}

/* ── CARDS ────────────────────────────────────────────── */
html[data-style="brutalist"] .card {
  border-radius: 0;
  border: 2px solid var(--card-border);
  background: var(--card);
  box-shadow: var(--shadow);
  backdrop-filter: none;
}
html[data-style="brutalist"] .card:hover {
  transform: translate(-2px, -2px);
  box-shadow: var(--shadow-hover);
  border-color: var(--accent);
}

/* ── BUTTONS ──────────────────────────────────────────── */
html[data-style="brutalist"] .btn {
  border-radius: 0;
  letter-spacing: .08em;
  text-transform: uppercase;
  font-size: .8rem;
}
html[data-style="brutalist"] .btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 3px 3px 0 var(--text);
}
html[data-style="brutalist"] .btn-primary:hover {
  transform: translate(-2px, -2px);
  box-shadow: 5px 5px 0 var(--text);
}
html[data-style="brutalist"] .btn-ghost {
  background: transparent;
  color: var(--text);
  border: 2px solid var(--text);
  box-shadow: 3px 3px 0 var(--text);
}
html[data-style="brutalist"] .btn-ghost:hover {
  background: var(--text);
  color: var(--bg);
  box-shadow: 5px 5px 0 var(--accent);
}

/* ── PAGE HERO ────────────────────────────────────────── */
html[data-style="brutalist"] .page-hero {
  border-bottom: 3px solid var(--text);
  background: var(--bg);
}
html[data-style="brutalist"] .page-title {
  font-size: 3.5rem;
  letter-spacing: -.05em;
}
html[data-style="brutalist"] .page-title span {
  color: var(--accent);
  text-shadow: none;
}
html[data-style="brutalist"] .hero-tag {
  color: var(--accent);
  text-shadow: none;
  letter-spacing: .2em;
}
html[data-style="brutalist"] .hero-tag::before {
  background: var(--accent);
  box-shadow: none;
}
html[data-style="brutalist"] .pstat-num {
  color: var(--accent);
  background: none;
  -webkit-text-fill-color: var(--accent);
}

/* ── SECTION DIVIDERS ─────────────────────────────────── */
html[data-style="brutalist"] .section-divider {
  font-size: 1.3rem;
  letter-spacing: .05em;
  text-transform: uppercase;
  font-weight: 800;
  border-bottom: 3px solid var(--text);
  padding-bottom: .4rem;
}
html[data-style="brutalist"] .section-divider::after {
  display: none;
}
html[data-style="brutalist"] .sec-title {
  text-transform: uppercase;
  letter-spacing: .02em;
}
html[data-style="brutalist"] .sec-sub {
  letter-spacing: .15em;
}

/* ── TAGS ─────────────────────────────────────────────── */
html[data-style="brutalist"] .tag {
  border-radius: 0;
  border: 1px solid var(--text);
  background: transparent;
  color: var(--text2);
  font-size: .65rem;
  letter-spacing: .06em;
  text-transform: uppercase;
}

/* ── INPUTS ───────────────────────────────────────────── */
html[data-style="brutalist"] .ctrl-input,
html[data-style="brutalist"] .ctrl-select {
  border-radius: 0;
  border: 2px solid var(--border2);
  background: var(--bg);
}
html[data-style="brutalist"] .ctrl-input:focus {
  border-color: var(--accent);
  box-shadow: 2px 2px 0 var(--accent);
}

/* ── HOME HERO ────────────────────────────────────────── */
html[data-style="brutalist"] .hero-name .n1 { color: var(--text); }
html[data-style="brutalist"] .hero-name .n2 {
  color: var(--accent);
  background: none;
  -webkit-text-fill-color: var(--accent);
  filter: none;
}
html[data-style="brutalist"] .cursor { color: var(--accent); text-shadow: none; }
html[data-style="brutalist"] .hero-portrait-wrap::before { display: none; }
html[data-style="brutalist"] .hero-portrait-wrap::after  { display: none; }
html[data-style="brutalist"] .hero-portrait {
  border-radius: 0;
  border: 3px solid var(--text);
  box-shadow: 8px 8px 0 var(--text);
  filter: none;
}
html[data-style="brutalist"] .hero-portrait:hover {
  box-shadow: 12px 12px 0 var(--accent);
  transform: translate(-3px, -3px);
}
html[data-style="brutalist"] .hero-grid-bg,
html[data-style="brutalist"] .hero-glow { display: none; }
/* Replace grid bg with brutalist rule lines */
html[data-style="brutalist"] .hero::before {
  content: '';
  position: absolute;
  left: 0; right: 0; top: 0; height: 3px;
  background: var(--accent);
  z-index: 0;
}
html[data-style="brutalist"] .stat-item { border-right: 2px solid var(--text); }
html[data-style="brutalist"] .stat-num {
  color: var(--accent);
  background: none;
  -webkit-text-fill-color: var(--accent);
}
html[data-style="brutalist"] .stats-row {
  border-top: 3px solid var(--text);
  border-bottom: 3px solid var(--text);
  background: var(--border);
}
html[data-style="brutalist"] .social-link {
  border-radius: 0;
  border: 2px solid var(--text2);
}
html[data-style="brutalist"] .social-link:hover {

/* ═══════════════════════════════════════════════════════
   SOFT & ELEGANT
   Scoped to html[data-style="elegant"]

   Concept: Art catalogue meets Swiss editorial.
   Warm crème paper, deep charcoal, brushed gold accents.
   Generous whitespace, refined serif-inspired headings.

   Light: warm crème + charcoal + gold
   Dark:  deep warm charcoal + cream + gold
═══════════════════════════════════════════════════════ */

html[data-style="elegant"] {
  --bg:       #f9f6f0;
  --bg2:      #f2ede4;
  --bg3:      #e8e1d6;
  --surface:  #ede8de;
  --surface2: #e0d9cc;

  --accent:   #b8943f;
  --accent2:  #8a6820;
  --accent3:  #c8a855;
  --accent4:  #6b4f1a;

  --glow-accent:  rgba(184,148,63,.25);
  --glow-accent2: rgba(138,104,32,.2);
  --glow-accent3: rgba(200,168,85,.2);
  --glow-accent4: rgba(107,79,26,.2);

  --text:  #1c1a16;
  --text2: #4a4640;
  --text3: #9a9288;

  --border:  #d8d0c4;
  --border2: #c4bab0;

  --card:         #fefcf8;
  --card-glass:   rgba(254,252,248,.9);
  --card-border:  #d8d0c4;
  --shadow:       0 2px 16px rgba(28,26,22,.08), 0 1px 4px rgba(28,26,22,.05);
  --shadow-hover: 0 8px 32px rgba(184,148,63,.2), 0 2px 8px rgba(28,26,22,.08);

  --fh: 'Syne', sans-serif;
  --fb: 'DM Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --r:    10px;
  --r-sm: 6px;

  --grad-accent:  linear-gradient(135deg, #c8a855, #8a6820);
  --grad-accent2: linear-gradient(135deg, #b8943f, #6b4f1a);
  --grad-text:    linear-gradient(135deg, #c8a855 0%, #8a6820 100%);
}

html[data-style="elegant"][data-theme="dark"] {
  --bg:       #1c1a16;
  --bg2:      #252220;
  --bg3:      #2e2a26;
  --surface:  #2e2a26;
  --surface2: #383430;

  --accent:   #d4a84a;
  --accent2:  #f0c870;
  --accent3:  #b8943f;
  --accent4:  #e8b855;

  --glow-accent:  rgba(212,168,74,.35);
  --glow-accent2: rgba(240,200,112,.3);
  --glow-accent3: rgba(184,148,63,.3);
  --glow-accent4: rgba(232,184,85,.3);

  --text:  #f0ece4;
  --text2: #b0a898;
  --text3: #706860;

  --border:  #3a3630;
  --border2: #4a4640;

  --card:         #252220;
  --card-glass:   rgba(37,34,32,.92);
  --card-border:  #3a3630;
  --shadow:       0 4px 24px rgba(0,0,0,.35);
  --shadow-hover: 0 8px 40px rgba(212,168,74,.3), 0 4px 12px rgba(0,0,0,.2);
}

/* Global */
html[data-style="elegant"] body { background: var(--bg); color: var(--text); }

/* NAV */
html[data-style="elegant"] nav {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}
html[data-style="elegant"] .nav-logo { font-weight: 800; letter-spacing: .02em; }
html[data-style="elegant"] .nav-logo span {
  background: var(--grad-accent);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
html[data-style="elegant"] .nav-group-btn:hover,
html[data-style="elegant"] .nav-group-btn.group-active,
html[data-style="elegant"] .nav-direct:hover,
html[data-style="elegant"] .nav-direct.active { color: var(--accent); text-shadow: none; }
html[data-style="elegant"] .nav-dropdown {
  border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 32px rgba(28,26,22,.12);
  background: var(--card);
}
html[data-style="elegant"] .nav-dropdown-item:hover { background: var(--surface); color: var(--accent); }
html[data-style="elegant"] .theme-btn,
html[data-style="elegant"] .lang-btn { border-color: var(--border2); }
html[data-style="elegant"] .theme-btn:hover,
html[data-style="elegant"] .lang-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: none; }

/* Cards */
html[data-style="elegant"] .card {
  background: var(--card); border: 1px solid var(--card-border); border-radius: var(--r);
  box-shadow: var(--shadow); backdrop-filter: none;
}
html[data-style="elegant"] .card:hover {
  transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--accent);
}

/* Buttons */
html[data-style="elegant"] .btn { border-radius: 6px; }
html[data-style="elegant"] .btn-primary {
  background: var(--grad-accent); color: var(--bg);
  font-weight: 700; box-shadow: 0 4px 16px var(--glow-accent);
}
html[data-style="elegant"] .btn-primary:hover { box-shadow: 0 6px 24px var(--glow-accent); }
html[data-style="elegant"] .btn-ghost { border: 1px solid var(--border2); }
html[data-style="elegant"] .btn-ghost:hover { border-color: var(--accent); color: var(--accent); box-shadow: none; }

/* Hero */
html[data-style="elegant"] .hero-name .n1 { color: var(--text); }
html[data-style="elegant"] .hero-name .n2 {
  background: var(--grad-text);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
html[data-style="elegant"] .cursor { color: var(--accent); text-shadow: none; animation: blink 1.2s step-end infinite; }
html[data-style="elegant"] .hero-tag { color: var(--accent); text-shadow: none; letter-spacing: .18em; }
html[data-style="elegant"] .hero-tag::before { background: var(--accent); box-shadow: none; }
html[data-style="elegant"] .hero-portrait-wrap::before { background: radial-gradient(ellipse, rgba(184,148,63,.15), transparent 70%); }
html[data-style="elegant"] .hero-portrait-wrap::after { display: none; }
html[data-style="elegant"] .hero-portrait {
  border: 2px solid var(--accent); border-radius: 16px;
  box-shadow: 0 8px 32px rgba(184,148,63,.2);
}
html[data-style="elegant"] .hero-portrait:hover { box-shadow: 0 16px 48px rgba(184,148,63,.3); }
html[data-style="elegant"] .stat-num { background: var(--grad-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
html[data-style="elegant"] .stats-row { background: var(--bg2); border-color: var(--border); }
html[data-style="elegant"] .stat-item:hover { background: var(--surface); }
html[data-style="elegant"] .social-link { border-color: var(--border2); border-radius: 6px; }
html[data-style="elegant"] .social-link:hover { border-color: var(--accent); color: var(--accent); box-shadow: none; background: var(--surface); }
html[data-style="elegant"] .tl-item::before { background: var(--accent); box-shadow: 0 0 6px var(--glow-accent); }
html[data-style="elegant"] .tl-year { color: var(--accent); }
html[data-style="elegant"] .tl::before { background: linear-gradient(var(--accent), var(--accent2)); }
html[data-style="elegant"] .about-portrait {
  border: 2px solid var(--accent);
  box-shadow: 0 4px 16px var(--glow-accent);
  background: linear-gradient(var(--bg2),var(--bg2)) padding-box, var(--grad-accent) border-box;
}

/* Sections */
html[data-style="elegant"] .pstat-num { background: var(--grad-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
html[data-style="elegant"] .sec-title { color: var(--text); }
html[data-style="elegant"] .section-divider { color: var(--text); }
html[data-style="elegant"] .section-divider::after { background: linear-gradient(90deg, var(--border2), transparent); }
html[data-style="elegant"] .page-title span { color: var(--accent); text-shadow: none; }
html[data-style="elegant"] .page-hero-glow { background: radial-gradient(circle, rgba(184,148,63,.12), transparent 70%); }
html[data-style="elegant"] .hero-tag { color: var(--accent); text-shadow: none; }

/* Tags */
html[data-style="elegant"] .tag { border: 1px solid var(--border); background: var(--bg3); border-radius: 4px; }

/* Inputs */
html[data-style="elegant"] .ctrl-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--glow-accent); }
html[data-style="elegant"] .ctrl-input,
html[data-style="elegant"] .ctrl-select { border-radius: 6px; }

/* Zitate */
html[data-style="elegant"] .zitat-author { color: var(--accent); text-shadow: none; }
html[data-style="elegant"] .zitat-card { border-radius: var(--r); border-color: var(--border); }
html[data-style="elegant"] .zitat-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }

html[data-style="elegant"] .game-card { border: 1px solid var(--border); border-radius: var(--r); }

html[data-style="elegant"] .gtab.active { background: var(--grad-accent); color: var(--bg); }

html[data-style="elegant"] .pod-card2:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="elegant"] .pod-cat-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

/* Natur */
html[data-style="elegant"] .nature-card { border: 1px solid var(--border); border-radius: var(--r); }
html[data-style="elegant"] .nature-card:hover { box-shadow: var(--shadow-hover); }
html[data-style="elegant"] .nature-cat-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); box-shadow: none; }

/* Studium/Bücher */
html[data-style="elegant"] .sort-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
html[data-style="elegant"] .ff-btn { border-radius: 4px; }

/* Diss */
html[data-style="elegant"] .diss-meta-badge.accent { background: var(--accent); border-color: var(--accent); color: var(--bg); }
html[data-style="elegant"] .diss-stat-num { background: var(--grad-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
html[data-style="elegant"] .diss-abstract { border-left-color: var(--accent); }
html[data-style="elegant"] .diss-abstract-label { color: var(--accent); }
html[data-style="elegant"] .toc-num { color: var(--accent); }

html[data-style="elegant"] .pmodal-name { color: var(--accent); }

/* Math */
html[data-style="elegant"] .mtab.active { background: var(--grad-accent); color: var(--bg); }

/* Footer */
html[data-style="elegant"] footer { background: var(--bg2); border-top: 1px solid var(--border); }

/* Favphil */

/* Kontakt */
html[data-style="elegant"] .contact-card { border: 1px solid var(--border); border-radius: var(--r); }
html[data-style="elegant"] .contact-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }

/* Wordcloud */
html[data-style="elegant"] .wc-thumb-wrap { border-radius: var(--r); }
html[data-style="elegant"] .diss-wc-label { color: var(--accent); }
html[data-style="elegant"] .wc-card { border: 1px solid var(--border); border-radius: var(--r); }
html[data-style="elegant"] .wc-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="elegant"] .wc-info-label { color: var(--accent); }

/* ═══════════════════════════════════════════════════════
   RETRO TERMINAL
   Scoped to html[data-style="terminal"]

   Concept: 1980s CRT terminal. Green phosphor glow on
   deep black. Monospace everything. Scanline texture.
   Boot sequence aesthetic.

   "Light" = classic green terminal (still dark bg)
   Dark    = amber phosphor variant (warm orange-gold)
═══════════════════════════════════════════════════════ */

/* ── Fonts: override to monospace for full effect ── */
html[data-style="terminal"] {
  --bg:       #000d00;
  --bg2:      #001200;
  --bg3:      #001800;
  --surface:  #001500;
  --surface2: #002200;

  --accent:   #00e040;
  --accent2:  #00ff55;
  --accent3:  #00c030;
  --accent4:  #80ff98;

  --glow-accent:  rgba(0,224,64,.5);
  --glow-accent2: rgba(0,255,85,.4);
  --glow-accent3: rgba(0,192,48,.4);
  --glow-accent4: rgba(128,255,152,.3);

  --text:  #00e040;
  --text2: #009928;
  --text3: #005518;

  --border:  #003310;
  --border2: #005520;

  --card:         #000d00;
  --card-glass:   rgba(0,13,0,.95);
  --card-border:  #00e040;
  --shadow:        0 0 8px rgba(0,224,64,.3), 0 0 2px rgba(0,224,64,.5);
  --shadow-hover:  0 0 20px rgba(0,224,64,.6), 0 0 4px rgba(0,224,64,.8);

  --fh: 'JetBrains Mono', monospace;
  --fb: 'JetBrains Mono', monospace;
  --fm: 'JetBrains Mono', monospace;
  --r:    2px;
  --r-sm: 2px;

  --grad-accent:  linear-gradient(135deg, #00ff55, #00c030);
  --grad-accent2: linear-gradient(135deg, #00e040, #005518);
  --grad-text:    linear-gradient(135deg, #00ff55, #009928);
}

/* Amber variant for dark mode */
html[data-style="terminal"][data-theme="dark"] {
  --bg:       #0d0800;
  --bg2:      #120c00;
  --bg3:      #1a1100;
  --surface:  #1a1100;
  --surface2: #221800;

  --accent:   #ff9500;
  --accent2:  #ffb830;
  --accent3:  #cc7800;
  --accent4:  #ffd080;

  --glow-accent:  rgba(255,149,0,.5);
  --glow-accent2: rgba(255,184,48,.4);
  --glow-accent3: rgba(204,120,0,.4);
  --glow-accent4: rgba(255,208,128,.3);

  --text:  #ff9500;
  --text2: #b36800;
  --text3: #664000;

  --border:  #331f00;
  --border2: #553300;

  --card:         #0d0800;
  --card-glass:   rgba(13,8,0,.95);
  --card-border:  #ff9500;
  --shadow:        0 0 8px rgba(255,149,0,.3), 0 0 2px rgba(255,149,0,.5);
  --shadow-hover:  0 0 20px rgba(255,149,0,.6), 0 0 4px rgba(255,149,0,.8);

  --grad-accent:  linear-gradient(135deg, #ffb830, #cc7800);
  --grad-accent2: linear-gradient(135deg, #ff9500, #664000);
  --grad-text:    linear-gradient(135deg, #ffb830, #b36800);
}

/* ── Global ── */
html[data-style="terminal"] body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--fm);
}

/* CRT scanline overlay */
html[data-style="terminal"] body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9998; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.18) 2px,
    rgba(0,0,0,.18) 4px
  );
}

/* ── NAV ── */
html[data-style="terminal"] nav {
  background: var(--bg2);
  border-bottom: 1px solid var(--accent);
  backdrop-filter: none;
  box-shadow: 0 1px 0 var(--accent), 0 2px 12px var(--glow-accent);
}
html[data-style="terminal"] .nav-logo {
  font-family: var(--fm); font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; font-size: 1rem;
  color: var(--accent);
  text-shadow: 0 0 8px var(--glow-accent);
}
html[data-style="terminal"] .nav-logo span {
  color: var(--accent2); background: none; -webkit-text-fill-color: var(--accent2);
  text-shadow: 0 0 10px var(--glow-accent2);
}
html[data-style="terminal"] .nav-group-btn,
html[data-style="terminal"] .nav-direct {
  font-family: var(--fm); letter-spacing: .08em; font-size: .72rem;
  color: var(--text2); text-transform: uppercase;
}
html[data-style="terminal"] .nav-group-btn:hover,
html[data-style="terminal"] .nav-group-btn.group-active,
html[data-style="terminal"] .nav-direct:hover,
html[data-style="terminal"] .nav-direct.active {
  color: var(--accent);
  text-shadow: 0 0 8px var(--glow-accent);
  background: transparent;
}
html[data-style="terminal"] .nav-dropdown {
  background: var(--bg2); border: 1px solid var(--accent); border-radius: 2px;
  box-shadow: 0 0 16px var(--glow-accent); backdrop-filter: none;
}
html[data-style="terminal"] .nav-dropdown-item { font-family: var(--fm); text-transform: uppercase; font-size: .68rem; letter-spacing: .06em; color: var(--text2); }
html[data-style="terminal"] .nav-dropdown-item:hover { background: var(--accent); color: var(--bg); text-shadow: none; border-radius: 0; }
html[data-style="terminal"] .theme-btn,
html[data-style="terminal"] .lang-btn {
  border-radius: 2px; border: 1px solid var(--accent);
  background: transparent; color: var(--accent);
  font-family: var(--fm); font-size: .65rem;
  text-shadow: 0 0 6px var(--glow-accent);
}
html[data-style="terminal"] .theme-btn:hover,
html[data-style="terminal"] .lang-btn:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 12px var(--glow-accent); }

/* ── Cards ── */
html[data-style="terminal"] .card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 2px; box-shadow: var(--shadow); backdrop-filter: none;
}
html[data-style="terminal"] .card:hover { box-shadow: var(--shadow-hover); border-color: var(--accent2); transform: translateY(-2px); }

/* ── Buttons ── */
html[data-style="terminal"] .btn { border-radius: 2px; font-family: var(--fm); letter-spacing: .08em; text-transform: uppercase; }
html[data-style="terminal"] .btn-primary {
  background: transparent; color: var(--accent); border: 1px solid var(--accent);
  box-shadow: 0 0 10px var(--glow-accent); font-weight: 700;
}
html[data-style="terminal"] .btn-primary:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 20px var(--glow-accent); transform: translateY(-1px); }
html[data-style="terminal"] .btn-ghost { border: 1px solid var(--text2); color: var(--text2); background: transparent; }
html[data-style="terminal"] .btn-ghost:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 8px var(--glow-accent); }

/* ── Home hero ── */
html[data-style="terminal"] .hero-grid-bg {
  background-image:
    linear-gradient(var(--accent)22 1px, transparent 1px),
    linear-gradient(90deg, var(--accent)22 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: .6;
}
html[data-style="terminal"] .hero-glow { background: radial-gradient(circle, rgba(0,224,64,.15), transparent 70%); }
html[data-style="terminal"] .hero-name .n1 { color: var(--text); text-shadow: 0 0 12px var(--glow-accent3); }
html[data-style="terminal"] .hero-name .n2 {
  color: var(--accent); background: none; -webkit-text-fill-color: var(--accent);
  text-shadow: 0 0 20px var(--glow-accent);
  filter: none;
}
html[data-style="terminal"] .cursor { color: var(--accent); text-shadow: 0 0 12px var(--glow-accent); }
html[data-style="terminal"] .hero-tag { color: var(--accent3); text-shadow: 0 0 8px var(--glow-accent3); letter-spacing: .2em; }
html[data-style="terminal"] .hero-tag::before { background: var(--accent3); box-shadow: 0 0 6px var(--glow-accent3); }
html[data-style="terminal"] .hero-subtitle span { color: var(--accent); text-shadow: 0 0 8px var(--glow-accent); }
html[data-style="terminal"] .hero-portrait-wrap::before { background: radial-gradient(ellipse, rgba(0,224,64,.2), transparent 70%); }
html[data-style="terminal"] .hero-portrait-wrap::after { animation: none; background: radial-gradient(ellipse, rgba(0,224,64,.15), transparent 70%); }
html[data-style="terminal"] .hero-portrait { border: 2px solid var(--accent); border-radius: 4px; box-shadow: 0 0 24px var(--glow-accent), inset 0 0 0 1px var(--accent3); filter: saturate(.6) contrast(1.1); }
html[data-style="terminal"] .hero-portrait:hover { box-shadow: 0 0 40px var(--glow-accent); filter: saturate(.8) contrast(1.2); }
html[data-style="terminal"] .stat-num { color: var(--accent); background: none; -webkit-text-fill-color: var(--accent); text-shadow: 0 0 10px var(--glow-accent); }
html[data-style="terminal"] .stats-row { background: var(--bg2); border-color: var(--accent); border-width: 1px; }
html[data-style="terminal"] .stat-item:hover { background: var(--surface2); }
html[data-style="terminal"] .skill-title { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent3); }
html[data-style="terminal"] .social-link { border: 1px solid var(--border2); border-radius: 2px; color: var(--text2); }
html[data-style="terminal"] .social-link:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 8px var(--glow-accent); background: transparent; }
html[data-style="terminal"] .tl-item::before { background: var(--accent); box-shadow: 0 0 6px var(--glow-accent); border-radius: 0; }
html[data-style="terminal"] .tl-year { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent3); }
html[data-style="terminal"] .tl::before { background: var(--accent); width: 1px; box-shadow: 0 0 4px var(--glow-accent); }
html[data-style="terminal"] .about-portrait { border: 2px solid var(--accent); border-radius: 2px; box-shadow: 0 0 16px var(--glow-accent); filter: saturate(.5); }
html[data-style="terminal"] .proj-lang { background: rgba(0,224,64,.1); color: var(--accent); border: 1px solid var(--accent3); }

/* ── Sections ── */
html[data-style="terminal"] .sec-title { color: var(--accent); text-shadow: 0 0 8px var(--glow-accent3); }
html[data-style="terminal"] .sec-sub { color: var(--text3); letter-spacing: .15em; }
html[data-style="terminal"] .section-divider { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent3); }
html[data-style="terminal"] .section-divider::after { background: linear-gradient(90deg, var(--accent), transparent); }
html[data-style="terminal"] .page-title span { color: var(--accent); text-shadow: 0 0 12px var(--glow-accent); }
html[data-style="terminal"] .pstat-num { color: var(--accent); background: none; -webkit-text-fill-color: var(--accent); text-shadow: 0 0 8px var(--glow-accent); }
html[data-style="terminal"] .hero-tag { color: var(--accent3); text-shadow: 0 0 8px var(--glow-accent3); }
html[data-style="terminal"] .page-hero { border-bottom: 1px solid var(--accent); }
html[data-style="terminal"] .page-hero-glow { background: radial-gradient(circle, rgba(0,224,64,.12), transparent 70%); }

/* Tags */
html[data-style="terminal"] .tag { border: 1px solid var(--border2); border-radius: 2px; color: var(--text3); background: transparent; font-size: .62rem; letter-spacing: .06em; }

/* Inputs */
html[data-style="terminal"] .ctrl-input,
html[data-style="terminal"] .ctrl-select { border-radius: 2px; border-color: var(--border2); background: var(--bg2); color: var(--text); font-family: var(--fm); }
html[data-style="terminal"] .ctrl-input:focus { border-color: var(--accent); box-shadow: 0 0 8px var(--glow-accent); }

/* Zitate */
html[data-style="terminal"] .zitat-author { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent3); }
html[data-style="terminal"] .zitat-card { border: 1px solid var(--border2); border-radius: 2px; backdrop-filter: none; background: var(--card); }
html[data-style="terminal"] .zitat-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="terminal"] .zitat-card::before { color: var(--accent); opacity: .15; }
html[data-style="terminal"] .zitat-motto { border-left-color: var(--accent); background: var(--bg2); }
html[data-style="terminal"] .zf-btn { border-radius: 2px; font-family: var(--fm); text-transform: uppercase; font-size: .68rem; }
html[data-style="terminal"] .zf-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

/* Games */
html[data-style="terminal"] .game-card { border: 1px solid var(--border2); border-radius: 2px; backdrop-filter: none; }
html[data-style="terminal"] .game-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="terminal"] .game-card-cover { filter: saturate(.5) contrast(1.1); transition: filter .3s; }
html[data-style="terminal"] .game-card:hover .game-card-cover { filter: saturate(.8) contrast(1.15); }
html[data-style="terminal"] .gtab { border-radius: 2px; font-family: var(--fm); text-transform: uppercase; font-size: .67rem; letter-spacing: .08em; }
html[data-style="terminal"] .gtab.active { background: var(--accent); color: var(--bg); }
html[data-style="terminal"] .g-tabs { border-radius: 2px; border: 1px solid var(--accent); }
html[data-style="terminal"] .game-badge { font-family: var(--fm); }

/* Podcasts */
html[data-style="terminal"] .pod-card2 { border: 1px solid var(--border2); border-radius: 2px; }
html[data-style="terminal"] .pod-card2:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="terminal"] .pod-cat-btn { border-radius: 2px; font-family: var(--fm); text-transform: uppercase; font-size: .68rem; }
html[data-style="terminal"] .pod-cat-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

/* Natur */
html[data-style="terminal"] .nature-card { border: 1px solid var(--border2); border-radius: 2px; }
html[data-style="terminal"] .nature-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="terminal"] .nature-card-img { filter: saturate(.5) contrast(1.1); }
html[data-style="terminal"] .nature-cat-btn { border-radius: 2px; font-family: var(--fm); text-transform: uppercase; font-size: .68rem; }
html[data-style="terminal"] .nature-cat-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); box-shadow: 0 0 10px var(--glow-accent); }

/* Studium */
html[data-style="terminal"] .sort-btn { border-radius: 2px; font-family: var(--fm); }
html[data-style="terminal"] .sort-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
html[data-style="terminal"] .books-table th { background: var(--surface2); color: var(--accent); }
html[data-style="terminal"] .books-table th:hover { color: var(--accent2); }
html[data-style="terminal"] .books-table tr:hover td { background: var(--surface); }
html[data-style="terminal"] .kurs-table th { background: var(--surface2); color: var(--accent); }
html[data-style="terminal"] .b-title { color: var(--accent3); }

/* Diss */
html[data-style="terminal"] .diss-meta-badge { border-radius: 2px; border-color: var(--accent3); color: var(--text); }
html[data-style="terminal"] .diss-meta-badge.accent { background: var(--accent); color: var(--bg); border-color: var(--accent); }
html[data-style="terminal"] .diss-stat { border-radius: 2px; border-color: var(--border2); }
html[data-style="terminal"] .diss-stat-num { color: var(--accent); background: none; -webkit-text-fill-color: var(--accent); text-shadow: 0 0 8px var(--glow-accent); }
html[data-style="terminal"] .diss-abstract { border-left-color: var(--accent); background: var(--bg2); }
html[data-style="terminal"] .diss-abstract-label { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent3); }
html[data-style="terminal"] .toc-num { color: var(--accent); }
html[data-style="terminal"] .toc-row:hover { background: var(--surface2); }

/* Phil modal */
html[data-style="terminal"] .pmodal-box { border: 1px solid var(--accent); border-radius: 2px; backdrop-filter: none; box-shadow: 0 0 40px var(--glow-accent); background: var(--bg2); }
html[data-style="terminal"] .pmodal-name { color: var(--accent); text-shadow: 0 0 10px var(--glow-accent); }
html[data-style="terminal"] .pmodal-close { border-radius: 2px; }

/* Math */
html[data-style="terminal"] .math-canvas { border-radius: 2px; border-color: var(--accent); box-shadow: 0 0 12px var(--glow-accent3); }
html[data-style="terminal"] .mtab { border-radius: 2px; font-family: var(--fm); text-transform: uppercase; }
html[data-style="terminal"] .mtab.active { background: var(--accent); color: var(--bg); }
html[data-style="terminal"] .math-formula { color: var(--accent); background: var(--surface2); border-radius: 2px; }
html[data-style="terminal"] .math-tabs { border-radius: 2px; border: 1px solid var(--accent); }

/* Footer */
html[data-style="terminal"] footer { background: var(--bg2); border-top: 1px solid var(--accent); box-shadow: 0 -1px 0 var(--accent), 0 -2px 12px var(--glow-accent); }
html[data-style="terminal"] .footer-txt { color: var(--text3); }
html[data-style="terminal"] .footer-links a:hover { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent); }

/* Pokémon — desaturated for terminal feel */
html[data-style="terminal"] .poke-card { border: 1px solid var(--border2); border-radius: 2px; }
html[data-style="terminal"] .poke-card img { filter: saturate(.4) sepia(.3); }
html[data-style="terminal"] .poke-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="terminal"] .poke-card:hover img { filter: saturate(.7); }

/* Kontakt */
html[data-style="terminal"] .contact-card { border: 1px solid var(--border2); border-radius: 2px; }
html[data-style="terminal"] .contact-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }

/* Favphil / Pe */
html[data-style="terminal"] .favphil-card { border: 1px solid var(--border2); border-radius: 2px; }
html[data-style="terminal"] .favphil-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="terminal"] .pe-card { border: 1px solid var(--border2); border-radius: 2px; backdrop-filter: none; }
html[data-style="terminal"] .pe-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
html[data-style="terminal"] .pe-ta { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent3); }

/* Wordcloud */
html[data-style="terminal"] .wc-thumb-wrap { border-radius: 2px; }
html[data-style="terminal"] .wc-thumb-wrap img { filter: saturate(.4) hue-rotate(90deg); }
html[data-style="terminal"] .diss-wc-label { color: var(--accent); text-shadow: 0 0 6px var(--glow-accent3); }

/* Game lightbox */
html[data-style="terminal"] .game-lb img { border-radius: 2px; filter: saturate(.8) contrast(1.1); box-shadow: 0 0 60px var(--glow-accent); }

/* ═══════════════════════════════════════════════════════
   GLASSMORPHISM
   Scoped to html[data-style="glass"]

   Concept: Everything is frosted glass floating over
   deep violet-indigo gradients. Iridescent edges,
   soft blur everywhere, aurora-like colour shifts.

   Light: violet-tinted soft white, glass with depth
   Dark:  deep indigo-black, strong glass contrast
═══════════════════════════════════════════════════════ */

html[data-style="glass"] {
  --bg:       #e8e4f8;
  --bg2:      #ddd8f4;
  --bg3:      #d0caf0;
  --surface:  rgba(255,255,255,.55);
  --surface2: rgba(255,255,255,.65);

  --accent:   #6c3ef5;
  --accent2:  #c040e8;
  --accent3:  #3b9ef0;
  --accent4:  #f03090;

  --glow-accent:  rgba(108,62,245,.4);
  --glow-accent2: rgba(192,64,232,.35);
  --glow-accent3: rgba(59,158,240,.35);
  --glow-accent4: rgba(240,48,144,.35);

  --text:  #1a1030;
  --text2: #5040a0;
  --text3: #8878c0;

  --border:  rgba(108,62,245,.2);
  --border2: rgba(108,62,245,.35);

  --card:         rgba(255,255,255,.65);
  --card-glass:   rgba(255,255,255,.55);
  --card-border:  rgba(255,255,255,.8);
  --shadow:        0 8px 32px rgba(108,62,245,.15), 0 2px 8px rgba(0,0,0,.08);
  --shadow-hover:  0 16px 48px rgba(108,62,245,.3), 0 4px 16px rgba(0,0,0,.1);

  --fh: 'Syne', sans-serif;
  --fb: 'DM Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --r:    16px;
  --r-sm: 10px;

  --grad-accent:  linear-gradient(135deg, #6c3ef5, #c040e8);
  --grad-accent2: linear-gradient(135deg, #3b9ef0, #6c3ef5);
  --grad-text:    linear-gradient(135deg, #6c3ef5 0%, #c040e8 50%, #f03090 100%);
}

html[data-style="glass"][data-theme="dark"] {
  --bg:       #080618;
  --bg2:      #0e0a24;
  --bg3:      #150f30;
  --surface:  rgba(255,255,255,.06);
  --surface2: rgba(255,255,255,.10);

  --accent:   #8060ff;
  --accent2:  #d060f8;
  --accent3:  #40b0ff;
  --accent4:  #ff4090;

  --glow-accent:  rgba(128,96,255,.55);
  --glow-accent2: rgba(208,96,248,.5);
  --glow-accent3: rgba(64,176,255,.45);
  --glow-accent4: rgba(255,64,144,.45);

  --text:  #f0ecff;
  --text2: #a898d8;
  --text3: #6858a0;

  --border:  rgba(128,96,255,.2);
  --border2: rgba(128,96,255,.38);

  --card:         rgba(255,255,255,.06);
  --card-glass:   rgba(255,255,255,.05);
  --card-border:  rgba(255,255,255,.14);
  --shadow:        0 8px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(128,96,255,.12);
