<script>
(function(){
'use strict';
// Wait briefly until ZITATE / PHILS_V2 / DB are available (they live in data.js + pages.js)
function init() {
  if (typeof ZITATE === 'undefined' && typeof PHILS_V2 === 'undefined' && typeof DB === 'undefined') {
    setTimeout(init, 100);
    return;
  }

  // Build the pool of featured items from existing data.
  // This is intentionally generic — when new content is added (more ZITATE, more PHILS_V2),
  // they will automatically appear here without code changes.
  var pool = [];

  // ── Zitate ─────────────────────────
  if (typeof ZITATE !== 'undefined' && ZITATE && ZITATE.length) {
    ZITATE.forEach(function(z) {
      pool.push({
        kind: 'Zitat',
        render: function() {
          return '<div class="featured-kind">Zitat</div>' +
                 '<div class="featured-body">' +
                   '<div class="featured-quote-text">»' + escapeHtml(z.text) + '«</div>' +
                   '<div class="featured-quote-attr"><strong>' + escapeHtml(z.author) + '</strong>' +
                     (z.source ? ' &middot; ' + escapeHtml(z.source) : '') + '</div>' +
                 '</div>' +
                 '<button class="featured-link" onclick="showPage(\'zitate\')">Alle Zitate</button>';
        }
      });
    });
  }

  // ── Lieblingsphilosophen (Tier 1 only — die wirklich wichtigen) ─────────────────────────
  if (typeof PHILS_V2 !== 'undefined' && PHILS_V2 && PHILS_V2.length) {
    PHILS_V2.filter(function(p) { return p.tier === 1; }).forEach(function(p) {
      pool.push({
        kind: 'Philosoph',
        render: function() {
          var ideas = (p.ideas || []).slice(0, 4).map(function(i) {
            return '<span class="tag">' + escapeHtml(i) + '</span>';
          }).join('');
          return '<div class="featured-kind">Lieblings­philosoph</div>' +
                 '<div class="featured-body">' +
                   '<div class="featured-phil-name">' + escapeHtml(p.name) + '</div>' +
                   '<div class="featured-phil-dates">' + escapeHtml((p.birth || '') + ' – ' + (p.death || '')) +
                     (p.epoch ? ' &middot; ' + escapeHtml(p.epoch) : '') + '</div>' +
                   '<div class="featured-phil-desc">' + escapeHtml(p.desc || p.short || '') + '</div>' +
                   (ideas ? '<div class="featured-phil-ideas">' + ideas + '</div>' : '') +
                 '</div>' +
                 '<button class="featured-link" onclick="showPage(\'philosophy\')">Zur Timeline</button>';
        }
      });
    });
  }

  // ── Games / Blizzard ─────────────────────────
  if (typeof DB !== 'undefined' && DB) {
    Object.keys(DB).forEach(function(key) {
      var arr = DB[key];
      if (!Array.isArray(arr)) return;
      arr.forEach(function(g) {
        if (!g.title || !g.text) return;
        pool.push({
          kind: 'Spiel',
          render: function() {
            var tags = (g.tags || []).slice(0, 4).map(function(t) {
              return '<span class="tag">' + escapeHtml(t) + '</span>';
            }).join('');
            return '<div class="featured-kind">' + escapeHtml(g.badgeText || 'Spiel') + '</div>' +
                   '<div class="featured-body">' +
                     '<div class="featured-game-title">' + escapeHtml(g.title) + '</div>' +
                     '<div class="featured-game-text">' + escapeHtml(g.text) + '</div>' +
                     (tags ? '<div class="featured-game-tags">' + tags + '</div>' : '') +
                   '</div>' +
                   '<button class="featured-link" onclick="showPage(\'gaming\')">Zur Gaming-Seite</button>';
          }
        });
      });
    });
  }

  if (pool.length === 0) return;

  // ── Setup carousel ─────────────────────────
  var card = document.getElementById('featured-card');
  var dotsEl = document.getElementById('ftr-dots');
  if (!card) return;

  // Show at most 8 dots — for many items, use ellipsis dots
  // For simplicity here just render up to 8 dots representing groups
  var MAX_DOTS = Math.min(8, pool.length);
  dotsEl.innerHTML = '';
  for (var i = 0; i < MAX_DOTS; i++) {
    var d = document.createElement('div');
    d.className = 'ftr-dot';
    dotsEl.appendChild(d);
  }

  // Shuffle the pool for a different order each visit
  function shuffled(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  var sequence = shuffled(pool);
  var idx = 0;

  function render(animateOut) {
    function doRender() {
      card.innerHTML = sequence[idx].render();
      // update dots — map current idx into MAX_DOTS positions
      var dotIdx = Math.floor((idx / sequence.length) * MAX_DOTS);
      Array.from(dotsEl.children).forEach(function(d, di) {
        d.classList.toggle('active', di === dotIdx);
      });
      requestAnimationFrame(function() {
        card.classList.remove('swap');
      });
    }
    if (animateOut) {
      card.classList.add('swap');
      setTimeout(doRender, 250);
    } else {
      doRender();
    }
  }

  document.getElementById('ftr-prev').onclick = function() {
    idx = (idx - 1 + sequence.length) % sequence.length;
    render(true);
    pauseAutoRotate();
  };
  document.getElementById('ftr-next').onclick = function() {
    idx = (idx + 1) % sequence.length;
    render(true);
    pauseAutoRotate();
  };
  document.getElementById('ftr-shuffle').onclick = function() {
    sequence = shuffled(pool);
    idx = 0;
    render(true);
    pauseAutoRotate();
  };

  // Auto-rotate every 10s, pause if user interacted
  var auto = null, paused = false;
  function startAutoRotate() {
    if (paused) return;
    auto = setInterval(function() {
      idx = (idx + 1) % sequence.length;
      render(true);
    }, 10000);
  }
  function pauseAutoRotate() {
    paused = true;
    if (auto) clearInterval(auto);
  }
  // Stop auto-rotate if user has navigated away
  document.addEventListener('visibilitychange', function() {
    if (document.hidden && auto) clearInterval(auto);
    else if (!paused) startAutoRotate();
  });

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  render();
  startAutoRotate();
}

init();
})();
</script>

  {text:'Es gibt kein richtiges Leben im falschen.',author:'Theodor W. Adorno',source:'Minima Moralia',kat:'Kritische Theorie'},
  {text:'Daten sind endlich: Sie sind Schnitte durch eine Wirklichkeit, die sie nie vollständig erfassen können.',author:'Alexander Schmidt',source:'Persönliche Notiz',kat:'Eigenes'},
  {text:'Das Schweigen ist nichts anderes als die Abwesenheit aller Bilder.',author:'Meister Eckhart',source:'Deutsche Predigten',kat:'Mystik'},
];

let activeKat = 'Alle';

function buildFilter() {
  const div = document.getElementById('zitat-filter');

    div.appendChild(b);

function renderGrid() {

  if (!grid) return;

<script>
/* ════════════════════════════════════════════
   TIMELINE ENGINE v2
════════════════════════════════════════════ */
(function(){
'use strict';

const YEAR_MIN = -700, YEAR_MAX = 2030, YEAR_RANGE = 2730;
const BASE_W   = 4000;
const SVG_H    = 530;
const AXIS_Y   = 265;
const CARD_W   = 130;
const CARD_H   = 65;
const PAD      = 70;   // axis-to-card gap

const INFL_COL = { student:'#5b80e8', inspires:'#22c55e', critic:'#e8527a', develops:'#a78bfa' };
const TIER_VIS = { 1:0.5, 2:1.0, 3:1.8, 4:2.8 };

let zoom      = 1.0;
let epoch     = '';
let search    = '';
let inflOn    = { student:true, inspires:true, critic:true, develops:true };
let ready     = false;

function svgW()   { return BASE_W * zoom; }
function xOf(yr)  { return ((yr - YEAR_MIN) / YEAR_RANGE) * svgW(); }
function dark()   { return document.documentElement.dataset.theme === 'dark'; }
function cv(v)    { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function phils()  { return typeof PHILS_V2 !== 'undefined' ? PHILS_V2 : []; }
function byName(n){ return phils().find(p => p.name === n); }
function visible(p){ return zoom >= (TIER_VIS[p.tier] || 1); }
function dimmed(p) { return (epoch && p.epoch !== epoch) || (search && !p.name.toLowerCase().includes(search)); }

function el(tag, attrs, txt) {
  const ns = 'http://www.w3.org/2000/svg';
  const e = document.createElementNS(ns, tag);
  if (attrs) for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, String(v));
  if (txt !== undefined) e.textContent = txt;
  return e;
}

/* ── Main render ── */
function render() {
  const W   = svgW();
  const svg = document.getElementById('tl-svg');
  if (!svg) return;
  svg.setAttribute('width', W);
  svg.setAttribute('height', SVG_H);
  svg.innerHTML = '';

  const dk  = dark();
  const bgCard  = dk ? '#181824' : '#ffffff';
  const textCol = dk ? '#e8e8f0' : '#18181f';
  const mutedCol= dk ? '#606078' : '#9090a8';
  const borderCol = cv('--border');

  /* 0. DEFS */
  const defs = el('defs');
  Object.entries(INFL_COL).forEach(([t, c]) => {
    const m = el('marker', { id:'arr-'+t, markerWidth:9, markerHeight:9, refX:7, refY:3, orient:'auto', markerUnits:'strokeWidth' });
    m.appendChild(el('path', { d:'M0,0 L0,6 L9,3 z', fill:c }));
    defs.appendChild(m);
  });
  /* axis gradient */
  const ag = el('linearGradient', { id:'axGrad', x1:'0%', y1:'0%', x2:'100%', y2:'0%' });
  ag.innerHTML = `<stop offset="0%" stop-color="${cv('--accent')}"/><stop offset="100%" stop-color="${cv('--accent2')}"/>`;
  defs.appendChild(ag);
  svg.appendChild(defs);

  /* 1. EPOCH BANDS */
  const epochColors = {};
  (typeof EPOCHS_META_V2 !== 'undefined' ? EPOCHS_META_V2 : []).forEach(e => epochColors[e.name] = e.color);
  const epochRanges = {};
  phils().forEach(p => {
    if (!epochRanges[p.epoch]) epochRanges[p.epoch] = { min:Infinity, max:-Infinity, c: epochColors[p.epoch]||'#888' };
    const d = p.death > 0 ? p.death : Math.max(p.birth+40, 2020);
    epochRanges[p.epoch].min = Math.min(epochRanges[p.epoch].min, p.birth);
    epochRanges[p.epoch].max = Math.max(epochRanges[p.epoch].max, d);
  });
  const bandG = el('g');
  Object.entries(epochRanges).forEach(([eName, r]) => {
    const x1 = xOf(r.min - 20), x2 = xOf(r.max + 20);
    const isActive = epoch === eName;
    bandG.appendChild(el('rect', { x:x1, y:0, width:Math.max(1, x2-x1), height:SVG_H,
      fill: r.c + (isActive ? '22' : dk ? '0f' : '09') }));
    if (x2 - x1 > 50) {
      const lx = (x1+x2)/2;
      const sz = Math.min(12, Math.max(7, (x2-x1)*0.06));
      bandG.appendChild(el('text', { x:lx, y:AXIS_Y+34, 'text-anchor':'middle',
        fill:r.c, 'font-size':sz, 'font-family':"'JetBrains Mono',monospace", opacity:'0.45' }, eName));
    }
  });
  svg.appendChild(bandG);

  /* 2. AXIS */
  svg.appendChild(el('line', { x1:0, y1:AXIS_Y, x2:W, y2:AXIS_Y, stroke:'url(#axGrad)', 'stroke-width':2.5 }));
  const step = zoom >= 4 ? 25 : zoom >= 2.5 ? 50 : zoom >= 1.5 ? 100 : 200;
  const major = step * 2;
  for (let y = -600; y <= 2025; y += step) {
    const x = xOf(y), isMajor = y % major === 0;
    svg.appendChild(el('line', { x1:x, y1:AXIS_Y-(isMajor?9:5), x2:x, y2:AXIS_Y+(isMajor?9:5),
      stroke:borderCol, 'stroke-width':isMajor?1.5:0.8, opacity:isMajor?'1':'0.5' }));
    if (isMajor || zoom > 1.5) {
      const lbl = y < 0 ? Math.abs(y)+' v.Chr.' : y === 0 ? '0 n.Chr.' : String(y);
      svg.appendChild(el('text', { x, y:AXIS_Y+22, 'text-anchor':'middle',
        fill:mutedCol, 'font-size':isMajor?10:8, 'font-family':"'JetBrains Mono',monospace",
        opacity:isMajor?'0.85':'0.45' }, lbl));
    }
  }

  /* 3. INFLUENCE LINES (behind nodes) */
  const posMap = {};
  phils().forEach(p => {
    if (!visible(p)) return;
    posMap[p.name] = xOf((p.birth + (p.death > 0 ? p.death : 2020)) / 2);
  });

  const inflG = el('g', { id:'infl-g' });
  phils().forEach(p => {
    if (!visible(p) || !p.influences) return;
    p.influences.forEach(inf => {
      if (!inflOn[inf.type]) return;
      const tx = posMap[inf.to];
      if (tx === undefined) return;
      const fx = posMap[p.name];
      const c  = INFL_COL[inf.type];
      const isHighlighted = search && (p.name.toLowerCase().includes(search) || inf.to.toLowerCase().includes(search));
      const isDimmedLine  = (epoch && p.epoch !== epoch && (byName(inf.to)?.epoch) !== epoch) ||
                            (search && !isHighlighted);
      const dist = Math.abs(tx - fx);
      const curve = inf.type === 'student' ? -50 : inf.type === 'critic' ? 48 : -35;
      const mx = (fx + tx) / 2;
      const d  = `M${fx},${AXIS_Y} C${mx},${AXIS_Y+curve} ${mx},${AXIS_Y+curve} ${tx},${AXIS_Y}`;
      const dash = inf.type==='critic' ? '6,3' : inf.type==='develops' ? '3,3' : 'none';
      inflG.appendChild(el('path', { d, fill:'none', stroke:c, 'stroke-width':isHighlighted?2.5:1.5,
        'stroke-dasharray':dash, opacity:isDimmedLine?'0.04':isHighlighted?'0.75':'0.35',
        'marker-end':`url(#arr-${inf.type})` }));
    });
  });
  svg.appendChild(inflG);

  /* 4. PHILOSOPHER NODES */
  const nodeG = el('g', { id:'node-g' });
  let cnt = 0;

  phils().forEach(p => {
    if (!visible(p)) return;
    cnt++;
    const cx    = posMap[p.name];
    const above = p.above;
    const dm    = dimmed(p);
    const fsize = p.tier === 1 ? 11.5 : p.tier === 2 ? 10 : 9;
    const showDates = zoom >= 0.85;
    const showEpoch = zoom >= 1.25;
    const cH    = CARD_H + (showEpoch ? 13 : 0);
    const cardY = above ? AXIS_Y - PAD - cH : AXIS_Y + PAD;
    const ly1   = above ? cardY + cH + 2 : AXIS_Y + 6;
    const ly2   = above ? AXIS_Y - 6 : cardY - 2;
    const dotR  = p.tier === 1 ? 7 : p.tier === 2 ? 5 : 4;

    const g = el('g', { class:'phil-node-group', opacity: dm ? '0.08' : '1', transform:`translate(${cx},0)` });

    /* connector */
    g.appendChild(el('line', { x1:0, y1:ly1, x2:0, y2:ly2, stroke:p.color+'55', 'stroke-width':1.5 }));

    /* dot */
    g.appendChild(el('circle', { cx:0, cy:AXIS_Y, r:dotR, fill:p.color,
      stroke: dk?'#0a0a0f':'#ffffff', 'stroke-width':2.5 }));

    /* card shadow (tier 1 glow) */
    if (p.tier === 1 && !dm) {
      g.appendChild(el('rect', { x:-CARD_W/2-4, y:cardY-4, width:CARD_W+8, height:cH+8,
        fill:'none', stroke:p.color, 'stroke-width':0.7, rx:11, ry:11, opacity:'0.3' }));
    }

    /* card */
    const cardBg = bgCard + (p.tier===1?'':'ee');
    g.appendChild(el('rect', { x:-CARD_W/2, y:cardY, width:CARD_W, height:cH,
      fill:cardBg, stroke:p.color, 'stroke-width': p.tier===1 ? 2 : 0.8, rx:8, ry:8 }));

    /* name */
    const nameShort = p.name.length > 17 ? p.name.substring(0,16)+'…' : p.name;
    g.appendChild(el('text', { x:0, y:cardY+16, 'text-anchor':'middle',
      fill:textCol, 'font-size':fsize, 'font-weight':p.tier<=2?'700':'600',
      'font-family':"'Syne',sans-serif" }, nameShort));

    /* dates */
    if (showDates) {
      const bs = p.birth<0 ? Math.abs(p.birth)+'v' : String(p.birth);
      const ds = p.death<=0 ? '→' : p.death<0 ? Math.abs(p.death)+'v' : String(p.death);
      g.appendChild(el('text', { x:0, y:cardY+29, 'text-anchor':'middle',
        fill:mutedCol, 'font-size':7.5, 'font-family':"'JetBrains Mono',monospace" }, bs+'–'+ds));
    }

    /* epoch */
    if (showEpoch) {
      const eShort = p.epoch.length>15 ? p.epoch.substring(0,14)+'…' : p.epoch;
      g.appendChild(el('text', { x:0, y:cardY+cH-7, 'text-anchor':'middle',
        fill:p.color, 'font-size':7, 'font-family':"'JetBrains Mono',monospace", opacity:'0.8' }, eShort));
    }

    /* invisible hit rect */
    const hit = el('rect', { x:-CARD_W/2, y:cardY, width:CARD_W, height:cH, fill:'transparent' });
    hit.addEventListener('click', () => tlOpenModal(p));
    g.appendChild(hit);
    nodeG.appendChild(g);
  });

  svg.appendChild(nodeG);

  /* update count */
  const vc = document.getElementById('vis-count');
  if (vc) vc.textContent = cnt + ' Philosophen sichtbar';
}

/* ── Zoom ── */
window.tlZoom = function(f) {
  const wrap = document.getElementById('tl-wrap');
  const ratio = wrap ? wrap.scrollLeft / Math.max(1, wrap.scrollWidth) : 0;
  zoom = Math.max(0.4, Math.min(5.5, zoom * f));
  document.getElementById('zoom-lbl').textContent = '×' + zoom.toFixed(1);
  render();
  if (wrap) requestAnimationFrame(() => { wrap.scrollLeft = ratio * wrap.scrollWidth; });
};

window.tlReset = function() {
  zoom = 1.0;
  document.getElementById('zoom-lbl').textContent = '×1.0';
  epoch = ''; search = '';
  document.getElementById('phil-search').value = '';
  document.querySelectorAll('.epoch-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.epoch-btn')?.classList.add('active');
  render();
  const wrap = document.getElementById('tl-wrap');
  if (wrap) setTimeout(() => { wrap.scrollLeft = BASE_W * 0.22; }, 60);
};

/* ── Search ── */
window.tlSearch = function(val) {
  search = val.toLowerCase().trim();
  render();
  if (search.length > 1) {
    const found = phils().find(p => p.name.toLowerCase().includes(search));
    if (found) {
      const wrap = document.getElementById('tl-wrap');
      const cx = ((found.birth + (found.death>0?found.death:2020))/2 - YEAR_MIN) / YEAR_RANGE * svgW();
      if (wrap) wrap.scrollLeft = cx - wrap.clientWidth / 2;
    }
  }
};

/* ── Influence toggles ── */
function buildInflToggles() {
  const c = document.getElementById('infl-toggles');
  if (!c) return;
  const labels = { student:'Lehrer→Schüler', inspires:'Inspiration', critic:'Kritik', develops:'Weiterentwicklung' };
  Object.entries(INFL_COL).forEach(([type, color]) => {
    const b = document.createElement('button');
    b.className = 'itbtn active'; b.id = 'itb-'+type;
    b.style.background = color; b.style.color = '#fff'; b.style.borderColor = 'transparent';
    b.innerHTML = `<div class="itbtn-dot" style="background:#ffffff99"></div>${labels[type]}`;
    b.onclick = () => {
      inflOn[type] = !inflOn[type];
      b.classList.toggle('active', inflOn[type]);
      b.style.background = inflOn[type] ? color : '';
      b.style.color      = inflOn[type] ? '#fff' : '';
      b.style.borderColor= inflOn[type] ? 'transparent' : '';
      render();
    };
    c.appendChild(b);
  });
}

/* ── Epoch filter ── */
function buildEpochFilter() {
  const c = document.getElementById('epoch-filter-row');
  if (!c) return;
  c.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'epoch-btn active'; all.textContent = 'Alle Epochen';
  all.onclick = () => { epoch=''; c.querySelectorAll('.epoch-btn').forEach(b=>b.classList.remove('active')); all.classList.add('active'); all.style.background=''; all.style.color=''; render(); };
  c.appendChild(all);
  (typeof EPOCHS_META_V2 !== 'undefined' ? EPOCHS_META_V2 : []).forEach(e => {
    const b = document.createElement('button');
    b.className = 'epoch-btn'; b.style.borderColor = e.color+'55';
    b.innerHTML = `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${e.color};margin-right:4px;vertical-align:middle"></span>${e.name}`;
    b.onclick = () => {
      epoch = e.name;
      c.querySelectorAll('.epoch-btn').forEach(x=>{ x.classList.remove('active'); x.style.background=''; x.style.color=''; });
      b.classList.add('active'); b.style.background=e.color; b.style.color='#fff';
      render();
    };
    c.appendChild(b);
  });
}

/* ── Drag scroll ── */
function setupDrag() {
  const w = document.getElementById('tl-wrap');
  if (!w) return;
  let dn=false, sx, sl;
  w.addEventListener('mousedown', e=>{dn=true; sx=e.pageX-w.offsetLeft; sl=w.scrollLeft;});
  w.addEventListener('mouseleave',()=>{dn=false;});
  w.addEventListener('mouseup',  ()=>{dn=false;});
  w.addEventListener('mousemove', e=>{if(!dn)return; e.preventDefault(); w.scrollLeft=sl-(e.pageX-w.offsetLeft-sx);});
  let ts, tsl;
  w.addEventListener('touchstart', e=>{ts=e.touches[0].pageX-w.offsetLeft; tsl=w.scrollLeft;},{passive:true});
  w.addEventListener('touchmove',  e=>{w.scrollLeft=tsl-(e.touches[0].pageX-w.offsetLeft-ts);},{passive:true});
}

/* ── Modal ── */
window.tlOpenModal = function(p) {
  const modal = document.getElementById('pmodal');
  if (!modal) return;
  document.getElementById('pm-epoch').innerHTML = `<span style="color:${p.color}">${p.epoch}</span><span class="tier-badge">Tier ${p.tier}</span>`;
  document.getElementById('pm-name').textContent  = p.name;
  const b = p.birth<0 ? Math.abs(p.birth)+' v.&thinsp;Chr.' : p.birth;
  const d = p.death<=0 ? 'heute' : p.death<0 ? Math.abs(p.death)+' v.&thinsp;Chr.' : p.death;
  document.getElementById('pm-dates').innerHTML = `${b} &ndash; ${d}`;
  document.getElementById('pm-desc').textContent  = p.desc;
  document.getElementById('pm-ideas').innerHTML   = (p.ideas||[]).map(i=>`<li>${i}</li>`).join('');

  /* influence section */
  const out = (p.influences||[]);
  const inc = phils().filter(q=>(q.influences||[]).some(i=>i.to===p.name))
                     .map(q=>({from:q.name, type:q.influences.find(i=>i.to===p.name).type}));
  let html = '';
  if (out.length) {
    html += `<span class="pmodal-infl-lbl">Hat beeinflusst:</span><div class="pmodal-chips">`;
    out.forEach(i=>{
      const c=INFL_COL[i.type];
      const safeN = i.to.replace(/'/g,"\\'");
      html+=`<span class="pmodal-chip" style="background:${c}20;border-color:${c}55;color:${c}"
        onclick="tlCloseModal();setTimeout(()=>{const q=tlByName('${safeN}');if(q)tlOpenModal(q)},200)">
        <div class="chip-dot" style="background:${c}"></div>${i.to}
        <span style="opacity:.55;font-size:.63rem">${i.type}</span></span>`;
    });
    html += '</div>';
  }
  if (inc.length) {
    html += `<span class="pmodal-infl-lbl">Wurde beeinflusst durch:</span><div class="pmodal-chips">`;
    inc.forEach(i=>{
      const c=INFL_COL[i.type];
      const safeN = i.from.replace(/'/g,"\\'");
      html+=`<span class="pmodal-chip" style="background:${c}20;border-color:${c}55;color:${c}"
        onclick="tlCloseModal();setTimeout(()=>{const q=tlByName('${safeN}');if(q)tlOpenModal(q)},200)">
        <div class="chip-dot" style="background:${c}"></div>${i.from}
        <span style="opacity:.55;font-size:.63rem">${i.type}</span></span>`;
    });
    html += '</div>';
  }
  document.getElementById('pm-infl').innerHTML = html;
  modal.classList.add('open');
};
window.tlCloseModal = function() { document.getElementById('pmodal')?.classList.remove('open'); };
window.tlByName     = byName;

/* ── Responsive height ── */
function setH() {
  const h = Math.max(400, window.innerHeight - 290);
  const w = document.getElementById('tl-wrap');
  const o = document.getElementById('tl-outer');
  if (w) w.style.height = h+'px';
  if (o) o.style.height = h+'px';
}

/* ── Init ── */
function init() {
  // rAF ensures DOM is laid out so height calculations work
  requestAnimationFrame(() => {
    setH();
    window.addEventListener('resize', ()=>{ setH(); render(); });
    new MutationObserver(()=>render()).observe(document.documentElement,
      { attributes:true, attributeFilter:['data-theme'] });

    buildInflToggles();
    buildEpochFilter();
    setupDrag();

    const tryRender = (attempts) => {
      if (typeof PHILS_V2 !== 'undefined' && typeof EPOCHS_META_V2 !== 'undefined') {
        render();
        setTimeout(()=>{
          const w = document.getElementById('tl-wrap');
          if (w) w.scrollLeft = BASE_W * 0.20;
        }, 100);
      } else if ((attempts||0) < 50) {
        setTimeout(() => tryRender((attempts||0)+1), 100);
      }
    };
    tryRender(0);
  });
}

// Always call init directly — this script runs after innerHTML injection
init();

})();
</script>

/* ── TOC renderer ── */
function buildTOC(items, container, level) {
  items.forEach(function(item) {
    var hasKids = item.children && item.children.length > 0;
    var row = document.createElement('li');
    row.className = 'toc-row l' + level + (hasKids ? ' has-children' : '');

    var arrow = document.createElement('span');
    arrow.className = 'toc-arrow';
    arrow.textContent = hasKids ? '▶' : '';
    row.appendChild(arrow);

    var num = document.createElement('span');
    num.className = 'toc-num' + (item.muted ? ' muted' : '');
    num.textContent = item.num;
    row.appendChild(num);

    var name = document.createElement('span');
    name.className = 'toc-name' + (item.bold ? ' bold' : '') + (item.muted ? ' italic' : '');
    name.textContent = item.title;
    row.appendChild(name);

    var dots = document.createElement('span');
    dots.className = 'toc-dots';
    row.appendChild(dots);

    var pg = document.createElement('span');
    pg.className = 'toc-pg';
    pg.textContent = item.page || '';
    row.appendChild(pg);

    container.appendChild(row);

    if (hasKids) {
      var kids = document.createElement('ul');
      kids.className = 'toc-list toc-children';
      buildTOC(item.children, kids, level + 1);
      container.appendChild(kids);
      row.addEventListener('click', function(e) {
        e.stopPropagation();
        var open = row.classList.toggle('open');
        kids.classList.toggle('open', open);
      });
    }
  });
}

};
window.wcClose = function() {

};
window.wcZoom = function(f) {

};

window.wcReset = function() {

};
window.wcToggle = function() {

  document.querySelectorAll('.gtab').forEach(function(b){ b.classList.remove('active'); });
  var sec = document.getElementById('gs-' + name);
  if (sec) sec.classList.add('active');
  var tabs = document.querySelectorAll('.gtab');
  if (tabs[idx]) tabs[idx].classList.add('active');

  // Future Cop audio easter egg
  if (name === 'fc') {
    setTimeout(function() {
      var toast = document.getElementById('_as_toast');
      try {
        var a = new Audio('assets/audio/skycaptain.mp3');
        a.volume = 0.72;
        a.play().catch(function(){});
      } catch(e) {}
      if (toast) {
        toast.textContent = '🔊 Niemand kann den Sky Captain aufhalten!';
        toast.style.transform = 'translateY(0)';
        toast.style.opacity = '1';
        clearTimeout(toast._t);
        toast._t = setTimeout(function(){
          toast.style.transform = 'translateY(80px)';
          toast.style.opacity = '0';
        }, 3500);
      }
    }, 400);
  }

  if (name === 'pokemon') { if (!pokeLoaded) loadPoke(); }
};

/* ── Blizzard sub-tab switching ─────────────────────── */
window.showBlizTab = function(name) {
  document.querySelectorAll('.bliz-sub').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.btab').forEach(function(b){ b.classList.remove('active'); });
  var sub = document.getElementById('bsub-' + name);
  if (sub) sub.classList.add('active');
  // Mark the right btab active
  document.querySelectorAll('.btab').forEach(function(b){
    if (b.getAttribute('onclick') && b.getAttribute('onclick').indexOf("'" + name + "'") >= 0) {
      b.classList.add('active');
    }
  });
  // Render cards for this sub-section if not yet done
  renderGameCards();
};

/* ─── Game cards ────────────────────────────────────────────────── */
function makePicture(base, alt, emoji, objPos) {
  var wrap = document.createElement('div');
  wrap.className = 'game-card-cover-wrap';
  var pic = document.createElement('picture');
  var src1 = document.createElement('source');
  src1.setAttribute('srcset', base + '.avif');
  src1.setAttribute('type', 'image/avif');
  var src2 = document.createElement('source');
  src2.setAttribute('srcset', base + '.webp');
  src2.setAttribute('type', 'image/webp');
  var img = document.createElement('img');
  img.className = 'game-card-cover';
  img.src = base + '.webp';
  img.alt = alt;
  img.loading = 'lazy';
  if (objPos) img.style.objectPosition = objPos;
  img.onerror = function() {
    var ph = document.createElement('div');
    ph.className = 'game-card-cover-placeholder';
    ph.textContent = emoji;
    wrap.replaceWith(ph);
  };
  pic.appendChild(src1);
  pic.appendChild(src2);
  pic.appendChild(img);
  wrap.appendChild(pic);
  // Click → open lightbox with full image
  wrap.addEventListener('click', function() {
    gameLbOpen(base + '.webp', alt);
  });
  return wrap;
}

/* ── Game image lightbox ─────────────────────────────── */
window.gameLbOpen = function(src, caption) {
  var lb  = document.getElementById('game-lb');
  var img = document.getElementById('game-lb-img');
  var cap = document.getElementById('game-lb-cap');
  if (!lb || !img) return;
  img.src = src;
  img.alt = caption || '';
  if (cap) cap.textContent = caption || '';
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
};
window.gameLbClose = function() {
  var lb = document.getElementById('game-lb');
  if (lb) { lb.classList.remove('open'); document.body.style.overflow = ''; }
};
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') gameLbClose();
});

function renderGameCards() {
  if (typeof DB === 'undefined') return;
  Object.keys(DB).forEach(function(s) {
    if (s === 'podcasts' || s === 'nature') return;
    var grid = document.getElementById(s + '-grid');
    if (!grid) return;
    grid.innerHTML = '';
    var imgs  = IMG[s] || null;
    var emoji = EMOJI[s] || '🎮';
    var cards = DB[s] || [];

    cards.forEach(function(item, idx) {
      var card = document.createElement('div');
      card.className = 'game-card';

      if (imgs) {
        var base = imgs[idx % imgs.length];
        var posArr = IMG_POS[s] || [];
        var pos = posArr[idx % imgs.length] || null;
        card.appendChild(makePicture(base, item.title, emoji, pos));
      } else {
        var ph = document.createElement('div');
        ph.className = 'game-card-cover-placeholder';
        ph.textContent = emoji;
        card.appendChild(ph);
      }

      var body = document.createElement('div');
      body.className = 'game-card-body';
      body.innerHTML =
        '<span class="game-badge ' + item.badge + '">' + item.badgeText + '</span>' +
        '<div class="game-card-title">' + item.title + '</div>' +
        '<div class="game-card-text">' + item.text + '</div>' +
        '<div class="tags">' + item.tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('') + '</div>';
      card.appendChild(body);
      grid.appendChild(card);
    });
  });
}

/* ─── Pokémon ───────────────────────────────────────────────────── */
var pokeLoaded = false, allPoke = [], filtPoke = [], pokeOff = 0, typeCache = {};
var BATCH = 24;

function loadPoke() {
  if (pokeLoaded) return;
  pokeLoaded = true;
  fetch('https://pokeapi.co/api/v2/pokemon?limit=493')
    .then(function(r){ return r.json(); })
    .then(function(d){
      allPoke = d.results.map(function(p,i){ return {name:p.name, id:i+1}; });
      filtPoke = allPoke.slice();
      renderPokeGrid();
    })
    .catch(function(){
      var g = document.getElementById('poke-grid');
      if (g) g.innerHTML = '<div class="poke-loading-msg">PokeAPI nicht erreichbar.</div>';
    });
}

function renderPokeGrid() {
  var grid = document.getElementById('poke-grid');
  if (!grid) return;
  if (pokeOff === 0) grid.innerHTML = '';
  filtPoke.slice(pokeOff, pokeOff + BATCH).forEach(function(p){
    grid.appendChild(makePokeCard(p));
  });
  pokeOff += BATCH;
  var more = document.getElementById('poke-more');
  if (more) more.style.display = pokeOff < filtPoke.length ? 'block' : 'none';
}

function makePokeCard(p) {
  var c = document.createElement('div');
  c.className = 'poke-card';
  c.innerHTML =
    '<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/' + p.id + '.png" alt="' + p.name + '" loading="lazy">' +
    '<div class="poke-name">' + p.name + '</div>' +
    '<div class="poke-num">#' + String(p.id).padStart(3,'0') + '</div>' +
    '<div class="poke-types" id="pt-' + p.id + '"><span class="type-badge type-normal">?</span></div>';
  c.onclick = function(){ showPokeDet(p.id); };
  loadPokeTypes(p.id);
  return c;
}

function loadPokeTypes(id) {
  if (typeCache[id]) return;
  fetch('https://pokeapi.co/api/v2/pokemon/' + id)
    .then(function(r){ return r.json(); })
    .then(function(d){
      typeCache[id] = d;
      var el = document.getElementById('pt-' + id);
      if (el) el.innerHTML = d.types.map(function(t){
        return '<span class="type-badge type-' + t.type.name + '">' + t.type.name + '</span>';
      }).join('');
    })
    .catch(function(){});
}

function showPokeDet(id) {
  var det = document.getElementById('poke-detail');
  if (!det) return;
  det.innerHTML = '<div style="color:var(--text3);font-family:var(--fm);padding:1rem">Lade\u2026</div>';
  det.classList.add('show');
  var d = typeCache[id];
  if (d) { renderPokeDet(det, d); return; }
  fetch('https://pokeapi.co/api/v2/pokemon/' + id)
    .then(function(r){ return r.json(); })
    .then(function(d){ typeCache[id] = d; renderPokeDet(det, d); })
    .catch(function(){ det.innerHTML = '<div style="color:var(--accent2);padding:1rem">Fehler beim Laden.</div>'; });
}

function renderPokeDet(det, d) {
  var sc = {hp:'#ff6b35',attack:'#f7c948',defense:'#5aa0e8','special-attack':'#e85878','special-defense':'#3ba844',speed:'#a890f0'};
  det.innerHTML =
    '<img class="poke-big-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/' + d.id + '.png" alt="' + d.name + '">' +
    '<div style="flex:1;min-width:200px">' +
    '<div class="poke-big-name">' + d.name + '</div>' +
    '<div style="display:flex;gap:.4rem;margin-bottom:.85rem">' + d.types.map(function(t){ return '<span class="type-badge type-' + t.type.name + '">' + t.type.name + '</span>'; }).join('') + '</div>' +
    '<div style="display:flex;gap:1.25rem;margin-bottom:.85rem;flex-wrap:wrap">' +
    '<div><div style="font-family:var(--fm);font-size:.65rem;color:var(--text3)">H\u00d6HE</div><div style="font-weight:500">' + (d.height/10) + 'm</div></div>' +
    '<div><div style="font-family:var(--fm);font-size:.65rem;color:var(--text3)">GEWICHT</div><div style="font-weight:500">' + (d.weight/10) + 'kg</div></div>' +
    '</div>' +
    d.stats.map(function(s){
      return '<div class="stat-bar"><span class="stat-label-sm">' + s.stat.name.replace('special-','sp.') + '</span>' +
             '<span class="stat-val">' + s.base_stat + '</span>' +
             '<div class="stat-track"><div class="stat-fill" style="width:' + Math.min(100, s.base_stat/255*100) + '%;background:' + (sc[s.stat.name]||'var(--accent)') + '"></div></div></div>';
    }).join('') +
    '</div>';
  det.scrollIntoView({behavior:'smooth', block:'nearest'});
}

window.filterPoke = function() {
  var q    = (document.getElementById('poke-search') || {value:''}).value.toLowerCase();
  var type = (document.getElementById('type-filter') || {value:''}).value;
  var gen  = parseInt((document.getElementById('gen-filter') || {value:''}).value) || 0;
  var gens = [[1,151],[152,251],[252,386],[387,493]];
  filtPoke = allPoke.filter(function(p) {
    if (q && p.name.indexOf(q) < 0) return false;
    if (gen) { var mm = gens[gen-1]; if (p.id < mm[0] || p.id > mm[1]) return false; }
    if (type && typeCache[p.id]) {
      var has = typeCache[p.id].types.some(function(t){ return t.type.name === type; });
      if (!has) return false;
    }
    return true;
  });
  pokeOff = 0;
  renderPokeGrid();
};
window.loadMorePoke = function() { renderPokeGrid(); };

/* ─── Init ──────────────────────────────────────────────────────── */
renderGameCards();

})();
</script>

  // ────────────────────────────────────────
  // SOUNDBOARD: build grid + audio engine
  // ────────────────────────────────────────
  var skyBuilt = false;
  function skyBuild(){
    if(skyBuilt) return; skyBuilt = true;
    var container = document.getElementById('sky-grid-container');
    if(!container) return;

    // Group by category, preserving order from SKY_CLIPS
    var catOrder = [];
    var grouped = {};
    SKY_CLIPS.forEach(function(c){
      if(!grouped[c.cat]){ grouped[c.cat] = []; catOrder.push(c.cat); }
      grouped[c.cat].push(c);
    });

    container.innerHTML = '';
    catOrder.forEach(function(cat){
      var clips = grouped[cat];
      var sec = document.createElement('div'); sec.className = 'sky-cat-section';
      var lbl = document.createElement('div'); lbl.className = 'sky-cat-label';
      lbl.innerHTML = cat + '<span class="sky-cat-count">' + clips.length + '</span>';
      sec.appendChild(lbl);

      var grid = document.createElement('div'); grid.className = 'sky-grid';
      clips.forEach(function(c){
        var btn = document.createElement('button'); btn.className = 'sky-btn';
        btn.innerHTML = '<span class="sky-num">' + String(c.n).padStart(2,'0') + '</span>' + escapeHtml(c.label);
        btn.onclick = function(){ skyPlay(c, btn); };
        grid.appendChild(btn);
      });
      sec.appendChild(grid);
      container.appendChild(sec);
    });
  }

  var skyActiveAudios = [];

  function skyPlay(clip, btn){
    var src = 'assets/audio/future_cop/' + encodeURIComponent(clip.file);
    var a = new Audio(src); a.volume = 0.85;
    skyActiveAudios.push(a);
    btn.classList.add('playing');
    a.addEventListener('ended', function(){
      btn.classList.remove('playing');
      var i = skyActiveAudios.indexOf(a); if(i>=0) skyActiveAudios.splice(i,1);
    });
    a.addEventListener('error', function(){
      btn.classList.remove('playing');
      btn.style.opacity = '.4';
      btn.title = 'Datei nicht gefunden: ' + clip.file;
    });
    a.play().catch(function(){ btn.classList.remove('playing'); });
  }

  window.skyStopAll = function(){
    skyActiveAudios.forEach(function(a){ try{ a.pause(); a.currentTime = 0; }catch(e){} });
    skyActiveAudios = [];
    document.querySelectorAll('.sky-btn.playing').forEach(function(b){ b.classList.remove('playing'); });
  };

  // ────────────────────────────────────────
  // FIREWORKS canvas
  // ────────────────────────────────────────
  function skyFireworks(duration){
    var cv = document.getElementById('sky-fireworks');
    if(!cv) return;
    cv.classList.add('active');
    var ctx = cv.getContext('2d');
    function resize(){ cv.width = innerWidth; cv.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);

    var particles = [];
    var rockets = [];
    var t0 = performance.now();
    var lastRocket = 0;

    var palettes = [
      ['#fca5a5','#dc2626','#fbbf24','#f59e0b'],   // red+gold
      ['#a78bfa','#7c3aed','#c084fc','#f0abfc'],   // purple
      ['#60a5fa','#3b82f6','#22d3ee','#a5f3fc'],   // blue+cyan
      ['#fb923c','#f97316','#fde047','#fb7185'],   // orange+pink
    ];

    function launchRocket(){
      var x = innerWidth * (0.15 + Math.random()*0.7);
      var targetY = innerHeight * (0.15 + Math.random()*0.35);
      var palette = palettes[Math.floor(Math.random()*palettes.length)];
      rockets.push({
        x:x, y:innerHeight+10, tx:x+(Math.random()-.5)*60, ty:targetY,
        vy:-(7 + Math.random()*3), trail:[], palette:palette, exploded:false
      });
    }

    function explode(r){
      var n = 50 + Math.floor(Math.random()*40);
      for(var i=0;i<n;i++){
        var ang = Math.random()*Math.PI*2;
        var speed = 1 + Math.random()*5;
        particles.push({
          x:r.x, y:r.y,
          vx:Math.cos(ang)*speed, vy:Math.sin(ang)*speed,
          life:1, decay:0.008 + Math.random()*0.012,
          color:r.palette[Math.floor(Math.random()*r.palette.length)],
          size:1.5 + Math.random()*2
        });
      }
    }

    function frame(now){
      var elapsed = now - t0;
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fillRect(0,0,cv.width,cv.height);

      // Spawn rockets
      if(elapsed < duration - 600 && now - lastRocket > 220 + Math.random()*200){
        launchRocket(); lastRocket = now;
        if(Math.random() < 0.4){ setTimeout(launchRocket, 80); }
      }

      // Update rockets
      rockets.forEach(function(r){
        r.trail.push({x:r.x,y:r.y});
        if(r.trail.length>8) r.trail.shift();
        r.y += r.vy;
        if(r.y <= r.ty && !r.exploded){
          r.exploded = true;
          explode(r);
        }
        if(!r.exploded){
          r.trail.forEach(function(t,i){
            ctx.beginPath();
            ctx.fillStyle = r.palette[0];
            ctx.globalAlpha = i/r.trail.length;
            ctx.arc(t.x, t.y, 2, 0, Math.PI*2);
            ctx.fill();
          });
          ctx.globalAlpha = 1;
        }
      });
      rockets = rockets.filter(function(r){ return !r.exploded; });

      // Update particles
      particles.forEach(function(p){
        p.vy += 0.04; // gravity
        p.vx *= 0.99; p.vy *= 0.99;
        p.x += p.vx; p.y += p.vy;
        p.life -= p.decay;
        ctx.beginPath();
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
      });
      particles = particles.filter(function(p){ return p.life > 0; });
      ctx.globalAlpha = 1;

      if(elapsed < duration || particles.length > 0 || rockets.length > 0){
        requestAnimationFrame(frame);
      } else {
        ctx.clearRect(0,0,cv.width,cv.height);
        cv.classList.remove('active');
      }
    }
    requestAnimationFrame(frame);
  }

  // ────────────────────────────────────────
  // TRIGGER: open soundboard
  // ────────────────────────────────────────
  window.skyOpenEasterEgg = function(){
    skyBuild();
    skyFireworks(2200);
    // Delay modal to let the first salvo show
    setTimeout(function(){
      document.getElementById('sky-modal').classList.add('active');
      document.body.style.overflow = 'hidden';
      // Play one random clip on open as a fanfare
      var clips = SKY_CLIPS;
      var pick = clips[Math.floor(Math.random()*Math.min(3, clips.length))]; // first 3 = grand intro lines
      var fakeBtn = {classList:{add:function(){},remove:function(){}}, style:{}};
      skyPlay(pick, fakeBtn);
    }, 700);
  };

  window.skyClose = function(){
    document.getElementById('sky-modal').classList.remove('active');
    document.body.style.overflow = '';
    skyStopAll();
  };

  // ────────────────────────────────────────
  // TRIGGER: tippe  "futurecop"  oder  "skycaptain"
  // ────────────────────────────────────────
  var typedBuffer = '';
  var triggers = ['futurecop','skycaptain'];
  document.addEventListener('keydown', function(e){
    // ESC closes the soundboard
    if(e.key === 'Escape'){
      var m = document.getElementById('sky-modal');
      if(m && m.classList.contains('active')) { skyClose(); return; }
    }
    // Random clip via Space
    if(e.key === ' '){
      var m2 = document.getElementById('sky-modal');
      if(m2 && m2.classList.contains('active')){
        // Don't trigger when typing in inputs
        if(['INPUT','TEXTAREA'].indexOf(document.activeElement.tagName)>=0) return;
        e.preventDefault();
        var btns = document.querySelectorAll('.sky-btn');
        if(btns.length){ btns[Math.floor(Math.random()*btns.length)].click(); }
        return;
      }
    }
    // Don't track when typing in inputs
    if(['INPUT','TEXTAREA'].indexOf(document.activeElement.tagName)>=0) return;
    if(e.key && e.key.length === 1){
      typedBuffer = (typedBuffer + e.key.toLowerCase()).slice(-20);
      triggers.forEach(function(trig){
        if(typedBuffer.indexOf(trig) >= 0){
          typedBuffer = '';
          window.skyOpenEasterEgg();
        }
      });
    }
  });

  function escapeHtml(s){
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
})();
</script>

  {name:'Platon',birth:-428,death:-348,epoch:'Klassisch',color:'#f7971e',x:0.17,above:true,desc:'Schüler des Sokrates. Gründer der Akademie. Sein Werk umfasst nahezu alle philosophischen Disziplinen.',ideas:['Ideenlehre: Die wahre Wirklichkeit ist nicht sichtbar','Das Höhlengleichnis','Philosophenkönig im Idealstaat']},
  {name:'Aristoteles',birth:-384,death:-322,epoch:'Klassisch',color:'#f7971e',x:0.20,above:false,desc:'Universalgelehrter und Begründer der Logik. Tutor Alexanders des Großen.',ideas:['Syllogismus: Die erste formale Logik','Eudaimonia als höchstes Gut','Hylomorphismus: Form und Materie als Einheit']},
  {name:'Epikur',birth:-341,death:-270,epoch:'Hellenismus',color:'#43e97b',x:0.23,above:true,desc:'Nicht vulgäre Lust sondern Seelenruhe (Ataraxia) und Freundschaft als höchstes Gut.',ideas:['Ataraxia: Seelenruhe als höchstes Gut','Freundschaft als Fundament des guten Lebens','Der Tod geht uns nichts an']},
  {name:'Zenon v. Kition',birth:-334,death:-262,epoch:'Hellenismus',color:'#43e97b',x:0.24,above:false,desc:'Begründer der Stoa. Tugend ist das einzige Gut.',ideas:['Tugend als einziges Gut','Naturgemäßes Leben','Kosmopolitismus: Alle sind Weltbürger']},
  {name:'Pyrrhon',birth:-360,death:-270,epoch:'Hellenismus',color:'#43e97b',x:0.25,above:true,desc:'Begründer des Skeptizismus. Wir können nichts mit Sicherheit wissen.',ideas:['Epoché: Urteilsenthaltung als Lebenshaltung','Ataraxia durch Nicht-Urteilen','Begründer des Pyrrhonischen Skeptizismus']},
  {name:'Plotin',birth:204,death:270,epoch:'Spätantike',color:'#ff6584',x:0.33,above:true,desc:'Bedeutendster Neuplatoniker. Drei-Hypostasen-Lehre: Das Eine — Nous — Seele.',ideas:['Das Eine: jenseits aller Bestimmungen','Emanation: Aus dem Einen strömt alles aus','Rückkehr der Seele zum Einen']},
  {name:'Porphyrios',birth:234,death:305,epoch:'Spätantike',color:'#ff6584',x:0.34,above:false,desc:'Schüler Plotins. Herausgeber der Enneaden. Sein Isagoge prägte mittelalterliche Logik.',ideas:['Herausgabe von Plotins Enneaden','Universalienproblem','Kritik am Christentum']},
  {name:'Proklos',birth:412,death:485,epoch:'Spätantike',color:'#ff6584',x:0.36,above:true,desc:'Letzter großer Neuplatoniker. Systematisierte den Neuplatonismus zu einem Gesamtwerk.',ideas:['Systematisierung des Neuplatonismus','Die Elemente der Theologie','Einfluss auf Pseudo-Dionysius']},
  {name:'Augustinus',birth:354,death:430,epoch:'Spätantike',color:'#ff6584',x:0.38,above:false,desc:'Kirchenvater. Verband Neuplatonismus mit christlichem Denken.',ideas:['Das Böse als Privation des Guten','Gottestaat vs. Erdenstaat','Zeit als Bewusstseinsbewegung der Seele']},
  {name:'Boethius',birth:477,death:524,epoch:'Spätantike',color:'#e87070',x:0.39,above:true,desc:'Im Gefängnis schrieb er den Trost der Philosophie — eines der meistgelesenen Bücher des Mittelalters.',ideas:['Trost der Philosophie','Übertragung aristotelischer Logik ins Lateinische','Universalienproblem']},
  {name:'Ps.-Dionysius',birth:500,death:530,epoch:'Frühes MA',color:'#98d8d8',x:0.41,above:false,desc:'Verband Neuplatonismus mit christlicher Mystik. Grundlagen der negativen Theologie.',ideas:['Apophatische Theologie','Hierarchien der Engel und Kirche','Mystische Einigung mit Gott']},
  {name:'Avicenna',birth:980,death:1037,epoch:'Islamische Philos.',color:'#60c060',x:0.46,above:false,desc:'Bedeutendster islamischer Philosoph und Arzt. Synthese von Aristoteles und islamischer Theologie.',ideas:['Kommentar zu Aristoteles','Der fliegende Mensch: Beweis für die Seele','Essenz und Existenz als trennbare Prinzipien']},
  {name:'Averroes',birth:1126,death:1198,epoch:'Islamische Philos.',color:'#60c060',x:0.48,above:true,desc:'Großer Kommentator des Aristoteles.',ideas:['Aristoteles-Kommentare','Einheit des aktiven Intellekts','Trennung von Philosophie und Religion']},
  {name:'Anselm',birth:1033,death:1109,epoch:'Scholastik',color:'#98d8d8',x:0.47,above:false,desc:'Begründer der Scholastik. Erfand den ontologischen Gottesbeweis.',ideas:['Credo ut intelligam','Ontologischer Gottesbeweis','Wahrheitstheorie']},
  {name:'Thomas v. Aquin',birth:1225,death:1274,epoch:'Scholastik',color:'#98d8d8',x:0.51,above:true,desc:'Synthesis von Aristoteles und christlicher Theologie in der Summa Theologica.',ideas:['Fünf Gottesbeweise','Naturrecht','Glaube und Vernunft als komplementär']},
  {name:'Duns Scotus',birth:1266,death:1308,epoch:'Scholastik',color:'#88c8c8',x:0.52,above:false,desc:'Kritiker des Thomas. Lehrte die Univozität des Seins.',ideas:['Univozität des Seinsbegriffs','Haecceitas: Das Diesheit-Prinzip','Voluntarismus: Wille über Intellekt']},
  {name:'Wilhelm v. Ockham',birth:1287,death:1347,epoch:'Scholastik',color:'#88c8c8',x:0.53,above:true,desc:'Begründer des Nominalismus. Universalien existieren nur als Namen.',ideas:['Universalien sind nur Namen','Ockhams Rasiermesser','Trennung von Philosophie und Theologie']},
  {name:'Meister Eckhart',birth:1260,death:1328,epoch:'Mystik',color:'#d090f0',x:0.54,above:false,desc:'Dominikaner-Mystiker. Gottesgeburt in der Seele — radikale Einheitsontologie.',ideas:['Gottesgeburt in der Seele','Abgeschiedenheit als höchste Tugend','Seelenfünklein als göttlicher Kern']},
  {name:'Nikolaus v. Kues',birth:1401,death:1464,epoch:'Renaissance',color:'#f85888',x:0.57,above:false,desc:'Kardinal und Universalgelehrter. Coincidenzia oppositorum: In Gott fallen Gegensätze zusammen.',ideas:['Coincidentia oppositorum','Docta ignorantia: Das gelehrte Nichtwissen','Unendlichkeit des Universums']},
  {name:'Pico della Mirandola',birth:1463,death:1494,epoch:'Renaissance',color:'#f85888',x:0.58,above:true,desc:'Die Rede über die Würde des Menschen begründet den modernen Humanismus.',ideas:['Würde des Menschen','Der Mensch kann sich selbst formen','Synthesis aller Weisheitstraditionen']},
  {name:'Montaigne',birth:1533,death:1592,epoch:'Renaissance',color:'#e87070',x:0.59,above:false,desc:'Erfinder des Essays als Gattung. Philosophie als Selbsterkenntnis und Lebenskunst.',ideas:['Was weiß ich? (Que sais-je?)','Essay als neue philosophische Gattung','Stoische Gelassenheit gegenüber dem Tod']},
  {name:'Giordano Bruno',birth:1548,death:1600,epoch:'Renaissance',color:'#f85888',x:0.60,above:true,desc:'Lehrte das unendliche Universum mit unzähligen Welten. Starb auf dem Scheiterhaufen.',ideas:['Unendlichkeit des Universums','Unzählige bewohnte Welten','Pantheismus']},
  {name:'Francis Bacon',birth:1561,death:1626,epoch:'Renaissance',color:'#e87070',x:0.61,above:false,desc:'Begründer der modernen Wissenschaftsmethode. Wissen ist Macht.',ideas:['Induktive Methode','Novum Organum','Vier Idola als Hindernisse der Erkenntnis']},
  {name:'Descartes',birth:1596,death:1650,epoch:'Rationalismus',color:'#e85878',x:0.63,above:true,desc:'Vater der modernen Philosophie. Methodischer Zweifel als Weg zur sicheren Erkenntnis.',ideas:['Cogito ergo sum','Methodischer Zweifel','Körper-Geist-Dualismus']},
  {name:'Hobbes',birth:1588,death:1679,epoch:'Rationalismus',color:'#e07070',x:0.64,above:false,desc:'Begründer des modernen politischen Denkens.',ideas:['Naturzustand: Bellum omnium contra omnes','Gesellschaftsvertrag','Der Staat als Leviathan']},
  {name:'Pascal',birth:1623,death:1662,epoch:'Rationalismus',color:'#d06060',x:0.65,above:true,desc:'Mathematiker und religiöser Denker. Der Mensch als denkendes Rohr.',ideas:['Der Mensch ist ein denkendes Rohr','Pascals Wette','Gründe des Herzens']},
  {name:'Spinoza',birth:1632,death:1677,epoch:'Rationalismus',color:'#f85888',x:0.66,above:false,desc:'Radikaler Pantheist. Deus sive Natura. Freiheit als Einsicht in die Notwendigkeit.',ideas:['Deus sive Natura','Freiheit als Einsicht in die Notwendigkeit','Geometrische Methode der Ethik']},
  {name:'Locke',birth:1632,death:1704,epoch:'Empirismus',color:'#60c090',x:0.67,above:false,desc:'Begründer des politischen Liberalismus. Das Bewusstsein als tabula rasa.',ideas:['Tabula rasa: Keine angeborenen Ideen','Naturrecht auf Leben, Freiheit und Eigentum','Gewaltenteilung']},
  {name:'Leibniz',birth:1646,death:1716,epoch:'Rationalismus',color:'#e87060',x:0.68,above:true,desc:'Universalgenie. Erfand Differential- und Integralrechnung. Die beste aller möglichen Welten.',ideas:['Monadologie','Die beste aller möglichen Welten','Prästabilierte Harmonie']},
  {name:'Berkeley',birth:1685,death:1753,epoch:'Empirismus',color:'#50b080',x:0.69,above:true,desc:'Radikaler Idealist. Esse est percipi: Sein heißt wahrgenommen werden.',ideas:['Esse est percipi','Immaterialismus','Gott als Garant der Wahrnehmung']},
  {name:'Vico',birth:1668,death:1744,epoch:'Aufklärung',color:'#ffd166',x:0.71,above:true,desc:'Begründer der Geschichtsphilosophie. Verum et factum convertuntur.',ideas:['Verum-Factum-Prinzip','Drei Zeitalter der Geschichte','Neue Wissenschaft']},
  {name:'Hume',birth:1711,death:1776,epoch:'Empirismus',color:'#50b080',x:0.70,above:false,desc:'Radikaler Skeptiker. Kausalität ist Gewohnheit. Weckte Kant aus dem dogmatischen Schlummer.',ideas:['Kausalität ist Gewohnheit keine Einsicht','Das Selbst ist ein Bündel von Eindrücken','Sein und Sollen: Das Humsche Gesetz']},
  {name:'Rousseau',birth:1712,death:1778,epoch:'Aufklärung',color:'#ffd166',x:0.73,above:true,desc:'Der natürliche Mensch ist gut — die Gesellschaft korrumpiert ihn.',ideas:['Der natürliche Mensch ist gut','Gesellschaftsvertrag und Volkssouveränität','Emile: Erziehung zur Entfaltung']},
  {name:'Voltaire',birth:1694,death:1778,epoch:'Aufklärung',color:'#ffd166',x:0.72,above:false,desc:'Leitfigur der Aufklärung. Radikale Religionskritik.',ideas:['Écrasez l\'infâme: Kampf gegen Fanatismus','Satirische Kritik des Optimismus (Candide)','Deismus']},
  {name:'Kant',birth:1724,death:1804,epoch:'Deutscher Idealismus',color:'#e8c040',x:0.75,above:false,desc:'Kopernikanische Wende: Das Subjekt konstituiert die Erkenntnis. Kategorischer Imperativ.',ideas:['Kategorischer Imperativ','Kritik der reinen Vernunft','Das Ding an sich bleibt unerkennbar']},
  {name:'Fichte',birth:1762,death:1814,epoch:'Deutscher Idealismus',color:'#d0b030',x:0.77,above:true,desc:'Radikalisierte Kant. Das Ich setzt sich selbst und das Nicht-Ich.',ideas:['Das Ich setzt sich selbst','Wissenschaftslehre','Tathandlung statt Faktum']},

  {name:'Hegel',birth:1770,death:1831,epoch:'Deutscher Idealismus',color:'#c09010',x:0.79,above:true,desc:'Dialektik als Gesetz des Geistes. Das Absolute verwirklicht sich in der Zeit.',ideas:['These – Antithese – Synthese','Phänomenologie des Geistes','Der Weltgeist in der Geschichte']},
  {name:'Schopenhauer',birth:1788,death:1860,epoch:'Pessimismus',color:'#e07070',x:0.80,above:false,desc:'Der Wille als blindes kosmisches Prinzip. Das Leben ist Leiden.',ideas:['Der Wille als blinder Weltgrund','Erlösung durch Kunst und Askese','Verneinung des Willens zum Leben']},
  {name:'Feuerbach',birth:1804,death:1872,epoch:'Kritische Philos.',color:'#c07050',x:0.81,above:true,desc:'Gott ist eine Projektion menschlicher Wünsche. Prägte Marx.',ideas:['Gott ist eine Projektion des Menschen','Materialismus gegen Hegels Idealismus','Das Wesen des Christentums']},
  {name:'Kierkegaard',birth:1813,death:1855,epoch:'Existenzphilosophie',color:'#fb923c',x:0.82,above:true,desc:'Begründer des Existenzialismus. Gegen Hegels System. Die drei Stadien des Lebens.',ideas:['Drei Existenzstadien: Ästhetisch – Ethisch – Religiös','Entweder/Oder: Radikale Entscheidung','Der Sprung zum Glauben']},
  {name:'Marx',birth:1818,death:1883,epoch:'Kritische Philos.',color:'#c06040',x:0.82,above:false,desc:'Stellt Hegel vom Kopf auf die Füße. Materielle Verhältnisse treiben die Geschichte.',ideas:['Historischer Materialismus','Entfremdung der Arbeit','Basis und Überbau']},
  {name:'Nietzsche',birth:1844,death:1900,epoch:'Existenzphilosophie',color:'#fb923c',x:0.84,above:true,desc:'Radikaler Kritiker aller abendländischen Werte. Umwertung aller Werte.',ideas:['Gott ist tot','Wille zur Macht','Übermensch und ewige Wiederkehr']},

// ── Page inits (called every visit) ──────────────
const _pageInits = {};
function registerPageInit(id, fn) { _pageInits[id] = fn; }

// ── HTML cache (content only — not init state) ───
const _htmlCache = {};

async function getPageHTML(id) {
  if (_htmlCache[id]) return _htmlCache[id];

  // Try embedded <template> first (works with file://)
  const tpl = document.getElementById('page-' + id);
  if (tpl) {
    const div = document.createElement('div');
    if (tpl.content) div.appendChild(tpl.content.cloneNode(true));
    else div.innerHTML = tpl.innerHTML;
    _htmlCache[id] = div.innerHTML;
    return _htmlCache[id];
  }

  // Fall back to fetch (http://)
  try {
    const r = await fetch('pages/' + id + '.html');
    if (r.ok) { _htmlCache[id] = await r.text(); return _htmlCache[id]; }
  } catch(e) {}
  return null;
}

// ── Router ────────────────────────────────────────
let _busy = false;

async function showPage(id) {
  if (_busy) return;
  _busy = true;

  // Update hash URL for direct links
  const newHash = '#' + id;
  if (location.hash !== newHash) history.pushState({page:id}, '', newHash);

  const root = document.getElementById('page-root');
  if (!root) { _busy = false; return; }

  root.style.transition = 'opacity .15s';
  root.style.opacity    = '0';

  const html = await getPageHTML(id);

  if (!html) {
    root.innerHTML = `<div style="padding:4rem 3rem;font-family:var(--fm);color:var(--text2)">
      <h2 style="font-family:var(--fh);color:var(--text);margin-bottom:1rem">Seite nicht gefunden</h2>
      <p>Starte einen lokalen Server: <code style="background:var(--surface);padding:.2rem .5rem;border-radius:4px">python3 -m http.server 8080</code></p>
    </div>`;
    root.style.opacity = '1';
    _busy = false;
    return;
  }

  // Inject HTML
  root.innerHTML = html;

  // Re-execute <script> tags (innerHTML doesn't run them)
  root.querySelectorAll('script').forEach(old => {
    const s = document.createElement('script');
    s.textContent = old.textContent;
    old.replaceWith(s);
  });

  requestAnimationFrame(() => { root.style.opacity = '1'; });

  updateNavActive(id);
  window.scrollTo(0, 0);

  // Audio
  if (PAGE_AUDIO[id]) setTimeout(PAGE_AUDIO[id], 350);

  // Run page init — EVERY time (not cached)
  if (_pageInits[id]) {
    setTimeout(() => {
      try { _pageInits[id](); } catch(e) { console.warn('init error', id, e); }
      _busy = false;
    }, 60);
  } else {
    _busy = false;
  }
}

function updateNavActive(id) {
  document.querySelectorAll('.nav-direct,.nav-group-btn').forEach(b => b.classList.remove('active','group-active'));
  const d = document.getElementById('navbtn-' + id);
  if (d) { d.classList.add('active'); return; }
  NAV.forEach(g => {
    if (g.type !== 'group') return;
    if ((g.items||[]).some(it => it.id === id)) {
      const gb = document.getElementById('navgrp-' + g.label);
      if (gb) gb.classList.add('group-active');
    }
  });
}

// ── Nav builder ───────────────────────────────────
function buildNav() {
  const ul = document.getElementById('nav-groups');
  if (!ul) return;
  ul.innerHTML = '';

  NAV.forEach(item => {
    const li = document.createElement('li');

    if (item.type === 'direct') {
      const b = document.createElement('button');
      b.className = 'nav-direct'; b.id = 'navbtn-' + item.id;
      b.textContent = item.label;
      b.onclick = () => showPage(item.id);
      li.appendChild(b);

    } else {
      li.className = 'nav-group';
      const btn = document.createElement('button');
      btn.className = 'nav-group-btn'; btn.id = 'navgrp-' + item.label;
      btn.innerHTML = item.label + ' <span class="arr">▾</span>';
      btn.addEventListener('click', e => {
        e.stopPropagation();
        document.querySelectorAll('.nav-group').forEach(g => { if (g !== li) g.classList.remove('open'); });
        li.classList.toggle('open');
      });

      const dd = document.createElement('div');
      dd.className = 'nav-dropdown';
      (item.items||[]).forEach(it => {
        if (it.divider) { dd.appendChild(Object.assign(document.createElement('div'), {className:'nav-dropdown-divider'})); return; }
        const di = document.createElement('div');
        di.className = 'nav-dropdown-item';
        di.innerHTML = `<span class="icon">${it.icon}</span>${it.label}`;
        di.onclick = () => { li.classList.remove('open'); showPage(it.id); };
        dd.appendChild(di);
      });
      li.appendChild(btn); li.appendChild(dd);
    }
    ul.appendChild(li);
  });
}

function buildFooter() {
  const f = document.getElementById('site-footer');
  if (!f) return;
  f.innerHTML = `<p class="footer-txt">&copy; 2025 Alexander Schmidt</p>

      <a href="https://linkedin.com/in/alexander-schmidt" target="_blank" rel="noopener">LinkedIn</a>
      <a href="mailto:aschmidtphil@gmail.com">Email</a>
    </div>`;
}

// ── Init ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(_theme);
  buildNav();
  buildFooter();

  // Read hash for direct links / page reload
  const startPage = (location.hash || '#home').slice(1) || 'home';
  applyStyle(_style);
    showPage(startPage);

  // Browser back/forward
  window.addEventListener('popstate', e => {
    const id = (e.state && e.state.page) || (location.hash||'#home').slice(1) || 'home';
    showPage(id);
  });

  // Close dropdowns outside click or Escape
  document.addEventListener('click', e => {
    if (!e.target.closest('nav')) document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
  });
});

var pokeLoaded=false,allPoke=[],filtPoke=[],pokeOff=0,typeCache={},BATCH=24;
async function loadPoke(){
  if(pokeLoaded)return;pokeLoaded=true;
  try{
    var r=await fetch('https://pokeapi.co/api/v2/pokemon?limit=493');
    var d=await r.json();
    allPoke=d.results.map(function(p,i){return{name:p.name,id:i+1};});
    filtPoke=allPoke.slice();renderPokeGrid();
  }catch(e){document.getElementById('poke-grid').innerHTML='<div class="poke-loading-msg">PokeAPI nicht erreichbar.</div>';}
}
function renderPokeGrid(){
  var grid=document.getElementById('poke-grid');
  if(pokeOff===0)grid.innerHTML='';
  filtPoke.slice(pokeOff,pokeOff+BATCH).forEach(function(p){grid.appendChild(makePokeCard(p));});
  pokeOff+=BATCH;
  var more=document.getElementById('poke-more');
  if(more)more.style.display=pokeOff<filtPoke.length?'block':'none';
}
function makePokeCard(p){
  var c=document.createElement('div');c.className='poke-card';
  c.innerHTML='<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/'+p.id+'.png" alt="'+p.name+'" loading="lazy">'
    +'<div class="poke-name">'+p.name+'</div>'
    +'<div class="poke-num">#'+String(p.id).padStart(3,'0')+'</div>'
    +'<div class="poke-types" id="pt-'+p.id+'"><span class="type-badge type-normal">?</span></div>';
  c.onclick=function(){showPokeDet(p.id);};
  loadPokeTypes(p.id);return c;
}
async function loadPokeTypes(id){
  if(typeCache[id])return;
  try{var r=await fetch('https://pokeapi.co/api/v2/pokemon/'+id);var d=await r.json();typeCache[id]=d;
  var el=document.getElementById('pt-'+id);
  if(el)el.innerHTML=d.types.map(function(t){return'<span class="type-badge type-'+t.type.name+'">'+t.type.name+'</span>';}).join('');}catch(e){}
}
async function showPokeDet(id){

  det.innerHTML='<div style="color:var(--text3);font-family:var(--fm);padding:1rem">Lade…</div>';

var philZoomLevel=1;
var philBaseW=3600;
var philActiveEpoch='';
var philSearchTerm='';

function buildPhil(){
  
  // Epoch buttons
  var btns=document.getElementById('epoch-btns');
  btns.innerHTML='<button class="epoch-btn active" onclick="philFilterEpoch(\'\',this)">Alle</button>';
  EPOCHS_META.forEach(function(e){
    var b=document.createElement('button');b.className='epoch-btn';
    b.style.borderColor=e.color+'55';
    b.innerHTML='<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+e.color+';margin-right:4px;vertical-align:middle"></span>'+e.name;
    b.onclick=function(){philFilterEpoch(e.name,this);};
    btns.appendChild(b);
  });
  renderTimeline();
  // Drag to scroll
  var sc=document.getElementById('tl-scroll');
  var isDown=false,sX,sL;
  sc.addEventListener('mousedown',function(e){isDown=true;sX=e.pageX-sc.offsetLeft;sL=sc.scrollLeft;});
  sc.addEventListener('mouseleave',function(){isDown=false;});
  sc.addEventListener('mouseup',function(){isDown=false;});
  sc.addEventListener('mousemove',function(e){if(!isDown)return;e.preventDefault();sc.scrollLeft=sL-(e.pageX-sc.offsetLeft-sX);});
}

function renderTimeline(){
  var W=philBaseW*philZoomLevel;
  var AY=240;
  var inner=document.getElementById('tl-inner');
  inner.innerHTML='<div class="tl-axis"></div>';
  inner.style.width=W+'px';
  inner.style.height='480px';
  // Year marks
  var years=[-600,-400,-200,0,200,400,600,800,1000,1200,1400,1500,1600,1700,1750,1800,1850,1900,1925,1950,1975,2000,2025];
  years.forEach(function(y){
    var pct=(y+700)/2800;
    var x=pct*W;
    var lbl=document.createElement('div');
    lbl.className='tl-yr'+(Math.abs(y)%400===0?' tl-yr-major':'');
    lbl.style.left=x+'px';
    lbl.textContent=y<0?Math.abs(y)+' v.Chr.':y===0?'0':y+'';
    inner.appendChild(lbl);
    // tick
    var tick=document.createElement('div');
    tick.style.cssText='position:absolute;left:'+x+'px;top:'+(AY+2)+'px;width:1px;height:'+(Math.abs(y)%400===0?10:6)+'px;background:rgba(128,128,128,'+(Math.abs(y)%400===0?.35:.2)+')';
    inner.appendChild(tick);
  });
  // Philosopher nodes
  PHILS_DATA.forEach(function(p,i){
    var px=p.x*W;
    var node=document.createElement('div');
    node.className='tl-node';
    node.setAttribute('data-epoch',p.epoch);
    node.setAttribute('data-name',p.name.toLowerCase());
    var LH=60;
    var above=p.above;
    var dotTop=AY-5;
    var lineTop=above?AY-LH:AY+2;
    var cardTop=above?AY-LH-80:AY+LH+2;
    node.style.cssText='left:'+px+'px;top:0;position:absolute;';
    node.innerHTML='<div class="tl-dot" style="background:'+p.color+';top:'+dotTop+'px;"></div>'
      +'<div class="tl-line" style="top:'+lineTop+'px;height:'+LH+'px;"></div>'
      +'<div class="tl-card" style="top:'+cardTop+'px;">'
      +'<div class="tl-card-name" style="color:'+p.color+'">'+p.name+'</div>'
      +'<div class="tl-card-dates">'+(p.birth<0?Math.abs(p.birth)+' v.Chr.':p.birth)+'–'+(p.death===0?'heute':(p.death<0?Math.abs(p.death)+' v.Chr.':p.death))+'</div>'
      +'<div class="tl-card-dates" style="margin-top:2px;opacity:.7">'+p.epoch+'</div>'
      +'</div>';
    node.onclick=function(){openPhilModal(p);};
    inner.appendChild(node);
  });
  applyPhilFilters();
}

function philZoom(factor){
  philZoomLevel=Math.max(0.5,Math.min(4,philZoomLevel*factor));
  var sc=document.getElementById('tl-scroll');
  var ratio=sc.scrollLeft/sc.scrollWidth;
  renderTimeline();
  sc.scrollLeft=ratio*sc.scrollWidth;
}
function philZoomReset(){philZoomLevel=1;renderTimeline();}

function philFilterEpoch(ep,btn){
  philActiveEpoch=ep;
  document.querySelectorAll('.epoch-btn').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  applyPhilFilters();
}
function filterPhilSearch(){
  philSearchTerm=document.getElementById('phil-search').value.toLowerCase();
  applyPhilFilters();
}
function applyPhilFilters(){
  document.querySelectorAll('.tl-node').forEach(function(n){
    var epochMatch=!philActiveEpoch||n.getAttribute('data-epoch')===philActiveEpoch;
    var nameMatch=!philSearchTerm||n.getAttribute('data-name').indexOf(philSearchTerm)>=0;
    n.style.opacity=(epochMatch&&nameMatch)?'1':'0.1';
    n.style.pointerEvents=(epochMatch&&nameMatch)?'auto':'none';
  });
}

function openPhilModal(p){
  document.getElementById('m-epoch').innerHTML='<span style="color:'+p.color+'">'+p.epoch+'</span>';
  document.getElementById('m-name').textContent=p.name;
  document.getElementById('m-dates').textContent=(p.birth<0?Math.abs(p.birth)+' v. Chr.':p.birth)+' – '+(p.death===0?'heute':(p.death<0?Math.abs(p.death)+' v. Chr.':p.death));
  document.getElementById('m-desc').textContent=p.desc;
  document.getElementById('m-ideas').innerHTML=p.ideas.map(function(i){return'<li>'+i+'</li>';}).join('');
  document.getElementById('phil-modal').classList.add('open');
}

  var vl=document.getElementById('mb-val');if(vl)vl.textContent=mi;
  var img=ctx.createImageData(W,H);
  for(var px=0;px<W;px++)for(var py=0;py<H;py++){
    var x0=mbV.x+px/W*mbV.w,y0=mbV.y+py/H*mbV.h,x=0,y=0,i=0;
    while(x*x+y*y<=4&&i<mi){var xt=x*x-y*y+x0;y=2*x*y+y0;x=xt;i++;}
    var idx=(py*W+px)*4;
    if(i===mi){img.data[idx]=10;img.data[idx+1]=10;img.data[idx+2]=20;img.data[idx+3]=255;}
    else{var t=i/mi;img.data[idx]=Math.floor(9*(1-t)*t*t*t*255);img.data[idx+1]=Math.floor(15*Math.pow(1-t,2)*t*t*255);img.data[idx+2]=Math.floor(8.5*Math.pow(1-t,3)*t*255);img.data[idx+3]=255;}
  }

var sortArr=[],sortRunning=false;
function initSort(){
  sortRunning=false;
  var n=parseInt((document.getElementById('sort-size')||{value:60}).value);
  sortArr=Array.from({length:n},function(){return Math.floor(Math.random()*300)+20;});
  drawSort(sortArr);
}
function drawSort(arr,h1,h2){
  h1=h1==null?-1:h1;h2=h2==null?-1:h2;
  var c=document.getElementById('sort-canvas');if(!c)return;
  var ctx=c.getContext('2d'),W=c.width,H=c.height;
  var dark=document.documentElement.getAttribute('data-theme')==='dark';
  ctx.fillStyle=dark?'#111118':'#f0f0f8';ctx.fillRect(0,0,W,H);
  var bw=Math.max(1,(W-20)/arr.length-1);
  arr.forEach(function(v,i){
    ctx.fillStyle=i===h1?'#e8527a':i===h2?'#22c55e':'#5b52e8';
    ctx.fillRect(10+i*(bw+1),H-v-5,bw,v);
  });
}
async function runSort(){
  if(sortRunning)return;sortRunning=true;
  var algo=document.getElementById('sort-algo').value,arr=sortArr.slice();
  var delay=function(ms){return new Promise(function(r){setTimeout(r,ms);});};
  var d=function(a,i,j){sortArr=a.slice();drawSort(sortArr,i,j);};
  if(algo==='bubble'){for(var i=0;i<arr.length-1;i++)for(var j=0;j<arr.length-i-1;j++){if(!sortRunning)return;if(arr[j]>arr[j+1]){var tmp=arr[j];arr[j]=arr[j+1];arr[j+1]=tmp;}d(arr,j,j+1);await delay(6);}}
  else if(algo==='insertion'){for(var i=1;i<arr.length;i++){var j=i;while(j>0&&arr[j-1]>arr[j]){var t=arr[j-1];arr[j-1]=arr[j];arr[j]=t;j--;if(!sortRunning)return;d(arr,j,j+1);await delay(10);}}}
  else if(algo==='quick'){
    async function qs(a,lo,hi){if(lo>=hi||!sortRunning)return;var p=a[hi],i2=lo;for(var j=lo;j<hi;j++){if(a[j]<p){var t=a[i2];a[i2]=a[j];a[j]=t;i2++;}d(arr,j,i2);await delay(4);if(!sortRunning)return;}var t=a[i2];a[i2]=a[hi];a[hi]=t;await qs(a,lo,i2-1);await qs(a,i2+1,hi);}
    await qs(arr,0,arr.length-1);
  }else{
    async function ms(a,lo,hi){if(lo>=hi||!sortRunning)return;var mid=Math.floor((lo+hi)/2);await ms(a,lo,mid);await ms(a,mid+1,hi);var tmp=[],i2=lo,j=mid+1;while(i2<=mid&&j<=hi)tmp.push(a[i2]<=a[j]?a[i2++]:a[j++]);while(i2<=mid)tmp.push(a[i2++]);while(j<=hi)tmp.push(a[j++]);for(var k=0;k<tmp.length;k++){a[lo+k]=tmp[k];d(arr,lo+k,-1);await delay(3);}}
    await ms(arr,0,arr.length-1);
  }
  if(sortRunning){sortArr=arr.slice();drawSort(sortArr);}sortRunning=false;
}
function drawFourier(){
  var terms=parseInt((document.getElementById('f-terms')||{value:5}).value);
  var fv=document.getElementById('f-val');if(fv)fv.textContent=terms;
  var shape=(document.getElementById('f-shape')||{value:'square'}).value;
  var c=document.getElementById('f-canvas');if(!c)return;
  var ctx=c.getContext('2d'),W=c.width,H=c.height;
  var dark=document.documentElement.getAttribute('data-theme')==='dark';
  ctx.fillStyle=dark?'#111118':'#f0f0f8';ctx.fillRect(0,0,W,H);
  var freqs=[],totalR=0;
  for(var k=0;k<terms;k++){
    var n=2*k+1;
    var amp=shape==='square'?4/(Math.PI*n):shape==='sawtooth'?2/(Math.PI*n):8/(Math.PI*Math.PI*n*n)*(k%2===0?1:-1);
    freqs.push({n:n,amp:Math.abs(amp),phase:amp<0?Math.PI:0});totalR+=Math.abs(amp);
  }
  var sc=60/totalR,pts=[];
  for(var xi=0;xi<W-160;xi++){var t=xi/400*2*Math.PI,y=H/2;freqs.forEach(function(f){y+=f.amp*sc*Math.sin(f.n*t+f.phase);});pts.push({x:xi+160,y:y});}
  ctx.beginPath();pts.forEach(function(p,i){ctx[i?'lineTo':'moveTo'](p.x,p.y);});
  ctx.strokeStyle='#5b52e8';ctx.lineWidth=2;ctx.stroke();
  var bx=80,by=H/2;
  freqs.forEach(function(f,k){
    var r=f.amp*sc;
    ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);
    ctx.strokeStyle='hsl('+(200+k*18)+',65%,'+(dark?'55%':'40%')+')';ctx.lineWidth=0.8;ctx.stroke();
    var ex=bx+r*Math.cos(f.phase),ey=by+r*Math.sin(f.phase);
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(ex,ey);
    ctx.strokeStyle='hsl('+(200+k*18)+',65%,'+(dark?'65%':'45%')+')';ctx.lineWidth=1.5;ctx.stroke();
    bx=ex;by=ey;
  });
}
