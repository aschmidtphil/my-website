<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Alexander Schmidt — Data Scientist, Philosoph, Entwickler.">
  <meta name="author" content="Alexander Schmidt">
  <title>Alexander Schmidt</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

  <!--
  ═══════════════════════════════════════════════════════
  CSS — Load order matters. variables.css must be first.
  ═══════════════════════════════════════════════════════
  -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/philosophy.css">
  <link rel="stylesheet" href="css/akademisches.css">
  <link rel="stylesheet" href="css/interessen.css">
</head>
<body>

<!-- ═══════════════════════════════════════════
     NAVIGATION — built by js/nav.js → buildNav()
     Do not edit the nav here; edit NAV_STRUCTURE in nav.js
═══════════════════════════════════════════ -->
<nav>
  <a class="nav-logo" href="#" onclick="showPage('home');return false;">
    A<span>.</span>Schmidt
  </a>
  <ul class="nav-groups" id="nav-groups">
    <!-- injected by nav.js -->
  </ul>
  <div class="nav-right">
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">&#127769;</button>
    <button class="lang-btn"  onclick="toggleLang()">DE/EN</button>
  </div>
</nav>

<!-- ═══════════════════════════════════════════
     PAGE ROOT — pages/xxx.html is loaded here
     by the router in js/nav.js → showPage()
═══════════════════════════════════════════ -->
<div id="page-root">
  <!-- Content loaded dynamically -->
</div>

<!-- ═══════════════════════════════════════════
     FOOTER — built by nav.js → buildFooter()
═══════════════════════════════════════════ -->
<footer id="site-footer"></footer>

<!-- ═══════════════════════════════════════════
     PHILOSOPHY MODAL — shared across all pages
═══════════════════════════════════════════ -->
<div class="phil-modal-overlay" id="phil-modal"
     onclick="if(event.target===this)this.classList.remove('open')">
  <div class="phil-modal-box">
    <button class="phil-modal-close"
      onclick="document.getElementById('phil-modal').classList.remove('open')">&#10005;</button>
    <div class="phil-modal-epoch" id="m-epoch"></div>
    <div class="phil-modal-name"  id="m-name"></div>
    <div class="phil-modal-dates" id="m-dates"></div>
    <div class="phil-modal-desc"  id="m-desc"></div>
    <ul class="phil-ideas" id="m-ideas"></ul>
  </div>
</div>

<!--
═══════════════════════════════════════════════════════
SCRIPTS — load order: data.js → nav.js → pages.js

  data.js   All static content (buecher, kurse, DB games,
            philosophers, zitate, etc.)
            → Edit here to add/change content

  nav.js    Router, theme, language, nav builder
            → Edit NAV_STRUCTURE here to change navigation

  pages.js  All page renderers (gaming, bücher, studium,
            timeline, zitate, math, ...)
            → Edit here to change how pages are rendered
═══════════════════════════════════════════════════════
-->
<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script src="js/pages.js"></script>

</body>
</html>
