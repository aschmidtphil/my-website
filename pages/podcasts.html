const HBC={Philosophie:'hb-philo',Psychologie:'hb-psych',Gaming:'hb-gaming',Literatur:'hb-lit',
  Selbstentwicklung:'hb-selbst',Geschichte:'hb-gesch',Wissenschaft:'hb-wiss','Musik / Biografie':'hb-musik'};

// Stats
const st=document.getElementById('pod-stats');
if(st) st.innerHTML=
  '<div class="pstat"><span class="pstat-num">'+PODS.length+'</span><span class="pstat-lbl">PODCASTS</span></div>'+
  '<div class="pstat"><span class="pstat-num">'+HOERB.length+'</span><span class="pstat-lbl">HÖRBÜCHER</span></div>'+
  '<div class="pstat"><span class="pstat-num">'+PODS.filter(p=>p.cat.includes('Gaming')).length+'</span><span class="pstat-lbl">GAMING</span></div>'+
  '<div class="pstat"><span class="pstat-num">'+HOERB.filter(h=>h.cat==='Philosophie').length+'</span><span class="pstat-lbl">PHILOSOPHIE</span></div>';

// Podcast cat filter
let activeCat='Alle';
const cn=document.getElementById('pod-cat-nav');
const cats=['Alle',...new Set(PODS.map(p=>p.cat))];
cats.forEach(c=>{
  const b=document.createElement('button');
  b.className='pod-cat-btn'+(c==='Alle'?' active':'');
  b.textContent=c;
  b.onclick=()=>{activeCat=c;document.querySelectorAll('.pod-cat-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderPods();};
  cn.appendChild(b);
});
function renderPods(){
  const g=document.getElementById('pod-grid2');g.innerHTML='';
  (activeCat==='Alle'?PODS:PODS.filter(p=>p.cat===activeCat)).forEach(p=>{
    const d=document.createElement('div');d.className='pod-card2';
    const safeName = p.name.replace(/"/g,'&quot;');
    const cover = p.img
      ? '<img class="pod-cover2" src="'+p.img+'" alt="'+safeName+' Cover" loading="lazy">'
      : '<div class="pod-icon2" style="background:'+p.bg+'">'+p.icon+'</div>';
    const linkIcon = p.url
      ? '<a class="pod-link2" href="'+p.url+'" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Auf Apple Podcasts öffnen">↗</a>'
      : '';
    const officialDesc = (p.offdesc && p.offdesc.length>10)
      ? '<div class="pod-offdesc"><span class="pod-offlabel">Offiziell:</span> '+p.offdesc+'</div>' : '';
    d.innerHTML = cover + '<div class="pod-body2"><div class="pod-name2">'+p.name+linkIcon+'</div>'
                + '<span class="pod-badge">'+p.cat+'</span>'
                + '<div class="pod-desc2">'+p.desc+'</div>' + officialDesc + '</div>';
    if (p.url) { d.style.cursor='pointer'; d.onclick=function(e){ if(e.target.tagName!=='A') window.open(p.url,'_blank','noopener'); }; }
    g.appendChild(d);
  });
}
renderPods();

// Hörbücher
let hbS='title',hbD=1;
window.sortHB=function(c){if(hbS===c)hbD*=-1;else{hbS=c;hbD=1;}filterHB();};
window.filterHB=function(){
  const tb=document.getElementById('hb-tbody'); if(!tb) return;
  const s=document.getElementById('hb-search'); const c=document.getElementById('hb-cat');
  const q=(s&&s.value||'').toLowerCase(); const fc=c&&c.value||'';
  let arr=HOERB.filter(h=>(!fc||h.cat===fc)&&(!q||(h.title+h.author).toLowerCase().includes(q)));
  arr.sort((a,b)=>{const x=a[hbS]||'',y=b[hbS]||'';return x<y?-hbD:x>y?hbD:0;});
  tb.innerHTML='';
  arr.forEach(h=>{
    const tr=document.createElement('tr');
    const cover = h.img ? '<img class="hb-cover" src="'+h.img+'" alt="" loading="lazy">'
                        : '<div class="hb-cover hb-cover-none">📖</div>';
    const cls = {'Philosophie':'hb-philo','Psychologie':'hb-psych','Gaming':'hb-gaming','Literatur':'hb-lit','Selbstentwicklung':'hb-selbst','Geschichte':'hb-gesch','Wissenschaft':'hb-wiss','Musik / Biografie':'hb-musik'}[h.cat]||'';
    tr.innerHTML='<td class="hb-title-cell"><div class="hb-row-inner">'+cover+'<span>'+h.title+'</span></div></td>'
                +'<td>'+h.author+'</td>'
                +'<td><span class="hb-badge '+cls+'">'+h.cat+'</span></td>'
                +'<td>'+h.dauer+'</td>';
    tb.appendChild(tr);
  });
  const cnt=document.getElementById('hb-count'); if(cnt) cnt.textContent=arr.length+' Titel';
};
filterHB();
// Expose as global so pages.js renderPodcasts() call works too
window.renderPodcasts = function(){};
})();
