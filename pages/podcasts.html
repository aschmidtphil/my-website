<style>

.hb-badge{display:inline-block;padding:.1rem .42rem;border-radius:3px;font-size:.63rem;font-family:var(--fm);white-space:nowrap;}

// Podcast cat filter
let activeCat='Alle';
const cn=document.getElementById('pod-cat-nav');
const cats=['Alle',...new Set(PODS.map(p=>p.cat))];
cats.forEach(c=>{
  const b=document.createElement('button');
  b.className='pod-cat-btn'+(c==='Alle'?' active':'');
  b.textContent=c;
  b.onclick=()=>{activeCat=c;document.querySelectorAll('.pod-cat-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderPods();};
  cn.appendChild(b);
});
function renderPods(){
  const g=document.getElementById('pod-grid2');g.innerHTML='';
  (activeCat==='Alle'?PODS:PODS.filter(p=>p.cat===activeCat)).forEach(p=>{
    const d=document.createElement('div');d.className='pod-card2';
    d.innerHTML='<div class="pod-icon2" style="background:'+p.bg+'">'+p.icon+'</div>'

    g.appendChild(d);
  });
}
renderPods();

// Hörbücher
let hbS='title',hbD=1;
window.sortHB=function(c){if(hbS===c)hbD*=-1;else{hbS=c;hbD=1;}filterHB();};
window.filterHB=function(){
  const q=(document.getElementById('hb-search')||{value:''}).value.toLowerCase();
  const cat=(document.getElementById('hb-cat')||{value:''}).value;
  let d=HOERB.filter(h=>{
    if(cat&&h.cat!==cat)return false;
    if(q&&!h.title.toLowerCase().includes(q)&&!h.author.toLowerCase().includes(q))return false;
    return true;
  });
  d.sort((a,b)=>((a[hbS]||'').localeCompare(b[hbS]||'','de'))*hbD);
  const tb=document.getElementById('hb-tbody');tb.innerHTML='';
  d.forEach(h=>{
    const cls=HBC[h.cat]||'hb-wiss';
    const tr=document.createElement('tr');

  });

};
